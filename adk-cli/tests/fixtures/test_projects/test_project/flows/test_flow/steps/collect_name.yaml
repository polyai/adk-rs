step_type: default_step
name: collect_name
prompt: What is your name? {{entity:customer_name}}
conditions:
  - name: has_name
    condition_type: step_condition
    description: User provided name
    required_entities:
      - customer_name
    child_step: confirm_details
  - name: exit_flow
    condition_type: exit_flow_condition
    description: Exit flow
    required_entities: []
extracted_entities:
  - customer_name
