Conversation):\n    # Add your function definition here.\n    # You can optionally return a string that will be fed back to the LLM.\n    return {\"utterance\": \"they didn''t connect\"}\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-04-28T00:18:53.718Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-04-28T00:18:53.718Z","updatedBy":"kitan.ademidun@poly-ai.com"},"createdAt":"2026-04-28T00:18:53.718Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-04-28T00:19:09.788Z","updatedBy":"kitan.ademidun@poly-ai.com","archived":true,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTIONS-0ed163be":{"id":"FUNCTIONS-0ed163be","name":"handoff_routing","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"\"\"\"Server-side handoff destination derivation.\n\nSee docs/handoff-routing-refactor-plan.md for the design rationale.\n\nThis module is not called by the LLM. It is imported directly by\nfunctions/transfer_call.py (and eventually by the warm-transfer path in a\nlater phase). The LLM-facing handoff_to parameter is preserved for now and\noverridden by the shim when derived routing is enabled for the site.\n\"\"\"\n\nimport json\nfrom collections.abc import Callable\n\n\nHANDOFF_ATTRIBUTE_MISSING_METRIC = \"HANDOFF_ATTRIBUTE_MISSING\"\nHANDOFF_CONFIG_PARSE_ERROR_METRIC = \"HANDOFF_CONFIG_PARSE_ERROR\"\nHANDOFF_LOOKUP_FAILED_METRIC = \"HANDOFF_LOOKUP_FAILED\"\nHANDOFF_USES_DERIVED_ROUTING_METRIC = \"HANDOFF_USES_DERIVED_ROUTING\"\n\n# Sentinel returned by lookup_destination for an *intentional* default-queue\n# route (no conditional matched, and the reason isn''t in the routes map). Lets\n# downstream code and logs distinguish this from the ``None`` returned on\n# validation errors. build_handoff_dict / validate_handoff map it back to the\n# \"null\" SIP placeholder, so the wire format is unchanged.\nBRIGHTREE_DEFAULT_DESTINATION = \"BRIGHTREE_DEFAULT\"\n\n\ndef _regional_order_status_flow(conv: Conversation) -> bool:\n    return conv.variant.site_code == \"regionalhomecare\" and conv.current_flow == \"order-status\"\n\n\ndef _betternight_new_machine_flag_on(conv: Conversation) -> bool:\n    # Default True matches the existing .get(..., True) semantic in transfer_call.py.\n    return conv.variant.site_code == \"betternight\" and conv.real_time_config.get(\n        \"FEATURE_FLAG_turn_on_better_night_special_transfer\", True\n    )\n\n\n_CONDITIONAL_FLAG_PREDICATES: dict[str, Callable[[Conversation], bool]] = {\n    \"regional_order_status_flow\": _regional_order_status_flow,\n    \"betternight_new_machine_flag_on\": _betternight_new_machine_flag_on,\n}\n\n\ndef is_derived_routing_enabled(conv: Conversation) -> bool:\n    \"\"\"Derived routing is enabled when the conversation''s variant name is\n    listed in the per-campaign ``campaign_settings`` array in RTC with\n    ``routing_enabled`` true.\n\n    Defaults conservatively: a campaign that isn''t listed, or whose entry\n    is missing ``routing_enabled``, is treated as **off**. After the\n    BetterNight misrouting incident, routing-safety toggles must be opt-in\n    only — an omitted/typo''d entry should never silently enable derived\n    routing.\n    \"\"\"\n    rtc = conv.real_time_config\n    variant_name = conv.variant_name\n\n    campaign_settings = rtc.get(\"campaign_settings\", [])\n    if not isinstance(campaign_settings, list):\n        conv.log.warning(\n            \"Derived routing flag resolved\",\n            variant_name=variant_name,\n            enabled=False,\n            reason=\"rtc_campaign_settings_not_a_list\",\n        )\n        return False\n\n    for entry in campaign_settings:\n        if not isinstance(entry, dict):\n            continue\n        if entry.get(\"campaign_name\") == variant_name:\n            enabled = bool(entry.get(\"routing_enabled\", False))\n            conv.log.info(\n                \"Derived routing flag resolved\",\n                variant_name=variant_name,\n                enabled=enabled,\n                reason=\"campaign_name_match\",\n            )\n            return enabled\n\n    conv.log.info(\n        \"Derived routing flag resolved\",\n        variant_name=variant_name,\n        enabled=False,\n        reason=\"campaign_name_not_listed\",\n    )\n    return False\n\n\ndef _validate_config(conv: Conversation) -> dict | None:\n    \"\"\"Fetch the handoff routing variant attribute, parse its JSON, and\n    validate the structure up-front.\n\n    Returns the parsed config dict if valid, or ``None`` on any error —\n    missing variant attribute, JSON parse failure, or structural/format\n    violation — after logging and emitting the appropriate metric.\n    ``lookup_destination`` propagates this ``None`` so callers can\n    distinguish an *error* fallback (``None``) from an *intentional*\n    default-queue route (``BRIGHTREE_DEFAULT_DESTINATION``). Validates:\n\n    - variant attribute is present and truthy\n    - JSON parses\n    - top-level is a dict\n    - ``routes`` is present and is a dict; every value is either a 10-digit\n      PSTN string or the literal ``BRIGHTREE_DEFAULT_DESTINATION`` sentinel\n      (omitting the route entry has the same effect as the sentinel)\n    - ``conditionals`` (if present) is a list; each entry is a dict with\n      ``flag`` (registered), ``applies_to`` (``\"*\"`` or a list), and\n      ``destination`` (a 10-digit PSTN string or\n      ``BRIGHTREE_DEFAULT_DESTINATION``) keys\n    \"\"\"\n    raw = getattr(conv.variant, \"handoff_routing\", None)\n    if not raw:\n        conv.log.warning(\"Handoff routing attribute missing for variant\")\n        conv.write_metric(HANDOFF_ATTRIBUTE_MISSING_METRIC)\n        return None\n\n    try:\n        config = json.loads(raw)\n    except (TypeError, ValueError) as e:\n        conv.log.error(f\"Failed to parse handoff routing config: {e}\")\n        conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n        return None\n\n    if not isinstance(config, dict):\n        conv.log.error(f\"Handoff routing config is not a dict: {type(config).__name__}\")\n        conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n        return None\n\n    routes = config.get(\"routes\")\n    if routes is None:\n        conv.log.error(\"Handoff routing config is missing ''routes'' key\")\n        conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n        return None\n    if not isinstance(routes, dict):\n        conv.log.error(f\"Handoff routing routes is not a dict: {type(routes).__name__}\")\n        conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n        return None\n    for reason, dest in routes.items():\n        if not isinstance(dest, str):\n            conv.log.error(\n                f\"Handoff routing route destination for {reason!r} is not a string: {type(dest).__name__}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        if dest != BRIGHTREE_DEFAULT_DESTINATION and not (len(dest) == 10 and dest.isdigit()):\n            conv.log.error(\n                f\"Handoff routing route destination for {reason!r} is not a 10-digit PSTN \"\n                f\"or {BRIGHTREE_DEFAULT_DESTINATION!r}: {dest!r}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n\n    conditionals = config.get(\"conditionals\", [])\n    if not isinstance(conditionals, list):\n        conv.log.error(f\"Handoff routing conditionals is not a list: {type(conditionals).__name__}\")\n        conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n        return None\n\n    required_conditional_keys = {\"flag\", \"applies_to\", \"destination\"}\n    for cond in conditionals:\n        if not isinstance(cond, dict):\n            conv.log.error(\n                f\"Handoff routing conditional entry is not a dict: {type(cond).__name__}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        missing_keys = required_conditional_keys - cond.keys()\n        if missing_keys:\n            conv.log.error(\n                f\"Handoff routing conditional missing required keys: {sorted(missing_keys)}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        flag_name = cond[\"flag\"]\n        if flag_name not in _CONDITIONAL_FLAG_PREDICATES:\n            conv.log.error(f\"Handoff routing conditional references unregistered flag: {flag_name}\")\n            conv.write_metric(HANDOFF_ATTRIBUTE_MISSING_METRIC)\n            return None\n        applies_to = cond[\"applies_to\"]\n        if applies_to != \"*\" and not isinstance(applies_to, list):\n            conv.log.error(\n                f\"Handoff routing applies_to is not ''*'' or a list: {type(applies_to).__name__}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        if isinstance(applies_to, list) and not all(\n            isinstance(reason, str) for reason in applies_to\n        ):\n            conv.log.error(\"Handoff routing applies_to list contains non-string entries\")\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        cond_dest = cond[\"destination\"]\n        if not isinstance(cond_dest, str):\n            conv.log.error(\n                f\"Handoff routing conditional destination is not a string: {type(cond_dest).__name__}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        if cond_dest != BRIGHTREE_DEFAULT_DESTINATION and not (\n            len(cond_dest) == 10 and cond_dest.isdigit()\n        ):\n            conv.log.error(\n                f\"Handoff routing conditional destination is not a 10-digit PSTN \"\n                f\"or {BRIGHTREE_DEFAULT_DESTINATION!r}: {cond_dest!r}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n\n    return config\n\n\ndef lookup_destination(conv: Conversation, handoff_reason: str) -> str | None:\n    \"\"\"Resolve `(variant, handoff_reason, conv.state)` to a 10-digit PSTN\n    destination, ``BRIGHTREE_DEFAULT_DESTINATION`` for the intentional\n    default queue, or ``None`` if the config is invalid / missing.\n\n    Caller is responsible for normalizing `handoff_reason` (uppercase,\n    underscore-separated) before invocation. The current caller in\n    `transfer_call.py` performs that normalization before calling this\n    function.\n\n    Conditionals are evaluated in declared order — **first match wins**. If\n    two entries have overlapping ``applies_to`` lists and both predicates\n    are true for the current conversation, only the earlier entry fires.\n    YAML ordering is therefore load-bearing.\n    \"\"\"\n    config = _validate_config(conv)\n    if config is None:\n        return None\n\n    # Walk conditionals in declared order; first match wins. _validate_config\n    # guarantees every entry is a dict with flag/applies_to/destination keys\n    # and that destination is a 10-digit PSTN string.\n    for cond in config.get(\"conditionals\", []):\n        applies_to = cond[\"applies_to\"]\n        if applies_to != \"*\" and handoff_reason not in applies_to:\n            continue\n        predicate = _CONDITIONAL_FLAG_PREDICATES[cond[\"flag\"]]\n        if predicate(conv):\n            return cond[\"destination\"]\n\n    # Fall back to static routing; missing reason → intentional default queue.\n    return config[\"routes\"].get(handoff_reason, BRIGHTREE_DEFAULT_DESTINATION)\n\n\ndef handoff_routing(conv: Conversation):\n    # Utility-module stub required by Agent Studio''s file-validator\n    # (every .py in functions/ must define a function matching the filename).\n    # This module is imported directly by transfer_call.py — see\n    # lookup_destination / is_derived_routing_enabled above.\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-04-28T00:18:53.718Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-04-28T00:18:53.718Z","updatedBy":"kitan.ademidun@poly-ai.com"},"createdAt":"2026-04-28T00:18:53.718Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-04-28T00:19:09.788Z","updatedBy":"kitan.ademidun@poly-ai.com","archived":true,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTIONS-030fb23b":{"id":"FUNCTIONS-030fb23b","name":"end_outbound_patient_unavailable","description":"OUTBOUND CALLS ONLY. Ends the call with the standard outbound callback goodbye when the patient or caller is unavailable, busy, wants a callback later, or declines to continue.","parameters":{"ids":["PARAMETER-0d36e1fa"],"entities":{"PARAMETER-0d36e1fa":{"id":"PARAMETER-0d36e1fa","name":"reason","description":"Why this function is called. This should be NO_DOB if the user refused to provide a date of birth or NO_SUPPLIES if the user declined to order supplies. None if no reason otherwise.","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"}}},"code":"def end_outbound_patient_unavailable(conv: Conversation, reason: str):\n    if not conv.state.is_outbound:\n        conv.log.warning(\"end_outbound_patient_unavailable ignored: inbound call\")\n        return {\n            \"content\": (\n                \"Inbound call: Continue verification using only \"\n                \"{{ft:save_date_of_birth}} as described in this step.\"\n            )\n        }\n\n    if reason == \"NO_SUPPLIES\" or reason == \"NO_DOB\":\n        conv.state.outbound_statuses[\"no_order_items_requested\"] = True\n    else:\n        conv.state.outbound_statuses[\"patient_unavailable\"] = True\n    utterance = conv.functions.utterances(\"OUTBOUND_CALL_HANGUP_UTTERANCE\").format(\n        callback_number=conv.variant.callback_number,\n        callback_number_slowed=conv.variant.callback_number_slowed,\n    )\n    return conv.functions.handle_end_call(utterance=utterance)\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-04-28T00:19:09.788Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-04-28T00:19:09.788Z","updatedBy":"kitan.ademidun@poly-ai.com"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-5EED538E":true,"VARIABLES-c12c8036":true}}},"FUNCTIONS-b4a8db73":{"id":"FUNCTIONS-b4a8db73","name":"handle_bridge_ended","description":"handle ended bridge","parameters":{"ids":[],"entities":{}},"code":"def handle_bridge_ended(conv: Conversation):\n    # Add your function definition here.\n    # You can optionally return a string that will be fed back to the LLM.\n    return {\"utterance\": \"they didn''t connect\"}\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-04-28T00:19:09.788Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-04-28T00:19:09.788Z","updatedBy":"kitan.ademidun@poly-ai.com"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTIONS-da1ab45a":{"id":"FUNCTIONS-da1ab45a","name":"handoff_routing","description":"MUST NEVER BE CALLED","parame