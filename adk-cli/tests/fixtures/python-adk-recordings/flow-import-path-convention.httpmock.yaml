UCATIONAL_UTTERANCE = {\n        \"en-US\": \"So we advise you include {item_name} in your order. Shall I keep this in your order?\",\n        \"es-US\": \"Recomendamos que incluya {item_name} en su pedido. ¿Debo conservar esto en su pedido?\",\n    }\n\n    ANSWERS_ITEM_EDUCATIONAL_UTTERANCE_2 = {\n        \"en-US\": \"For the {item_name}, {educational_utterance}. {add_back_utt}\",\n        \"es-US\": \"Para {item_name}, {educational_utterance}. {add_back_utt}\",\n    }\n\n    GENERIC_HANDOFF_UTTERANCE = {\n        \"en-US\": \"One moment, let me transfer you to someone who can assist you further.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    GENERIC_HANDOFF_UTTERANCE_2 = {\n        \"en-US\": \"No worries, one moment while I transfer you to someone that can help you.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    SAME_OR_DIFFERENT_PATIENT = {\n        \"en-US\": \"And can you confirm that this is for the same patient or a different one?\",\n        \"es-US\": \"Me puede confirmar si su pedido es para el mismo paciente o otro paciente?\",\n    }\n\n    CONFIRM_PHONE_NUMBER_ADDITIONAL = {\n        \"en-US\": \"Wonderful, could you confirm the phone number we have on file for this patient?\",\n        \"es-US\": \"Excelente, ¿podría confirmar el número de teléfono que tenemos registrado para este paciente?\",\n    }\n\n    VERIFICATION_REQUEST_YOUR_DOB = {\n        \"en-US\": \"Ok, lovely... and could you just confirm the month, day, and year of your date of birth for me?\",\n        \"es-US\": \"De acuerdo, muy bien... ¿Podrías confirmarme el mes, el día y el año de tu fecha de nacimiento?\",\n    }\n\n    VERIFICATION_REQUEST_DOB_ON_FILE = {\n        \"en-US\": \"Ok, lovely... and could you just confirm the month, day, and year of the date of birth on file for me?\",\n        \"es-US\": \"De acuerdo, perfecto... ¿Podrías confirmarme el mes, el día y el año de mi fecha de nacimiento que consta en nuestros archivos?\",\n    }\n\n    VERIFICATION_REQUEST_PATIENT_DOB = {\n        \"en-US\": \"Could you just confirm the month, day, and year of the patient''s date of birth for me?\",\n        \"es-US\": \"¿Podrías confirmarme el mes, el día y el año de nacimiento del paciente?\",\n    }\n\n    # Outbound: caller is the patient\n    VERIFICATION_OUTBOUND_PATIENT_DOB_INTRO = {\n        \"en-US\": \"Hi, this is {agent_name} from {site_name}, calling on a recorded line. We''re calling because it''s time to refill your disposable supplies. I just need to confirm your account information, and I can get the supplies sent out. Can you confirm the date of birth on the account?\",\n        \"es-US\": \"Hola, le habla {agent_name} de {site_name}, en una línea grabada. Llamamos porque es momento de rellenar sus suministros desechables. Solo necesito confirmar la información de su cuenta para poder enviarlos. ¿Puede confirmar la fecha de nacimiento en la cuenta?\",\n    }\n\n    # Outbound: caller is the authorized representative\n    VERIFICATION_OUTBOUND_AUTHORIZED_REP_DOB_INTRO = {\n        \"en-US\": \"Hi, this is {agent_name} from {site_name}, calling on a recorded line. We''re calling because it''s time to refill their disposable supplies. I just need to confirm the account information, and I can get those sent out. Can you confirm the date of birth on the account?\",\n        \"es-US\": \"Hola, le habla {agent_name} de {site_name}, en una línea grabada. Llamamos porque es momento de rellenar sus suministros desechables. Solo necesito confirmar la información de la cuenta para poder enviarlos. ¿Puede confirmar la fecha de nacimiento en la cuenta?\",\n    }\n\n    OUTBOUND_CALL_HANGUP_BRIEF_UTTERANCE = {\n        \"en-US\": \"Thank you, I’ve documented your account. We’ll follow up again in the future but please don’t hesitate to call us if anything changes before then. Have a great day!\",\n        \"es-US\": \"Gracias, he documentado su cuenta. Nos pondremos en contacto nuevamente en el futuro, pero no dude en llamarnos si algo cambia antes de entonces. Que tenga un buen día!\",\n    }\n\n    OUTBOUND_CALL_HANGUP_UTTERANCE = {\n        \"en-US\": \"No problem, we''ll call back at another time, or we can also be contacted at {callback_number}. That is... {callback_number_slowed}. Have a great day, Goodbye!\",\n        \"es-US\": \"No hay problema, lo llamaremos en otro momento, o también puede contactarnos al {callback_number}. Es decir... {callback_number_slowed}. Que tenga un buen día, ¡adiós!\",\n    }\n\n    OUTBOUND_CALL_VOICEMAIL_UTTERANCE = {\n        \"en-US\": \"Hello, this is the resupply department with {site_name}, calling to discuss your supplies. Please return our call at {callback_number} at your earliest convenience. We are now available for resupply and order status 24 hours a day, 7 days a week, 365 days a year. Thank you, and we look forward to speaking with you.\",\n        \"es-US\": \"Hola, le habla el departamento de resurtido de {site_name}. Le llamamos para hablar sobre sus suministros. Por favor, devuélvanos la llamada al {callback_number} a la mayor brevedad posible. Ahora estamos disponibles para resurtidos y estado de pedidos las 24 horas del día, los 7 días de la semana, los 365 días del año. Gracias, y esperamos poder hablar con usted.\",\n    }\n\n    CONFIRM_PHONE_NUMBER = {\n        \"en-US\": \"Could you confirm the phone number we have on file?\",\n        \"es-US\": \"¿Podría confirmar el número de teléfono que tenemos registrado?\",\n    }\n\n    INVALID_NUMBER_GIVEN = {\n        \"en-US\": \"Sorry, didn''t quite get that, could you repeat your number or type it out again?\",\n        \"es-US\": \"Disculpe, no entendí. ¿Podría repetirlo o escribirlo nuevamente?\",\n    }\n\n    UPDATE_ADDRESS_HANDOFF = {\n        \"en-US\": \"One moment while I transfer you to someone who can update that for you.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    GENERIC_HANDOFF_UTTERANCE_6 = {\n        \"en-US\": \"Ok, just one moment while I transfer you to someone who can help further.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    NO_NUMBER_FOUND_NUMBER_COLLECTION = {\n        \"en-US\": \"Hmm... I couldn''t find any matches for that number on file. Could you repeat that number back to me? If it''s easier you can also type the number on the keypad and press the pound sign.\",\n        \"es-US\": \"Hmm... No encontré ninguna coincidencia con ese número. ¿Podrías repetirlo, por favor? Si te resulta más fácil, también puedes marcar el número en el teclado y presionar la tecla de número.\",\n    }\n\n    DENY_NUMBER_COLLECTION = {\n        \"en-US\": \"Sorry, could you say that number again? You can also just type it on the keypad and hit the pound sign.\",\n        \"es-US\": \"Perdón, ¿podrías repetir ese número? O, si te resulta más fácil, puedes marcarlo en el teclado y presionar la tecla de número.\",\n    }\n\n    CONFIRM_DOB = {\n        \"en-US\": \"Got it, and could you confirm the date of birth that we have on file with the month name, day, and year, please?\",\n        \"es-US\": \"Muy bien, ¿me podría confirmar la fecha de nacimiento que tenemos en el sistema, indicando el mes, el día y el año?\",\n    }\n\n    DEFAULT_OOH_UTTERANCE = {\n        \"en-US\": \"I apologize for the inconvenience; our contact center is closed {closure_period} In order to assist you with this inquiry, please call back Monday through Friday from {in_hours_times}. Is there anything else I can help you with today?\",\n        \"es-US\": \"Disculpe las molestias, pero nuestro centro de contacto está cerrado {closure_period} Para ayudarle con esta consulta, llame de lunes a viernes entre {in_hours_times}. ¿Hay algo más con lo que pueda ayudarle hoy?\",\n    }\n\n    NEW_SHIPPING_ADDRESS_HANDOFF = {\n        \"en-US\": \"So, it looks like we need to get your shipping information updated. Just one moment while I transfer you to someone who can get that sorted for you.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    MULTIPLE_PATIENTS_IDENTIFIED = {\n        \"en-US\": \"Alright, so... I''m seeing multiple patients linked to this number. Please can you provide the phone number for the patient you''re calling on behalf of?\",\n        \"es-US\": \"De acuerdo... estoy viendo que hay varios pacientes asociados con este número. ¿Me puede dar el número de teléfono del paciente por quien está llamando?\",\n    }\n\n    HIPAA_WHY_UTTERANCE = {\n        \"en-US\": \"So due to HIPAA laws, we cannot discuss health information unless we know we are speaking to the correct person. Are you the patient, caregiver or an authorized representative?\",\n        \"es-US\": \"En conformidad con las leyes HIPAA, no podemos discutir información sobre la salud, a menos que sepamos que estamos hablando con la persona correcta. ¿Es usted el paciente, cuidador o un representante autorizado?\",\n    }\n\n    NO_RECENT_ORDER_NEW_ORDER = {\n        \"en-US\": \"So... I''m not seeing any recent orders. Would you like me to set up a new order for you?\",\n        \"es-US\": \"Bien... no veo ningún pedido reciente. ¿Le gustaría que le prepare un nuevo pedido?\",\n    }\n\n    DTMF_KEYPAD_INPUT = {\n        \"en-US\": \"Just so that I get it right, could you try typing it out using your keypad, followed by the pound sign?\",\n        \"es-US\": \"Para asegurarme de que entendí correctamente, ¿podría escribirlo usando el teclado, seguido de la tecla numeral?\",\n    }\n\n    ORDER_COMPLETED = {\n        \"en-US\": \"Thanks, I''ve put that order in for you. We’ll bill the insurance and the order is subject to any unmet deductibles or coinsurance. If there is anything else needed like a new order from the doctor or authorization from your insurance, we will work to get what is needed but may delay your order and result in a follow up call. If we have your email on file, you''ll be sent confirmation details of your order shortly. Is there anything else I can help with?\",\n        \"es-US\": \"Gracias, ya he realizado su pedido. Facturaremos a la aseguradora y el pedido está sujeto a cualquier deducible o coseguro pendiente. Si se necesita algo más, como una nueva orden médica o una autorización de su aseguradora, haremos lo posible por obtenerlo, pero esto podría retrasar su pedido y dar lugar a una llamada de seguimiento. Si tenemos su correo electrónico registrado, le enviaremos en breve la confirmación de su pedido. ¿Hay algo más en lo que pueda ayudarle?\",\n    }\n\n    ORDER_COMPLETED_MSCO = {\n        \"en-US\": \"Thanks, I''ve put that order in for you. We’ll bill the insurance and the order is subject to any unmet deductibles or coinsurance. If there is anything else needed like a new order from the doctor or authorization from your insurance, we will work to get what is needed but may delay your order and result in a follow up call. If we have your email on file, you''ll be sent confirmation details of your order shortly. Please also make sure to review your order once you''ve received it as we have a strict 30 day return policy, and no exchanges or refunds will be possible after that time. Otherwise, is there anything else that I can help you with?\",\n        \"es-US\": \"Gracias, ya he realizado el pedido. Facturaremos a la aseguradora y el pedido está sujeto a cualquier deducible o coseguro pendiente. Si se necesita algo más, como una nueva orden del médico o autorización de su seguro, haremos lo posible por conseguirlo, pero esto podría retrasar su pedido y requerir una llamada de seguimiento. Si tenemos su correo electrónico registrado, le enviaremos la confirmación de su pedido en breve. Por favor, revise su pedido una vez que lo reciba, ya que tenemos una política de devoluciones estricta de 30 días y no se aceptarán cambios ni reembolsos después de ese plazo. ¿Hay algo más en lo que pueda ayudarle?\",\n    }\n\n    GENERIC_HANDOFF_UTTERANCE_3 = {\n        \"en-US\": \"Alright, let me transfer you to someone who can help. Just a moment please.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    GENERIC_HANDOFF_UTTERANCE_4 = {\n        \"en-US\": \"Ok, just one moment. Let me put you through to someone who can assist further.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    HIPAA_WHY_DOB_UTTERANCE = {\n        \"en-US\": \"Due to HIPAA laws, we cannot discuss health information unless we know we are speaking to the correct person. So... can you please confirm the date of birth on file for me?\",\n        \"es-US\": \"En conformidad con las leyes HIPAA, no podemos discutir información sobre la salud, a menos que sepamos que estamos hablando con la persona correcta. ¿Podría confirmar la fecha de nacimiento que tenemos registrada?\",\n    }\n\n    CLARIFICATION_REPEAT_UTTERANCE = {\n        \"en-US\": \"I''m sorry, I didn''t catch that. What did you say?\",\n        \"es-US\": \"Disculpe, no entendí. ¿Podría repetirlo?\",\n    }\n\n    NAME_CONFIRMATION = {\n        \"en-US\": \"Finally, please confirm your first name and last name.\",\n        \"es-US\": \"Por último, confirme su nombre y apellido\",\n    }\n\n    GENERIC_HANDOFF_UTTERANCE_5 = {\n        \"en-US\": \"I''ll need to transfer you to someone who can assist further with this. One moment.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    NO_RESPONSE_HANGUP = {\n        \"en-US\": \"Ok, I''m having some trouble hearing you so I''m going to have to hang up. If you need anything please give us a call again, have a great rest of your day. Goodbye!\",\n        \"es-US\": \"Perdone, hay problemas en la comunicación y no puedo escuchar, así que tendré que colgar. Si necesita algo, llámenos nuevamente. ¡Que tenga un excelente resto del día! ¡Adiós!\",\n    }\n\n    RAPID_REORDER_OOH_UTTERANCE = {\n        \"en-US\": \"Alright, so I''d usually transfer you to someone to assist further, but I''m afraid our contact center is closed {closure_period} You''ll have to give us a call back {in_hours_times} so that our team can resolve this with you. In the meantime, is there anything else that I can do for you?\",\n        \"es-US\": \"Muy bien, normalmente suelo transferirle con alguien para ayudarle, pero me temo que nuestro centro de contacto está cerrado {closure_period} Tendrá que llamarnos de nuevo {in_hours_times} para que nuestro equipo pueda resolver esto con usted. Mientras tanto, ¿hay algo más en que pueda ayudarle?\",\n    }\n\n    ADDRESS_UPDATE_OOH_UTTERANCE = {\n        \"en-US\": \"So... I''d usually transfer you to a member of our team who can update this for you, but our contact centers are closed {closure_period} I''m really sorry for the inconvenience. Please give us a call back Monday through Friday between {in_hours_times} so that our team can help with this. In the meantime, is there anything else I can do for you?\",\n        \"es-US\": \"Bien... normalmente suelo transferirle con un miembro de nuestro equipo que puede actualizar esto para usted, pero nuestros centros de contacto están cerrados {closure_period} Lamento mucho el inconveniente. Puede llamarnos de lunes a viernes entre las {in_hours_times} para que nuestro equipo pueda ayudarle. Mientras tanto, ¿hay algo más que pueda hacer por usted?\",\n    }\n\n    TRANSFER_SOMEONE_HELP_MOMENT = {\n        \"en-US\": \"Let me transfer you to someone who can help. One moment...\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    TRANSFER_ASSIST_FURTHER_MOMENT = {\n        \"en-US\": \"Alright, just one moment while I transfer you to someone who can assist you further.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    # MSCo UHC Community Plan: hand off to 440-296-9338; patient should select option 4 then option 3\n    UHC_INSURANCE_HANDOFF_UTTERANCE = {\n        \"en-US\": \"One moment while I transfer you to complete your order. When you''re connected, please select option 4, then option 3. Transferring you now.\",\n        \"es-US\": \"Un momento mientras lo transfiero para completar su pedido. Cuando se conecte, seleccione la opción 4 y luego la opción 3. Transfiriendo ahora.\",\n    }\n\n    # MSCo Synapse: tell patient new resupply number (do not transfer to this number)\n    SYNAPSE_INSURANCE_REDIRECT_UTTERANCE = {\n        \"en-US\": \"For your resupply, there''s a new number to call: 888-336-9363. Please call this number to complete your order. Is there anything else I can help you with?\",\n        \"es-US\": \"Para su resurtido, hay un nuevo número al que llamar: 888-336-9363. Llame a este número para completar su pedido. ¿Hay algo más que pueda ayudarme con?\",\n    }\n\n    TRANSFER_SOMEONE_HELP_SORRY = {\n        \"en-US\": \"Sorry, one moment while I transfer you to someone that can help you.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    TRANSFER_SOMEONE_HELP_ORDER = {\n        \"en-US\": \"Thanks, just one moment while I transfer you to someone to help with your order.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    UTTERANCE_WARM_TRANSFER_EXPLANATION = {\n        \"en-US\": \"Okay, I''ll transfer you to the {site_name} team to help. You may be on hold for a short time while I get you through to the right person.\",\n        \"es-US\": \"De acuerdo, le voy a transferir al equipo de {site_name} para que le ayuden. Es posible que esté en espera por un momento mientras le conecto con la persona correcta.\",\n    }\n\n    UTTERANCE_WARM_TRANSFER_HOLD_ASSURANCE = {\n        \"en-US\": \"Thank you for holding, please remain on the line and the next available representative will assist you.\",\n        \"es-US\": \"Gracias por su espera. Por favor, permanezca en línea y el próximo representante disponible le atenderá.\",\n    }\n\n    UTTERANCE_WARM_TRANSFER_HANDOFF = {\n        \"en-US\": \"Thank you for your patience. I''ll be dropping from the call, but please remain on the line and the next available representative will assist you.\",\n        \"es-US\": \"Gracias por su paciencia. Voy a salir de la llamada, pero por favor permanezca en línea y el próximo representante disponible le atenderá.\",\n    }\n\n    UTTERANCE_WARM_TRANSFER_PATIENT_REFUSED_ID_COLLECTION = {\n        \"en-US\": \"No problem, one moment while I transfer you.\",\n        \"es-US\": \"Sin problema, un momento mientras le transfiero.\",\n    }\n\n    UTTERANCE_WARM_TRANSFER_NAME_COLLECTION = {\n        \"en-US\": \"I need to connect you to one of our representatives. Just so they know who is speaking, can I get your name?\",\n        \"es-US\": \"Necesito conectarle con uno de nuestros representantes. Para que sepan con quién hablan, ¿me puede dar su nombre?\",\n    }\n\n    CONFIRM_INSURANCE_PROVIDER = {\n        \"en-US\": \"Ok, it looks like we have {primary_insurance_name} listed as your primary insurance, is that still the case?\",\n        \"es-US\": \"Muy bien, parece que tenemos {primary_insurance_name} registrado como su seguro principal. ¿Sigue siendo correcto?\",\n    }\n\n    RECONFIRM_INSURANCE_PROVIDER = {\n        \"en-US\": \"I just need to confirm, are you still insured under {primary_insurance_name}?\",\n        \"es-US\": \"Solo necesito confirmar, ¿todavía tiene seguro con {primary_insurance_name}?\",\n    }\n\n    INSURANCE_CHANGED_CONFIRM_SHIPPING_ADDRESS = {\n        \"en-US\": \"Thanks, I''ve made a note of that insurance change, if any additional information is needed we''ll contact you. And... to confirm, we have {patient_shipping_address} as your shipping address. Is that right?\",\n        \"es-US\": \"Gracias, he tomado nota del cambio de seguro. Si necesitamos algo más, nos pondremos en contacto con usted. Y... ¿podría confirmarme si su dirección de envío es {patient_shipping_address}?\",\n    }\n\n    CONFIRM_SHIPPING_ADDRESS = {\n        \"en-US\": \"And... to confirm, we have {patient_shipping_address} as your shipping address. Is that right?\",\n        \"es-US\": \"Y... ¿podría confirmarme si su dirección de envío es {patient_shipping_address}?\",\n    }\n\n    ADDRESS_CHANGE_BILLING_FIRST_TIME_SHIPPER = {\n        \"en-US\": \"No worries, we''ll take care of that for you shortly... just to check, should we also update your billing address?\",\n        \"es-US\": \"¿Y quiere que actualicemos también su dirección de facturación?\",\n    }\n\n    ADDRESS_CHANGE_BILLING = {\n        \"en-US\": \"No worries, we''ll take care of that for you shortly... just to check, should we also update your billing address?\",\n        \"es-US\": \"¿Y quiere que actualicemos también su dirección de facturación?\",\n    }\n\n    ADDRESS_COLLECT_BILLING_SOURCE = {\n        \"en-US\": \"And is your billing address the same or different than your shipping address?\",\n        \"es-US\": \"¿Y su dirección de facturación es la misma que su dirección de envío o es una diferente?\",\n    }\n\n    ADDRESS_CHANGE_FLOA = {\n        \"en-US\": \"No problem. To make sure we have the correct address, could you share the street number and street name, and include any apartment, suite, or PO box number if it applies?\",\n        \"es-US\": \"No hay problema. Solo para confirmar que tengamos la dirección correcta, ¿me puede dar el número y nombre de la calle, y si aplica, el número de apartamento, suite o apartado postal?\",\n    }\n\n    ADDRESS_CHANGE_FLOA_REPEAT = {\n        \"en-US\": \"Could you share the street number and street name, and include any apartment, suite, or PO box number if it applies?\",\n        \"es-US\": \"Solo para confirmar que tengamos la dirección correcta, ¿me puede dar el número y nombre de la calle, y si aplica, el número de apartamento, suite o apartado postal?\",\n    }\n\n    ADDRESS_CHANGE_FLOA_REBUTTAL = {\n        \"en-US\": \"So I''ll just need to get the address for where we should send the order out to, for our records. Could I get the street number, street name, and any other details for this address, such as an apartment, suite, or PO box number, if there is one?\",\n        \"es-US\": \"Solo necesito confirmar la dirección a donde debemos enviar el pedido, para tenerlo en nuestros registros. ¿Podría darme el número y nombre de la calle, y cualquier otro detalle de esta dirección, como número de apartamento, suite o apartado postal, si aplica?\",\n    }\n\n    ADDRESS_CHANGE_FLOA_CONFIRM = {\n        \"en-US\": \"Okay, I''ve got down {floa} as the first line of your address... is that right?\",\n        \"es-US\": \"Bien, tengo anotado {floa} como la primera línea de su dirección, ¿es correcto?\",\n    }\n\n    ADDRESS_CHANGE_CITY_STATE = {\n        \"en-US\": \"Which city and state is that in?\",\n        \"es-US\": \"¿Y eso sería en qué ciudad y estado?\",\n    }\n\n    ADDRESS_CHANGE_CITY_STATE_REBUTTAL = {\n        \"en-US\": \"We just need to ensure that we have the right address on file so that orders are shipped to the right location. Could you please let me know the city and state of the address?\",\n        \"es-US\": \"Solo queremos confirmar que tengamos la dirección correcta en el sistema, para que el pedido llegue sin problema. ¿Me podría decir en qué ciudad y estado se encuentra, por favor?\",\n    }\n\n    ADDRESS_CHANGE_CITY_STATE_CONFIRM = {\n        \"en-US\": \"Okay, I''ve got down {city}, {state}. Is that right?\",\n        \"es-US\": \"Perfecto, tengo {city}, {state} anotado aquí… ¿está bien así?\",\n    }\n\n    ADDRESS_CHANGE_ZIP = {\n        \"en-US\": \"Great, could you let me know the address zip code please?\",\n        \"es-US\": \"Muy bien, ¿me comparte el código postal de la dirección, por favor?\",\n    }\n\n    ADDRESS_CHANGE_ZIP_REBUTTAL = {\n        \"en-US\": \"We just need to ensure that we have the right address on file so that orders are shipped to the right location. Could you please let me know the address zip code?\",\n        \"es-US\": \"Solo necesitamos confirmar que tengamos la dirección correcta en el sistema para que los pedidos lleguen al lugar adecuado. ¿Podría darme el código postal, por favor?\",\n    }\n\n    ADDRESS_CHANGE_ZIP_CONFIRM = {\n        \"en-US\": \"Okay, I have down {zip_code}... Is that right?\",\n        \"es-US\": \"Perfecto, tengo el código postal {zip_code} anotado… ¿está bien así?\",\n    }\n    ADDRESS_CHANGE_CONFIRM = {\n        \"en-US\": \"Thank you very much. Just to confirm, is the address {full_address}?\",\n        \"es-US\": \"Muchas gracias, solo para confirmar, ¿la dirección es {full_address}?\",\n    }\n\n    ADDRESS_CHANGE_SUCCESSFUL = {\n        \"en-US\": \"Great, we''ve made a note of that address change.\",\n        \"es-US\": \"Perfecto, hemos registrado el cambio de dirección.\",\n    }\n\n    ADDRESS_CHANGE_SHIPPING_SUCCESSFUL = {\n        \"en-US\": \"Great, we''ve made a note of that shipping address change. ... just to check, should we also update your billing address?\",\n        \"es-US\": \"Perfecto, hemos registrado el cambio de dirección de envío. Solo para confirmar, ¿quiere que actualicemos también su dirección de facturación?\",  # KA-TODO validate\n    }\n\n    ORDER_COMPLETED_BILLING_ADDRESS_UPDATE = {\n        \"en-US\": \"Okay, so we''ve put that order through for you. I''ll just need to transfer you to someone who can update your billing address information for you. One moment...\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    # ADDRESS CHANGE\n\n    # SPEAK TO DEFLECTION\n    SPEAK_TO_DEFLECTION = {\n        \"en-US\": \"No problem. Just so I get you to the right place, could you tell me more about why you are calling?\",\n        \"es-US\": \"No hay problema. Para poder comunicarle con la persona correcta, ¿me podría contar un poco más sobre el motivo de su llamada?\",\n    }\n    # SPEAK TO DEFLECTION\n\n    REDUCE_QUANTITY_CONFIRM = {\n        \"en-US\": \"Okay, so to confirm,\",\n        \"es-US\": \"Bien, para confirmar,\",\n    }\n\n    CONFIRM_READBACK_NUMBER = {\n        \"en-US\": \"Okay. Just to confirm, that''s {readback_collected_number}?\",\n        \"es-US\": \"Muy bien. Solo para confirmar, ¿el número es {readback_collected_number}?\",\n    }\n\n    INCLUDE_ITEM_IN_ORDER_QUESTION = {\n        \"en-US\": \"So, we advise that you include this in your order. Shall I keep this in your order?\",\n        \"es-US\": \"Bien, le sugerimos que incluya esto en su pedido. ¿Debo conservar esto en su pedido?\",\n    }\n\n    OOH_NO_MATCH_NUMBER_UTTERANCE = {\n        \"en-US\": \"I''m really sorry, but I couldn''t find a match for that number on file. I''d usually transfer you to someone to assist further, but I''m afraid our contact center is closed {closure_period} You''ll have to give us a call back {in_hours_times} so that our team can resolve this with you. In the meantime, is there anything else that I can do for you?\",\n        \"es-US\": \"Lamentablemente, no pude encontrar una coincidencia para ese número registrado. Normalmente suelo transferirle con alguien para que le ayude de manera personalizada, pero me temo que nuestro centro de contacto está cerrado {closure_period} Tendrá que llamarnos de nuevo {in_hours_times} para que nuestro equipo pueda resolver esto. Mientras tanto, ¿hay algo más que pueda hacer por usted?\",\n    }\n\n    TRACKING_NUMBER_FIRST_TIME = {\n        \"en-US\": \"So, your tracking number is: {readback_tracking_number}. You''ll be able to get the estimated delivery times if you search up the tracking number on the {shipping_carrier} website. Do you want me to repeat that?\",\n        \"es-US\": \"Entonces, su número de rastreo es: {readback_tracking_number}. Podrá obtener el tiempo estimado de entrega si busca el número de rastreo en el sitio web de {shipping_carrier}. ¿Quiere que lo repita?\",\n    }\n\n    TRACKING_NUMBER_REPEAT = {\n        \"en-US\": \"Your tracking number is: {readback_tracking_number}. You''ll be able to get the estimated delivery times if you search up the tracking number on the {shipping_carrier} website. Is there anything else I can help with?\",\n        \"es-US\": \"Su número de rastreo es: {readback_tracking_number}. Podrá obtener el tiempo estimado de entrega si busca el número de rastreo en el sitio web de {shipping_carrier}. ¿Hay algo más con lo que pueda ayudar?\",\n    }\n\n    ITEMS_SETUP_MOMENT = {\n        \"en-US\": \"Give me just a few moments while I set that order up for you okay?\",\n        \"es-US\": \"Deme un momento mientras preparo su pedido, ¿está bien?\",\n    }\n\n    ELIGIBLE_ITEMS_NOT_WANTED = {\n        \"en-US\": \"Sorry about that. So, I''m seeing you''re eligible for {readout_items_in_order_str}. Which of these items did you not want included in the order?\",\n        \"es-US\": \"Disculpe, veo que es elegible para {readout_items_in_order_str}. ¿Cuáles de estos artículos no quería incluir en el pedido?\",\n    }\n\n    # Inbound: recording disclaimer before determine-language (IVR handoff)\n    INBOUND_RECORDING_UPFRONT = {\n        \"en-US\": \"This call may be recorded for quality and training purposes. You''ll now be put through to our agent. Ringtone.\",\n        \"es-US\": \"Esta llamada puede ser grabada con fines de calidad y capacitación. Ahora lo pasamos con nuestro agente.\",\n    }\n    INBOUND_RECORDING_UPFRONT_TEST = {\n        \"en-US\": \"This call may be recorded for quality and training purposes. You''ll now be put through to our virtual agent. Ringtone.\",\n        \"es-US\": \"Esta llamada puede ser grabada con fines de calidad y capacitación. En un momento lo comunicamos con nuestro agente virtual.\",\n    }\n\n    GREETING_SITE_NAME = {\n        \"en-US\": \"Hi, thanks for calling {site_name}, {agent_name} speaking. How can I help?\",\n        \"es-US\": \"¡Hola! Gracias por llamar a {site_name}, mi nombre es {agent_name}. ¿Cómo puedo ayudarle?\",\n    }\n\n    TRANSFER_OF_COURSE = {\n        \"en-US\": \"Of course, just one moment while I transfer you to someone who can help further\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    TRANSFER_BEREAVEMENT = {\n        \"en-US\": \"I''m really sorry about this. I''ll put you through to someone who can help. Just one moment.\",\n        \"es-US\": \"Lo siento mucho. Ahora le transfiero con alguien que pueda ayudarle. Aguarde un momento.\",\n    }\n\n    SLEEP_THERAPY_TRANSFER = {\n        \"en-US\": \"No problem. I''ll put you through to someone who can help. One second.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    HCPC_CONFIRM_REPLACEMENT = {\n        \"en-US\": \"{initial_utterance} Can you confirm the {hcpc_type_name} needs to be replaced?\",\n        \"es-US\": \"{initial_utterance} ¿Puede confirmar que tiene que reemplazar {hcpc_type_name}?\",\n    }\n\n    HCPC_CONFIRM_REPLACEMENT_2 = {\n        \"en-US\": \"{initial_utterance} Can you confirm that your supplies need to be replaced?\",\n        \"es-US\": \"{initial_utterance} ¿Puede confirmar que tiene que reemplazar {hcpc_type_name}?\",\n    }\n\n    HCPC_SIZE = {\n        \"en-US\": \"What size {hcpc_type_name} do you wear? Is it {answer_choices_combined}?\",\n        \"es-US\": \"¿Qué talla de {hcpc_type_name} usa? ¿Es {answer_choices_combined}?\",\n    }\n\n    HCPC_REASON = {\n        \"en-US\": \"What is the main reason for reordering the {hcpc_type_name}? Is it {answer_choices_combined}?\",\n        \"es-US\": \"¿Cuál es el motivo principal para volver a pedir {hcpc_type_name}? ¿Es porque el producto se encuentra {answer_choices_combined}?\",\n    }\n\n    HCPC_FINAL_Q_PREFIX = {\n        \"en-US\": \"Ok, lastly, \",\n        \"es-US\": \"Bien, y por último, \",\n    }\n\n    PLQ_FINAL_Q_PREFIX = {\n        \"en-US\": \"Ok, lastly, \",\n        \"es-US\": \"Bien, y por último, \",\n    }\n\n    PLQ_ACK_IN_FIRST_PERSON = {\n        \"en-US\": \"I need your confirmation on the next statement. Please respond with ''Yes'' or ''No'' for the following: {question_text}\",\n        \"es-US\": \"Necesito su confirmación sobre la siguiente declaración. Por favor, responda ''Sí'' o ''No'' a lo siguiente: {question_text}\",\n    }\n\n    PLQ_CONFIRM_REPLACE_NEED = {\n        \"en-US\": \"To clarify, in order to refill your supplies I have to confirm that they need to be replaced. Are your supplies worn out, depleted, or need to be replaced?\",\n        \"es-US\": \"Para aclarar, con el fin de reabastecer sus suministros, tengo que confirmar que necesitan ser reemplazados. ¿Están sus suministros desgastados, agotados o necesitan ser reemplazados?\",\n    }\n\n    # HCPC Item Education Utterances\n    HCPC_ITEM_EDUCATION_UTTERANCE_A7030 = {\n        \"en-US\": \"The mask needs to be replaced every three months due to bacteria and fit issues.\",\n        \"es-US\": \"La mascarilla necesita ser reemplazada cada tres meses debido a bacterias y problemas de ajuste.\",\n    }\n\n    HCPC_ITEM_EDUCATION_UTTERANCE_A7034 = {\n        \"en-US\": \"The mask needs to be replaced every three months due to bacteria and fit issues.\",\n        \"es-US\": \"La mascarilla necesita ser reemplazada cada tres meses debido a bacterias y problemas de ajuste.\",\n    }\n\n    HCPC_ITEM_EDUCATION_UTTERANCE_A7031 = {\n        \"en-US\": \"The cushions need to be replaced monthly due to fit and seal issues causing leaking.\",\n        \"es-US\": \"Los cojines necesitan ser reemplazados mensualmente debido a problemas de ajuste y sellado que causan fugas.\",\n    }\n\n    HCPC_ITEM_EDUCATION_UTTERANCE_A7032 = {\n        \"en-US\": \"The cushions or pillows need to be replaced every two weeks due to fit and seal issues causing leaking.\",\n        \"es-US\": \"Los cojines o almohadas necesitan ser reemplazados cada dos semanas debido a problemas de ajuste y sellado que causan fugas.\",\n    }\n\n    HCPC_ITEM_EDUCATION_UTTERANCE_A7033 = {\n        \"en-US\": \"The cushions or pillows need to be replaced every two weeks due to fit and seal issues causing leaking.\",\n        \"es-US\": \"Los cojines o almohadas necesitan ser reemplazados cada dos semanas debido a problemas de ajuste y sellado que causan fugas.\",\n    }\n\n    HCPC_ITEM_EDUCATION_UTTERANCE_A7035 = {\n        \"en-US\": \"The headgear needs to be replaced every 6 months due to lack of elasticity that can cause leaking.\",\n        \"es-US\": \"El arnés de cabeza necesita ser reemplazado cada 6 meses debido a la falta de elasticidad que puede causar fugas.\",\n    }\n\n    HCPC_ITEM_EDUCATION_UTTERANCE_A7037 = {\n        \"en-US\": \"The tubing needs to be replaced every three months, due to mold and bacteria that can grow, leading to upper respiratory infections and other illnesses.\",\n        \"es-US\": \"El tubo necesita ser reemplazado cada tres meses. Debido al moho y bacterias que pueden crecer, lo que puede llevar a infecciones respiratorias superiores y otras enfermedades.\",\n    }\n\n    HCPC_ITEM_EDUCATION_UTTERANCE_A4604 = {\n        \"en-US\": \"The tubing needs to be replaced every three months, due to mold and bacteria that can grow, leading to upper respiratory infections and other illnesses.\",\n        \"es-US\": \"El tubo necesita ser reemplazado cada tres meses. Debido al moho y bacterias que pueden crecer, lo que puede llevar a infecciones respiratorias superiores y otras enfermedades.\",\n    }\n\n    HCPC_ITEM_EDUCATION_UTTERANCE_A7038 = {\n        \"en-US\": \"The filters need to be replaced every two weeks to optimize air flow.\",\n        \"es-US\": \"Los filtros necesitan ser reemplazados cada dos semanas para optimizar el flujo de aire.\",\n    }\n\n    HCPC_ITEM_EDUCATION_UTTERANCE_A7039 = {\n        \"en-US\": \"The reusable filter needs to be replaced every 6 months to optimize air flow and extend the life of the machine.\",\n        \"es-US\": \"El filtro reutilizable necesita ser reemplazado cada 6 meses para optimizar el flujo de aire y extender la vida de la máquina.\",\n    }\n\n    HCPC_ITEM_EDUCATION_UTTERANCE_A7046 = {\n        \"en-US\": \"The water chamber needs to be replaced every 6 months due to mineral build up and cracks that can cause water to leak into the machine.\",\n        \"es-US\": \"La cámara de agua necesita ser reemplazada cada 6 meses debido a la acumulación de minerales y grietas que pueden causar que el agua se filtre en la máquina.\",\n    }\n\n    # Start verification utterances\n    INVALID_INTENT_ERROR = {\n        \"en-US\": \"Invalid argument for `intent`, must be one of: {possible_choices}. Did you mean to call this?\",\n        \"es-US\": \"Argumento inválido para `intent`, debe ser uno de: {possible_choices}. ¿Quiso llamar esto?\",\n    }\n\n    DISAMBIGUATE_INTENT = {\n        \"en-US\": \"Disambiguate with the user exactly what they wish to do, and call this function again with an option from: {possible_choices}\",\n        \"es-US\": \"Desambigüe con el usuario exactamente lo que desea hacer, y llame esta función nuevamente con una opción de: {possible_choices}\",\n    }\n\n    VERIFICATION_TRANSFER_UTTERANCE = {\n        \"en-US\": \"One moment while I transfer you to someone who can assist you further.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    CALLBACK_REORDER_PREFIX = {\n        \"en-US\": \"Thanks for calling back, we were reaching out because it''s time to re-order your supplies. \",\n        \"es-US\": \"Gracias por devolver la llamada, nos comunicamos porque es hora de volver a pedir sus suministros. \",\n    }\n\n    CALLBACK_ORDER_STATUS_PREFIX = {\n        \"en-US\": \"Thanks for calling back, we were reaching out about an order you placed with us. \",\n        \"es-US\": \"Gracias por devolver la llamada, nos comunicamos sobre un pedido que realizó con nosotros. \",\n    }\n\n    # Phrasing here is a bit clumsy in Spanish, but the usual way requires verb ''quedar'' (to remain) to conjugate for number of questions\n    # and I don''t want to open that can of worms.\n    INITIAL_UTT_PLQS_NUM_QS = {\n        \"en-US\": \"Right... I just have {question_quantity} left to get through... thanks for bearing with me.\",\n        \"es-US\": \"Sólo tengo que preguntar {question_quantity} más. Gracias por su paciencia.\",\n    }\n\n    INITIAL_UTT_HCPC_NUM_QS = {\n        \"en-US\": \"Ok so, for insurance purposes, I''ll need to run through {question_quantity} with you.\",\n        \"es-US\": \"Muy bien, para fines de seguro, necesito hacerle {question_quantity}.\",\n    }\n\n    INITIAL_ITEMS_IN_ORDER_UTT = {\n        \"en-US\": \"Okay, so I''m seeing here that you''re eligible for {item_quantity} products. That is...\",\n        \"es-US\": \"Bien, veo que es elegible para {item_quantity} productos. Son ... \",\n    }\n\n    QUESTION_SINGULAR = {\n        \"en-US\": \"question\",\n        \"es-US\": \"pregunta\",\n    }\n\n    QUESTION_PLURAL = {\n        \"en-US\": \"questions\",\n        \"es-US\": \"preguntas\",\n    }\n\n    VERIFICATION_DEFAULT_PREFIX = {\n        \"en-US\": \"Of course. \",\n        \"es-US\": \"Por supuesto. \",\n    }\n\n    VERIFICATION_MAIN_UTTERANCE = {\n        \"en-US\": \"I just need to confirm a couple of details to make sure I''m speaking with the right person. Are you the patient, caregiver, or authorized representative?\",\n        \"es-US\": \"Solo necesito confirmar algunos detalles para asegurarme de que estoy hablando con la persona correcta. ¿Es usted el paciente, cuidador o representante autorizado?\",\n    }\n\n    VERIFICATION_START_UTTERANCE = {\n        \"en-US\": \"I just need to confirm a couple of details to make sure I''m speaking with the right person.\",\n        \"es-US\": \"Solo necesito confirmar algunos detalles para asegurarme de que estoy hablando con la persona correcta.\",\n    }\n\n    # Transfer and error utterances\n\n    SORRY_STRUGGLING_HEAR = {\n        \"en-US\": \"Sorry I''m struggling to hear what you''re saying, let me put you through to someone.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    THANK_YOU_CALLING_BRIGHTREE = {\n        \"en-US\": \"Thank you for calling Brightree, let me put you through to someone. Just one moment.\",\n        \"es-US\": \"Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\",\n    }\n\n    # Educational utterances\n\n    # Product line question utterances\n    GREAT_QUESTIONS_UTTERANCE = {\n        \"en-US\": \"Great, I''ll just need to run through some questions with you...\",\n        \"es-US\": \"Excelente, solo necesito hacerle algunas preguntas...\",\n    }\n\n    # Wait function utterances\n\n    WAIT_UTTERANCE_1 = {\n        \"en-US\": \"Take your time.\",\n        \"es-US\": \"Tómese su tiempo.\",\n    }\n\n    WAIT_UTTERANCE_2 = {\n        \"en-US\": \"I''ll be here when you''re ready.\",\n        \"es-US\": \"Estaré aquí cuando tenga todo listo\",\n    }\n\n    WAIT_UTTERANCE_3 = {\n        \"en-US\": \"No rush, I can wait.\",\n        \"es-US\": \"Sin prisa, puedo esperar.\",\n    }\n\n    WAIT_UTTERANCE_4 = {\n        \"en-US\": \"Whenever you''re set, just let me know.\",\n        \"es-US\": \"Cuando tenga todo listo, solo avíseme.\",\n    }\n\n    WAIT_UTTERANCE_5 = {\n        \"en-US\": \"I''m here when you need me.\",\n        \"es-US\": \"Estoy aquí cuando me necesite.\",\n    }\n\n    WAIT_UTTERANCE_6 = {\n        \"en-US\": \"Happy to wait as long as you need.\",\n        \"es-US\": \"Sin problemas, espero todo el tiempo que necesite.\",\n    }\n\n    WAIT_UTTERANCE_7 = {\n        \"en-US\": \"I''ll be standing by.\",\n        \"es-US\": \"Estaré esperando.\",\n    }\n\n    WAIT_UTTERANCE_8 = {\n        \"en-US\": \"Ready when you are.\",\n        \"es-US\": \"Listo cuando usted esté.\",\n    }\n\n    WAIT_UTTERANCE_9 = {\n        \"en-US\": \"Let me know when you''re good to go.\",\n        \"es-US\": \"Avíseme cuando esté listo para continuar.\",\n    }\n\n    WAIT_UTTERANCE_10 = {\n        \"en-US\": \"I''m not in a hurry — take your time.\",\n        \"es-US\": \"No tengo prisa, tómese su tiempo.\",\n    }\n\n    # ACK utterances for add_hcpc_item_back_after_education.py\n    ADD_HCPC_ITEM_BACK_AFTER_EDUCATION_ACK_UTTERANCE_1 = {\n        \"en-US\": \"Okay, we''ll remove that\",\n        \"es-US\": \"De acuerdo, lo eliminaremos\",\n    }\n\n    ADD_HCPC_ITEM_BACK_AFTER_EDUCATION_ACK_UTTERANCE_2 = {\n        \"en-US\": \"Got it, we''ll remove that\",\n        \"es-US\": \"Entendido, lo eliminaremos\",\n    }\n\n    ADD_HCPC_ITEM_BACK_AFTER_EDUCATION_ACK_UTTERANCE_3 = {\n        \"en-US\": \"Sure, we''ll remove that\",\n        \"es-US\": \"Claro, lo eliminaremos\",\n    }\n\n    # ACK utterances for answers_item_question.py\n    ANSWERS_ITEM_QUESTION_ACK_UTTERANCE_1 = {\n        \"en-US\": \"Okay\",\n        \"es-US\": \"De acuerdo\",\n    }\n\n    ANSWERS_ITEM_QUESTION_ACK_UTTERANCE_2 = {\n        \"en-US\": \"Thanks\",\n        \"es-US\": \"Gracias\",\n    }\n\n    ANSWERS_ITEM_QUESTION_ACK_UTTERANCE_3 = {\n        \"en-US\": \"Got it\",\n        \"es-US\": \"Entendido\",\n    }\n\n    ANSWERS_ITEM_QUESTION_ACK_UTTERANCE_4 = {\n        \"en-US\": \"Sure\",\n        \"es-US\": \"Claro\",\n    }\n\n    # ACK utterances for answers_product_line_question.py\n    ANSWERS_PRODUCT_LINE_QUESTION_ACK_UTTERANCE_1 = {\n        \"en-US\": \"Okay\",\n        \"es-US\": \"De acuerdo\",\n    }\n\n    ANSWERS_PRODUCT_LINE_QUESTION_ACK_UTTERANCE_2 = {\n        \"en-US\": \"Thanks\",\n        \"es-US\": \"Gracias\",\n    }\n\n    ANSWERS_PRODUCT_LINE_QUESTION_ACK_UTTERANCE_3 = {\n        \"en-US\": \"Got it\",\n        \"es-US\": \"Entendido\",\n    }\n\n    ANSWERS_PRODUCT_LINE_QUESTION_ACK_UTTERANCE_4 = {\n        \"en-US\": \"Sure\",\n        \"es-US\": \"Claro\",\n    }\n\n    ANSWERS_PRODUCT_LINE_QUESTION_ACK_UTTERANCE_5 = {\n        \"en-US\": \"Perfect\",\n        \"es-US\": \"Perfecto\",\n    }\n\n    ANSWERS_PRODUCT_LINE_QUESTION_ACK_UTTERANCE_6 = {\n        \"en-US\": \"Alright\",\n        \"es-US\": \"Muy bien\",\n    }\n\n    # Speak to human utterances\n    NO_PROBLEM_PUT_THROUGH = {\n        \"en-US\": \"No problem. I''ll put you through now. One second.\",\n        \"es-US\": \"Sin problemas. Ahora le transfiero. Un momento.\",\n    }\n\n    SPEAK_TO_REPRESENTATIVE_UTTERANCE = {\n        \"en-US\": \"Inform the user that you understand they want to speak to a representative, but that you might be able to help them much more quickly, and ask them what it was specifically that they wanted to discuss.\",\n        \"es-US\": \"Informe al usuario que entiende que quiere hablar con un representante, pero que podría ayudarle mucho más rápido, y pregúntele qué era específicamente lo que quería discutir.\",\n    }\n\n    # Order history utterances\n    INITIAL_ORDER_HISTORY_UTT = {\n        \"en-US\": \"Okay, I can see on our system that you made {n_orders} orders with us in the last 90 days.\",\n        \"es-US\": \"Bien, puedo ver en nuestro sistema que realizó {n_orders} pedidos con nosotros en los últimos 90 días.\",\n    }\n\n    INITIAL_ORDER_HISTORY_MOST_RECENT_ORDER_UTT = {\n        \"en-US\": \"Your most recent order was made on {most_recent_order_date}, which included the {most_recent_order_item_name}. Is this the order you were asking about?\",\n        \"es-US\": \"Su pedido más reciente fue realizado el {most_recent_order_date}, que incluía {most_recent_order_item_name}. ¿Es este el pedido sobre el que preguntaba?\",\n    }\n\n    ORDER_VOIDED_TRANSFER = {\n        \"en-US\": \"The user''s order is voided. call the transfer_call function with utterance=''One moment while I transfer you to someone who can assist you further.'', handoff_reason=\\\"ORDER_VOIDED\\\", handoff_to=\\\"\",\n        \"es-US\": ''El pedido del usuario está anulado. llame la función transfer_call con utterance=\\''Un momento, le voy a transferir con alguien que pueda tomar su información para una devolución de llamada.\\'', handoff_reason=\"ORDER_VOIDED\", handoff_to=\"'',\n    }\n\n    # pre ship issues\n\n    PRESHIP_ORDER_MUST_BE_MANUALLY_SHIPPED = {\n        \"en-US\": \"We are in the process of reviewing your order before it can be released to ship. We will follow up with you if anything additional is needed.\",\n        \"es-US\": \"Estamos en el proceso de revisar su pedido antes de poder enviarlo. Nos comunicaremos con usted si se necesita algo adicional.\",\n    }\n\n    PRESHIP_ORDER_CORRECTIONS_NEEDED = {\n        \"en-US\": \"\",\n        \"es-US\": \"\",\n    }\n\n    PRESHIP_PATIENT_HAS_SHIPPED_ORDER_WAITING_ON_BILLABLE_DOCS = {\n        \"en-US\": \"We are in the process of obtaining billable documents. The process may be expedited by following up with your physician.\",\n        \"es-US\": \"Estamos en el proceso de obtener los documentos facturables. El proceso puede agilizarse si se comunica con su médico.\",\n    }\n\n    PRESHIP_PATIENT_COPAY_CALL_NEEDED = {\n        \"en-US\": \"The order is still in process as we gather information for your copay request. One of our staff will be reaching out to you soon.\",\n        \"es-US\": \"El pedido sigue en proceso mientras reunimos la información para su solicitud de copago. Uno de nuestros representantes se comunicará con usted pronto.\",\n    }\n\n    PRESHIP_PATIENT_COPAY_CALL_NEEDED_TRANSFER = {\n        \"en-US\": \"The order requires copay approval before it can be released to ship. Let me transfer you to someone who can assist you further.\",\n        \"es-US\": \"El pedido requiere aprobación del copago antes de poder enviarlo. Permítame transferirle con alguien que pueda ayudarle.\",\n    }\n\n    PRESHIP_UPFRONT_PATIENT_PAYMENT_DUE = {\n        \"en-US\": \"\",\n        \"es-US\": \"\",\n    }\n\n    PRESHIP_ORDER_TYPE_REQUIRES_STAFF_REVIEW = {\n        \"en-US\": \"We are in the process of reviewing your order before it can be released to ship. We will follow up with you if anything additional is needed.\",\n        \"es-US\": \"Estamos en el proceso de revisar su pedido antes de poder enviarlo. Nos comunicaremos con usted si se necesita algo adicional.\",\n    }\n\n    PRESHIP_PATIENT_REQUESTED_DELAYED_SHIPMENT = {\n        \"en-US\": \"The order was requested to be shipped on a specific date. Once that date is met, the order will ship.\",\n        \"es-US\": \"Se solicitó que el pedido se envíe en una fecha específica. Una vez que llegue esa fecha, el pedido será enviado.\",\n    }\n\n    PRESHIP_ORDER_FLAGGED_AS_DO_NOT_SHIP = {\n        \"en-US\": \"The order has been placed on hold for review.\",\n        \"es-US\": \"El pedido se ha puesto en espera para revisión.\",\n    }\n\n    PRESHIP_PATIENT_NOT_YET_ELIGIBLE_FOR_SHIPMENT = {\n        \"en-US\": \"The order will ship once eligible based on insurance guidelines.\",\n        \"es-US\": \"El pedido se enviará una vez que sea elegible según las normas del seguro.\",\n    }\n\n    PRESHIP_PATIENT_HAS_OVERDUE_PAST_BALANCE = {\n        \"en-US\": \"\",\n        \"es-US\": \"\",\n    }\n\n    PRESHIP_PATIENT_HAS_NOT_RECENTLY_CONFIRMED_ORDER = {\n        \"en-US\": \"\",\n        \"es-US\": \"\",\n    }\n\n    PRESHIP_PATIENTS_DOCTOR_REQUIRES_BILLABLE_RX = {\n        \"en-US\": \"The order is still processing because your physician requires a billable prescription. The process may be expedited by following up with your physician.\",\n        \"es-US\": \"El pedido sigue en proceso porque su médico requiere una receta facturable. El proceso puede agilizarse si se comunica con su médico.\",\n    }\n\n    PRESHIP_BILLING_ERRORS_EXIST_FOR_THIS_ORDER = {\n        \"en-US\": \"We are in the process of reviewing your insurance and medical documentation. We will follow up with you if anything else is needed.\",\n        \"es-US\": \"Estamos en el proceso de revisar su seguro y la documentación médica. Nos comunicaremos con usted si se necesita algo más.\",\n    }\n\n    PRESHIP_ORDER_SHIPPING_ADDRESS_REQUIRES_STAFF_REVIEW = {\n        \"en-US\": \"\",\n        \"es-US\": \"\",\n    }\n\n    # documents needed\n\n    DOCNEEDED_BASE_UTTERANCE = {\n        \"en-US\": \"We are in the process of obtaining {document_name}. The process may be expedited by following up with your {contact_name}.\",\n        \"es-US\": \"Estamos en el proceso de obtener {document_name}. El proceso puede agilizarse si se comunica con su {contact_name}.\",\n    }\n\n    # Reminder utterances\n    SUPPLIES_DISPOSABLE_REMINDER = {\n        \"en-US\": \"As a reminder, all supplies are disposable.\",\n        \"es-US\": \"Como recordatorio, todos los suministros son desechables.\",\n    }\n\n    # Error and clarification utterances\n    REPHRASE_QUESTION_PROMPT = {\n        \"en-US\": \"Rephrase your question, attempting to collect a clearer response.\",\n        \"es-US\": \"Reformule su pregunta, intentando obtener una respuesta más clara.\",\n    }\n\n    # Education-related utterances\n    EDUCATION_ADVISE_INCLUDE_ITEM = {\n        \"en-US\": \"So we advise you include {item_name} in your order. Shall I keep this in your order?\",\n        \"es-US\": \"Recomendamos que incluya {item_name} en su pedido. ¿Debo conservar esto en su pedido?\",\n    }\n\n    EDUCATION_KEEP_ITEM_ALSO = {\n        \"en-US\": \"Shall I also keep the {item_name} in the order?\",\n        \"es-US\": \"¿También debo conservar {item_name} en el pedido?\",\n    }\n\n    EDUCATION_ADVISE_INCLUDE_THIS = {\n        \"en-US\": \"So, we advise that you include this in your order. Shall I keep this in your order?\",\n        \"es-US\": \"Recomendamos que incluya esto en su pedido. ¿Debo conservar esto en su pedido?\",\n    }\n\n    EDUCATION_FOR_ITEM_WITH_UTTERANCE = {\n        \"en-US\": \"For the {item_name}, {edu_utts_combined}. {add_back_utt}\",\n        \"es-US\": \"Para {item_name}, {edu_utts_combined}. {add_back_utt}\",\n    }\n\n    # Quantity education utterances\n    QUANTITY_EDUCATION_RECOMMEND = {\n        \"en-US\": \"We recommend {quantity} {item_name}{suffix} as {hcpc_edd_utt}\",\n        \"es-US\": \"Recomendamos {quantity} {item_name}{suffix} ya que {hcpc_edd_utt}\",\n    }\n\n    QUANTITY_EDUCATION_FULL_ORDER = {\n        \"en-US\": \"We recommend you order the full {quantity} {item_name}{suffix} as all supplies are disposable, so we recommend that you replace them regularly.\",\n        \"es-US\": \"Recomendamos que ordene los {quantity} {item_name}{suffix} completos ya que todos los suministros son desechables, por lo que recomendamos que los reemplace regularmente.\",\n    }\n\n    # HCPC-specific quantity education utterances\n    HCPC_A7030_QUANTITY_EDUCATION = {\n        \"en-US\": \"having extra masks allows frequent replacement to limit bacteria buildup and keeps the fit consistent.\",\n        \"es-US\": \"tener máscaras adicionales permite reemplazos frecuentes para limitar la acumulación de bacterias y mantener el ajuste consistente.\",\n    }\n\n    HCPC_A7034_QUANTITY_EDUCATION = {\n        \"en-US\": \"having extra masks allows frequent replacement to limit bacteria buildup and keeps the fit consistent.\",\n        \"es-US\": \"tener máscaras adicionales permite reemplazos frecuentes para limitar la acumulación de bacterias y mantener el ajuste consistente.\",\n    }\n\n    HCPC_A7031_QUANTITY_EDUCATION = {\n        \"en-US\": \"keeping extra cushions lets you maintain a reliable seal and minimize leaks.\",\n        \"es-US\": \"mantener cojines adicionales le permite mantener un sello confiable y minimizar las fugas.\",\n    }\n\n    HCPC_A7032_QUANTITY_EDUCATION = {\n        \"en-US\": \"keeping multiple cushion and pillow sets allows you to better preserve the seal and avoid leak-related issues.\",\n        \"es-US\": \"mantener múltiples juegos de cojines y almohadas le permite preservar mejor el sello y evitar problemas relacionados con fugas.\",\n    }\n\n    HCPC_A7033_QUANTITY_EDUCATION = {\n        \"en-US\": \"keeping multiple cushion and pillow sets allows you to better preserve the seal and avoid leak-related issues.\",\n        \"es-US\": \"mantener múltiples juegos de cojines y almohadas le permite preservar mejor el sello y evitar problemas relacionados con fugas.\",\n    }\n\n    HCPC_A7035_QUANTITY_EDUCATION = {\n        \"en-US\": \"having spare headgear allows you to replace them before the straps stretch and reduces the risk of leaks.\",\n        \"es-US\": \"tener arneses de repuesto le permite reemplazarlos antes de que las correas se estiren y reduce el riesgo de fugas.\",\n    }\n\n    HCPC_A7037_QUANTITY_EDUCATION = {\n        \"en-US\": \"keeping extra tubes reduces the risk of mold or bacteria buildup, and protects your respiratory health\",\n        \"es-US\": \"mantener tubos adicionales reduce el riesgo de acumulación de moho o bacterias, y protege su salud respiratoria\",\n    }\n\n    HCPC_A4604_QUANTITY_EDUCATION = {\n        \"en-US\": \"keeping extra tubes reduces the risk of mold or bacteria buildup, and protects your respiratory health\",\n        \"es-US\": \"mantener tubos adicionales reduce el riesgo de acumulación de moho o bacterias, y protege su salud respiratoria\",\n    }\n\n    HCPC_A7038_QUANTITY_EDUCATION = {\n        \"en-US\": \"stocking disposable filters allows you to regularly change them out to keep airflow clear and steady.\",\n        \"es-US\": \"tener filtros desechables le permite cambiarlos regularmente para mantener el flujo de aire claro y constante.\",\n    }\n\n    HCPC_A7039_QUANTITY_EDUCATION = {\n        \"en-US\": \"having spare reusable filters allows you to change them out regularly to maintain airflow and helps to extend the machine''s life.\",\n        \"es-US\": \"tener filtros reutilizables de repuesto le permite cambiarlos regularmente para mantener el flujo de aire y ayuda a extender la vida de la máquina.\",\n    }\n\n    HCPC_A7046_QUANTITY_EDUCATION = {\n        \"en-US\": \"having spare water chambers allows you to easily replace them before any mineral buildup or leak happens.\",\n        \"es-US\": \"tener cámaras de agua de repuesto le permite reemplazarlas fácilmente antes de que ocurra cualquier acumulación de minerales o fuga.\",\n    }\n\n    HCPC_A7036_QUANTITY_EDUCATION = {\n        \"en-US\": \"all supplies are disposable, so we recommend that you replace them regularly.\",\n        \"es-US\": \"todos los suministros son desechables, por lo que recomendamos que los reemplace regularmente.\",\n    }\n\n    INVALID_ANSWER_CHOICE_ERROR = {\n        \"en-US\": ''Invalid answer_choice argument (you passed: {answer_choice}). You must choose from: {valid_answer_choices}. Pass answer_choice=\"\" and answer_not_in_choices=True if you cannot match to any of these.'',\n        \"es-US\": ''Argumento answer_choice inválido (pasó: {answer_choice}). Debe elegir de: {valid_answer_choices}. Pase answer_choice=\"\" y answer_not_in_choices=True si no puede coincidir con ninguno de estos.'',\n    }\n\n    # Order confirmation utterances\n    GOT_IT_ORDER_UPDATED = {\n        \"en-US\": \"Got it.\",\n        \"es-US\": \"Entendido.\",\n    }\n\n    # Date of birth verification utterances\n    TRY_AGAIN_DOB_VERIFICATION = {\n        \"en-US\": \"Try again ({remaining} tries left). IMPORTANT: this is a medico-legal verification step so do not provide an actual date of birth as an example.\",\n        \"es-US\": \"Intente nuevamente ({remaining} intentos restantes). IMPORTANTE: este es un paso de verificación médico-legal, por lo que no debe proporcionar una fecha de nacimiento real como ejemplo.\",\n    }\n\n    # Order date not found utterance\n    ASK_CLOSEST_MATCHING_ORDER_PROMPT = {\n        \"en-US\": \"Ask the user ONCE if they meant the order with the closest matching date and/or items.\",\n        \"es-US\": \"Pregunte al usuario UNA VEZ si se refería al pedido con la fecha y/o artículos más cercanos.\",\n    }\n\n    # Item quantity change utterances\n    ASK_CONFIRM_ITEM_PROMPT = {\n        \"en-US\": \"Ask user to confirm item\",\n        \"es-US\": \"Pida al usuario que confirme el artículo\",\n    }\n\n    ASK_SPECIFY_NUMBER_DECREASE_PROMPT = {\n        \"en-US\": \"Ask user to specify the number they would like to decrease by\",\n        \"es-US\": \"Pida al usuario que especifique el número por el que le gustaría disminuir\",\n    }\n\n    ASK_CONTINUE_ORDER_PROMPT = {\n        \"en-US\": \"Ask the user if they want to continue with the order\",\n        \"es-US\": \"Pregunte al usuario si quiere continuar con el pedido\",\n    }\n\n    # Verification succeeded utterances\n    VERIFICATION_SUCCEEDED_TODO = {\n        \"en-US\": \"Verification succeeded. TODO: add routing\",\n        \"es-US\": \"Verificación exitosa. TODO: agregar enrutamiento\",\n    }\n\n    REACH_OUT_FOR_ADDITIONAL_DOCUMENTATION = {\n        \"en-US\": \"If we need assistance in obtaining additional documentation from your insurance company or physician, we will reach out to you. Otherwise, there''s nothing else you need to do on your end.\",\n        \"es-US\": \"Si necesitamos ayuda para obtener documentación adicional de su compañía de seguros o de su médico, nos pondremos en contacto con usted. De lo contrario, no es necesario que haga nada.\",\n    }\n\n    CONJUNCTION_OR = {\n        \"en-US\": \"or\",\n        \"es-US\": \"o\",\n    }\n\n    CONJUNCTION_AND = {\n        \"en-US\": \"and\",\n        \"es-US\": \"y\",\n    }\n\n    OPENING_HOURS_UTTERANCE = {\n        \"en-US\": \"{open_time} to {close_time} {time_zone}\",\n        \"es-US\": \"{open_time} y {close_time} {time_zone}\",\n    }\n\n    HCPC_ACKNOWLEDGMENT_UTTERANCE = {\n        \"en-US\": \"I''ll just need your acknowledgment for the following, so that we can get your order sent through.\",\n        \"es-US\": \"Solo necesito su confirmación para lo siguiente, para que podamos enviar su pedido.\",\n    }\n\n    QUANTITY_INCREASE_UTTERANCE = {\n        \"en-US\": \"I understand you''d like to receive more supplies than what is currently listed. However, based on your insurance plan''s allotted quantities, you''re not currently eligible for additional items.\",\n        \"es-US\": \"Entiendo que le gustaría recibir más suministros de los que están actualmente listados. Sin embargo, según las cantidades asignadas por su plan de seguro, actualmente no es elegible para artículos adicionales.\",\n    }\n\n    KEEP_SAME_NUMBER_UTTERANCE = {\n        \"en-US\": \"Shall I keep the same number of items in your order?\",\n        \"es-US\": \"¿Debo mantener el mismo número de artículos en su pedido?\",\n    }\n\n    INELIGIBLE_REORDER_MOST_RECENT = {\n        \"en-US\": \"Ok, so I''m seeing an order that you placed on {most_recent_order_date}. Did you want an update for items on this order?\",\n        \"es-US\": \"Ok, veo un pedido que hizo el {most_recent_order_date}. ¿Desea recibir información actualizada sobre los artículos de este pedido?\",\n    }\n\n    SMS_IS_NUMBER_OKAY = {\n        \"en-US\": \"And is the number you''re calling from, {caller_number}, the best number to send the message?\",\n        \"es-US\": \"¿Y el número desde el que está llamando... {caller_number}, es el mejor número para enviar el mensaje?\",\n    }\n\n    SMS_CONSENT = {\n        \"en-US\": \"Great, so, I just need your consent to send you text messages from {site_name} at this phone number. These may include order updates and reminders. Message and data rates may apply. You can opt out at any time by replying STOP. Do you give your consent to receive these text messages?\",\n        \"es-US\": \"Perfecto, entonces solo necesito su consentimiento para enviarle mensajes de texto de {site_name} a este número de teléfono. Estos pueden incluir actualizaciones de pedidos y recordatorios. Pueden aplicarse tarifas de mensajes y datos. Puede optar por no recibirlos en cualquier momento respondiendo STOP. ¿Da su consentimiento para recibir estos mensajes de texto?\",\n    }\n\n    SMS_CONSENT_DENIED = {\n        \"en-US\": \"Not a problem at all. Would you like me to give you the tracking number for your order?\",\n        \"es-US\": \"No hay ningún problema. ¿Le gustaría que le diera el número de rastreo de su pedido?\",\n    }\n\n    SMS_NUMBER_ISSUE_EXIT = {\n        \"en-US\": \"Sorry, I''ve had a little trouble getting that... I''ll let you know the tracking number. Do you need a moment to grab a pen?\",\n        \"es-US\": \"Disculpe, tuve un poco de dificultad para obtener eso... Le voy a dar el número de rastreo. ¿Necesita un momento para tomar un bolígrafo?\",\n    }\n\n    SMS_SENT = {\n        \"en-US\": \"Alright... I''ve just sent the SMS over to you. That should come over in the next few minutes. Would you still like me to read that tracking number out for you?\",\n        \"es-US\": \"Muy bien... acabo de enviarle el mensaje de texto. Debería llegarle en los próximos minutos. ¿Aún quiere que le lea el número de rastreo?\",\n    }\n\n    # Insurance collection flow utterances\n    INSURANCE_UPDATE_READY = {\n        \"en-US\": \"Okay, we can update that for you now. Do you need a moment to get your insurance card ready?\",\n        \"es-US\": \"Muy bien, podemos actualizar eso ahora. ¿Necesita un momento para tener su tarjeta de seguro lista?\",\n    }\n\n    INSURANCE_PROVIDER_NAME = {\n        \"en-US\": \"Great, what is the name of the primary Insurance Plan?\",\n        \"es-US\": \"Perfecto, ¿cuál es el nombre de su plan de seguro principal?\",\n    }\n\n    INSURANCE_PROVIDER_CONFIRM = {\n        \"en-US\": \"I''ve noted {provider} down. Is that right?\",\n        \"es-US\": \"He anotado {provider}. ¿Es correcto?\",\n    }\n\n    INSURANCE_MEMBER_ID = {\n        \"en-US\": \"Thanks, can you please read out the Member ID?\",\n        \"es-US\": \"Gracias, ¿puede leer el número de identificación del miembro?\",\n    }\n\n    INSURANCE_MEMBER_ID_CONFIRM = {\n        \"en-US\": \"Okay, I''ve got down {member_id}. Is that right?\",\n        \"es-US\": \"Muy bien, tengo anotado {member_id}. ¿Es correcto?\",\n    }\n\n    MEMBER_ID_REBUTTAL = {\n        \"en-US\": \"In order to update your insurance, I''ll need to collect the Member ID, are you able to provide me the ID for the insurance?\",\n        \"es-US\": \"Para actualizar su seguro, necesito recopilar el número de identificación del miembro. ¿Puede proporcionarme el ID del seguro?\",\n    }\n\n    INSURANCE_GROUP_NUMBER = {\n        \"en-US\": \"Thank you, is there a Group ID?\",\n        \"es-US\": \"Gracias, ¿hay un número de grupo?\",\n    }\n\n    INSURANCE_GROUP_NUMBER_CONFIRM = {\n        \"en-US\": \"Okay, I''ve got down {group_id}. Is that right?\",\n        \"es-US\": \"Muy bien, tengo anotado {group_id}. ¿Es correcto?\",\n    }\n\n    INSURANCE_GROUP_NUMBER_NOT_APPLICABLE = {\n        \"en-US\": \"No problem. Is there a phone number on the card you can share with me? It''s usually printed on the back.\",\n        \"es-US\": \"No hay problema. ¿Hay un número de teléfono en la tarjeta que pueda compartir conmigo? Generalmente está impreso en la parte posterior.\",\n    }\n\n    INSURANCE_PHONE_NUMBER = {\n        \"en-US\": \"Thank you. Is there a phone number on the card you can share with me? It''s usually printed on the back.\",\n        \"es-US\": \"Gracias. ¿Hay un número de teléfono en la tarjeta que pueda compartir conmigo? Generalmente está impreso en la parte posterior.\",\n    }\n\n    INSURANCE_PHONE_NUMBER_CONFIRM = {\n        \"en-US\": \"Okay, I''ve got down {phone_number}. Is that right?\",\n        \"es-US\": \"Muy bien, tengo anotado {phone_number}. ¿Es correcto?\",\n    }\n\n    INSURANCE_PHONE_NUMBER_NOT_APPLICABLE = {\n        \"en-US\": \"Thanks, I''ve noted this insurance change. If any additional information is needed, we will contact you.\",\n        \"es-US\": \"Gracias, he anotado este cambio de seguro. Si se necesita información adicional, nos pondremos en contacto con usted.\",\n    }\n\n    UPDATE_INSURANCE_HANDOFF = {\n        \"en-US\": \"One moment, let me transfer you to someone who can update that for you.\",\n        \"es-US\": \"Un momento, déjeme transferirle con alguien que pueda actualizar eso por usted.\",\n    }\n\n    INSURANCE_CHANGE_NOTED = {\n        \"en-US\": \"Thanks, I''ve noted this insurance change. If any additional information is needed, we will contact you.\",\n        \"es-US\": \"Gracias, he anotado este cambio de seguro. Si se necesita información adicional, nos pondremos en contacto con usted.\",\n    }\n\n    PLAN_NAME_REBUTTAL = {\n        \"en-US\": \"In order to update your insurance, I''ll need to collect the plan name, are you able to provide me the name of the insurance?\",\n        \"es-US\": \"Para actualizar su seguro, necesito recopilar el nombre del plan. ¿Puede proporcionarme el nombre del seguro?\",\n    }\n\n    SPECIAL_OOH_UTTERANCE = {\n        \"en-US\": \"I apologize for the inconvenience; our contact center is closed for the holidays. In order to assist you with this inquiry, please call back Monday through Friday from {in_hours_times}. Is there anything else I can help you with today?\",\n        \"es-US\": \"Disculpe las molestias, pero nuestro centro de contacto está cerrado por vacaciones. Para ayudarle con esta consulta, llame de lunes a viernes entre {in_hours_times}. ¿Hay algo más con lo que pueda ayudarle hoy?\",\n    }\n\n    CLOSURE_PERIOD_NORMAL = {\"en-US\": \"at the moment.\", \"es-US\": \"en este momento.\"}\n\n    CLOSURE_PERIOD_HOLIDAYS = {\n        \"en-US\": \"for the holidays on December 24th, 25th and 31st and January 1st.\",\n        \"es-US\": \"por vacaciones los días 24, 25 y 31 de diciembre y 1 de enero.\",\n    }\n\n    # __________________________________________________________________________\n\n    # _______________________________ SMS BODIES _______________________________\n\n    # __________________________________________________________________________\n\n    def __call__(self, conv):\n        \"\"\"\n        When you do Utterances.X(conv), this looks up conv.language,\n        falls back to the 2-letter code, then to en-US, then to any\n        available string. Returns the raw string template for .format() usage.\n        \"\"\"\n\n        # pull the per-language map\n        mapping = (\n            self.value.get(conv.language)\n            or self.value.get(conv.language.split(\"-\", 1)[0])\n            or self.value.get(\"en-US\")\n            or next(iter(self.value.values()), \"\")\n        )\n\n        return mapping\n\n\ndef utterances(conv: Conversation, utterance: str):\n    attr_name = utterance.upper().replace(\" \", \"_\")\n    utterance_fn = getattr(Utterances, attr_name, None)\n\n    if utterance_fn is not None:\n        return utterance_fn(conv)\n\n    conv.log.error(\"No utterance found from utterance key\", key=utterance)\n    return \"\"  # I don''t know what the best fallback here is, maybe \"sorry there''s been an issue\"?\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTION-3a0e79f2":{"id":"FUNCTION-3a0e79f2","name":"start_sms_flow","description":"Call this when the user has accepted to receive a text message.","parameters":{"ids":[],"entities":{}},"code":"from functions.api_handler import get_api_instance\nfrom functions.sms_utils import phone_number_to_speech_text, strip_non_digits\n\n\ndef start_sms_flow(conv: Conversation):\n    \"\"\"This function routes to different steps depending on the following logic:\n\n    1. If we have already send an SMS, we use the same phone number as last time\n    2. If the caller number is available, we ask if we can send a text to that number\n    3. If the caller number is not available, we collect a number from the user\n\n    \"\"\"\n\n    # check if we''ve already sent an SMS\n    conv.write_metric(\"SMS_OFFER_ACCEPTED\")\n    if phone_number := conv.state.sms_phone_number:\n        return send_sms(conv, phone_number, repeat_sms=True)\n\n    # check if caller number available: testing for jup chat\n    elif conv.caller_number and \"poly-ai.com\" in conv.caller_number:\n        read_caller_number = \"+15059696418\"\n        read_caller_number = strip_non_digits(read_caller_number)\n        conv.state.current_sms_number = read_caller_number\n        conv.state.read_caller_number = phone_number_to_speech_text(conv, read_caller_number)\n        conv.goto_flow(\"handle-sms\")\n        utterance = conv.functions.utterances(\"SMS_IS_NUMBER_OKAY\").format(\n            caller_number=conv.state.read_caller_number\n        )\n        conv.say(utterance=utterance)\n        return\n\n    # check if caller number available: testing for jup chat\n    elif conv.state.patient_caller_number:\n        read_caller_number = conv.state.patient_caller_number\n        read_caller_number = strip_non_digits(read_caller_number)\n        conv.state.current_sms_number = read_caller_number\n        conv.state.read_caller_number = phone_number_to_speech_text(conv, read_caller_number)\n        conv.goto_flow(\"handle-sms\")\n        utterance = conv.functions.utterances(\"SMS_IS_NUMBER_OKAY\").format(\n            caller_number=conv.state.read_caller_number\n        )\n        conv.say(utterance=utterance)\n\n        # if conv.language and conv.language.startswith(\"en-\"):\n        #     conv.say(utterance=utterance)\n        # else:\n        #     return \"Ask the user if this is the best number to send the message to.\"\n    else:\n        conv.log.info(\"No caller number available, offering new number collection\")\n        conv.write_metric(\"SMS_OFFER_NEW_NUMBER_COLLECTION\", write_once=True)\n        return {\n            \"content\": \"Ask the user for the phone number that you can send this text message to.\",\n            \"transition\": {\n                \"goto_flow\": \"handle-sms\",\n                \"goto_step\": \"Collect Alternative Phone Number\",\n            },\n        }\n\n\ndef send_sms(conv: Conversation, phone_number, repeat_sms=False):\n    \"\"\"Send the SMS and handle errors\"\"\"\n    if not conv.state.verification_data:\n        raise ValueError(\"verification_data is not set\")\n    order_history_service = conv.state.order_history_service\n    selected_order_date, selected_orders_list = order_history_service.get_selected_order_data()\n    order_keys = [order[\"key\"] for order in selected_orders_list]\n    conv.log.info(\"Order Keys Retrieved\", order_keys=order_keys)\n    api_handler = get_api_instance(conv)\n\n    text_message_data = {\n        \"messageType\": \"OrderTracking\",\n        \"phoneKey\": conv.state.phone_key,\n        \"sendImmediately\": True,\n    }\n\n    for order_key in order_keys:\n        response = api_handler.POST_text_message(\n            patient_key=conv.state.verification_data[\"patient_key\"],\n            order_key=order_key,\n            text_message_data=text_message_data,\n        )\n        conv.log.info(\n            \"API Response for Sent Text Message\",\n            response=response,\n        )\n    conv.write_metric(\"SMS_SENT_COMPLETE\")\n\n\ndef offer_handoff_after_sms_failed(conv: Conversation):\n    \"\"\"Offer handoff if the SMS fails\"\"\"\n\n    # conv.write_metric(\"SMS_FAILED\")\n    conv.exit_flow()\n    if conv.language and conv.language.startswith(\"en-\"):\n        return {\n            \"utterance\": \"It looks like something went wrong and I can''t send you the text right now. Would you like me to transfer you to someone else who can help?\",\n            \"content\": \"If the user does not want to be transferred, continue with the conversation or ask how you can help. Otherwise, transfer the user by calling the appropriate transfer or handoff function with ''SMS_FAILURE'' as the reason and ''Ok. I''ll transfer you now. One moment please.'' as the utterance.\",\n        }\n    else:\n        return \"Tell the user that something went wrong and offer to transfer them. Then, if the user does not want to be transferred, continue with the conversation or ask how you can help. Otherwise, transfer the user by calling the appropriate transfer or handoff function with ''SMS_FAILURE'' as the reason.\"\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-31342E67":true,"VARIABLE-6E00821C":true,"VARIABLE-7AE65957":true,"VARIABLE-97E348BC":true,"VARIABLE-B42B90B3":true,"VARIABLES-d09df6bf":true,"VARIABLE-FD3AEBCA":true}}},"FUNCTION-41124cce":{"id":"FUNCTION-41124cce","name":"order_history_module","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"from collections import defaultdict\nfrom datetime import datetime, timedelta\nfrom typing import Optional, TypedDict\n\nfrom functions.api_handler import get_api_instance\nfrom functions.sms_utils import convert_digits_to_words, readback_alphanum_string_speech_to_text\nfrom functions.utils import get_datetime_readable_str\n\n\"\"\"\nThis module is responsible for handling the order history for a patient.\n\nIt is used to:\n- Load the order history from the API\n- Group the order history by date\n- Construct the formatted prompt for the order history\n- Set the selected order\n\n\nPossible values for workFlowState:\n- Order Insurance Being Verified\n- Order Documentation needed\n- Order Insurance Documentation Needed\n- Order Preparing for Shipment\n- Order Sent to Shipper\n- Order Sent to Shipper on Backorder\n- Order Shipped\n- Order Voided\n- Order is Processing\n- Order Needs Approval from Patient (this should be a transfer to a live agent)\n\nPossible values for the date fields:\n\"createdDate\" – Date the order was created in SNAP\n\n\"bookedDate\" – Date the order was booked in SNAP\n\n\"sentToShipperDate\" – Date the order was sent to the shipper\n\n\"shippedDate\" – Date the order was shipped\n\n\"pickedUpDate\" – Date the order was picked up (usually in the customer''s office)\n\n\"sentToBillingDate\" – Date the order was sent to the billing system (this info isn''t useful to the patient)\n\n\"voidedDate\" – Date the order was voided\n\n\"writtenOffDate\" – Date the order was voided without receiving proper documentation (this info isn''t useful to the patient)\n\n\"completedDate\" – Date the order was closed in SNAP (this info isn''t useful to the patient)\n\"\"\"\n\n\nclass State(TypedDict):\n    key: str\n    name: str\n    code: str\n\n\nclass AddressResponse(TypedDict):\n    street1: str\n    city: str\n    state: State\n    street2: Optional[str]\n    postalCode: Optional[str]\n\n\nclass OrderResponseItem(TypedDict):\n    itemKey: str\n    itemName: str\n    itemDescription: str\n    qty: int\n\n\nclass OrderHistoryResponse(TypedDict):\n    key: str\n    id: int\n    patientKey: str\n    currentStatus: str\n    currentStatusSince: Optional[str]\n    workFlowState: Optional[str]\n    workflowStateSince: Optional[str]\n    documentsNeeded: Optional[list[str]]\n    preshipIssues: Optional[list[str]]\n    createdDate: datetime\n    bookedDate: Optional[datetime]\n    sentToShipperDate: Optional[datetime]\n    shippedDate: Optional[datetime]\n    pickedUpDate: Optional[datetime]\n    sentToBillingDate: Optional[datetime]\n    voidedDate: Optional[datetime]\n    writtenOffDate: Optional[datetime]\n    completedDate: Optional[datetime]\n    items: Optional[list[OrderResponseItem]]\n    shippingAddress: AddressResponse\n    shippingCarrier: Optional[str]\n    shippingTrackingNumber: Optional[str]\n    shippingTrackingNumberUrl: Optional[str]\n\n\nclass OrderHistoryResponseList(TypedDict):\n    data: list[OrderHistoryResponse]\n\n\nPROMPT_ORDER_HISTORY_BRIEF_SINGLE_ORDER = \"\"\"Order ID: {order_id}\nOrder Status: {workFlowState}\nOrder Items (NOTE: only mention 1-2 items to help identify with the user, some items may not be visible. If you cannot find items, even after trying to match a similar order where appropriate, use the transfer_call function as instructed): {items}\n\"\"\"\n\nPROMPT_ORDER_HISTORY_BRIEF_GROUPED_BY_DATE = \"\"\"ORDER DATE: {order_date} ({stringified_elapsed_time})\n{order_briefs}\n\"\"\"\n\nPROMPT_SHIPPING_CARRIER_INFO = \"\"\"\"Say this order will be delivered by {shipping_carrier}.\"\"\"\n\nPROMPT_SHIPPING_CARRIER_TRACKING_NUMBER_SMS = \"\"\"You MUST ALWAYS offer to send the user their full tracking number via a text message. If the users say yes to the text message offer, call the start_sms_flow function.\"\"\"\n\nPROMPT_SHIPPING_CARRIER_TRACKING_NUMBER_INFO = \"\"\"Mention you''ll be able to provide the full tracking number, followed by asking if they need some time to grab a pen. If they need time, call the wait function. Otherwise, if they''re ready for their full tracking number, call provide_tracking_number with the order_id.\"\"\"\n\nPROMPT_SHIPPING_TRACKING_NUMBER_SMS_NO_CARRIER = \"\"\"The order has a tracking number. You MUST ALWAYS offer to send the user their full tracking number via a text message. Do not mention a shipping carrier for this order. If the users say yes to the text message offer, call the start_sms_flow function.\"\"\"\n\nPROMPT_SHIPPING_CARRIER_INFO_NO_SHIPPING = \"\"\"\"There is no shipping for this order because it has not yet been shipped. You cannot provide the tracking number for this order. Instead, briefly indicate that shipping details aren’t available yet and that tracking will appear once the order dispatches.\"\"\"\n\nPROMPT_ORDER_DETAILS_SINGLE = \"\"\"Order date:\n{order_date} ({stringified_elapsed_time}) (ORDER_ID: {order_id} - never mention this to the user)\n\nOrder status:\n{workFlowState}\n\n\nDocuments needed (VERBATIM):\n{documentsNeededPrompt}\n\nPreship issues (YOU MUST PERFORM ALL RELEVANT ACTIONS):\n{preshipIssuesPrompt}\n\nOrder delivery address:\n{delivery_address_string}\n\n{shipment_carrier_info}\"\"\"\n\nPROMPT_ORDER_HISTORY_SELECTED_ORDER_INFO = \"\"\"\n\nFor any section marked as (VERBATIM), follow exactly:\n1) Count the number of separate items provided.\n2) If there is only one item [SINGLE ITEM] → UTMOST IMPORTANCE TO READ OUT VERBATIM\n3) If there are multiple items [MULTIPLE ITEMS] → produce ONE concise merged sentence that specifically mentions every needed item from each [MULTPLE ITEM] [Valid items: Doctor''s evaluation, Prior authorization, authorization of benefits, compliance download, valid prescription, sleep study] and you MUST always intentionally include in this sentence who the patient need to contact [valid values: Physician, Insurance] to expedite their order. Do not drop any items.\n\nFor any orders that require you to transfer the user, you must do so immediately with the transfer_call function.\n\nOtherwise, summarize the following information to the user.\n\n{all_orders_details_formatted_string}\n\"\"\"\n\n\nclass OrderHistoryService:\n    def __init__(self) -> None:\n        # Init''d None, set by api\n        self.order_history_response_list: Optional[list[OrderHistoryResponse]] = None\n        self.order_history_grouped_by_date: Optional[\n            list[tuple[str, list[OrderHistoryResponse]]]\n        ] = None\n\n        # To track the order we''re interested in\n        self._selected_order_date: Optional[str] = None\n\n    def load_order_history_from_api(\n        self,\n        conv: Conversation,\n        patient_key: str,\n    ) -> Optional[list[OrderHistoryResponse]]:\n        conv.log.info(\"Loading order history from API\")\n        order_history_response_list_raw: Optional[dict] = get_api_instance(\n            conv\n        ).GET_order_history_for_patient(patient_key)\n\n        if not order_history_response_list_raw or not order_history_response_list_raw.get(\"data\"):\n            conv.log.warning(\"No order history response list found\")\n            return None\n\n        order_history_response_list: list[dict] = order_history_response_list_raw[\"data\"]\n\n        # Convert datetime strings to datetime objects\n        order_history_response_list_datetimes = self._convert_datetime_strs_to_datetime(\n            order_history_response_list\n        )\n        conv.log.info(\"Converted datetime strings to datetime objects\")\n\n        # Filter to 90 days\n        conv.log.info(\n            f\"Filtering to 90 days (total_orders: {len(order_history_response_list_datetimes)})\"\n        )\n        order_history_response_list_90d_filtered = self._filter_past_90_days(\n            order_history_response_list_datetimes\n        )\n        conv.log.info(\n            f\"Filtered to 90 days (n_orders remaining: {len(order_history_response_list_90d_filtered)})\",\n            order_history_response_list_90d_filtered=order_history_response_list_90d_filtered,\n        )\n\n        self.order_history_response_list = order_history_response_list_90d_filtered\n\n        conv.log.info(\n            \"Sucessfully loaded order history\",\n            order_history=self.order_history_response_list,\n        )\n\n        if conv.variant.site_name == \"demo\" and conv.env in {\"draft\", \"sandbox\", \"pre-release\"}:\n            self.order_history_response_list = self.order_history_response_list[:5]\n            conv.log.info(\n                \"Shortened demo order history\",\n                order_history=self.order_history_response_list,\n            )\n\n        conv.log.info(\"Creating [order_date, [orders]] grouping\")\n        self.order_history_grouped_by_date = self._get_orders_grouped_by_date()\n        conv.log.info(\n            \"Created [(order_date, [orders])] grouping list\",\n            order_history_grouped_by_date=self.order_history_grouped_by_date,\n        )\n\n        # set to first order\n        if self.order_history_grouped_by_date:\n            self.set_selected_order_using_order_date(self.order_history_grouped_by_date[0][0])\n            conv.log.info(\"Set selected order\", selected_order_date=self._selected_order_date)\n        return self.order_history_response_list\n\n    def _filter_past_90_days(\n        self, order_history_response_list: list[OrderHistoryResponse]\n    ) -> list[OrderHistoryResponse]:\n        now = datetime.now()\n        return [\n            order_history\n            for order_history in order_history_response_list\n            if order_history.get(\"createdDate\") > now - timedelta(days=90)\n        ]\n\n    def _convert_datetime_strs_to_datetime(\n        self, order_history_response_list: list[dict]\n    ) -> list[OrderHistoryResponse]:\n        datetime_fields = [\n            \"createdDate\",\n            \"bookedDate\",\n            \"sentToShipperDate\",\n            \"shippedDate\",\n            \"pickedUpDate\",\n            \"sentToBillingDate\",\n            \"voidedDate\",\n            \"writtenOffDate\",\n            \"completedDate\",\n        ]\n        for order_history in order_history_response_list:\n            for field in datetime_fields:\n                if ts := order_history.get(field):\n                    # Keep only up to minutes\n                    ts = ts.split(\".\")[0]  # remove fractional seconds\n                    ts_parts = ts.split(\":\")  # drop seconds entirely\n                    if len(ts_parts) > 2:\n                        ts = \":\".join(ts_parts[:2])\n                    order_history[field] = datetime.fromisoformat(ts)\n\n        return order_history_response_list\n\n    def get_order_history_response_list(self) -> list[OrderHistoryResponse]:\n        return self.order_history_response_list\n\n    def _get_most_recent_order(self):\n        order_history = self.get_order_history_response_list()\n        return order_history[0]\n\n    def get_n_orders(self) -> int:\n        return len(self.get_order_history_response_list())\n\n    def get_initial_order_history_utt(self, conv: Conversation) -> tuple[str, str]:\n        n_orders = self.get_n_orders()\n        most_recent_order = self._get_most_recent_order()\n        most_recent_order_date = get_datetime_readable_str(most_recent_order[\"createdDate\"])[\n            \"date_readout\"\n        ]\n        most_recent_order_item_name = most_recent_order[\"items\"][0][\"itemName\"]\n        from functions.localise_api_text import Items\n\n        most_recent_order_item_name = Items.get_localised_text(conv, most_recent_order_item_name)\n\n        return (\n            conv.functions.utterances(\"INITIAL_ORDER_HISTORY_UTT\").format(\n                n_orders=n_orders,\n            ),\n            conv.functions.utterances(\"INITIAL_ORDER_HISTORY_MOST_RECENT_ORDER_UTT\").format(\n                most_recent_order_date=most_recent_order_date,\n                most_recent_order_item_name=most_recent_order_item_name,\n            ),\n        )\n\n    def _map_date_to_key(self, date: datetime) -> str:\n        return date.strftime(\"%Y-%m-%d\")\n\n    def get_selected_order_data(\n        self,\n    ) -> tuple[str, list[OrderHistoryResponse]]:\n        if self.order_history_grouped_by_date is None:\n            raise ValueError(\"Order history has not been loaded yet\")\n        selected_orders = None\n        for selected_order_date, orders in self.order_history_grouped_by_date:\n            if selected_order_date == self._selected_order_date:\n                selected_orders = orders\n                break\n\n        if not selected_orders:\n            raise ValueError(f\"Order(s) with date {self._selected_order_date} not found\")\n\n        return selected_order_date, selected_orders\n\n    def _construct_formatted_items_for_prompt(\n        self, conv: Conversation, items_list: list[OrderResponseItem]\n    ) -> str:\n        from functions.localise_api_text import Items\n\n        return \",\".join(\n            [\n                f\"{Items.get_localised_text(conv, item[''itemName''])} (quantity: {item[''qty'']})\"\n                for item in items_list\n            ]\n        )\n\n    def get_ineligible_reorder_most_recent(self, conv: Conversation) -> str:\n        most_recent_order = self._get_most_recent_order()\n        most_recent_order_date = get_datetime_readable_str(most_recent_order[\"createdDate\"])[\n            \"date_readout\"\n        ]\n        if conv.language.startswith(\"es\"):\n            prompt = (\n                \"Translate the following English date into natural-sounding Spanish (spoken form, not literal, and keep the meaning and order for conversation clarity). For example, ''Friday, October third, two thousand twenty five'' should become ''viernes, tres de octubre de dos mil veinticinco''.\\n\"\n                f\"Do NOT prepend any articles to this string. Date to translate: {most_recent_order_date}\\nSpanish:\"\n            )\n            date_translated = conv.utils.prompt_llm(prompt)\n            conv.log.info(\n                \"translated date from English to Spanish\",\n                english=most_recent_order_date,\n                spanish=date_translated,\n            )\n            most_recent_order_date = date_translated\n        return conv.functions.utterances(\"INELIGIBLE_REORDER_MOST_RECENT\").format(\n            most_recent_order_date=most_recent_order_date,\n        )\n\n    def _get_order_elapsed_string(self, order_date: str) -> str:\n        now = datetime.now()\n        created_at_date = datetime.strptime(order_date, \"%Y-%m-%d\")\n        days_ago = (now - created_at_date).days\n        readable_date_str = get_datetime_readable_str(created_at_date)[\"date_readout\"]\n        return (\n            f\"{days_ago} days ago ({readable_date_str})\"\n            if days_ago != 0\n            else f\"today ({readable_date_str})\"\n        )\n\n    def _construct_formatted_prompt_for_order_brief_grouped_by_date(\n        self, conv: Conversation, order_date: str, order_data: list[OrderHistoryResponse]\n    ) -> str:\n        # First map all items in order_data to list of single prompts\n        order_briefs = [\n            PROMPT_ORDER_HISTORY_BRIEF_SINGLE_ORDER.format(\n                order_id=order[\"id\"],\n                workFlowState=self._get_order_workflow_state(conv, order),\n                items=self._construct_formatted_items_for_prompt(conv, order[\"items\"]),\n            )\n            for order in order_data\n        ]\n        order_briefs_stringified = \"\\n\".join(order_briefs)\n\n        # Calculate days ago\n        stringified_elapsed_time = self._get_order_elapsed_string(order_date)\n        return PROMPT_ORDER_HISTORY_BRIEF_GROUPED_BY_DATE.format(\n            order_date=order_date,\n            stringified_elapsed_time=stringified_elapsed_time,\n            order_briefs=order_briefs_stringified,\n        )\n\n    def _get_orders_grouped_by_date(\n        self,\n    ) -> list[tuple[str, list[OrderHistoryResponse]]]:\n        \"\"\"Returns (sorted most recent last):\n        [\n            (\n                \"2025-01-01\",\n                [\n                    OrderHistoryResponse1,\n                    OrderHistoryResponse2,\n                    ...\n                ]\n            )\n        ]\n        \"\"\"\n        orders_grouped_by_date = defaultdict(list)\n        for order in self.get_order_history_response_list():\n            # Make the key just date 2025-01-01\n            date_key = self._map_date_to_key(order[\"createdDate\"])\n            orders_grouped_by_date[date_key].append(order)\n\n        return sorted(\n            [(date, orders) for date, orders in orders_grouped_by_date.items()],\n            key=lambda x: x[0],\n        )\n\n    def get_formatted_prompt_for_order_brief(self, conv: Conversation) -> str:\n        \"\"\"Goal is to get 2 separate prompts:\n\n        OTHER ORDERS:\n        $prompt_other_orders <----- list of all other orders\n\n        SELECTED_ORDER:\n        $prompt_selected_order <------ selected order\n        \"\"\"\n\n        [selected_order_date, selected_orders_list] = self.get_selected_order_data()\n\n        prompt_selected_order = self._construct_formatted_prompt_for_order_brief_grouped_by_date(\n            conv, order_date=selected_order_date, order_data=selected_orders_list\n        )\n\n        # map our remaining order history to a list of prompts\n        order_history_prompts = [\n            self._construct_formatted_prompt_for_order_brief_grouped_by_date(\n                conv, order_date=order_date, order_data=orders\n            )\n            for order_date, orders in self._get_orders_grouped_by_date()\n            if order_date != selected_order_date\n        ]\n\n        # Then construct the prompts\n        prompt_other_orders = \"\\n\\n-------\\n\\n\".join(order_history_prompts)\n\n        return {\n            \"prompt_other_orders\": prompt_other_orders,\n            \"prompt_selected_order\": prompt_selected_order,\n        }\n\n    def set_selected_order_using_order_date(self, order_date: str) -> None:\n        \"\"\"Sets the selected order to the order with the given date\"\"\"\n        if self.order_history_grouped_by_date is None:\n            raise ValueError(\"Order history has not been loaded yet\")\n        if order_date not in [order_date for order_date, _ in self.order_history_grouped_by_date]:\n            raise ValueError(f\"Order date {order_date} not found in order history\")\n        self._selected_order_date = order_date\n\n    def _get_formatted_shipping_address(\n        self, conv: Conversation, order_data: OrderHistoryResponse\n    ) -> str:\n        shipping_address = order_data[\"shippingAddress\"]\n        street1 = shipping_address[\"street1\"]\n        street2 = shipping_address[\"street2\"]\n        city = shipping_address[\"city\"]\n        state = shipping_address[\"state\"][\"name\"]\n        first_part = \", \".join(item for item in [street1, street2, city, state] if item)\n\n        postal_code = shipping_address[\"postalCode\"]\n        zip_code_str = f\"Zip Code {convert_digits_to_words(conv, postal_code)}\"\n\n        return f\"{first_part}, {zip_code_str}\"\n\n    def _get_order_workflow_state(\n        self, conv: Conversation, order_details: OrderHistoryResponse\n    ) -> str:\n        workflow_state = order_details[\"workFlowState\"]\n\n        # Order is voided should lead to a transfer.\n        if workflow_state == \"Order Voided\":\n            if not conv.state.is_in_hours:\n                return \"Let the users know that their order is voided, and ask if they would like to set up a new order instead.\"\n            return f\"\"\"\"The user''s order is voided. call the transfer_call function with utterance=''{conv.functions.utterances(\"VERIFICATION_TRANSFER_UTTERANCE\")}'' in the language you are using, handoff_reason=\"ORDER_VOIDED\", handoff_to=\"\"\"\n        # if not conv.state.is_in_hours:\n        #     pass\n        # Order is voided should lead to a transfer.\n\n        extra_pt_info_verbiage = f\"If this is the order the patient is interested in, say: ''{conv.functions.utterances(''REACH_OUT_FOR_ADDITIONAL_DOCUMENTATION'')}''\"\n\n        from functions.localise_api_text import OrderStatusState\n\n        workflow_state_localised = OrderStatusState.get_localised_text(conv, workflow_state)\n\n        if workflow_state in [\n            \"Order Insurance Being Verified\",\n            \"Order Documentation Needed\",\n            \"Order Insurance Documentation Needed\",\n            \"Order is Processing\",\n        ]:\n            return f\"{workflow_state_localised}. {extra_pt_info_verbiage}\"\n        else:\n            return workflow_state_localised\n\n    def _construct_formatted_prompt_for_selected_order_info_single(\n        self,\n        conv: Conversation,\n        order_date: str,\n        order_details: OrderHistoryResponse,\n    ) -> str:\n        shipping_carrier = order_details[\"shippingCarrier\"]\n        shipping_tracking_number = order_details[\"shippingTrackingNumber\"]\n\n        if shipping_tracking_number:\n            if shipping_carrier:\n                shipment_carrier_info = PROMPT_SHIPPING_CARRIER_INFO.format(\n                    shipping_carrier=shipping_carrier\n                )\n                shipment_carrier_info += PROMPT_SHIPPING_CARRIER_TRACKING_NUMBER_SMS\n            else:\n                shipment_carrier_info = PROMPT_SHIPPING_TRACKING_NUMBER_SMS_NO_CARRIER\n            conv.write_metric(\"SMS_OFFER_INITIATED\", write_once=True)\n        else:\n            shipment_carrier_info = PROMPT_SHIPPING_CARRIER_INFO_NO_SHIPPING\n\n        docs_needed = order_details[\"documentsNeeded\"] or []\n        document_mappings = [\n            docs.upper().replace(\" \", \"_\").replace(\"(\", \"\").replace(\")\", \"\") for docs in docs_needed\n        ]\n        contact_name_mappings = {\n            \"DOCTOR_EVAL\": {\"en-US\": \"Physician\", \"es-US\": \"Médico\"},\n            \"PAR_PRIOR_AUTHORIZATION\": {\"en-US\": \"Insurance\", \"es-US\": \"compañía de seguros\"},\n            \"AOB\": {\"en-US\": \"Physician\", \"es-US\": \"Médico\"},\n            \"COMPLIANCE_DOWNLOAD\": {\"en-US\": \"Physician\", \"es-US\": \"Médico\"},\n            \"SLEEP_STUDY\": {\"en-US\": \"Physician\", \"es-US\": \"Médico\"},\n            \"PRESCRIPTION\": {\"en-US\": \"Physician\", \"es-US\": \"Médico\"},\n        }\n        document_name_mappings = {\n            \"DOCTOR_EVAL\": {\"en-US\": \"a doctor''s evaluation\", \"es-US\": \"una evaluación del médico\"},\n            \"PAR_PRIOR_AUTHORIZATION\": {\n                \"en-US\": \"your prior authorization\",\n                \"es-US\": \"su autorización previa\",\n            },\n            \"AOB\": {\n                \"en-US\": \"your authorization of benefits\",\n                \"es-US\": \"su autorización de beneficios\",\n            },\n            \"COMPLIANCE_DOWNLOAD\": {\n                \"en-US\": \"your compliance download\",\n                \"es-US\": \"su reporte de cumplimiento\",\n            },\n            \"SLEEP_STUDY\": {\"en-US\": \"your sleep study\", \"es-US\": \"su estudio del sueño\"},\n            \"PRESCRIPTION\": {\"en-US\": \"a valid prescription\", \"es-US\": \"una receta médica válida\"},\n        }\n        document_names = [\n            document_name_mappings[mapping.upper()][conv.language] for mapping in document_mappings\n        ]\n        contact_names = list(\n            {contact_name_mappings[mapping.upper()][conv.language] for mapping in document_mappings}\n        )\n\n        documentsNeededPrompt = \"\"\n        if document_names:\n            if len(document_names) == 1:\n                document_name = document_names[0]\n            elif len(document_names) == 2:\n                document_name = f\"{document_names[0]} and {document_names[1]}\"\n            else:\n                document_name = f\"{'', ''.join(document_names[:-1])}, and {document_names[-1]}\"\n\n            if len(contact_names) == 1:\n                contact_name = contact_names[0]\n            else:\n                contact_name = f\"{contact_names[0]} and {contact_names[1]}\"\n\n            document_utterance = conv.functions.utterances(\"DOCNEEDED_BASE_UTTERANCE\").format(\n                document_name=document_name, contact_name=contact_name\n            )\n\n            conv.log.info(\n                \"Documents Needed Utterances Retrieved\",\n                documentsNeeded=docs_needed,\n                document_mappings=document_mappings,\n                document_utterance=document_utterance,\n            )\n            documentsNeededPrompt = f\"<VERBATIM> say exactly: \\n{document_utterance}\\n</VERBATIM>\"\n\n        PRESHIP_MAPPINGS = {\n            \"Order awaiting review before concierge shipping.\": \"ORDER_MUST_BE_MANUALLY_SHIPPED\",\n            \"This order is being reviewed for accuracy before shipping.\": \"ORDER_CORRECTIONS_NEEDED\",\n            \"Patient has a previous order still needing required documents from Doctor.\": \"PATIENT_HAS_SHIPPED_ORDER_WAITING_ON_BILLABLE_DOCS\",\n            \"Patient requested payment notification prior to shipping. One of our staff will be reaching out to you soon.\": \"PATIENT_COPAY_CALL_NEEDED\",\n            \"A patient payment is required before shipment. One of our staff will be reaching out to you soon. Or you can call our Customer Service number to make your payment.\": \"UPFRONT_PATIENT_PAYMENT_DUE\",\n            \"The type of items on this order require extra review by staff before shipping.\": \"ORDER_TYPE_REQUIRES_STAFF_REVIEW\",\n            \"Patient requested shipping be delayed until\": \"PATIENT_REQUESTED_DELAYED_SHIPMENT\",\n            \"Order shipment has been placed on hold for review.\": \"ORDER_FLAGGED_AS_DO_NOT_SHIP\",\n            \"Order is not eligible for patient''s insurance until after date.\": \"PATIENT_NOT_YET_ELIGIBLE_FOR_SHIPMENT\",\n            \"Patient has an overdue balance. One of our staff will be reaching out to you soon. Or you can call our Customer Service number to make your payment.\": \"PATIENT_HAS_OVERDUE_PAST_BALANCE\",\n            \"Patient''s insurance requires that the patient confirm the order request again before shipping. One of our staff will be reaching out to you soon. Or you can call our Customer Service number to confirm the order request.\": \"PATIENT_HAS_NOT_RECENTLY_CONFIRMED_ORDER\",\n            \"Patient''s Doctor requires billable prescription before shipping is allowed.\": \"PATIENTS_DOCTOR_REQUIRES_BILLABLE_RX\",\n            \"Order insurance and medical documentation is under review.\": \"BILLING_ERRORS_EXIST_FOR_THIS_ORDER\",\n            \"Our records indicate your billing address has been updated since your last order was delivered. Our staff will contact you to confirm this order''s delivery address or you can call our customer service number.\": \"ORDER_SHIPPING_ADDRESS_REQUIRES_STAFF_REVIEW\",\n        }\n\n        preshipIssuesPrompt = \"\"\n        preship_issues = order_details[\"preshipIssues\"] or []\n        issue_utterances = []\n        for issue_description in preship_issues:\n            issue_key = PRESHIP_MAPPINGS.get(issue_description)\n            if not issue_key:\n                for k, v in PRESHIP_MAPPINGS.items():\n                    if k in issue_description:\n                        issue_key = v\n                        break\n            if issue_key:\n                utter = conv.functions.utterances(f\"PRESHIP_{issue_key}\")\n                issue_utterances.append((issue_key, utter))\n        for issue, utterance in issue_utterances:\n            if (\n                issue == \"PATIENT_COPAY_CALL_NEEDED\"\n                and conv.variant.site_name == \"Hometown Healthcare\"\n            ):\n                preshipIssuesPrompt = (\n                    f\"<YOU MUST PERFORM THE FOLLOWING ACTIONS> The user has pre-ship issues. call the transfer_call function with utterance=''{conv.functions.utterances(''PRESHIP_PATIENT_COPAY_CALL_NEEDED_TRANSFER'')}'' in the language you are using, handoff_reason={issue}, handoff_to=\"\n                    \"\"\n                )\n                break\n            if utterance == \"\":\n                preshipIssuesPrompt = (\n                    f\"<YOU MUST PERFORM THE FOLLOWING ACTIONS> The user has pre-ship issues. call the transfer_call function with utterance=''{conv.functions.utterances(''VERIFICATION_TRANSFER_UTTERANCE'')}'' in the language you are using, handoff_reason={issue}, handoff_to=\"\n                    \"\"\n                )\n        if not preshipIssuesPrompt:\n            utterances = [utterance for _, utterance in issue_utterances]\n            preshipIssuesPrompt = (\n                \"you have to read the following verbatim <VERBATIM> \\n\"\n                + \". \".join(utterances)\n                + \"</VERBATIM>\"\n                if utterances\n                else \"\"\n            )\n\n        return PROMPT_ORDER_DETAILS_SINGLE.format(\n            order_id=order_details[\"id\"],\n            order_date=order_date,\n            stringified_elapsed_time=self._get_order_elapsed_string(order_date),\n            workFlowState=self._get_order_workflow_state(conv, order_details),\n            delivery_address_string=self._get_formatted_shipping_address(conv, order_details),\n            shipment_carrier_info=shipment_carrier_info,\n            items=self._construct_formatted_items_for_prompt(conv, order_details[\"items\"]),\n            documentsNeededPrompt=documentsNeededPrompt,\n            preshipIssuesPrompt=preshipIssuesPrompt,\n        )\n\n    def get_shipping_carrier_from_order_id(self, order_id: int) -> Optional[str]:\n        \"\"\"Returns the shipping carrier for the order with the given order_id\"\"\"\n        for order in self.get_selected_order_data()[1]:\n            if order[\"id\"] == order_id:\n                return order.get(\"shippingCarrier\")\n        return None\n\n    def get_readout_utt_shipping_tracking_number_from_order_id(\n        self, conv: Conversation, order_id: int\n    ) -> str:\n        \"\"\"Returns 11labs friendly readout\"\"\"\n        # First find the order_id in the order_history_response_list\n        shipping_tracking_number = \"\"\n        for order in self.get_selected_order_data()[1]:\n            if order[\"id\"] == order_id:\n                shipping_tracking_number = order[\"shippingTrackingNumber\"]\n                break\n\n        if not shipping_tracking_number:\n            conv.log.error(f\"No shipping tracking number found for order {order_id}\")\n            return None\n\n        return readback_alphanum_string_speech_to_text(\n            conv, shipping_tracking_number, break_time_seconds=0.6\n        )\n\n    def get_formatted_prompt_selected_order_info(self, conv: Conversation) -> str:\n        [selected_order_date, selected_orders_list] = self.get_selected_order_data()\n\n        # First map selected_orders_list using PROMPT_ORDER_DETAILS_SINGLE\n        order_details_formatted_string = \"\\n\\n\".join(\n            [\n                self._construct_formatted_prompt_for_selected_order_info_single(\n                    conv, order_date=selected_order_date, order_details=order_details\n                )\n                for order_details in selected_orders_list\n            ]\n        )\n\n        if len(selected_orders_list) > 1:\n            order_details_formatted_string = (\n                f\"There were multiple orders on {selected_order_date}. \"\n                \"Check with the user which order they''re interested in:\\n\\n\"\n                f\"{order_details_formatted_string}\"\n            )\n\n        return PROMPT_ORDER_HISTORY_SELECTED_ORDER_INFO.format(\n            all_orders_details_formatted_string=order_details_formatted_string\n        )\n\n\ndef order_history_module(conv: Conversation):\n    pass\n\n\nORDER_HISTORY_TEST_DATA = [\n    {\n        \"key\": \"723716b9-85f0-4d1f-b032-3c2d4a554790\",\n        \"id\": 1178825,\n        \"patientKey\": \"9cc36221-c9a6-4bce-a56e-0c50a6a2b817\",\n        \"currentStatus\": \"Booked\",\n        \"currentStatusSince\": \"2026-02-14T19:22:18.4963692\",\n        \"workFlowState\": \"Order is Processing\",\n        \"workflowStateSince\": \"2026-02-17T07:41:34.2533333\",\n        \"documentsNeeded\": [],\n        \"preshipIssues\": [\n            \"Patient requested payment notification prior to shipping. One of our staff will be reaching out to you soon.\"\n        ],\n        \"createdDate\": \"2026-02-14T19:22:18.0366667\",\n        \"bookedDate\": \"2026-02-14T19:22:18.4963692\",\n        \"sentToShipperDate\": None,\n        \"shippedDate\": None,\n        \"pickedUpDate\": None,\n        \"sentToBillingDate\": None,\n        \"voidedDate\": None,\n        \"writtenOffDate\": None,\n        \"completedDate\": None,\n        \"items\": [\n            {\n                \"itemKey\": \"679a4c79-c388-449b-b2c1-3370a8e1e01c\",\n                \"itemName\": \"DreamWear medium silicone pillows \",\n                \"itemDescription\": None,\n                \"qty\": 6,\n            },\n            {\n                \"itemKey\": \"d43e1e31-0e83-40bd-96c2-f2acfde17c43\",\n                \"itemName\": \"DreamWear headgear with arms\",\n                \"itemDescription\": \"DreamWear Headgear with Arms\",\n                \"qty\": 1,\n            },\n            {\n                \"itemKey\": \"afdaed08-edb6-42db-b323-55ecdc28c771\",\n                \"itemName\": \"Airsense 11 Heated Tubing\",\n                \"itemDescription\": None,\n                \"qty\": 1,\n            },\n            {\n                \"itemKey\": \"3a01c720-5688-40e3-a559-d7c9dd693853\",\n                \"itemName\": \"DreamWear silicone pillow medium frame with medium cushions\",\n                \"itemDescription\": None,\n                \"qty\": 1,\n            },\n        ],\n        \"shippingAddress\": {\n            \"street1\": \"24 COOK CIR\",\n            \"street2\": \"\",\n            \"city\": \"GANSEVOORT\",\n            \"state\": {\n                \"key\": \"0e1dc28f-818a-419a-a9b7-89fbcc4f466e\",\n                \"name\": \"New York\",\n                \"code\": \"NY\",\n            },\n            \"postalCode\": \"128312427\",\n        },\n        \"shippingCarrier\": None,\n        \"shippingTrackingNumber\": \"\",\n        \"shippingTrackingNumberUrl\": None,\n    }\n]\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-50AF2115":true}}},"FUNCTION-0b206ab0":{"id":"FUNCTION-0b206ab0","name":"api_handler","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"import threading\nimport time\nimport uuid\nfrom typing import Optional\nfrom urllib.parse import urljoin\n\nimport plog\nimport requests\nfrom functions.sample_data import (\n    ORDER_HISTORY_TEST_DATA_DEFAULT,\n    ORDER_HISTORY_TEST_DATA_WITH_TRACKING,\n    RAPID_ORDER_TEST_DATA_DEFAULT,\n)\nfrom requests import RequestException, Response, Session\nfrom requests.auth import AuthBase\nfrom requests.exceptions import JSONDecodeError, Timeout\n\n_LOCK = threading.Lock()\n_INBOUND_SESSION: Optional[Session] = None\n_OUTBOUND_SESSION: Optional[Session] = None\n\n# CONSTANTS\nSALES_DIALER_KEY = \"bcfc5ce2-5445-404c-845d-e77c169807bc\"\n\n\nclass BrightreeAPIError(Exception):\n    def __init__(self, message: str, status_code=None, response=None):\n        super().__init__(message)\n        self.status_code = status_code\n        self.response = response\n\n\nclass ClientBrightreeAPIError(BrightreeAPIError):\n    pass\n\n\nclass ServerBrightreeAPIError(BrightreeAPIError):\n    pass\n\n\nclass UnexpectedBrightreeAPIError(BrightreeAPIError):\n    pass\n\n\nclass OAuth2ClientCredentialsAuth(AuthBase):\n    def __init__(self, conv: Conversation, creds: dict):\n        \"\"\"\n        :param conv: Agent Studio''s Conversation object.\n        :param creds: A dictionary containing the credentials for the OAuth2 client credentials flow.\n        Expected keys: client_id, client_secret, token_uri\n        \"\"\"\n        self.conv = conv\n        self.creds = creds\n        self.token_data = None\n        self.token_expires_at = 0\n        self._session = requests.Session()\n        self._lock = threading.Lock()\n\n        _ = self.get_access_token()\n        conv.log.info(\"OAuth2ClientCredentialsAuth instance initiated\")\n\n    def _retrieve_token(self, timeout=(3.0, 5.0)):\n        data = {\n            \"grant_type\": \"client_credentials\",\n            \"client_id\": self.creds[\"client_id\"],\n            \"client_secret\": self.creds[\"client_secret\"],\n        }\n\n        try:\n            resp = self._session.post(\n                self.creds[\"token_uri\"],\n                data=data,\n                headers={\"Content-Type\": \"application/x-www-form-urlencoded\"},\n                timeout=timeout,\n            )\n            # Log only metadata, never the body\n            plog.info(\n                \"OAuth2 token endpoint response\",\n                status=resp.status_code,\n                ok=resp.ok,\n            )\n            if resp.ok:\n                td = resp.json()\n                # Redact token in logs\n                plog.info(\"Retrieved access token (redacted)\", client_id=self.creds[\"client_id\"])\n                return td\n            else:\n                plog.error(\"Failed to retrieve token\", status=resp.status_code)\n                return None\n        except RequestException as e:\n            plog.error(\"Error retrieving token\", error=str(e))\n            return None\n\n    def _refresh_token(self):\n        token_data = self._retrieve_token()\n        if token_data is None:\n            raise RuntimeError(\"Failed to fetch OAuth2 token\")\n\n        self.token_data = token_data\n        expires_in = token_data.get(\"expires_in\", 3600)\n        self.token_expires_at = time.time() + expires_in\n\n    def get_access_token(self):\n        now = time.time()\n        if self.token_data is None or now >= self.token_expires_at:\n            with self._lock:  # prevent double refresh\n                if self.token_data is None or time.time() >= self.token_expires_at:\n                    self._refresh_token()\n        if self.token_data is None:\n            raise RuntimeError(\"Failed to obtain OAuth2 token after refresh\")\n        return self.token_data[\"access_token\"]\n\n    def __call__(self, r):\n        r.headers[\"Authorization\"] = f\"Bearer {self.get_access_token()}\"\n        return r\n\n\nclass BaseApiHandler:\n    \"\"\"\n    A base API handler that uses composition to wrap a requests Session.\n    This centralizes logging, error handling, authentication, etc.\n    \"\"\"\n\n    def __init__(\n        self,\n        conv: Conversation,\n        session: Session,\n        base_url: str,\n    ) -> None:\n        \"\"\"\n        :param conv: Agent Studio''s Conversation object.\n        :param base_url: Base URL for this API (endpoints can be relative).\n        :param session: A requests Session configured with authentication.\n        \"\"\"\n        self.conv = conv\n        self.base_url = base_url\n        self.session = session\n        self.connection_error_count = 0\n\n    def request(\n        self,\n        method: str,\n        endpoint: str,\n        timeout: int = 25,\n        request_description=None,\n        **kwargs,\n    ) -> Optional[Response]:\n        \"\"\"\n        Execute an HTTP request and return the Response object on success,\n        or None if an error/timeout occurs.\n\n        :param method: HTTP method (GET, POST, etc.)\n        :param endpoint: Relative path or full URL.\n        :param timeout: Max time to wait for a response in seconds.\n        :param request_description: A description of the request for logging purposes.\n        :param kwargs: Additional arguments to pass to `requests.Session.request`.\n        :return: The requests.Response on success, or None on failure.\n        \"\"\"\n        # Build the full URL if a relative endpoint was provided\n        if not endpoint.startswith(\"http\"):\n            url = urljoin(self.base_url, endpoint)\n        else:\n            url = endpoint\n\n        request_dict = {\n            \"method\": method,\n            \"url\": url,\n            \"timeout\": timeout,\n            \"params\": kwargs.get(\"params\"),\n            \"data\": kwargs.get(\"data\"),\n            \"json\": kwargs.get(\"json\"),\n            \"headers\": kwargs.get(\"headers\"),\n        }\n\n        # using this for hunting down weird request issues\n        unique_request_id = uuid.uuid4()\n\n        plog_message = f\"Making API Request ({url}) (uuid={unique_request_id})\"\n        if request_description:\n            plog_message += f\" ({request_description})\"\n        plog.info(plog_message, request=request_dict)\n\n        response: Optional[Response] = None\n\n        try:\n            response = self.session.request(method=method, url=url, timeout=timeout, **kwargs)\n\n            plog.info(\n                f\"API request completed ({url}) (uuid={unique_request_id})\",\n                request=request_dict,\n                response={\n                    \"status\": response.status_code,\n                    \"raw\": response.text,\n                    \"json\": self.parse_json_response(response, skip_warning=True),\n                    \"duration_ms\": response.elapsed.total_seconds() * 1000,\n                },\n            )\n\n            response.raise_for_status()\n            return response\n        except requests.HTTPError as e:\n            r = e.response or response\n            status = r.status_code if r is not None else None\n\n            if 400 <= status < 500:\n                plog.warn(\n                    f\"CLIENT ERROR {endpoint}\",\n                    error=str(e),\n                    response=r.text,\n                )\n\n                # Write this metric to make more visible in UI\n                expected_errors_for_endpoints = {\n                    \"/rapid-order\": 404,\n                    \"/rapid-order/book\": 400,  # usually means validation error\n                }\n\n                for endpoint_suffix, expected_error_code in expected_errors_for_endpoints.items():\n                    if endpoint.endswith(endpoint_suffix) and status == expected_error_code:\n                        self._write_expected_api_error_metric(\n                            endpoint_suffix=endpoint_suffix, response=r\n                        )\n                        break\n\n                raise ClientBrightreeAPIError(\n                    f\"Client error {endpoint} {r.text}\", status_code=status\n                ) from None\n            elif 500 <= status < 600:\n                plog.error(f\"SERVER ERROR {endpoint}\", error=str(e), response=r.text)\n                raise ServerBrightreeAPIError(f\"Server error {endpoint} {r.text}\") from None\n            else:\n                plog.error(\n                    f\"UNEXPECTED HTTP ERROR {endpoint}\",\n                    error=str(e),\n                    response=r.text,\n                )\n                raise UnexpectedBrightreeAPIError(f\"Unexpected error {endpoint}\") from None\n\n        except Timeout as e:\n            plog.error(\"TIMEOUT\", url=url, error=str(e))\n            raise ServerBrightreeAPIError(\n                f\"Timeout at {endpoint}\", status_code=None, response=response\n            ) from None\n\n        except requests.ConnectionError as e:\n            self.connection_error_count += 1\n            if self.connection_error_count > 1:\n                plog.error(\"CONNECTION ERROR - Retry Failed\", url=url, error=str(e))\n                raise ServerBrightreeAPIError(\n                    f\"Connection error at {endpoint}\", status_code=None, response=response\n                ) from None\n            else:\n                plog.warn(\"CONNECTION ERROR - Retrying\", url=url, error=str(e))\n                return self.request(\n                    method,\n                    endpoint,\n                    timeout=timeout,\n                    request_description=request_description,\n                    **kwargs,\n                )\n\n        except RequestException as e:\n            plog.error(\"REQUEST EXCEPTION\", url=url, error=str(e))\n            raise UnexpectedBrightreeAPIError(\n                f\"Request error at {endpoint}\", status_code=None, response=response\n            ) from None\n\n        except Exception as e:\n            plog.error(\"UNEXPECTED ERROR\", url=url, error=str(e))\n            raise UnexpectedBrightreeAPIError(\n                f\"Unexpected error at {endpoint}\", status_code=None, response=response\n            ) from None\n\n    def _write_expected_api_error_metric(self, endpoint_suffix: str, response: Response):\n        metric_value = endpoint_suffix\n\n        if response.status_code == 404:\n            # Expected client discussed 404\n            metric_value = f\"{metric_value}_404\"\n        elif response.status_code == 400:\n            # These are expected client-discussed errors\n            metric_value = f\"{metric_value}_400\"\n            try:\n                response_json = response.json()\n                error_messages_list = response_json.get(\"errors\", {}).get(\"\", None)\n                if error_messages_list:\n                    err_msgs: str = \"_\".join(error_messages_list)\n                    metric_value = f\"{metric_value}_{err_msgs}\"\n            except Exception as e:\n                plog.warn(f\"Error parsing response json: {e}\")\n\n        self.conv.write_metric(\"KNOWN_API_ERROR\", metric_value)\n\n    def parse_json_response(\n        self, response: Optional[Response], skip_warning=False\n    ) -> Optional[dict]:\n        \"\"\"\n        Safely parse JSON from a response, returning None if parsing fails or response is None.\n        :param response: Response object from requests (or None).\n        :return: Parsed JSON dict or None.\n        \"\"\"\n        if response is None:\n            return None\n        try:\n            return response.json()\n        except JSONDecodeError:\n            if not skip_warning:\n                plog.warning(\n                    \"Failed to parse JSON from response\",\n                    status=response.status_code,\n                    text_snippet=response.text[:500],\n                )\n            return None\n\n\nclass BrightreeApiHandler(BaseApiHandler):\n    \"\"\"\n    This centralizes logging, error handling, authentication, etc.\n    \"\"\"\n\n    VERSION = \"v1\"\n    BASE_URL = f\"https://api.snapworx.com/{VERSION}/\"\n\n    def __init__(\n        self,\n        conv: Conversation,\n        creds,\n        is_outbound: bool = False,\n    ) -> None:\n        self.conv = conv\n        if conv.state.qa_api:\n            self.BASE_URL = f\"https://api.snapworxqa.com/{self.VERSION}/\"\n\n        if is_outbound:\n            self.session = self._get_outbound_session(creds)\n        else:\n            self.session = self._get_inbound_session(creds)\n\n        super().__init__(\n            conv,\n            self.session,\n            base_url=self.BASE_URL,\n        )\n\n    def _get_inbound_session(self, creds: dict) -> Session:\n        \"\"\"Return the cached inbound session, creating it on first use.\"\"\"\n        global _INBOUND_SESSION\n\n        if _INBOUND_SESSION is None:\n            with _LOCK:\n                if _INBOUND_SESSION is None:\n                    auth = OAuth2ClientCredentialsAuth(conv=self.conv, creds=creds)\n                    sess = Session()\n                    sess.auth = auth\n                    _INBOUND_SESSION = sess\n\n        return _INBOUND_SESSION\n\n    def _get_outbound_session(self, creds: dict) -> Session:\n        \"\"\"Return the cached outbound session, creating it on first use.\"\"\"\n        global _OUTBOUND_SESSION\n\n        if _OUTBOUND_SESSION is None:\n            with _LOCK:\n                if _OUTBOUND_SESSION is None:\n                    auth = OAuth2ClientCredentialsAuth(conv=self.conv, creds=creds)\n                    sess = Session()\n                    sess.auth = auth\n                    _OUTBOUND_SESSION = sess\n\n        return _OUTBOUND_SESSION\n\n    @property\n    def _snap_site_headers(self) -> dict:\n        return {\"x-snap-site\": self.conv.variant.site_code}\n\n    def _safe_request(\n        self, method: str, endpoint: str, error_msg: str, **kwargs\n    ) -> Optional[Response]:\n        \"\"\"Make a request, log a warning and return None on any exception.\"\"\"\n        try:\n            return self.request(method, endpoint=endpoint, **kwargs)\n        except Exception as e:\n            plog.warning(error_msg, error=e, api_error=\"brightree-api\")\n            return None\n\n    def _parse_no_content_response(\n        self, response: Optional[Response], method_name: str\n    ) -> Optional[dict]:\n        \"\"\"Handle responses that may legitimately return 204 No Content.\"\"\"\n        if not response:\n            return None\n        if response.status_code == 204:\n            plog.info(f\"{method_name} successful\")\n            return None\n        return self.parse_json_response(response)\n\n    def GET_rapid_order_items_for_patient(\n        self,\n        patient_key: str,\n        campaignPatientKey: Optional[str],\n        timeout: int = 8,\n    ) -> Optional[dict]:\n        \"\"\"Returns a list of rapid order items for a patient.\n\n        Returns None only for 404 (patient has no rapid order — expected).\n        Raises ServerBrightreeAPIError for timeouts/5xx so callers can retry selectively.\n        Raises UnexpectedBrightreeAPIError if the 2xx response body is not valid JSON.\n        \"\"\"\n        params = {\"salesDialerKey\": SALES_DIALER_KEY}\n        if campaignPatientKey:\n            params[\"campaignPatientKey\"] = campaignPatientKey\n\n        try:\n            response = self.request(\n                \"GET\",\n                endpoint=f\"ai-agent/patients/{patient_key}/rapid-order\",\n                request_description=\"Rapid Order Items for Patient\",\n                params=params,\n                headers=self._snap_site_headers,\n                timeout=timeout,\n            )\n        except ClientBrightreeAPIError as e:\n            if e.status_code == 404:\n                return None\n            raise\n        result = self.parse_json_response(response)\n        if result is None:\n            raise UnexpectedBrightreeAPIError(\n                f\"Rapid order response for patient {patient_key} was not valid JSON \"\n                f\"(status={response.status_code})\"\n            )\n        return result\n\n    def GET_patients_by_phone_number(self, phone_number_to_search: str) -> Optional[dict]:\n        \"\"\"Returns patient details for IVR\"\"\"\n        # Clean the number — API rejects +1 prefix\n        phone_number_to_search = phone_number_to_search.strip().replace(\"+1\", \"\").replace(\"+\", \"\")\n\n        response = self._safe_request(\n            \"POST\",\n            endpoint=\"ai-agent/patients/by-phone-number\",\n            error_msg=f\"Error getting patients by phone number {phone_number_to_search}\",\n            request_description=\"Patients by Phone Number\",\n            json={\"patientPhoneNumber\": phone_number_to_search},\n            headers=self._snap_site_headers,\n        )\n        if response is None:\n            return None\n        return self.parse_json_response(response) or {}\n\n    def POST_rapid_order(\n        self,\n        patient_key: str,\n        rapid_order_data: dict,\n    ) -> Optional[dict]:\n        \"\"\"Books a new rapid order for a patient\"\"\"\n        if rapid_order_data.get(\"campaignPatientKey\") is None:\n            rapid_order_data.pop(\"campaignPatientKey\", None)\n\n        TIMEOUT = 60\n        plog.warn(f\"Setting long API request {TIMEOUT=} for POST_rapid_order booking\")\n\n        response = self._safe_request(\n            \"POST\",\n            endpoint=f\"ai-agent/patients/{patient_key}/rapid-order/book\",\n            error_msg=f\"Error posting rapid order for patient {patient_key}\",\n            json=rapid_order_data,\n            headers=self._snap_site_headers,\n            timeout=TIMEOUT,\n        )\n        return self.parse_json_response(response)\n\n    def GET_order_history_for_patient(self, patient_key: str) -> Optional[dict]:\n        \"\"\"Returns a list of order history for a patient\"\"\"\n        response = self._safe_request(\n            \"GET\",\n            endpoint=f\"ai-agent/patients/{patient_key}/orders\",\n            error_msg=f\"Error getting order history for patient {patient_key}\",\n            headers=self._snap_site_headers,\n        )\n        return self.parse_json_response(response)\n\n    def GET_site_state_info(self) -> Optional[dict]:\n        \"\"\"Returns state info for the site\"\"\"\n        response = self._safe_request(\n            \"GET\",\n            endpoint=\"states\",\n            error_msg=f\"Error getting states for site {self.conv.variant.site_code}\",\n            headers=self._snap_site_headers,\n        )\n        return self.parse_json_response(response)\n\n    def POST_inbound_call(self, patient_key: str, phone_number_data: dict) -> Optional[dict]:\n        \"\"\"Creates a new call for a patient inbound campaign\"\"\"\n        response = self._safe_request(\n            \"POST\",\n            endpoint=f\"ai-agent/inbound-campaigns/patients/{patient_key}/calls\",\n            error_msg=f\"Error creating inbound call for patient {patient_key}\",\n            json=phone_number_data,\n            headers=self._snap_site_headers,\n            timeout=5,\n        )\n        return self.parse_json_response(response)\n\n    def POST_outbound_call(self, patient_key: str, phone_number_data: dict) -> Optional[dict]:\n        \"\"\"Creates a new call for a patient outbound campaign\"\"\"\n        response = self._safe_request(\n            \"POST\",\n            endpoint=f\"ai-agent/transfer-campaigns/patients/{patient_key}/calls\",\n            error_msg=f\"Error creating outbound call for patient {patient_key}\",\n            json=phone_number_data,\n            headers=self._snap_site_headers,\n            timeout=5,\n        )\n        return self.parse_json_response(response)\n\n    def PUT_call_result(\n        self, patient_key: str, campaign_patient_key: str, call_result_data: dict\n    ) -> Optional[dict]:\n        \"\"\"Updates the call with the specific result\"\"\"\n        endpoint = f\"ai-agent/campaigns/patients/{patient_key}/calls/{campaign_patient_key}/results\"\n        response = None\n        for _ in range(3):\n            try:\n                response = self.request(\n                    \"PUT\",\n                    endpoint=endpoint,\n                    json=call_result_data,\n                    headers=self._snap_site_headers,\n                )\n                break\n            except Exception as e:\n                plog.warning(f\"Error updating call info for patient {patient_key}\", error=e)\n                if \"400\" in str(e):\n                    break\n        return self._parse_no_content_response(response, \"PUT_call_result\")\n\n    def GET_phone_numbers(self, patient_key: str) -> Optional[dict]:\n        \"\"\"Returns a list of phone number consents for a patient\"\"\"\n        response = self._safe_request(\n            \"GET\",\n            endpoint=f\"ext/patients/{patient_key}/phone-numbers\",\n            error_msg=f\"Error getting phone numbers for site {self.conv.variant.site_code}\",\n            headers=self._snap_site_headers,\n        )\n        return self.parse_json_response(response)\n\n    def POST_phone_number(self, patient_key: str, phone_number_data: dict) -> Optional[dict]:\n        \"\"\"Send a new phone number for a patient\"\"\"\n        response = self._safe_request(\n            \"POST\",\n            endpoint=f\"ext/patients/{patient_key}/phone-numbers\",\n            error_msg=f\"Error posting number for {patient_key}\",\n            json=phone_number_data,\n            headers=self._snap_site_headers,\n        )\n        return self.parse_json_response(response)\n\n    def PUT_phone_number_consent(\n        self, patient_key: str, phone_key: str, consent_data: dict\n    ) -> Optional[dict]:\n        \"\"\"Updates text consent for a patient phone number\"\"\"\n        response = self._safe_request(\n            \"PUT\",\n            endpoint=f\"ext/patients/{patient_key}/phone-numbers/{phone_key}/consents/text\",\n            error_msg=f\"Error updating text consent for patient {patient_key} with phone {phone_key}\",\n            json=consent_data,\n            headers=self._snap_site_headers,\n        )\n        return self._parse_no_content_response(response, \"PUT_phone_number_consent\")\n\n    def POST_text_message(\n        self,\n        patient_key: str,\n        order_key: str,\n        text_message_data: dict,\n    ) -> Optional[dict]:\n        \"\"\"Send a text message for a patient order\"\"\"\n        response = self._safe_request(\n            \"POST\",\n            endpoint=f\"patients/{patient_key}/orders/{order_key}/text-message\",\n            error_msg=f\"Error posting text message for {patient_key}\",\n            json=text_message_data,\n            headers=self._snap_site_headers,\n        )\n        return self._parse_no_content_response(response, \"POST_text_message\")\n\n    def PUT_billing_address(self, patient_key: str, billing_address_data: dict) -> Optional[dict]:\n        \"\"\"Updates the billing address for a patient\"\"\"\n        return self._safe_request(\n            \"PUT\",\n            endpoint=f\"patients/{patient_key}/billing-address\",\n            error_msg=f\"Error updating billing address for patient {patient_key}\",\n            json=billing_address_data,\n            headers=self._snap_site_headers,\n        )\n\n    def PUT_patient_language(self, patient_key: str, language_data: dict) -> Optional[dict]:\n        \"\"\"PUT /v1/patients/{patientKey}/language - Updates the language preference for a patient.\"\"\"\n        response = self._safe_request(\n            \"PUT\",\n            endpoint=f\"patients/{patient_key}/language\",\n            error_msg=f\"Error updating language for patient {patient_key}\",\n            json=language_data,\n            headers=self._snap_site_headers,\n        )\n        return self._parse_no_content_response(response, \"PUT_patient_language\")\n\n    def GET_patient_insurance(self, patient_key: str) -> Optional[dict]:\n        \"\"\"Returns insurance information for a BetterNight patient\"\"\"\n        response = self._safe_request(\n            \"GET\",\n            endpoint=f\"patients/{patient_key}/insurances\",\n            error_msg=f\"Error getting insurance information for patient {patient_key}\",\n            headers=self._snap_site_headers,\n        )\n        return self.parse_json_response(response)\n\n\n# ============================================================================\n# MOCK API HANDLER (for voice-testing in draft/sandbox envs)\n#\n# Controlled via RTC key \"mock_api\" — a list of objects, each with a caller\n# email/number and the number of GET retries that should timeout (the rest\n# succeed with test data).\n#\n# Example RTC:\n#   \"mock_api\": [\n#     {\"caller\": \"kara.best@poly-ai.com\", \"timeout_retries\": 3},\n#     {\"caller\": \"+15551234567\", \"timeout_retries\": 1}\n#   ]\n#\n# timeout_retries=3 means all 3 retries timeout → ORDER_NOT_FOUND.\n# timeout_retries=1 means the 1st retry times out, 2nd succeeds with test data.\n# timeout_retries=0 means no timeouts — uses test data immediately.\n# ============================================================================\n\nMOCK_TIMEOUT_SECONDS = 8\n\nMOCK_PATIENT = {\n    \"phone_number\": \"5059696418\",\n    \"patientKey\": \"eedcb85c-7430-43bc-a972-1c615a9629d4\",\n    \"dateOfBirth\": \"1958-09-07T00:00:00\",\n    \"patientLanguage\": \"English\",\n}\n\n\ndef _get_mock_config(conv: Conversation) -> dict | None:\n    \"\"\"Return the mock_api config entry for this caller, or None.\"\"\"\n    mock_api = conv.real_time_config.get(\"mock_api\", [])\n    for entry in mock_api:\n        if isinstance(entry, dict) and entry.get(\"caller\") == conv.caller_number:\n            return entry\n    return None\n\n\ndef should_use_mock_api(conv: Conversation) -> bool:\n    if conv.env not in (\"draft\", \"sandbox\"):\n        return False\n    return _get_mock_config(conv) is not None\n\n\ndef _get_timeout_retries(conv: Conversation) -> int:\n    \"\"\"Number of GET retries that should timeout. Defaults to 3 (all).\"\"\"\n    config = _get_mock_config(conv)\n    if config is None:\n        return 3\n    return int(config.get(\"timeout_retries\", 3))\n\n\nclass MockBrightreeApiHandler:\n    \"\"\"Drop-in replacement for BrightreeApiHandler that simulates failures.\n\n    Wraps a real handler so non-mocked methods (e.g. insurance lookups) still work.\n    \"\"\"\n\n    def __init__(self, conv: Conversation, real_handler: BrightreeApiHandler | None = None):\n        self.conv = conv\n        self._real = real_handler\n        self._get_attempt = 0\n        self._timeout_retries = _get_timeout_retries(conv)\n\n    def __getattr__(self, name):\n        \"\"\"Delegate anything not explicitly mocked to the real handler.\"\"\"\n        if self._real is not None:\n            return getattr(self._real, name)\n        raise AttributeError(\n            f\"MockBrightreeApiHandler has no attribute {name!r} and no real handler\"\n        )\n\n    def GET_patients_by_phone_number(self, phone_number_to_search: str):\n        self.conv.log.info(\n            \"MOCK: Returning mock patient for phone number lookup\",\n            phone_number=phone_number_to_search,\n        )\n        return {\"data\": [MOCK_PATIENT]}\n\n    def GET_rapid_order_items_for_patient(\n        self, patient_key: str, campaignPatientKey=None, timeout: int = 8\n    ):\n        self._get_attempt += 1\n        if self._get_attempt <= self._timeout_retries:\n            self.conv.log.warning(\n                \"MOCK: Simulating GET timeout for rapid order items\",\n                patient_key=patient_key,\n                campaign_patient_key=campaignPatientKey,\n                attempt=self._get_attempt,\n                timeout_retries=self._timeout_retries,\n                sleep_seconds=MOCK_TIMEOUT_SECONDS,\n            )\n            time.sleep(MOCK_TIMEOUT_SECONDS)\n            raise ServerBrightreeAPIError(\n                \"MOCK: Simulated timeout on GET_rapid_order_items_for_patient\",\n                status_code=504,\n            )\n\n        self.conv.log.info(\n            \"MOCK: Returning test rapid order data (past timeout_retries limit)\",\n            patient_key=patient_key,\n            attempt=self._get_attempt,\n            timeout_retries=self._timeout_retries,\n        )\n        return RAPID_ORDER_TEST_DATA_DEFAULT\n\n    def GET_order_history_for_patient(self, patient_key: str):\n        self.conv.log.info(\n            \"MOCK: Returning order history with tracking number\",\n            patient_key=patient_key,\n        )\n        return {\"data\": ORDER_HISTORY_TEST_DATA_WITH_TRACKING + ORDER_HISTORY_TEST_DATA_DEFAULT}\n\n    def POST_inbound_call(self, patient_key: str, phone_number_data: dict):\n        self.conv.log.info(\n            \"MOCK: Returning fake campaign patient key (POST_inbound_call)\",\n            patient_key=patient_key,\n        )\n        return {\"key\": \"MOCK-cpk-00000000-0000-0000-0000-000000000000\"}\n\n    def POST_outbound_call(self, patient_key: str, phone_number_data: dict):\n        self.conv.log.info(\n            \"MOCK: Returning fake campaign patient key (POST_outbound_call)\",\n            patient_key=patient_key,\n        )\n        return {\"key\": \"MOCK-cpk-00000000-0000-0000-0000-000000000001\"}\n\n\n# ============================================================================\n# FACTORY\n# ============================================================================\n\n\ndef get_api_instance(\n    conv: Conversation,\n) -> BrightreeApiHandler | MockBrightreeApiHandler:\n    live_test_number = \"+16783254689\"\n    using_live_test_number = conv.callee_number == live_test_number\n\n    if using_live_test_number or (conv.functions.is_dev_env() and conv.state.USE_DEV_API):\n        conv.log.info(\"Using QA API\")\n        if conv.state.is_outbound:\n            creds = conv.utils.get_secret(\"outbound_qa_api_credentials_store\")\n        else:\n            creds = conv.utils.get_secret(\"qa_api_credentials_store\")\n        conv.state.qa_api = True\n    else:\n        if conv.state.is_outbound:\n            creds = conv.utils.get_secret(\"outbound_production_api_credentials_store\")\n        else:\n            creds = conv.utils.get_secret(\"production_api_credentials_store\")\n        conv.state.qa_api = False\n\n    real_handler = BrightreeApiHandler(conv, creds, is_outbound=conv.state.is_outbound)\n\n    if should_use_mock_api(conv):\n        conv.log.info(\"MOCK: Wrapping real API handler with MockBrightreeApiHandler\")\n        return MockBrightreeApiHandler(conv, real_handler=real_handler)\n\n    return real_handler\n\n\ndef api_handler(conv: Conversation):\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-1DB53096":true,"VARIABLE-1EFBB8E9":true,"VARIABLE-5EED538E":true}}},"FUNCTION-7a471f0f":{"id":"FUNCTION-7a471f0f","name":"handle_routing_after_verification","description":"MUST NEVER BE CALLED","parameters":{"ids":["FUNCTION-7a471f0f-PARAM-0"],"entities":{"FUNCTION-7a471f0f-PARAM-0":{"id":"FUNCTION-7a471f0f-PARAM-0","name":"next_flow_after_verification","description":"Next flow after verification complete","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"}}},"code":"from datetime import datetime\nfrom typing import Literal\n\nfrom functions.start_warm_transfer_flow import go_to_warm_transfer_flow\n\nOOH_UTTERANCES = {\"rapid-reorder\": \"RAPID_REORDER_OOH_UTTERANCE\"}\n\nPROMPT_ORDER_STATUS_INSTRUCTIONS = \"\"\"The user is asking about their order history.\n\nConsider the conversation history carefully to determine if they''ve already asked about an order.\n\n# No specific order mentioned by user already\n\nIf no specific order has already been mentioned, begin by stating the number of orders made in the last 90 days by saying: ''{initial_order_history_utt}''.\n\nThen, ask if it''s their most recent order by saying something like: ''{most_recent_order_utt}''.\n\n# Already expressed interest in an order\n\nIf they''ve already expressed interest in an order, only ask if it''s that order, identifying by using the date and a single item.\n\n# General instructions\n\n{multilingual_prompt}\n\nIf you cannot find the order requested (either date does not exist, or items missing), then call the transfer_call function with:\nutterance={handoff_utterance}\nhandoff_reason=''PREV_ORDER_NOT_FOUND''\nhandoff_to=''''\n\"\"\"\n\n\ndef handle_ooh(conv: Conversation, flow_name: Literal[\"rapid-reorder\"]):\n    from functions.utils import format_ooh_utterance\n\n    utterance_name = OOH_UTTERANCES.get(flow_name, \"RAPID_REORDER_OOH_UTTERANCE\")\n    utterance = format_ooh_utterance(conv, utterance_name)\n    conv.exit_flow()\n    return {\"utterance\": utterance}\n\n\ndef rapid_reorder_routing(conv: Conversation):\n    if not conv.state.verification_data:\n        raise ValueError(\"verification_data is not set\")\n\n    order_service = conv.state.order_service\n\n    # GET rapid order data first — if this times out, no Snapworx call record has been\n    # created yet, so a function retry won''t produce a duplicate.\n    success = order_service.load_rapid_order_data_from_api(conv)\n\n    # TEMP TEST: force ORDER_NOT_FOUND repeat path for outbound – comment out after testing/change email name\n    # if (conv.env in (\"sandbox\", \"draft\")) and conv.caller_number in (\"nicole.soh@poly-ai.com\",):\n    #     success = None\n    #     conv.state.is_outbound = True\n\n    # Create the Snapworx call record after the GET completes (success or failure),\n    # so any retry of this function won''t make a duplicate POST_inbound_call.\n    if conv.state.FEATURE_FLAG_call_summary_enabled and not conv.state.campaign_patient_key:\n        conv.state.campaign_patient_key = conv.state.order_service.get_campaign_patient_key(conv)\n        if not conv.state.campaign_patient_key:\n            conv.log.info(\"Transfer due to Campaign Patient Key error\")\n            return conv.functions.transfer_call(\n                utterance=conv.functions.utterances(\"GENERIC_HANDOFF_UTTERANCE\"),\n                handoff_reason=\"CAMPAIGN_PATIENT_KEY_ERROR\",\n                handoff_to=\"\",\n            )\n\n    # some sites / insurances will require different behaviour when the user requests a rapid reorder\n    if response := conv.state.order_service.create_response_if_rapid_reorder_not_allowed(\n        conv, origin=\"rapid_order_routing\"\n    ):\n        return response\n\n    if not success:\n        conv.write_metric(\"ORDER_NOT_FOUND\", write_once=True)\n        if not conv.state.order_not_found_repeat:\n            conv.state.order_not_found_repeat = True\n            order_history_service = conv.state.order_history_service\n            order_history_list = order_history_service.load_order_history_from_api(\n                conv=conv,\n                patient_key=conv.state.verification_data[\"patient_key\"],\n            )\n\n            if (\n                # API issue\n                not order_history_list or not conv.state.order_history_service.get_n_orders()\n            ):\n                if not conv.state.is_in_hours:\n                    return handle_ooh(conv, \"rapid-reorder\")\n\n                return conv.functions.transfer_call(\n                    utterance=conv.functions.utterances(\"TRANSFER_ASSIST_FURTHER_MOMENT\"),\n                    handoff_reason=\"ORDER_NOT_FOUND\",\n                    handoff_to=\"\",\n                )\n            prompts = order_history_service.get_formatted_prompt_for_order_brief(conv)\n            conv.state.prompt_other_orders = prompts[\"prompt_other_orders\"]\n            conv.state.prompt_selected_order = prompts[\"prompt_selected_order\"]\n            most_recent_order_utt = order_history_service.get_ineligible_reorder_most_recent(conv)\n            if not conv.state.call_result or conv.state.call_result != \"completed\":\n                conv.state.call_result = \"order status requested\"\n\n            if conv.state.is_outbound:\n                most_recent_order_utt = (\n                    f\"Apologies, I see your order is already placed. {most_recent_order_utt}\"\n                )\n\n            return {\n                \"utterance\": most_recent_order_utt,\n                \"transition\": {\"goto_flow\": \"order-status\", \"goto_step\": \"ask-about-last-order\"},\n            }\n\n        conv.log.warning(\"Failed to load rapid order data!\")\n        if not conv.state.is_in_hours:\n            return handle_ooh(conv, \"rapid-reorder\")\n\n        return conv.functions.transfer_call(\n            utterance=conv.functions.utterances(\"TRANSFER_ASSIST_FURTHER_MOMENT\"),\n            handoff_reason=\"ORDER_NOT_FOUND\",\n            handoff_to=\"\",\n        )\n\n    # check if there are any rapid order items\n    conv.log.info(\"checking order service if items in order\")\n    try:\n        # Outgoing SIP\n        first_name, last_name = (\n            success.get(\"patientFirstName\", \"FIRST_NAME_NOT_FOUND\"),\n            success.get(\"patientLastName\", \"LAST_NAME_NOT_FOUND\"),\n        )\n        conv.state.out_going_sip_headers[\"X-patient-name\"] = f\"{first_name} {last_name}\"\n\n        if not order_service.check_items_in_rapid_order():\n            conv.log.error(\"no items found in rapid_order_data\")\n            conv.write_metric(\"ORDER_NOT_FOUND\", write_once=True)\n\n            if not conv.state.order_not_found_repeat:\n                conv.state.order_not_found_repeat = True\n                order_history_service = conv.state.order_history_service\n                order_history_list = order_history_service.load_order_history_from_api(\n                    conv=conv,\n                    patient_key=conv.state.verification_data[\"patient_key\"],\n                )\n                if (\n                    # API issue\n                    not order_history_list or not conv.state.order_history_service.get_n_orders()\n                ):\n                    if not conv.state.is_in_hours:\n                        return handle_ooh(conv, \"rapid-reorder\")\n\n                    return conv.functions.transfer_call(\n                        utterance=conv.functions.utterances(\"TRANSFER_ASSIST_FURTHER_MOMENT\"),\n                        handoff_reason=\"ORDER_NOT_FOUND\",\n                        handoff_to=\"\",\n                    )\n                prompts = order_history_service.get_formatted_prompt_for_order_brief(conv)\n                conv.state.prompt_other_orders = prompts[\"prompt_other_orders\"]\n                conv.state.prompt_selected_order = prompts[\"prompt_selected_order\"]\n                most_recent_order_utt = order_history_service.get_ineligible_reorder_most_recent(\n                    conv\n                )\n                if not conv.state.call_result or conv.state.call_result != \"completed\":\n                    conv.state.call_result = \"order status requested\"\n                return {\n                    \"utterance\": most_recent_order_utt,\n                    \"transition\": {\n                        \"goto_flow\": \"order-status\",\n                        \"goto_step\": \"ask-about-last-order\",\n                    },\n                }\n\n            if not conv.state.is_in_hours:\n                return handle_ooh(conv, \"rapid-reorder\")\n\n            return conv.functions.transfer_call(\n                utterance=conv.functions.utterances(\"TRANSFER_ASSIST_FURTHER_MOMENT\"),\n                handoff_reason=\"ORDER_NOT_FOUND\",\n                handoff_to=\"\",\n            )\n    except Exception as e:\n        conv.log.error(\"Error checking items in rapid order\", error=e)\n\n        if not conv.state.is_in_hours:\n            return handle_ooh(conv, \"rapid-reorder\")\n\n        return conv.functions.transfer_call(\n            utterance=conv.functions.utterances(\"GENERIC_HANDOFF_UTTERANCE\"),\n            handoff_reason=\"ORDER_NOT_FOUND\",\n            handoff_to=\"\",\n        )\n    if not conv.state.call_result or conv.state.call_result != \"completed\":\n        conv.state.call_result = \"connected but incomplete\"\n    conv.goto_flow(\"rapid-reorder\")\n    conv.write_metric(\"ORDER_FOUND\")\n\n    primary_insurance_name = order_service.get_primary_insurance_plan_name_from_api(conv)\n    if not primary_insurance_name:\n        conv.log.warning(\"No primary insurance name found\")\n        return conv.functions.transfer_call(\n            utterance=conv.functions.utterances(\"GENERIC_HANDOFF_UTTERANCE\"),\n            handoff_reason=\"PRIMARY_INSURANCE_NAME_NOT_FOUND_FROM_API\",\n            handoff_to=\"\",\n        )\n\n    if \"SRS\" in primary_insurance_name.upper() and conv.variant.site_code == \"betternight\":\n        return conv.functions.transfer_call(\n            utterance=conv.functions.utterances(\"GENERIC_HANDOFF_UTTERANCE\"),\n            handoff_reason=\"SRS_INSURANCE\",\n            handoff_to=\"6195016274\",\n        )\n\n    return {\n        \"utterance\": conv.functions.utterances(\"CONFIRM_INSURANCE_PROVIDER\").format(\n            primary_insurance_name=primary_insurance_name\n        )\n    }\n\n\ndef order_status_routing(conv: Conversation):\n    if not conv.state.verification_data:\n        raise ValueError(\"verification_data is not set\")\n    # api look up\n    order_history_service = conv.state.order_history_service\n    order_history_list = order_history_service.load_order_history_from_api(\n        conv=conv,\n        patient_key=conv.state.verification_data[\"patient_key\"],\n    )\n\n    if (\n        # API issue\n        not order_history_list or not conv.state.order_history_service.get_n_orders()\n    ):\n        if order_history_list is None:\n            conv.log.info(\"No order history response list found\")\n        else:\n            conv.log.info(\"No orders found in the last 90 Days after filtering\")\n        return {\n            \"utterance\": conv.functions.utterances(\"NO_RECENT_ORDER_NEW_ORDER\"),\n            \"transition\": {\n                \"goto_flow\": \"re-routing\",\n                \"goto_step\": \"asked-rapid-reorder-no-orders-90-days\",\n            },\n        }\n    if not conv.state.call_result or conv.state.call_result != \"completed\":\n        conv.state.call_result = \"order status requested\"\n    conv.goto_flow(\"order-status\")\n\n    initial_order_history_utt, most_recent_order_utt = (\n        order_history_service.get_initial_order_history_utt(conv)\n    )\n    # Using prompt to force spanish readout of any untranslated dates, item names here.\n    # TODO: If necessary, refactor date readout functions to allow for spanish (Warning, this is not easily scalable across languages).\n    multilingual_prompt = \"\"\n    if conv.language == \"es-US\":\n        multilingual_prompt = \"For any dates or items mentioned in English, please only say these in spanish, using appropriate date formatting and grammatical conventions.\"\n    prompt_order_status = PROMPT_ORDER_STATUS_INSTRUCTIONS.format(\n        initial_order_history_utt=initial_order_history_utt,\n        most_recent_order_utt=most_recent_order_utt,\n        multilingual_prompt=multilingual_prompt,\n        handoff_utterance=conv.functions.utterances(\"GENERIC_HANDOFF_UTTERANCE\"),\n    )\n\n    # Also get values used in step prompt\n    prompts = order_history_service.get_formatted_prompt_for_order_brief(conv)\n    conv.state.prompt_other_orders = prompts[\"prompt_other_orders\"]\n    conv.state.prompt_selected_order = prompts[\"prompt_selected_order\"]\n\n    conv.state.prompt_useful_notes = (\n        f\"Potentially useful notes:\\n{conv.state.useful_notes}\"\n        \"If this mentions an order that does NOT exist, call the transfer_call function with:\\n\"\n        f\"utterance={conv.functions.utterances(''GENERIC_HANDOFF_UTTERANCE'')},\"\n        \"handoff_reason=''PREV_ORDER_NOT_FOUND''\"\n        \"handoff_to=''''\"\n        if conv.state.useful_notes\n        else \"\"\n    )\n\n    return {\n        \"content\": prompt_order_status,\n    }\n\n\ndef ordinal_suffix(day: int) -> str:\n    \"\"\"Return the ordinal suffix for a given day number.\"\"\"\n    if 11 <= day <= 13:  # special case for teens\n        return \"th\"\n    return {1: \"st\", 2: \"nd\", 3: \"rd\"}.get(day % 10, \"th\")\n\n\ndef handle_routing_after_verification(conv: Conversation, next_flow_after_verification: str):\n    # Don''t want to redo\n    conv.state.already_verified = True\n\n    # For outgoing SIP\n    conv.state.out_going_sip_headers[\"X-passed-idnv\"] = \"true\"\n    if patient_dob := conv.state.verification_data.get(\"patient_dob\"):\n        try:\n            # Try parsing ISO 8601 date string\n            parsed_date = datetime.fromisoformat(patient_dob)\n\n            # Build custom formatted string\n            day = parsed_date.day\n            formatted_dob = parsed_date.strftime(f\"%B {day}{ordinal_suffix(day)} %Y\")\n\n            conv.state.out_going_sip_headers[\"X-patient-dob\"] = formatted_dob\n        except ValueError:\n            # Use original string if parsing fails\n            conv.state.out_going_sip_headers[\"X-patient-dob\"] = patient_dob\n\n    if next_flow_after_verification in {\"rapid-reorder\", \"order-status\"}:\n        if conv.variant.site_code == \"betternight\":\n            if conv.state.order_service.is_patient_insurance_srs(conv):\n                return conv.functions.transfer_call(\n                    utterance=conv.functions.utterances(\"GENERIC_HANDOFF_UTTERANCE\"),\n                    handoff_reason=\"SRS_INSURANCE\",\n                    handoff_to=\"6195016274\",\n                )\n\n        # CAMPAIGN PATIENT KEY (order-status only)\n        # For rapid-reorder, the campaign key is created in rapid_reorder_routing,\n        # after the rapid-order GET, to prevent duplicate Snapworx records if the\n        # function times out and is retried.\n        if (\n            conv.state.FEATURE_FLAG_call_summary_enabled\n            and next_flow_after_verification == \"order-status\"\n        ):\n            if not conv.state.campaign_patient_key:\n                conv.state.campaign_patient_key = conv.state.order_service.get_campaign_patient_key(\n                    conv\n                )\n                if not conv.state.campaign_patient_key:\n                    conv.log.info(\"Transfer due to Campaign Patient Key error\")\n                    return conv.functions.transfer_call(\n                        utterance=conv.functions.utterances(\"GENERIC_HANDOFF_UTTERANCE\"),\n                        handoff_reason=\"CAMPAIGN_PATIENT_KEY_ERROR\",\n                        handoff_to=\"\",\n                    )\n\n    if next_flow_after_verification == \"rapid-reorder\":\n        conv.write_metric(\"REORDER_INITIATED\")\n        return rapid_reorder_routing(conv)\n\n    elif next_flow_after_verification == \"order-status\":\n        conv.write_metric(\"ORDER_STATUS_INITIATED\")\n        return order_status_routing(conv)\n\n    elif next_flow_after_verification == \"Warm Transfer Flow\":\n        conv.write_metric(\"WARM_TRANSFER_RESUMED_AFTER_IDNV\")\n        return go_to_warm_transfer_flow(conv)\n\n    conv.log.error(f\"Routing for flow {next_flow_after_verification} not implemented!\")\n    return conv.functions.transfer_call(\n        utterance=conv.functions.utterances(\"GENERIC_HANDOFF_UTTERANCE\"),\n        handoff_reason=\"SPEAK_TO\",\n        handoff_to=\"\",\n    )\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-181ECB59":true,"VARIABLE-3BA5149E":true,"VARIABLE-50AF2115":true,"VARIABLE-53C80B44":true,"VARIABLE-7210ADAD":true,"VARIABLE-7AE65957":true,"VARIABLE-7E3536D6":true,"VARIABLE-9C584E86":true,"VARIABLE-B42B90B3":true,"VARIABLE-B9DF4796":true,"VARIABLE-BC055271":true,"VARIABLE-D0415610":true,"VARIABLE-E30356DF":true,"VARIABLE-FC3C0DBD":true,"VARIABLE-5EED538E":true}}},"FUNCTION-b017d294":{"id":"FUNCTION-b017d294","name":"transfer_call","description":"Call this function to transfer the call to a person. DO NOT MENTION A SPECIFIC PERSON AS WE CANNOT GUARANTEE A TRANSFER TO THEM.","parameters":{"ids":["FUNCTION-b017d294-PARAM-0","FUNCTION-b017d294-PARAM-1","FUNCTION-b017d294-PARAM-2"],"entities":{"FUNCTION-b017d294-PARAM-0":{"id":"FUNCTION-b017d294-PARAM-0","name":"utterance","description":"The utterance to say to the user. Use an empty string \"\" if not explicitly provided.","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"},"FUNCTION-b017d294-PARAM-1":{"id":"FUNCTION-b017d294-PARAM-1","name":"handoff_reason","description":"The reason for handoff","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"},"FUNCTION-b017d294-PARAM-2":{"id":"FUNCTION-b017d294-PARAM-2","name":"handoff_to","description":"The handoff destination. Use an empty string \"\" if not explicitly provided.","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"}}},"code":"import re\n\nfrom functions.handoff_routing import (\n    BRIGHTREE_DEFAULT_DESTINATION,\n    HANDOFF_LOOKUP_FAILED_METRIC,\n    HANDOFF_USES_DERIVED_ROUTING_METRIC,\n    is_derived_routing_enabled,\n    lookup_destination,\n)\nfrom functions.start_warm_transfer_flow import go_to_warm_transfer_flow\nfrom functions.utils import build_sip_headers\n\n_BRIGHTREE_HANDOFF_REASON_MAPPING = {\n    # Any\n    \"SPEAK_TO\": \"AGENT_REQUEST\",\n    # FAQ\n    \"SOCLEAN_PROCEDURE\": \"REQUESTED_SOCLEAN\",\n    \"AUTOSHIPPING_PROCEDURE\": \"REQUESTED_AUTOSHIP\",\n    \"PICKUP_PROCEDURE\": \"PICKUP_REQUEST\",\n    # Order Status\n    \"CANCEL_ORDER_PLACED\": \"CANCEL_EXISTING_ORDER\",\n    # Reorder\n    \"INVALID_ANSWER_CHOICE_HCPC\": \"INVALID_HCPC_RESPONSE\",\n    \"PRODUCTLINE_QN_ANSWERED_UNSUCCESSFUL\": \"INVALID_PRODUCT_LINE_RESPONSE\",\n    \"REORDER_UPDATE_ADDRESS\": \"UPDATE_PATIENT_ADDRESS\",\n    # Verification\n    \"VERIFICATION_OOD\": \"VERIFICATION_OUT_OF_SCOPE_Q\",\n}\n\nIDV_FAILURE_TRANSFER_REASONS = [\n    \"API_FAILED_NO_PATIENTS\",\n    \"VERIFICATION_DOB_UNSUCCESSFUL\",\n    \"VERIFICATION_MULTIPLE_PATIENTS_IDENTIFIED\",\n    \"VERIFICATION_NO_MATCH_NUMBER_COLLECT_READBACK_UNSUCCESSFUL\",\n    \"VERIFICATION_NUMBER_COLLECTION_UNSUCCESSFUL\",\n    \"VERIFICATION_OOD\",\n]\n\n\ndef normalize_number(s: str) -> str:\n    # Remove spaces, dashes, parentheses\n    s = re.sub(r\"[^\\d+]\", \"\", s)\n\n    # Match 10 digits, optionally prefixed by \"1\" or \"+1\"\n    match = re.fullmatch(r\"(?:\\+?1)?(\\d{10})\", s)\n    if match:\n        return match.group(1)\n    return s\n\n\ndef transfer_call(conv: Conversation, utterance: str, handoff_reason: str, handoff_to: str):\n    if handoff_reason == \"ORDER_NOT_FOUND\" and conv.state.is_outbound:\n        return conv.functions.end_outbound_patient_unavailable()\n\n    if (\n        handoff_reason in IDV_FAILURE_TRANSFER_REASONS\n        and conv.state.warm_transfer_active\n        and conv.real_time_config.get(\"FEATURE_FLAG_allow_warm_transfers\", False)\n    ):\n        return go_to_warm_transfer_flow(conv)\n\n    if not utterance:\n        utterance = conv.functions.utterances(\"GENERIC_HANDOFF_UTTERANCE\")\n\n    # Special handling for COPAY\n    if (\n        handoff_reason == \"COPAY\"\n        and conv.current_flow == \"rapid-reorder\"\n        and conv.variant.site_name != \"Hart Medical\"\n    ):\n        return \"\"\"The user has requested a CO PAY CALLBACK.\n            Say \"We will run this order through insurance and if there is a cost we can call you and get approval before shipping\".\n            You must continue with your current questioning (do not mention transfer at all)\"\"\"\n\n    # Normalise before any comparisons so casing/spacing from the LLM never matters\n    handoff_reason = \"SPEAK_TO\" if not handoff_reason else handoff_reason.upper().replace(\" \", \"_\")\n    # Preserve the pre-rewrite reason for derived-routing lookup. The Regional\n    # order-status block below rewrites handoff_reason to values (e.g.\n    # PRESCRIPTION_RCM) that aren''t keys in handoff_routing config.\n    original_handoff_reason = handoff_reason\n\n    if conv.variant.site_name == \"Better Night\":\n        # TODO-KA-LIVE: DELETE FEATURE FLAGS AFTER BETTER NIGHT ACCEPTED\n        if conv.real_time_config.get(\"FEATURE_FLAG_turn_on_better_night_special_transfer\", True):\n            # New machine request + item returns does not have a VM column so we need to specify the handoff destination here\n            # Hidden behind feature flag - this if statement SHOULD remain after feature flag removed\n            if handoff_reason in {\"NEW_MACHINE_REQUEST\", \"ITEM_RETURNS\"} and (\n                conv.variant.site_name == \"Better Night\"\n            ):\n                conv.log.info(\n                    \"Better Night special handoff new_machine_request\", handoff_to=handoff_to\n                )\n                handoff_to = \"8582215888\"\n            elif handoff_reason == \"WRONG_ITEM\":\n                # TODO: THIS RETURN IS HERE BECAUSE OF THE FEATURE FLAG - ONCE ABLE TO DO SO AND NO FLAG IS NEEDED, MOVE TO VARIANTS\n                if not conv.state.betternight_tubing_question_checked:\n                    conv.state.betternight_tubing_question_checked = True\n\n                    return \"\"\"\n                    If the user speaks about wrong items in their order call the transfer_call function with\n\n                    utterance = an appropriate contextual response about the user''s query, starting with \"Let me transfer you to someone who can help about USER''S QUERY\"\n\n                    handoff_reason = \"WRONG_ITEM\"\n\n                    handoff_to = \"8582215888\"\n\n                    If they are calling about the wrong tubing, and the issue is the portal is showing the wrong tubing handoff_to=\"\"\n                    If it is because they received the wrong tubing handoff_to=\"8582215888\".\n                    If unclear, clarify with the user. If still unsure handoff_to=\"\"\n                    \"\"\"\n        # This else logic is specific to the feature flag - can be deleted when we do longer need the feature flag\n        elif handoff_reason in {\n            \"SCHEDULING\",\n            \"WRONG_ITEM\",\n            \"MISSING_ITEM\",\n            \"ITEM_RETURNS\",\n            \"NEW_MACHINE_REQUEST\",\n        } and (conv.variant.site_name == \"Better Night\"):\n            conv.log.info(\"Better Night special handoff diversion\")\n            # Reset handoff_to to an empty string for these betternight scenarios - when feature flag is turned off.\n            if not conv.state.soft_handoff_offerred and handoff_reason == \"SCHEDULING\":\n                conv.state.soft_handoff_offerred = True\n                return \"Consider this query OUT_OF_DOMAIN\"\n            handoff_to = \"\"\n\n    # Special handling for Regional Home Care order-status flow\n    if conv.variant.site_name == \"Regional Home Care\" and conv.current_flow == \"order-status\":\n        rcm_overrides = {\n            \"PRESCRIPTION_UPDATE\": \"PRESCRIPTION_RCM\",\n            \"SPEAK_TO\": \"SPEAK_TO_RCM\",\n            \"USER_REQUESTED_HUMAN\": \"SPEAK_TO_RCM\",\n            \"DOCUMENTS_NEEDED\": \"DOCUMENTS_RCM\",\n        }\n        if handoff_reason in rcm_overrides:\n            utterance = conv.functions.utterances(\"TRANSFER_ASSIST_FURTHER_MOMENT\")\n            handoff_reason = rcm_overrides[handoff_reason]\n            handoff_to = \"9782880582\"\n\n    if not conv.state.is_in_hours:\n        from functions.utils import format_ooh_utterance\n\n        utterance = format_ooh_utterance(conv, \"DEFAULT_OOH_UTTERANCE\")\n        conv.exit_flow()\n        return {\"utterance\": utterance}\n\n    if handoff_reason == \"SPEAK_TO\" and len(conv.history) <= 6:\n        conv.write_metric(\"SPEAK_TO_FROM_START_OF_CALL\")\n\n    # Derived-routing shim (Phase 1, feature-flag gated; default off).\n    # When enabled, LLM-provided handoff_to and any earlier BetterNight/Regional\n    # overrides are discarded in favour of a destination derived from\n    # conv.variant.handoff_routing. Keyed on the pre-rewrite reason so the\n    # Regional order-status rewrites (PRESCRIPTION_UPDATE → PRESCRIPTION_RCM\n    # etc.) still resolve — the config keys conditionals on the original\n    # reasons.\n    if is_derived_routing_enabled(conv):\n        handoff_to = lookup_destination(conv, original_handoff_reason)\n        # Audit signal: flag is ON for this site (RTC isn''t PR-gated, so\n        # this metric is the only durable record of the rollout state).\n        conv.write_metric(HANDOFF_USES_DERIVED_ROUTING_METRIC)\n        # Rolled-up failure signal: lookup yielded nothing usable. Pairs\n        # with the granular HANDOFF_ATTRIBUTE_MISSING / HANDOFF_CONFIG_PARSE_ERROR\n        # already emitted from lookup_destination.\n        if handoff_to is None:\n            conv.write_metric(HANDOFF_LOOKUP_FAILED_METRIC)\n    elif handoff_to:\n        handoff_to = normalize_number(handoff_to)\n\n    conv.write_metric(\n        \"BRIGHTREE_HANDOFF_REASON\",\n        _BRIGHTREE_HANDOFF_REASON_MAPPING.get(handoff_reason, handoff_reason),\n    )\n\n    handoff_dict = build_handoff_dict(conv, handoff_reason, handoff_to)\n    conv.state.handoff_called = True\n    return {\n        \"utterance\": utterance,\n        \"handoff\": validate_handoff(conv, handoff_dict),\n    }\n\n\n# --- PSTN allowlist for transfer handoffs (read at runtime by validate_handoff) ---\n# VARIANT_NAME_TO_TRANSFER_NUMBERS: non-empty handoff_to digits from\n# config/variant_attributes.yaml (all attributes), plus hard-coded\n# destinations from transfer_call (Better Night 8582215888; Regional\n# Home Care order-status RCM 9782880582), plus site+insurance routes\n# (Better Night SRS 6195016274; MSCo UHC Community 4402969338).\n# Synapse 8883369363 is utterance-only, not in allowlist. Empty tuple means transfers in prompts\n# use handoff_to \"\" (Brightree agent).\n#\n# NOTE: this is a **second validation layer** applied after derived routing.\n# ``_validate_config`` in handoff_routing.py enforces 10-digit PSTN *format*\n# on every destination in the YAML, but it doesn''t know which numbers a\n# variant is permitted to dial. ``validate_handoff`` checks this allowlist at\n# runtime — a well-formed number that isn''t listed here is silently downgraded\n# to the default queue and a HANDOFF_VALIDATION_FAILED metric is emitted. So\n# when adding a new destination to ``handoff_routing``, it **must** also be\n# added here, or it will never actually dial. The ``test_derived_destinations_subset_of_allowlist``\n# YAML test catches this mismatch at CI time.\nVARIANT_NAME_TO_TRANSFER_NUMBERS: dict[str, tuple[str, ...]] = {\n    \"Quinlans - Inbound Call Campaign\": (),\n    \"Sleep Metrics - Inbound Call Campaign\": (),\n    \"Quipt  - Mediserve - Inbound Call Campaign\": (\"4234779806\",),\n    \"Nunn - Inbound Call Campaign\": (\"3153625951\",),\n    \"Hampton - Inbound Call Campaign\": (),\n    \"Medcare - Inbound Call Campaign\": (\"7246890840\", \"7248506913\", \"7248506988\", \"7248506994\"),\n    \"Great Elm - Inbound Call Campaign\": (),\n    \"Quipt  - SleepWell - Inbound Call Campaign\": (),\n    \"demo\": (),\n    \"Quipt  - Patient Aids - Inbound Call Campaign\": (),\n    \"Hendrick - Inbound Call Campaign\": (\"3256733711\",),\n    \"MSCo._PAP - Inbound\": (\"4402969338\", \"8008241400\", \"8554037035\"),\n    \"UNC Homecare - Inbound Call Campaign\": (),\n    \"Lehan - Inbound Call Campaign\": (\"8157663455\",),\n    \"Unity Point Home - Eastern Iowa - Inbound Call Campaign\": (),\n    \"Quipt  - CMGA - Inbound Call Campaign\": (),\n    \"Quipt  - Thrift - Inbound Call Campain\": (),\n    \"Sleep Affiliates - Inbound Call Campaign\": (),\n    \"Deaconess - Inbound Call Campaign\": (\"8552623771\",),\n    \"Quipt  - GNM - Inbound Call Campaign\": (),\n    \"BetterNight - Inbound Call Campaign\": (\"6195016274\", \"8582215888\", \"8668019440\"),\n    \"Quipt  - Black Bear -Inbound Call Campaign\": (),\n    \"Reliable Respiratory - Inbound Call Campaign\": (),\n    \"SleepQuest - Inbound Call Campaign\": (\"6504120105\", \"6505179460\"),\n    \"Regional - Inbound Call Campaign\": (\"9782082307\", \"9782880582\", \"9789427580\"),\n    \"Vantage - Inbound Call Campaign\": (),\n    \"pps2\": (\"8104064450\", \"9782880582\", \"9893167287\"),\n    \"Quipt  - Hometown - Inbound Call Campaign\": (\"6016217444\",),\n    \"Ochsner - Inbound Call Campaign\": (),\n    \"HME\": (\"8002362619\",),\n    \"Unity Point Home - West Lakes - Inbound Call Campaign\": (),\n    \"Lakeland - Inbound Call Campaign\": (\"8778425334\",),\n    \"Sleep Solutions - Inbound Call Campaign\": (\"2486889095\",),\n    \"The Medical Store - Inbound Call Campaign\": (),\n    \"Doubek - Inbound Call Campaign\": (\"7082931122\",),\n    \"Quipt  - RMG - Inbound Call Campaign\": (),\n    \"Medcare SV - Inbound Call Campaign\": (),\n    \"Quipt  - Health Tech - Inbound Call Campaign\": (\"8479478044\",),\n    \"Hometown Healthcare NY - Inbound Call Campaign\": (\"5185000000\",),\n    \"Unity Point Home - Inbound Call Campaign\": (),\n    \"Quipt  - Legacy Oxygen - Inbound Call Campaign\": (\"2707532001\",),\n    \"Baird - Inbound Call Campaign\": (),\n    \"Northwestern - Inbound Call Campaign\": (\"8153345032\", \"8478547250\"),\n    \"UW Health - Inbound Call Campaign\": (),\n    \"Integris - Inbound Call Campaign\": (),\n    \"Britkare - Inbound Call Campaign\": (\"8063512500\",),\n    \"Kadence - Inbound Call Campaign\": (\"7142200071\", \"7148728205\"),\n    \"Cox Health - Inbound Call Campaign\": (),\n    \"Munson - Inbound Call Campaign\": (\"2319352100\", \"2319352107\"),\n    \"Frontier - Inbound Call Campaign\": (),\n    \"Quipt  - Mayhugh - Inbound Call Campaign\": (),\n    \"PHM - Inbound Call Campaign\": (),\n    \"Williams Bros - Inbound Call Campaign\": (),\n    \"Hart - Inbound Call Campaign\": (\"8104064450\", \"9893167287\"),\n    \"Quipt  - West Home - Inbound Call Campaign\": (),\n    \"IU Health Sleep - Inbound Call Campaign\": (\"3179638291\",),\n    \"Ricks Medical Supply - Inbound Call Campaign\": (),\n    \"demoqa\": (\"8104064450\", \"9782880582\", \"9893167287\"),\n    \"Valley Sleep - Inbound Call Campaign\": (\"4805420619\",),\n    \"Bryans Test Campain Inbound\": (),\n    \"Sutter - Inbound Call Campaign\": (\"8002811764\",),\n    \"Atrium - Inbound Call Campaign\": (),\n    \"Advocate - Inbound Call Campaign\": (\"6305163100\",),\n    \"Aurora - Inbound Call Campaign\": (),\n    \"Bryans Test Campaign Outbound\": (\"8104064450\", \"9782880582\", \"9893167287\"),\n    \"Medic Sleep Care - Inbound Call Campaign\": (),\n    \"Medic Sleep Care - Outbound Dialer Campaign\": (),\n    \"HME - Inbound Call Campaign\": (),\n}\n\n# PRIMARY_INSURANCE_RULE_TO_NUMBERS: same site+insurance destinations as above,\n# keyed by rule for maintainers/tests (not read by validate_handoff — that uses\n# VARIANT_NAME_TO_TRANSFER_NUMBERS only). See handle_routing_after_verification.py,\n# order_service_module.py, utterances.SYNAPSE_INSURANCE_REDIRECT_UTTERANCE. Synapse:\n# utterance redirect only, not transfer_call handoff_to.\nPRIMARY_INSURANCE_RULE_TO_NUMBERS: dict[str, tuple[str, ...]] = {\n    \"betternight_site_primary_plan_contains_srs\": (\"6195016274\",),\n    \"medical_service_company_site_uhc_community_plan\": (\"4402969338\",),\n    \"medical_service_company_site_uhc_medicare_synapse_plan_utterance_redirect\": (\"8883369363\",),\n}\n\n\ndef build_handoff_dict(conv: Conversation, handoff_reason: str, handoff_to: str | None) -> dict:\n    brightree_handoff_reason = _BRIGHTREE_HANDOFF_REASON_MAPPING.get(handoff_reason, handoff_reason)\n    # Both the \"\" legacy marker and BRIGHTREE_DEFAULT_DESTINATION represent an\n    # intentional default; None means the derived-routing config failed to\n    # parse/validate — we also fall back to the default queue in that case.\n    is_default_queue = not handoff_to or handoff_to == BRIGHTREE_DEFAULT_DESTINATION\n    sip_headers = build_sip_headers(\n        conv,\n        contained=False,\n        handoff_reason=brightree_handoff_reason,\n        destination=\"null\" if is_default_queue else handoff_to,\n    )\n    handoff_type = (\n        \"Brightree Agent\"\n        if is_default_queue\n        else f\"{conv.variant.site_name} Agent {handoff_reason}\"\n    )\n    return {\n        \"bye\": {\"sip_headers\": sip_headers},\n        \"reason\": handoff_reason,\n        \"type\": handoff_type.upper().replace(\" \", \"_\"),\n    }\n\n\ndef handoff_with_default_destination(conv: Conversation, original_handoff: dict) -> dict:\n    \"\"\"Build a **new** Brightree default-queue handoff; this is not a copy of ``original_handoff``.\n\n    Only ``reason`` is carried over (default ``SPEAK_TO`` if missing). ``type`` is always\n    ``BRIGHTREE_AGENT``. SIP headers are rebuilt from ``build_sip_headers`` (fresh dict),\n    with ``X-destination`` as the string ``\\\"null\\\"`` — same default-queue placeholder as\n    ``transfer_call`` when ``handoff_to`` is empty. Any other keys from the original handoff\n    (or prior SIP header fields) are dropped.\n    \"\"\"\n\n    original_reason = (original_handoff or {}).get(\"reason\", \"SPEAK_TO\")\n    default_sip_headers = build_sip_headers(\n        conv,\n        contained=False,\n        handoff_reason=_BRIGHTREE_HANDOFF_REASON_MAPPING.get(original_reason, original_reason),\n    )\n    default_handoff = {\n        \"bye\": {\"sip_headers\": default_sip_headers},\n        \"reason\": original_reason,\n        \"type\": \"BRIGHTREE_AGENT\",\n    }\n    conv.log.info(\n        \"handoff_dict: Returning default-destination handoff\",\n        handoff=default_handoff,\n        variant_name=conv.variant_name,\n        x_destination=default_handoff[\"bye\"][\"sip_headers\"][\"X-destination\"],\n    )\n    conv.state.handoff_to = default_handoff[\"bye\"][\"sip_headers\"][\"X-destination\"]\n    return default_handoff\n\n\ndef validate_handoff(conv: Conversation, handoff: dict) -> dict:\n    \"\"\"Return ``handoff`` unchanged, or ``handoff_with_default_destination(conv, handoff)`` if invalid.\"\"\"\n    try:\n        dest = handoff[\"bye\"][\"sip_headers\"][\"X-destination\"]\n    except (TypeError, KeyError, AttributeError):\n        return handoff_with_default_destination(conv, handoff)\n\n    if dest in (None, \"\", \"null\", BRIGHTREE_DEFAULT_DESTINATION):\n        conv.log.info(\n            \"handoff_dict: returning handoff unchanged (default-queue SIP destination)\",\n            handoff=handoff,\n            variant_name=conv.variant_name,\n            x_destination=dest,\n        )\n        conv.state.handoff_to = dest\n        return handoff\n\n    normalized = normalize_number(str(dest))\n    vname = conv.variant_name\n    allowed = VARIANT_NAME_TO_TRANSFER_NUMBERS.get(vname) if vname else None\n    if (\n        len(normalized) == 10\n        and normalized.isdigit()\n        and allowed is not None\n        and normalized in allowed\n    ):\n        conv.log.info(\n            \"handoff_dict: returning handoff unchanged (destination on variant allowlist)\",\n            handoff=handoff,\n            variant_name=vname,\n            x_destination=dest,\n        )\n        conv.state.handoff_to = dest\n        return handoff\n\n    conv.write_metric(\"HANDOFF_VALIDATION_FAILED\")\n    conv.log.warning(\n        \"X-destination not allowed for variant; forcing default queue (X-destination=null)\",\n        variant_name=vname,\n        x_destination=dest,\n        normalized=normalized,\n        allowed=list(allowed) if allowed is not None else None,\n    )\n    return handoff_with_default_destination(conv, handoff)\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{"ebc48dd4-0106-4f4d-9968-96a1e498265b":true,"TOPIC-C292B370":true,"3c7d1b19-368e-47cb-a2bb-e8b16875d040":true},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-50AF2115":true,"VARIABLE-B5EB3149":true,"VARIABLE-34C5B490":true,"VARIABLES-23df6905":true,"VARIABLE-0C287589":true,"VARIABLES-e4bf86bb":true,"VARIABLE-5EED538E":true}}},"FUNCTION-77ee38d8":{"id":"FUNCTION-77ee38d8","name":"tmp_dev_checks","description":"Call this when the user says a fruit","parameters":{"ids":["FUNCTION-77ee38d8-PARAM-0"],"entities":{"FUNCTION-77ee38d8-PARAM-0":{"id":"FUNCTION-77ee38d8-PARAM-0","name":"fruit","description":"The fruit described by the user","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"}}},"code":"from functions.api_handler import get_api_instance\n\nSANDBOX_PT_DETAILS = {\n    \"phone_number\": \"5059696418\",\n    \"patientKey\": \"eedcb85c-7430-43bc-a972-1c615a9629d4\",\n    \"dateOfBirth\": \"1958-09-07T00:00:00\",\n    \"patientLanguage\": \"English\",\n}\n\n\ndef tmp_dev_checks(conv: Conversation, fruit: str):\n    if conv.env == \"live\":\n        return \"Help the user with their query\"\n\n    conv.state.verification_data[\"patient_dob\"] = SANDBOX_PT_DETAILS[\"dateOfBirth\"]\n\n    # rapid reorder\n    order_service = conv.state.order_service\n    if fruit == \"banana\":\n        conv.state.verification_data[\"patient_key\"] = SANDBOX_PT_DETAILS[\"patientKey\"]\n        order_service.set_patient_details(SANDBOX_PT_DETAILS)\n        conv.state.out_going_sip_headers[\"X-reorder-started\"] = \"true\"\n        return conv.functions.handle_routing_after_verification(\"rapid-reorder\")\n\n    elif fruit == \"apple\":\n        conv.state.verification_data[\"patient_key\"] = SANDBOX_PT_DETAILS[\"phone_number\"]\n        return conv.functions.start_sms_flow()\n\n    elif fruit == \"orange\":\n        conv.state.verification_data[\"patient_key\"] = SANDBOX_PT_DETAILS[\"patientKey\"]\n        order_service.set_patient_details(SANDBOX_PT_DETAILS)\n        return conv.functions.handle_routing_after_verification(\"order-status\")\n\n    elif (fruit or \"\").lower().strip() == \"strawberry\":\n        return {\n            \"transition\": {\n                \"goto_flow\": \"Set Up Test Data\",\n            },\n            \"utterance\": \"Please provide the test command.\",\n        }\n\n    else:\n        conv.state.flow_after_verification = \"rapid-reorder\"\n\n        api_handler = get_api_instance(conv)\n        result = api_handler.GET_patients_by_phone_number(SANDBOX_PT_DETAILS[\"phone_number\"])\n        patients_retrieved = result.get(\"data\", [])\n\n        if not patients_retrieved:\n            raise Exception(\"No patients returned for API lookup\")\n\n        conv.state.patients_retrieved_for_ivr = patients_retrieved\n\n        return {\n            \"utterance\": conv.functions.utterances(\"VERIFICATION_REQUEST_YOUR_DOB\"),\n            \"transition\": {\n                \"goto_flow\": \"verification\",\n                \"goto_step\": \"collect-date-of-birth\",\n            },\n        }\n","errors":[],"latencyControl":{"enabled":true,"delayResponses":{"ids":["FUNCTION-77ee38d8-DELAY-0","FUNCTION-77ee38d8-DELAY-1","FUNCTION-77ee38d8-DELAY-2","FUNCTION-77ee38d8-DELAY-3","FUNCTION-77ee38d8-DELAY-4"],"entities":{"FUNCTION-77ee38d8-DELAY-0":{"id":"FUNCTION-77ee38d8-DELAY-0","message":"you are the universe experiencing itself,","duration":4,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system","references":{"variables":{}}},"FUNCTION-77ee38d8-DELAY-1":{"id":"FUNCTION-77ee38d8-DELAY-1","message":"The real you is not a puppet that life pushes around, the real deep down you is the whole universe.","duration":4,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system","references":{"variables":{}}},"FUNCTION-77ee38d8-DELAY-2":{"id":"FUNCTION-77ee38d8-DELAY-2","message":"We are the witnesses through which the universe becomes conscious of its glory, of its magnificence.","duration":4,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system","references":{"variables":{}}},"FUNCTION-77ee38d8-DELAY-3":{"id":"FUNCTION-77ee38d8-DELAY-3","message":"There is no such thing as a single, solitary event. The only possible single event is all events whatsoever.","duration":4,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system","references":{"variables":{}}},"FUNCTION-77ee38d8-DELAY-4":{"id":"FUNCTION-77ee38d8-DELAY-4","message":"Trying to define yourself is like trying to bite your own teeth.","duration":4,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system","references":{"variables":{}}}}},"initialDelay":1,"interval":3,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-300BE440":true,"VARIABLE-48C7A8A0":true,"VARIABLE-53C80B44":true,"VARIABLE-7AE65957":true,"VARIABLE-FC3C0DBD":true}}},"FUNCTION-8f0a505f":{"id":"FUNCTION-8f0a505f","name":"utils","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"from datetime import datetime, time\nfrom typing import Optional\n\n\n\ndef format_ooh_utterance(conv, default_utterance_name: str) -> str:\n    \"\"\"Return the formatted OOH utterance. During special OOH (holidays)\n    a single unified message is used regardless of context.\"\"\"\n    if conv.state.is_special_ooh:\n        return conv.functions.utterances(\"SPECIAL_OOH_UTTERANCE\").format(\n            in_hours_times=conv.state.in_hours_times,\n        )\n    return conv.functions.utterances(default_utterance_name).format(\n        in_hours_times=conv.state.in_hours_times,\n        closure_period=conv.functions.utterances(conv.state.closure_period),\n    )\n\n\nRTC_FORCE_HOURS_NONE = \"none\"\nRTC_FORCE_HOURS_FORCE_IN_HOURS = \"force_in_hours\"\nRTC_FORCE_HOURS_FORCE_OOH = \"force_ooh\"\n\nMON_FRI = [0, 1, 2, 3, 4]\n\n\ndef get_force_hours_from_rtc(conv: Conversation) -> Optional[bool]:\n    \"\"\"\n    True = in hours\n    False = out of hours\n    None = use site code in hours\n    \"\"\"\n    force_hours = conv.real_time_config.get(\"force_hours\", RTC_FORCE_HOURS_NONE)\n    if force_hours == RTC_FORCE_HOURS_NONE:\n        return None\n    elif force_hours == RTC_FORCE_HOURS_FORCE_IN_HOURS:\n        return True\n    elif force_hours == RTC_FORCE_HOURS_FORCE_OOH:\n        return False\n    else:\n        conv.log.error(f\"Invalid force_hours value: {force_hours}\")\n        return None\n\n\ndef get_in_hours_from_variant_name(conv: Conversation, variant_name: str) -> dict:\n    in_hours = {\n        \"demo\": {\n            \"start_time\": time(7, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"Bryans Test Campain Inbound\": {\n            \"start_time\": time(7, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"Bryans Test Campaign Outbound\": {\n            \"start_time\": time(7, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"Baird - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"BetterNight - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(21, 00),\n        },\n        \"Britkare - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Cox Health - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Deaconess - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Doubek - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Frontier - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Hampton - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"Hart - Inbound Call Campaign\": {\n            \"start_time\": time(7, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"Hendrick - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"HME\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"HME - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Hometown Healthcare NY - Inbound Call Campaign\": {\n            \"start_time\": time(7, 30),\n            \"end_time\": time(18, 00),\n        },\n        \"IU Health Sleep - Inbound Call Campaign\": {\n            \"start_time\": time(7, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"Integris - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Kadence - Inbound Call Campaign\": {\n            \"start_time\": time(10, 30),\n            \"end_time\": time(21, 00),\n        },\n        \"Lakeland - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Lehan - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Medcare - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_t