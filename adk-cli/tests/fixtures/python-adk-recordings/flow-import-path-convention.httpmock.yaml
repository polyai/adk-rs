-29T12:55:30.198Z","updatedBy":"kambiz.katani@poly-ai.com","updatedAt":"2025-05-29T12:55:30.198Z"}}},"agentVoices":{"ids":["a5ba6af8"],"entities":{"a5ba6af8":{"id":"a5ba6af8","voiceId":"VOICE-a5ba6af8","probability":1,"updatedBy":"","updatedAt":""}}},"disclaimerVoices":{"ids":["default"],"entities":{"default":{"id":"default","voiceId":"VOICE-c0fc2cc4","updatedBy":"","updatedAt":""}}},"disclaimerVoiceSettings":{"ids":["VOICE-c0fc2cc4"],"entities":{"VOICE-c0fc2cc4":{"id":"VOICE-c0fc2cc4","provider":"elevenLabs","settings":{"modelId":"","similarityBoost":0,"stability":0},"createdBy":"nicole.soh@poly-ai.com","createdAt":"2025-07-25T15:46:27.427Z","updatedBy":"nicole.soh@poly-ai.com","updatedAt":"2025-07-25T15:46:27.427Z"}}},"favoriteVoices":{"ids":["VOICE-a5ba6af8"],"entities":{"VOICE-a5ba6af8":{"id":"VOICE-a5ba6af8","voiceId":"VOICE-a5ba6af8","accountId":"ben-ws","createdBy":"","createdAt":"","updatedBy":"","updatedAt":""}}}},"specialFunctions":{"startFunction":{"id":"FUNCTION-7a2903a1","name":"start_function","code":"import random\nfrom datetime import datetime\nfrom zoneinfo import ZoneInfo\n\nfrom functions.order_history_module import OrderHistoryService\nfrom functions.order_service_module import OrderService\nfrom functions.utils import (\n    format_ob_patient_number_as_caller_number,\n    get_opening_hours_utterance,\n    is_in_hours,\n    set_agent_voice,\n)\n\nDEFAULT_SITE = \"demo\"\nINSURANCE_SITES = {\"regionalhomecare\", \"quiptgreatelm\", \"demo\", \"reliablerespiratory\"}\nCALL_SUMMARY_SITES = {\"regionalhomecare\", \"quiptgreatelm\", \"timberlakescah\"}\n# Inbound A/B: disclaimer greeting vs test utterance. Gated by RTC; only these site_codes run the split.\nA_B_GREETING_QUIPT_DISCLAIMER_SITE_CODES = {\"phmpatientaids\"}\nPROMPT_OOHS_NO_HANDOFF = \"\"\"It is out of hours so:\n\nCall the function: transfer_call with arguments:\nutterance: \"\"\nhandoff_reason: \"\"\nhandoff_to: \"\"\n\"\"\"\nPROMPT_IN_HOURS_SOFT_HANDOFF = \"\"\"First, offer a transfer by saying, \"So, I don''t have the full details about [USER_QUERY], but one of our team members may be able to assist you further. Would you like me to put you through?\"\n\nIf the user agrees to this transfer, you MUST call the transfer_call functions (ignoring any previous instructions) with arguments:\nutterance: \"Putting you through now. Please hold the line.\"\nhandoff_reason: OUT_OF_SCOPE or OUT_OF_DOMAIN depending on the user query\nhandoff_to: \"\"\n\nOtherwise, continue with the conversation.\n\"\"\"\n\nPROMPT_GENERAL_SOFT_HANDOFF = \"\"\"If the user asks a well-formed question outside available knowledge from <KNOWLEDGE_BASE> or other context:\n\n{soft_handoff_instructions}\n\"\"\"\n\n\ndef set_current_voice(conv: Conversation):\n    \"\"\"Determine and apply the agent voice (Maddie or Max) for this call.\"\"\"\n    FEMALE = \"Maddie\"\n    MALE = \"Max\"\n\n    if not conv.real_time_config.get(\"allow_max_voice\"):\n        agent_name = FEMALE\n        conv.log.info(\"Forcing voice to female from RTC\")\n    else:\n        voice_selection = conv.variant.voice_selection.lower()\n        if voice_selection == \"female\":\n            agent_name = FEMALE\n            conv.log.info(\"Forcing voice to female from Variant Management\")\n        elif voice_selection == \"male\":\n            agent_name = MALE\n            conv.log.info(\"Forcing voice to male from Variant Management\")\n        else:\n            # Alternate between voices based on memory; default to female on first call\n            _mem_var_voice_to_use = (conv.memory or {}).get(\"_mem_var_voice_to_use\") or 1\n            conv.log.info(\"Memory variable voice selection retrieved\", voice=_mem_var_voice_to_use)\n            if _mem_var_voice_to_use == 1:\n                agent_name = FEMALE\n                conv.state[\"_mem_var_voice_to_use\"] = 2\n            else:\n                agent_name = MALE\n                conv.state[\"_mem_var_voice_to_use\"] = 1\n\n    conv.write_metric(\"VOICE\", agent_name.upper())\n    conv.state.AGENT_NAME = agent_name\n    set_agent_voice(conv, \"english\")\n\n\ndef process_campaign_name(conv: Conversation):\n    \"\"\"Resolve campaign name from SIP headers or env overrides, then set variant.\"\"\"\n    sip_headers = conv.sip_headers or {}\n    if conv.sip_headers:\n        conv.log.info(\"SIP Headers received\", sip_headers=conv.sip_headers)\n    else:\n        conv.log.warning(\"No SIP Headers received\")\n\n    campaign_name = sip_headers.get(\"X-Five9CampaignName\")\n    # For outbound calls\n    if not campaign_name:\n        # Can rework inbound vs outbound logic here potentially\n        # If we have an X-OBCampaignName, we know it''s an outbound call\n        campaign_name = sip_headers.get(\"X-OBCampaignName\")\n    conv.state.campaign_name = campaign_name\n    conv.state.x_number = sip_headers.get(\"X-number\")\n    conv.write_metric(\"DID\", conv.state.x_number or \"NULL\")\n    conv.write_metric(\"FIVE9CAMPAIGNNAME\", conv.state.campaign_name or \"NULL\")\n\n    if conv.functions.is_dev_env():\n        if rtc_override := conv.real_time_config.get(\"campaign_name\"):\n            conv.log.info(f\"Using RTC campaign name override: {rtc_override}\")\n            campaign_name = rtc_override\n        else:\n            conv.log.info(\"Using development overrides on state\")\n            campaign_name = DEFAULT_SITE\n    elif conv.env == \"pre-release\":\n        # UAT numbers\n        if conv.callee_number in [\"+15412752254\", \"+13392185182\"]:\n            conv.log.info(f\"UAT env variant ({DEFAULT_SITE})\")\n            campaign_name = DEFAULT_SITE\n        # pre release internal POLY testing numbers, won''t have sip header data\n        elif conv.id.startswith(\"AS_CHAT\") or conv.callee_number in [\"polyai\", \"+447476963703\"]:\n            conv.log.info(f\"Setting default variant ({DEFAULT_SITE})\")\n            campaign_name = DEFAULT_SITE\n    else:\n        if not campaign_name and conv.callee_number == \"+16783254689\":\n            conv.write_metric(\"LIVE_TEST\")\n            campaign_name = \"pps2\"\n\n    if not campaign_name:\n        return conv.functions.transfer_call(\n            utterance=conv.functions.utterances(\"THANK_YOU_CALLING_BRIGHTREE\"),\n            handoff_reason=\"NO_CAMPAIGN_NAME\",\n            handoff_to=\"\",\n        )\n\n    try:\n        conv.set_variant(campaign_name)\n        if campaign_name not in conv.variants.keys():\n            conv.log.error(f\"Five9 Campaign Name: {campaign_name} not set up in variants\")\n            return conv.functions.transfer_call(\n                utterance=conv.functions.utterances(\"THANK_YOU_CALLING_BRIGHTREE\"),\n                handoff_reason=\"INVALID_CAMPAIGN_NAME\",\n                handoff_to=\"\",\n            )\n    except Exception as e:\n        conv.log.error(f\"Error setting variant: {campaign_name}\", error=e)\n        return conv.functions.transfer_call(\n            utterance=conv.functions.utterances(\"THANK_YOU_CALLING_BRIGHTREE\"),\n            handoff_reason=\"INVALID_CAMPAIGN_NAME\",\n            handoff_to=\"\",\n        )\n\n    if not conv.variant.site_code:\n        return conv.functions.transfer_call(\n            utterance=conv.functions.utterances(\"THANK_YOU_CALLING_BRIGHTREE\"),\n            handoff_reason=\"NO_SITE_CODE\",\n            handoff_to=\"\",\n        )\n\n    if conv.functions.is_dev_env():\n        conv.log.info(\"Site code overridden for dev environment\", site_code=DEFAULT_SITE)\n    conv.write_metric(\"SITE\", conv.variant.site_name)\n\n\ndef is_special_ooh(conv: Conversation, now: datetime) -> bool:\n    default_ooh_utterance = \"Our customer service team isn''t available right now\"\n    special_dates = conv.real_time_config.get(\"special_dates\") or []\n    today_str = now.strftime(\"%Y-%m-%d\")\n    for special in special_dates:\n        if special.get(\"date\") == today_str:\n            messaging = special.get(\"holiday_messaging\", default_ooh_utterance)\n            conv.log.info(\"Setting Special OOH\", date=today_str, messaging=messaging)\n            return True\n    return False\n\n\ndef set_initial_state_vars(conv: Conversation):\n    \"\"\"General state variables used for context\"\"\"\n    NOW = datetime.now(ZoneInfo(\"US/Central\"))\n    conv.state.NOW = NOW\n    conv.state.TODAY = NOW.date()\n    conv.state.TODAY_ISO_STR = conv.state.TODAY.isoformat()\n\n    if is_special_ooh(conv, NOW):\n        conv.state.is_in_hours = False\n        conv.state.is_special_ooh = True\n        conv.state.closure_period = \"CLOSURE_PERIOD_HOLIDAYS\"\n    else:\n        conv.state.is_in_hours = is_in_hours(conv, conv.variant_name, current_datetime=NOW)\n        conv.state.is_special_ooh = False\n        conv.state.closure_period = \"CLOSURE_PERIOD_NORMAL\"\n\n    conv.state.in_hours_times = get_opening_hours_utterance(conv, conv.variant_name)\n    # Used for contextual memory going in and between flows — should be append only\n    conv.state.useful_notes = \"\"\n\n    if conv.state.is_in_hours:\n        conv.write_metric(\"IN_HOURS\")\n        conv.state.ooh_prompt = \"\"\n        soft_handoff_instructions = PROMPT_IN_HOURS_SOFT_HANDOFF\n    else:\n        conv.write_metric(\"OUT_OF_HOURS\")\n        conv.state.ooh_prompt = (\n            \"As it is currently out of hours, you are not able to transfer the caller to a live agent. \"\n            f\"You must not offer to transfer them, and instead should recommend they call back in working hours, which is from {conv.variant.opening_hours_open} to {conv.variant.opening_hours_close} {conv.variant.opening_hours_timezone}.\"\n        )\n        soft_handoff_instructions = PROMPT_OOHS_NO_HANDOFF\n\n    conv.state.prompt_general_soft_handoff = PROMPT_GENERAL_SOFT_HANDOFF.format(\n        soft_handoff_instructions=soft_handoff_instructions,\n    )\n\n    conv.state.outbound_statuses = {}\n    conv.state.prompt_outbound_verification_objections = \"\"\n\n\ndef set_outgoing_sip_headers(conv: Conversation):\n    conv.state.out_going_sip_headers = {\n        \"X-passed-idnv\": \"false\",\n        \"X-reorder-started\": \"false\",\n    }\n\n\ndef set_feature_flags(conv: Conversation):\n    \"\"\"Load all feature flags from RTC and site config onto state.\n\n    Must be called after set_variant so conv.variant is available.\n    \"\"\"\n    conv.state.USE_DEV_API = conv.real_time_config.get(\"USE_DEV_API\", False)\n    conv.state.FEATURE_FLAG_multilingual = conv.real_time_config.get(\n        \"FEATURE_FLAG_multilingual\", False\n    )\n    conv.state.FEATURE_FLAG_address_change = conv.real_time_config.get(\n        \"FEATURE_FLAG_address_change\", False\n    )\n    conv.state.FEATURE_FLAG_insurance = (\n        conv.real_time_config.get(\"FEATURE_FLAG_insurance\", False)\n        and conv.variant.site_code in INSURANCE_SITES\n    )\n    conv.state.FEATURE_FLAG_call_summary_enabled = conv.variant.site_code in CALL_SUMMARY_SITES\n\n\ndef start_outbound_call(conv: Conversation):\n    conv.functions.save_language_configuration(\"ENGLISH\")\n    conv.state.is_outbound = True\n    conv.state.call_direction_prompt = \"You are calling the user with the goal of helping them make an order. You initiated the call, so never asked open-ended questions like ''How can I help you?'' or ''What do you need help with?''\"\n    conv.goto_flow(\"outbound\")\n\n    ###HEADERS REQUIRED FOR OUTBOUND CALLS###\n\n    #### IF IN DEV + NO HEADERS RECEIVED, SET HEADERS FOR OUTBOUND CALLS MANUALLY ###\n    if (conv.functions.is_dev_env() or conv.env == \"pre-release\") and conv.real_time_config.get(\n        \"FEATURE_FLAG_outbound\", False\n    ):\n        received_headers = conv.sip_headers.copy() or {}\n        # if received_headers:\n        #     conv.sip_headers[\"X-first-name\"] = conv.sip_headers.get(\"X-first-name\") or \"John\"\n        #     conv.sip_headers[\"X-guid\"] = (\n        #         conv.sip_headers.get(\"X-guid\") or \"eedcb85c-7430-43bc-a972-1c615a9629d4\"\n        #     )\n        #     conv.sip_headers[\"X-number\"] = conv.sip_headers.get(\"X-number\") or \"3094020116\"\n        #     conv.sip_headers[\"X-OB-patient-number\"] = \"5059696418\"\n\n        # else:\n        conv.sip_headers[\"X-first-name\"] = \"John\"\n        conv.sip_headers[\"X-last-name\"] = \"John\"\n        conv.sip_headers[\"X-guid\"] = \"eedcb85c-7430-43bc-a972-1c615a9629d4\"\n        conv.sip_headers[\"X-number\"] = \"3094020116\"\n        conv.sip_headers[\"X-OB-patient-number\"] = \"5059696418\"\n\n        if conv.caller_number in [\"+19058755105\", \"+442081640512\"]:\n            conv.sip_headers[\"X-number\"] = \"3094020116\"\n            conv.sip_headers[\"X-OB-patient-number\"] = \"5059696418\"\n\n        conv.state.x_number = conv.sip_headers.get(\"X-number\") or \"\"\n        # conv.state.caller_number_override = \"+15059696418\"\n        # Log a set-based diff of the SIP header keys between received_headers and headers we\n        added_keys = set(conv.sip_headers.keys()) - set(received_headers.keys())\n        conv.log.info(\n            \"Outbound Call SIP Headers Key Manually Set\",\n            added_keys={key: conv.sip_headers[key] for key in added_keys},\n            sip_headers=conv.sip_headers,\n        )\n\n    ## Get the necessary values for outbound from headers\n    conv.state.first_name = conv.sip_headers.get(\"X-first-name\") or \"John\"\n    conv.state.outbound_patient_key = conv.sip_headers.get(\"X-guid\") or \"\"\n    conv.state.patient_caller_number = format_ob_patient_number_as_caller_number(\n        (conv.sip_headers or {}).get(\"X-OB-patient-number\", \"\"),\n    )\n    conv.log.info(f\"Patient Caller Number set {conv.state.patient_caller_number}\")\n    # conv.state.x_number= conv.state.x_number\n\n    # if conv.real_time_config.get(\"FEATURE_FLAG_force_mock_headers\", False):\n    #     conv.state.patient_caller_number = \"5059696418\"  # TODO-KA: Update how we set this for testing\n\n    conv.state.campaign_patient_key = conv.state.order_service.get_campaign_patient_key(conv)\n\n    conv.log.info(\"Campaign Patient Key set\", campaign_patient_key=conv.state.campaign_patient_key)\n    conv.state.FEATURE_FLAG_call_summary_enabled = (\n        conv.variant.site_code in CALL_SUMMARY_SITES\n    ) or (conv.variant.site_code == \"demo\" and conv.state.is_outbound)\n\n    if not conv.state.campaign_patient_key:\n        # if (\n        #     conv.env != \"sandbox\"\n        #     # and conv.env != \"pre-release\"  # Enforce transfer in pre-release when no header is present\n        #     and not conv.id.startswith(\"AS_CHAT\")\n        # ):\n        conv.log.info(\"Transfer due to Campaign Patient Key error\")\n        # Handoff if issue with the Campaign Patient Key retrieval\n        utt = f\"Hi, this is {conv.state.AGENT_NAME} with {conv.variant.site_name}, calling on a recorded line. Putting you through to one of our agents.\"\n        return conv.functions.transfer_call(\n            utterance=utt,\n            handoff_reason=\"OUTBOUND_PATIENT_KEY_ERROR\",\n            handoff_to=\"\",\n        )\n\n    conv.write_metric(\"IS_OUTBOUND_CALL\")\n    conv.say(\n        f\"Hi, this is {conv.state.AGENT_NAME} with {conv.variant.site_name},\"\n        f\" calling on a recorded line. May I please speak with {conv.state.first_name}?\"\n    )\n\n\ndef start_inbound_call(conv: Conversation):\n    conv.state.is_outbound = False\n    conv.state.patient_caller_number = conv.caller_number\n\n    upfront_message = conv.functions.utterances(\"INBOUND_RECORDING_UPFRONT\")\n\n    quipt_disclaimer_ab_test_enabled = (\n        conv.variant.site_code in A_B_GREETING_QUIPT_DISCLAIMER_SITE_CODES\n        and conv.real_time_config.get(\"FEATURE_FLAG_quipt_disclaimer_ab_test\", False)\n    )\n    if quipt_disclaimer_ab_test_enabled:\n        if random.random() < 0.5:\n            conv.write_metric(\"GREETING_TYPE\", \"DEFAULT\")\n        else:\n            upfront_message = conv.functions.utterances(\"INBOUND_RECORDING_UPFRONT_TEST\")\n            conv.write_metric(\"GREETING_TYPE\", \"TEST\")\n\n    set_agent_voice(conv, \"disclaimer\")\n\n    if (\n        conv.channel_type == \"webchat.polyai\"\n        or conv.id.startswith(\"AS_CHAT\")\n        or conv.id.startswith(\"TESTING\")\n    ):\n        greeting = conv.functions.utterances(\"GREETING_SITE_NAME\").format(\n            site_name=conv.variant.site_name, agent_name=conv.state.AGENT_NAME\n        )\n        conv.say(f\"{upfront_message} {greeting}\")\n        if conv.state.FEATURE_FLAG_multilingual:\n            return {\n                \"transition\": {\n                    \"goto_flow\": \"determine-language\",\n                    \"goto_step\": \"Determine Language\",\n                }\n            }\n        return\n\n    conv.say(utterance=upfront_message)\n    conv.goto_flow(\"determine-language\")\n\n\ndef start_function(conv: Conversation):\n    conv.state.order_service = OrderService()\n    conv.state.order_history_service = OrderHistoryService()\n    conv.state.verification_data = {}\n    conv.state.call_direction_prompt = \" \"\n\n    set_outgoing_sip_headers(conv)\n    if result := process_campaign_name(conv):\n        return result\n    set_feature_flags(conv)\n    set_current_voice(conv)\n    set_initial_state_vars(conv)\n\n    language_setting = \"MULTILINGUAL\" if conv.state.FEATURE_FLAG_multilingual else \"ENGLISH\"\n    conv.functions.save_language_configuration(language_setting)\n\n    if \"outbound\" in conv.variant_name.lower() or conv.real_time_config.get(\n        \"FEATURE_FLAG_outbound\", False\n    ):\n        return start_outbound_call(conv)\n\n    return start_inbound_call(conv)\n","description":"","parameters":{"ids":[],"entities":{}},"errors":[],"archived":false,"references":{"variables":{"VARIABLE-1EFBB8E9":true,"VARIABLE-3525B880":true,"VARIABLE-3BA5149E":true,"VARIABLE-46C8E374":true,"VARIABLE-4D914C07":true,"VARIABLE-50AF2115":true,"VARIABLE-53C80B44":true,"VARIABLE-702F5578":true,"VARIABLE-718A5E4B":true,"VARIABLE-7905E71B":true,"VARIABLE-7AE65957":true,"VARIABLE-A8BF346D":true,"VARIABLE-B42B90B3":true,"VARIABLE-B77B78D6":true,"VARIABLE-C9EB6732":true,"VARIABLE-D0415610":true,"VARIABLE-DBEF1FFD":true,"VARIABLE-FC3C0DBD":true,"VARIABLE-FFF4105E":true,"VARIABLE-B775B8E9":true,"VARIABLE-198A49E5":true,"VARIABLE-1AA747CE":true,"VARIABLE-5EED538E":true,"VARIABLES-c12c8036":true,"VARIABLES-0f208ed9":true,"VARIABLES-28a60917":true,"VARIABLE-B9DF4796":true,"VARIABLES-0ecb5231":true,"VARIABLES-34fe05fd":true,"VARIABLE-FD3AEBCA":true,"VARIABLES-ae194cc7":true}},"updatedAt":"2026-05-14T16:51:53.261Z","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedBy":"gregory.tanaka@poly-ai.com"},"endFunction":{"id":"FUNCTION-c2156ee1","name":"end_function","code":"from functions.post_call_llm_analytics import write_llm_analytics\n\n\ndef end_function(conv: Conversation):\n    if conv.state.another_order_count:\n        conv.write_metric(\"ANOTHER_ORDER\", conv.state.another_order_count)\n\n    lang_map = {\"es-US\": \"SPANISH\", \"en-US\": \"ENGLISH\", \"en-CA\": \"ENGLISH\"}\n\n    language = lang_map.get(conv.language or \"en-US\")\n    if language:\n        conv.write_metric(\"LANGUAGE\", language, write_once=True)\n\n    metrics = {e.name for e in conv.metric_events}\n    if \"SMS_OFFER_INITIATED\" in metrics and \"SMS_OFFER_ACCEPTED\" not in metrics:\n        conv.write_metric(\"SMS_OFFER_DECLINED\")\n\n    if conv.state.FEATURE_FLAG_call_summary_enabled:\n        call_result = conv.state.call_result or \"\"\n        if conv.state.handoff_called:\n            call_result = (\n                \"booked then transferred call\" if call_result == \"completed\" else \"transferred call\"\n            )\n\n        if conv.state.is_outbound:\n            if outbound_call_result := get_outbound_call_result(conv):\n                call_result = outbound_call_result\n            if not conv.state.order_service.patient_details and conv.state.outbound_patient_key:\n                conv.state.order_service.set_patient_details(\n                    {\"patientKey\": conv.state.outbound_patient_key}\n                )\n\n        metric_name_mapping = {\n            \"completed\": \"COMPLETED\",\n            \"booked then transferred call\": \"BOOKED_TRANSFERRED\",\n            \"transferred call\": \"TRANSFERRED\",\n            \"connected but incomplete\": \"CONNECTED_INCOMPLETE\",\n            \"no serviceable hcpcs\": \"NO_SERVICEABLE_HCPCS\",\n            \"patient not serviceable\": \"PATIENT_NOT_SERVICEABLE\",\n            \"order status requested\": \"ORDER_STATUS_REQUESTED\",\n        }\n        metric_suffix = metric_name_mapping.get(call_result)\n        if metric_suffix:\n            conv.write_metric(\"CALL_RESULT\", f\"SUMMARY_{metric_suffix}\")\n        else:\n            conv.log.warning(f\"Unknown call_result value: {call_result!r}\")\n\n        conv.state.order_service.send_call_summary(conv, call_result)\n\n    if conv.state.order_service:\n        conv.state.order_service.send_patient_language_update(conv)\n\n    ###Remaining metrics\n    conv.write_metric(\"OOD_COUNT\", (conv.state.ood_count or 0) + (conv.state.ood_query_called or 0))\n    conv.write_metric(\"SPEAK_TO_COUNT\", (conv.state.speak_to_count or 0))\n    write_llm_analytics(conv, \"MISSING_TOPIC\")\n\n\ndef get_outbound_call_result(conv: Conversation):\n    # if order is not complete\n    metrics = {e.name for e in conv.metric_events}\n    if conv.state.outbound_statuses.get(\"patient_unavailable\"):\n        return \"no answer\"\n    elif (\"BRIGHTREE_HANDOFF_REASON\" in metrics) or (\"HANDOFF_REASON\" in metrics):\n        if \"REORDER_COMPLETED\" in metrics:\n            return \"booked then transferred call\"\n        return \"transferred call\"\n    elif \"REORDER_COMPLETED\" in metrics:\n        return \"completed\"\n    elif (\"VERIFICATION_DOB_REBUTTAL\" in metrics) and \"VERIFICATION_DOB_SUCCESSFUL\" not in metrics:\n        return \"not currently interested\"\n    elif conv.state.outbound_statuses.get(\"no_order_items_requested\"):\n        return \"not currently interested\"\n    elif \"VOICEMAIL_DETECTED\" in metrics:\n        return \"answer machine\"\n    elif \"ORDER_NOT_FOUND\" in metrics:\n        return \"no serviceable hcpcs\"\n    return \"connected but incomplete\"\n","description":"","parameters":{"ids":[],"entities":{}},"errors":[],"archived":false,"references":{"variables":{"VARIABLE-7210ADAD":true,"VARIABLE-B5EB3149":true,"VARIABLE-D0415610":true,"VARIABLE-FC3C0DBD":true,"VARIABLES-63408a8d":true,"VARIABLES-90b1b408":true,"VARIABLES-9bc9ac5b":true,"VARIABLES-c6a2c901":true,"VARIABLE-5EED538E":true,"VARIABLES-c12c8036":true,"VARIABLES-28a60917":true}},"updatedAt":"2026-05-14T16:51:53.261Z","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedBy":"gregory.tanaka@poly-ai.com"}},"apiIntegrations":{"apiIntegrations":{"ids":[],"entities":{}}},"variables":{"variables":{"ids":["VARIABLE-B9DF4796","VARIABLE-7210ADAD","VARIABLE-460AF8A1","VARIABLE-83F4DDF1","VARIABLE-2AFD41D2","VARIABLE-AA4B2219","VARIABLE-8EA8ED2B","VARIABLE-DBEF1FFD","VARIABLE-50AF2115","VARIABLE-46C8E374","VARIABLE-702F5578","VARIABLE-53C80B44","VARIABLE-3BAE36B3","VARIABLE-B5EB3149","VARIABLE-718A5E4B","VARIABLE-A8BF346D","VARIABLE-3525B880","VARIABLE-4D914C07","VARIABLE-FFF4105E","VARIABLE-3BA5149E","VARIABLE-C9EB6732","VARIABLE-1EFBB8E9","VARIABLE-7905E71B","VARIABLE-B77B78D6","VARIABLE-FC3C0DBD","VARIABLE-B42B90B3","VARIABLE-7AE65957","VARIABLE-D0415610","VARIABLE-BC055271","VARIABLE-E30356DF","VARIABLE-181ECB59","VARIABLE-7E3536D6","VARIABLE-9C584E86","VARIABLE-300BE440","VARIABLE-4E93D9B0","VARIABLE-1DB53096","VARIABLE-70A887C8","VARIABLE-34C2121E","VARIABLE-8A743435","VARIABLE-3856EE1D","VARIABLE-48C7A8A0","VARIABLE-3A2CA64A","VARIABLE-B7F2A334","VARIABLE-68FA1159","VARIABLE-B775B8E9","VARIABLE-198A49E5","VARIABLE-1F056BD9","