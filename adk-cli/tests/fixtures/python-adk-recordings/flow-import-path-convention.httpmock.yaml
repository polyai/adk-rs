nversation id, and conv.state.rapid_order_test_data). If\n    set_test_data was used earlier (e.g. in agentic QA), conv.state.rapid_order_test_data\n    will be set and is returned here. Otherwise returns hard-coded test payloads for\n    specific callers/envs or None to use real API.\n\n    Only runs in sandbox, draft, or pre-release.\n\n    Returns:\n        A rapid-order payload dict (for test), or None to load from API.\n    \"\"\"\n    if not (conv.env == \"sandbox\" or conv.env == \"draft\" or conv.env == \"pre-release\"):\n        return None\n\n    if bool(getattr(conv, \"id\", \"\") and conv.id.startswith(\"TESTING\")):\n        rapid_order_data = json.loads(\n            ''{\"rapidOrderKey\":\"e0258bb2-5880-4a9d-9f18-2b767eb31e10\",\"patientKey\":\"eedcb85c-7430-43bc-a972-1c615a9629d4\",\"patientFirstName\":\"Walter\",\"patientPreferredFirstName\":null,\"patientLastName\":\"White\",\"patientEmailAddress\":\"walterwhite@snapworx.com\",\"patientBillingAddress\":{\"street1\":\"308 Negra Arroyo Ln\",\"street2\":null,\"city\":\"Albuquerque\",\"state\":{\"key\":\"5a88c136-b6a9-48e7-a449-b1ba78d52ebf\",\"name\":\"New Mexico\",\"code\":\"NM\"},\"postalCode\":\"87153\"},\"items\":[{\"itemKey\":\"e98285a9-487a-4048-a0d5-3fe13ec31144\",\"itemDescription\":\"CPAP Chinstrap:  Adjustable Sunset Ruby Style Chin Strap\",\"qty\":1,\"hcpcs\":[{\"hcpcCode\":\"A7036\",\"hcpcTypeName\":\"CPAP Chinstrap\",\"qty\":1,\"nonFunctionalReasonAnswerChoices\":[\"Yes\"],\"lastDateOfService\":\"2024-08-31T16:20:09.743\",\"isRequiredBeforeBooking\":true,\"isRequiredEvenAfterBooking\":true,\"isRequiredForMedicareOnly\":true}],\"eligibilityDrivingHcpcForItem\":\"\"},{\"itemKey\":\"cc7ad30e-6fa2-4930-8cc0-61a0e80b5342\",\"itemDescription\":\"CPAP Cushion or Pillow:  Airfit F20 Full Face large Cushions\",\"qty\":3,\"hcpcs\":[{\"hcpcCode\":\"A7031\",\"hcpcTypeName\":\"CPAP Cushion or Pillow\",\"qty\":1,\"nonFunctionalReasonAnswerChoices\":[\"Yes\"],\"lastDateOfService\":\"2025-02-07T00:00:00\"