"PARAMETER-35298A84","PARAMETER-65405417","PARAMETER-177061CF"],"entities":{"PARAMETER-35298A84":{"id":"PARAMETER-35298A84","name":"handoff_reason","description":"The reason for handoff","type":"string","createdAt":"2026-04-06T01:58:28.869Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-04-06T01:58:28.869Z","updatedBy":"kitan.ademidun@poly-ai.com"},"PARAMETER-65405417":{"id":"PARAMETER-65405417","name":"handoff_to","description":"The handoff destination. Use an empty string \"\" if not explicitly provided.","type":"string","createdAt":"2026-04-06T01:58:28.869Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-04-06T01:58:28.869Z","updatedBy":"kitan.ademidun@poly-ai.com"},"PARAMETER-177061CF":{"id":"PARAMETER-177061CF","name":"utterance","description":"Utterance that should be said","type":"string","createdAt":"2026-04-06T01:58:28.869Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-04-06T01:58:28.869Z","updatedBy":"kitan.ademidun@poly-ai.com"}}},"code":"def start_warm_transfer_flow(conv: Conversation, handoff_reason: str, handoff_to: str, utterance: str):\n    if not conv.real_time_config.get(\"FEATURE_FLAG_allow_warm_transfers\", False):\n        return conv.functions.transfer_call(\n            utterance=utterance, handoff_reason=handoff_reason, handoff_to=handoff_to\n        )\n\n    conv.state.warm_transfer_handoff_reason = handoff_reason\n    conv.state.warm_transfer_handoff_to = handoff_to\n    conv.state.warm_transfer_utterance = utterance\n    conv.state.warm_transfer_active = True\n\n    if not conv.state.already_verified:\n        return conv.functions.start_verification(\"warm-transfer\", \"\", \"\")\n\n    return go_to_warm_transfer_flow(conv)\n\n\ndef go_to_warm_transfer_flow(conv: Conversation):\n    conv.say(conv.functions.utterances(\"UTTERANCE_WARM_TRANSFER_NAME_COLLECTION\"))\n    conv.goto_flow(\"Warm Transfer Flow\")\n    return\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entitie