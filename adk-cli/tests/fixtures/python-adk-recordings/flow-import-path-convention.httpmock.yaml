redForMedicareOnly\": False,\n            }\n        ],\n        \"eligibilityDrivingHcpcForItem\": \"\",\n    },\n    \"fit\": {\n        \"itemKey\": \"26ece895-0a4d-4e92-801c-a6729d2c3c2f\",\n        \"itemDescription\": \"CPAP Headgear, CPAP Mask: Airfit F20 Full Face Mask with Headgear and Large cushions\",\n        \"qty\": 1,\n        \"hcpcs\": [\n            {\n                \"hcpcCode\": \"A7035\",\n                \"hcpcTypeName\": \"CPAP Headgear\",\n                \"qty\": 1,\n                \"nonFunctionalReasonAnswerChoices\": [\"Stretched\", \"Loosening\", \"Stiffening\"],\n                \"lastDateOfService\": \"2025-02-07T00:00:00\",\n                \"isRequiredBeforeBooking\": True,\n                \"isRequiredEvenAfterBooking\": True,\n                \"isRequiredForMedicareOnly\": True,\n            },\n        ],\n        \"eligibilityDrivingHcpcForItem\": \"Full Face mask\",\n    },\n    \"size\": {\n        \"itemKey\": \"671f4033-47c8-4864-9b40-3b0b86a05cad\",\n        \"itemDescription\": \"CPAP Cushion or Pillow: AirTouch F20 Large Cushions \",\n        \"qty\": 3,\n        \"hcpcs\": [\n            {\n                \"hcpcCode\": \"A7031\",\n                \"hcpcTypeName\": \"CPAP Cushion or Pillow\",\n                \"qty\": 1,\n                \"nonFunctionalReasonAnswerChoices\": [\n                    \"X-Small\",\n                    \"Small\",\n                    \"Small Wide\",\n                    \"Medium\",\n                    \"Medium Wide\",\n                    \"Large\",\n                    \"Extra Large\",\n                ],\n                \"lastDateOfService\": \"2024-11-05T00:00:00\",\n                \"isRequiredBeforeBooking\": False,\n                \"isRequiredEvenAfterBooking\": False,\n                \"isRequiredForMedicareOnly\": False,\n            }\n        ],\n        \"eligibilityDrivingHcpcForItem\": \"\",\n    },\n    \"yes\": {\n        \"itemKey\": \"a147b869-bae5-4ed6-beeb-82d0e938afc2\",\n        \"itemDescription\": \"CPAP Mask: Nasal mask frame\",\n        \"qty\": 1,\n        \"hcpcs\": [\n            {\n                \"hcpcCode\": \"A7034\",\n                \"hcpcTypeName\": \"CPAP Mask\",\n                \"qty\": 1,\n                \"nonFunctionalReasonAnswerChoices\": [\"Yes\"],\n                \"lastDateOfService\": \"2025-10-10T00:00:00\",\n                \"isRequiredBeforeBooking\": True,\n                \"isRequiredEvenAfterBooking\": True,\n                \"isRequiredForMedicareOnly\": True,\n            }\n        ],\n        \"eligibilityDrivingHcpcForItem\": \"Nasal Mask\",\n    },\n    \"yes_affirm\": {\n        \"itemKey\": \"96c488e2-b61d-4a6b-ae85-5077777bdf04\",\n        \"itemDescription\": \"CPAP Cushion or Pillow: Airfit F30 Full Face medium Cushions\",\n        \"qty\": 3,\n        \"hcpcs\": [\n            {\n                \"hcpcCode\": \"A7031\",\n                \"hcpcTypeName\": \"CPAP Cushion or Pillow\",\n                \"qty\": 1,\n                \"nonFunctionalReasonAnswerChoices\": [\"Yes - I affirm my supplies need replaced\"],\n                \"lastDateOfService\": \"2025-11-28T00:00:00\",\n                \"isRequiredBeforeBooking\": True,\n                \"isRequiredEvenAfterBooking\": True,\n                \"isRequiredForMedicareOnly\": False,\n            }\n        ],\n        \"eligibilityDrivingHcpcForItem\": \"\",\n    },\n    \"yes_refil\": {\n        \"itemKey\": \"3e16eedb-3724-438f-9772-248b4cd40452\",\n        \"itemDescription\": \"CPAP Cushion or Pillow: DreamWear medium nasal cushions\",\n        \"qty\": 6,\n        \"hcpcs\": [\n            {\n                \"hcpcCode\": \"A7032\",\n                \"hcpcTypeName\": \"CPAP Cushion or Pillow\",\n                \"qty\": 1,\n                \"nonFunctionalReasonAnswerChoices\": [\n                    \"Yes - I am requesting this item as a refill.\"\n                ],\n                \"lastDateOfService\": \"2025-11-05T00:00:00\",\n                \"isRequiredBeforeBooking\": True,\n                \"isRequiredEvenAfterBooking\": True,\n                \"isRequiredForMedicareOnly\": False,\n            }\n        ],\n        \"eligibilityDrivingHcpcForItem\": \"\",\n    },\n    \"yes_request\": {\n        \"itemKey\": \"26ece895-0a4d-4e92-801c-a6729d2c3c2f\",\n        \"itemDescription\": \"CPAP Headgear, CPAP Mask: Airfit F20 Full Face Mask with Headgear and Large cushions\",\n        \"qty\": 1,\n        \"hcpcs\": [\n            {\n                \"hcpcCode\": \"A7030\",\n                \"hcpcTypeName\": \"CPAP Mask\",\n                \"qty\": 1,\n                \"nonFunctionalReasonAnswerChoices\": [\n                    \"yes - I am requesting the following items as a refill to be used\"\n                ],\n                \"lastDateOfService\": \"2025-02-07T00:00:00\",\n                \"isRequiredBeforeBooking\": True,\n                \"isRequiredEvenAfterBooking\": True,\n                \"isRequiredForMedicareOnly\": True,\n            },\n        ],\n        \"eligibilityDrivingHcpcForItem\": \"Full Face mask\",\n    },\n}\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-02-15T18:03:29.102Z","createdBy":"miles.nash@poly-ai.com","updatedAt":"2026-02-15T18:03:29.102Z","updatedBy":"miles.nash@poly-ai.com"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLES-4d8a6034":true}}},"FUNCTION-CB7167F5":{"id":"FUNCTION-CB7167F5","name":"initiate_call","description":"This is a function that was created automatically","parameters":{"ids":[],"entities":{}},"code":"def initiate_call(conv: Conversation):\n  # Add your function definition here.\n  # You can optionally return a string that will be fed back to the LLM.\n  pass","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-03-05T11:50:02.594Z","createdBy":"miles.nash@poly-ai.com","updatedAt":"2026-03-05T11:50:02.594Z","updatedBy":"miles.nash@poly-ai.com"},"createdAt":"2026-03-05T11:50:02.594Z","createdBy":"miles.nash@poly-ai.com","updatedAt":"2026-03-05T11:50:53.013Z","updatedBy":"miles.nash@poly-ai.com","archived":true,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTIONS-68b1656d":{"id":"FUNCTIONS-68b1656d","name":"post_call_llm_analytics","description":"DO NOT CALL","parameters":{"ids":[],"entities":{}},"code":"def post_call_llm_analytics(conv: Conversation):\n    # Add your function definition here.\n    # You can optionally return a string that will be fed back to the LLM.\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-03-18T02:16:55.997Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-03-18T02:16:55.997Z","updatedBy":"kitan.ademidun@poly-ai.com"},"createdAt":"2026-03-18T02:16:55.997Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-03-19T14:40:18.882Z","updatedBy":"kitan.ademidun@poly-ai.com","archived":true,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTION-C94B71EC":{"id":"FUNCTION-C94B71EC","name":"post_call_llm_analytics","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"\"\"\"Post-call LLM analytics.\n\nRuns after a call ends: sends the conversation transcript to an LLM and asks it to\ndo an analysis of specified metrics and compares that to agent studio metrics.\n\"\"\"\n\n\nMETRIC_DATA_TYPE_INT = \"int\"\nMETRIC_DATA_TYPE_STRING = \"string\"\n\n# Metric key -> ``description`` (LLM instruction) and ``data_type`` (``int`` | ``string`` JSON value).\nLLM_ANALYSIS_SET = {\n    \"SPEAK_TO_COUNT\": {\n        \"description\": (\n            \"Count how many times the user asked to speak to a human, agent, representative, \"\n            \"or operator (including phrases like ''real person'', ''live person'', ''someone'').\"\n        ),\n        \"data_type\": METRIC_DATA_TYPE_INT,\n    },\n    \"OOD_COUNT\": {\n        \"description\": (\n            \"Count how many times the user made a request that was out of domain (identify \"\n            \"this by the agents speech, e.g, I can''t help with that, we don''t have information on that).\"\n        ),\n        \"data_type\": METRIC_DATA_TYPE_INT,\n    },\n    \"OOD_IN_A_ROW\": {\n        \"description\": (\n            \"Count the max number of times the user made a request that was out of domain \"\n            \"(identify this by the agents speech, e.g, I can''t help with that, we don''t have information on that). \"\n            \"If the OOD request / statement repeats that in back to back turns count each time. \"\n            \"If there are separate instances where they repeat this, take the highest count.\"\n        ),\n        \"data_type\": METRIC_DATA_TYPE_INT,\n    },\n    \"BAD_CONTEXT\": {\n        \"description\": (\n            \"Score 0 or 1 for the whole call: 1 = the call was handled reasonably well given \"\n            \"context (we understood what the user was saying as a human would, even if the \"\n            \"conversation was formal/procedural); 0 = we did not (e.g. repeated misunderstandings, \"\n            \"wrong assumptions, inappropriate responses). Return this as a count of 0 or 1.\"\n        ),\n        \"data_type\": METRIC_DATA_TYPE_INT,\n    },\n    \"AGENT_REPEAT\": {\n        \"description\": (\n            \"Repeat trigger count: Count of times the agent has had to repeat an utterance on a call. \"\n            \"The repeated utterance might be rephrased (e.g. ''What''s your address?'' then ''I didn''t quite catch your address?'' \"\n            \"then ''Would you mind helping me with getting your address?''). If there are several instances where different \"\n            \"utterances are repeated, take the highest count. E.g. if we ask for address 3 times and ask for phone number \"\n            \"5 times, the value for this should be 5.\"\n        ),\n        \"data_type\": METRIC_DATA_TYPE_INT,\n    },\n    \"MISSING_TOPIC\": {\n        \"description\": (\n            \"The topic of the user''s main query in one plain-text word or short phrase; \"\n            \"if you cannot infer it, use exactly the string unclear.\"\n        ),\n        \"data_type\": METRIC_DATA_TYPE_STRING,\n    },\n}\n\n# Metric names to pull from conv.metrics_queue (Agent Studio metrics). Values are added\n# to the final output under keys \"AS_<name>\".\nAS_ANALYSIS_LIST = [\"SPEAK_TO_COUNT\", \"OOD_COUNT\"]\n\n# ``MISSING_TOPIC`` is only sent to the LLM when the last ``BRIGHTREE_HANDOFF_REASON`` on the\n# queue matches an out-of-scope / verification-OOD transfer (``VERIFICATION_OOD`` is stored\n# as ``VERIFICATION_OUT_OF_SCOPE_Q`` after Brightree mapping in ``transfer_call``).\n_HANDOFF_REASON_METRIC = \"BRIGHTREE_HANDOFF_REASON\"\n_MISSING_TOPIC_HANDOFF_VALUES = frozenset(\n    {\"OUT_OF_DOMAIN\", \"OUT_OF_SCOPE\", \"VERIFICATION_OOD\", \"VERIFICATION_OUT_OF_SCOPE_Q\"}\n)\n\nPOST_CALL_ANALYTICS_PROMPT = \"\"\"You are analyzing a completed voice conversation between an agent and a user.\n\n## Conversation history (speaker + text per turn)\n\n{conversation_text}\n\n## Metrics\n\nEach metric lists a **data_type**: use a JSON **number** (integer ≥ 0) for `int` (counts and 0/1 scores), and a JSON **string** for `string`.\n\n{metrics_descriptions}\n\n## Your task\n\nReturn a JSON object with exactly one key per metric. Each key must be the metric name as given. Each value must match that metric''s **data_type**.\n\nExample format:\n{example_keys}\n\nReturn only valid JSON, no other text.\"\"\"\n\n\ndef _default_for_metric(_key: str) -> None:\n    return None\n\n\ndef _last_metrics_queue_value(conv: Conversation, name: str):\n    \"\"\"Last value for ``name`` in ``conv.metrics_queue`` (most recent write wins).\"\"\"\n    metrics_queue = getattr(conv, \"metrics_queue\", []) or []\n    conv.log.info(\"post_call_analytics metrics_queue\", metrics_queue=metrics_queue)\n    value = None\n    for m in metrics_queue:\n        entry_name = m.get(\"name\") if isinstance(m, dict) else getattr(m, \"name\", None)\n        if entry_name == name:\n            value = m.get(\"value\") if isinstance(m, dict) else getattr(m, \"value\", None)\n    return value\n\n\ndef _should_include_missing_topic(conv: Conversation) -> bool:\n    metrics = {e.name for e in conv.metric_events}\n    if _HANDOFF_REASON_METRIC not in metrics:\n        return False\n    # Find the value for _HANDOFF_REASON_METRIC in conv.metric_events\n    value = None\n    for e in reversed(conv.metric_events):\n        if getattr(e, \"name\", None) == _HANDOFF_REASON_METRIC:\n            value = getattr(e, \"value\", None)\n            break\n    if value is None:\n        return False\n    normalized = str(value).strip().upper().replace(\" \", \"_\")\n    return normalized in _MISSING_TOPIC_HANDOFF_VALUES\n\n\ndef _active_llm_analysis_set(conv: Conversation) -> dict:\n    \"\"\"Subset of ``LLM_ANALYSIS_SET`` for this call (may omit ``MISSING_TOPIC``).\"\"\"\n    if _should_include_missing_topic(conv):\n        return LLM_ANALYSIS_SET\n    return {k: v for k, v in LLM_ANALYSIS_SET.items() if k != \"MISSING_TOPIC\"}\n\n\n# ---------------------------------------------------------------------------\n# 1. Prompt structuring\n# ---------------------------------------------------------------------------\n\n\ndef _format_conversation_for_analytics(conv: Conversation) -> str:\n    \"\"\"Format conv.history into a single string for the analytics prompt.\"\"\"\n    lines = []\n    for event in conv.history:\n        role = getattr(event, \"role\", \"unknown\")\n        text = (getattr(event, \"text\", \"\") or \"\").strip().replace(\"\\n\", \" \")\n        if text or role in (\"user\", \"agent\"):\n            lines.append(\n                f\"{role.capitalize()}: {text}\" if text else f\"{role.capitalize()}: [no text]\"\n            )\n    return \"\\n\".join(lines) if lines else \"[Empty conversation]\"\n\n\ndef _build_analytics_prompt(conv: Conversation, active_analysis: dict) -> str:\n    \"\"\"Build the full prompt string for post-call analytics.\"\"\"\n    metrics_descriptions = \"\\n\".join(\n        f\"- **{k}** (`data_type`: `{spec[''data_type'']}`): {spec[''description'']}\"\n        for k, spec in active_analysis.items()\n    )\n    example_parts = []\n    for k, spec in active_analysis.items():\n        if spec[\"data_type\"] == METRIC_DATA_TYPE_STRING:\n            example_parts.append(f''\"{k}\": \"unclear\"'')\n        else:\n            example_parts.append(f''\"{k}\": 0'')\n    example_keys = \"{\" + \", \".join(example_parts) + \"}\"\n    return POST_CALL_ANALYTICS_PROMPT.format(\n        conversation_text=_format_conversation_for_analytics(conv),\n        metrics_descriptions=metrics_descriptions,\n        example_keys=example_keys,\n    )\n\n\n# ---------------------------------------------------------------------------\n# 2. LLM call and response parsing\n# ---------------------------------------------------------------------------\n\n\ndef _call_llm_for_analytics(conv: Conversation, prompt: str):\n    \"\"\"Call the LLM with the analytics prompt; returns parsed JSON dict or None.\"\"\"\n    try:\n        return conv.utils.prompt_llm(\n            prompt, return_json=True, show_history=False, model=\"gpt-5-mini\"\n        )\n    except Exception as e:\n        conv.log.warning(\"post_call_analytics LLM call failed\", exception=str(e))\n        return None\n\n\ndef _parse_llm_analytics_response(result, active_analysis: dict) -> dict | None:\n    \"\"\"Parse LLM JSON per metric ``data_type`` (``int`` or ``string``).\"\"\"\n    if result is None or not isinstance(result, dict):\n        return None\n    counts: dict[str, int | str | None] = {}\n    for key, spec in active_analysis.items():\n        dtype = spec[\"data_type\"]\n        default = _default_for_metric(key)\n\n        if key not in result or result.get(key) is None:\n            counts[key] = default\n            continue\n\n        val = result.get(key)\n        if dtype == METRIC_DATA_TYPE_STRING:\n            s = str(val).strip() if val is not None else \"\"\n            counts[key] = s if s else None\n            continue\n\n        try:\n            int_val = int(val)\n            counts[key] = int_val if int_val >= 0 else None\n        except (TypeError, ValueError):\n            counts[key] = None\n\n    return counts\n\n\ndef _all_metric_defaults() -> dict[str, None]:\n    return {k: _default_for_metric(k) for k in LLM_ANALYSIS_SET}\n\n\n# ---------------------------------------------------------------------------\n# 3. Metrics output structuring\n# ---------------------------------------------------------------------------\n\n\ndef _get_as_metrics_from_queue(metrics_queue: list, metric_names: list[str]) -> dict:\n    \"\"\"Extract Agent Studio metrics from the queue by name → keys ``AS_<name>``.\"\"\"\n    out = {}\n    for name in metric_names:\n        value = None\n        for m in metrics_queue:\n            entry_name = m.get(\"name\") if isinstance(m, dict) else getattr(m, \"name\", None)\n            if entry_name == name:\n                value = m.get(\"value\") if isinstance(m, dict) else getattr(m, \"value\", None)\n        if value is not None:\n            out[\"AS_\" + name] = value\n    return out\n\n\ndef _structure_metrics_output(\n    conv: Conversation,\n    llm_counts: dict | None,\n) -> dict:\n    \"\"\"Merge LLM metrics, ``call_sid``, and AS_ metrics from ``conv.metrics_queue``.\"\"\"\n    merged = _all_metric_defaults()\n    if llm_counts:\n        merged.update(llm_counts)\n\n    counts = merged\n    counts[\"call_sid\"] = conv.id\n    metrics_queue = getattr(conv, \"metrics_queue\", []) or []\n    counts.update(_get_as_metrics_from_queue(metrics_queue, AS_ANALYSIS_LIST))\n    return counts\n\n\ndef write_llm_analytics(conv: Conversation, metric_name: str) -> None:\n    \"\"\"Persist a single post-call LLM analytics metric from ``conv.state.llm_metrics``.\n\n    If ``llm_metrics`` is unset, ``post_call_llm_analytics`` runs first to populate it.\n    Unknown metric names log a warning and do nothing. For known metrics, the populated\n    ``llm_metrics`` dict normally includes default values for every key in\n    ``LLM_ANALYSIS_SET``, with any parsed LLM output layered on top before writing.\n    \"\"\"\n    if metric_name not in LLM_ANALYSIS_SET:\n        conv.log.warning(\n            \"write_llm_analytics: metric not in LLM_ANALYSIS_SET\",\n            metric_name=metric_name,\n        )\n        return\n    counts = getattr(conv.state, \"llm_metrics\", None)\n    if counts is None:\n        post_call_llm_analytics(conv)\n        counts = getattr(conv.state, \"llm_metrics\", None)\n    if not isinstance(counts, dict):\n        conv.log.warning(\n            \"write_llm_analytics: conv.state.llm_metrics missing or not a dict\",\n            metric_name=metric_name,\n        )\n        return\n    if metric_name not in counts:\n        return\n    value = counts[metric_name]\n    if value is None:\n        return\n    conv.write_metric(metric_name, value)\n\n\n# ---------------------------------------------------------------------------\n# Main entrypoint\n# ---------------------------------------------------------------------------\n\n\ndef post_call_llm_analytics(conv: Conversation):\n    \"\"\"Post-call: LLM analytics per ``LLM_ANALYSIS_SET`` (description + data_type), plus AS_ metrics.\"\"\"\n    try:\n        active = _active_llm_analysis_set(conv)\n        prompt = _build_analytics_prompt(conv, active)\n        raw_result = _call_llm_for_analytics(conv, prompt)\n        llm_counts = _parse_llm_analytics_response(raw_result, active)\n        if raw_result is not None and llm_counts is None:\n            conv.log.warning(\n                \"post_call_analytics expected dict\", result_type=type(raw_result).__name__\n            )\n        counts = _structure_metrics_output(conv, llm_counts)\n        conv.state.llm_metrics = counts\n        conv.log.info(\"post_call_analytics\", metric_counts=counts)\n        return counts\n    except Exception as e:\n        conv.log.warning(\"post_call_analytics failed\", exception=str(e))\n        fallback = _all_metric_defaults()\n        fallback[\"call_sid\"] = conv.id\n        fallback.update(\n            _get_as_metrics_from_queue(getattr(conv, \"metrics_queue\", []) or [], AS_ANALYSIS_LIST)\n        )\n        conv.state.llm_metrics = fallback\n        return fallback\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-03-19T14:40:18.882Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-03-19T14:40:18.882Z","updatedBy":"kitan.ademidun@poly-ai.com"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLES-d2fd5cde":true}}},"FUNCTIONS-af8f29a1":{"id":"FUNCTIONS-af8f29a1","name":"google_maps_api_handler","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"from abc import ABC, abstractmethod\nfrom dataclasses import dataclass\nfrom typing import Any, Optional\n\nimport requests\nfrom functions.api_handler import BaseApiHandler, BrightreeAPIError\nfrom requests import PreparedRequest, Session\nfrom requests.auth import AuthBase\n\n\"\"\"Google Maps API Integration.\"\"\"\n\nBASE_URL = \"https://maps.googleapis.com/maps/api/\"\n# Address Validation uses a separate host (see Google docs).\nADDRESS_VALIDATION_URL = \"https://addressvalidation.googleapis.com/v1:validateAddress\"\nSECRET_NAME = \"google_maps_api_creds\"\n\n\n@dataclass(frozen=True)\nclass Place:\n    \"\"\"Represents a place from Google Maps Places API.\"\"\"\n\n    name: Optional[str]\n    formatted_address: Optional[str]\n    place_id: Optional[str]\n    geometry: Optional[dict[str, Any]]\n    types: list[str]\n    rating: Optional[float]\n    user_ratings_total: Optional[int]\n    vicinity: Optional[str]\n\n    @classmethod\n    def from_json(cls, data: dict) -> Place:\n        return cls(\n            name=data.get(\"name\"),\n            formatted_address=data.get(\"formatted_address\"),\n            place_id=data.get(\"place_id\"),\n            geometry=data.get(\"geometry\"),\n            types=data.get(\"types\", []),\n            rating=data.get(\"rating\"),\n            user_ratings_total=data.get(\"user_ratings_total\"),\n            vicinity=data.get(\"vicinity\"),\n        )\n\n\n@dataclass(frozen=True)\nclass PlacesSearchResult:\n    \"\"\"Result from Google Maps Places API text search.\"\"\"\n\n    places: list[Place]\n    status: str\n    success: bool\n    error_message: Optional[str] = None\n\n    @classmethod\n    def from_json(cls, data: dict) -> PlacesSearchResult:\n        return cls(\n            places=[Place.from_json(p) for p in data.get(\"results\", [])],\n            status=data.get(\"status\", \"UNKNOWN\"),\n            success=True,\n            error_message=data.get(\"error_message\"),\n        )\n\n\n@dataclass(frozen=True)\nclass GeocodeHit:\n    \"\"\"One Geocoding API result — https://developers.google.com/maps/documentation/geocoding/requests-geocoding\"\"\"\n\n    formatted_address: Optional[str]\n    place_id: Optional[str]\n    geometry: Optional[dict[str, Any]]\n    types: list[str]\n    address_components: list[dict[str, Any]]\n    partial_match: bool = False\n\n    @classmethod\n    def from_json(cls, data: dict[str, Any]) -> GeocodeHit:\n        return cls(\n            formatted_address=data.get(\"formatted_address\"),\n            place_id=data.get(\"place_id\"),\n            geometry=data.get(\"geometry\"),\n            types=data.get(\"types\", []),\n            address_components=data.get(\"address_components\", []),\n            partial_match=bool(data.get(\"partial_match\", False)),\n        )\n\n\n@dataclass(frozen=True)\nclass GeocodingResult:\n    \"\"\"Geocoding API forward/reverse response.\"\"\"\n\n    results: list[GeocodeHit]\n    status: str\n    success: bool\n    error_message: Optional[str] = None\n\n\n@dataclass(frozen=True)\nclass AddressValidationResult:\n    \"\"\"Address Validation API — https://developers.google.com/maps/documentation/address-validation/overview\"\"\"\n\n    success: bool\n    response_id: Optional[str] = None\n    result: Optional[dict[str, Any]] = None\n    error_message: Optional[str] = None\n    http_status: Optional[int] = None\n\n\nclass GoogleMapsAuth(AuthBase):\n    \"\"\"Google Maps API key authentication (API key added via query params, not headers).\"\"\"\n\n    def __init__(self, conv: Conversation, secret_name: str):\n        self.conv = conv\n        self.secret_name = secret_name\n        self._api_key: Optional[str] = None\n        self._initialized = False\n\n    def _ensure_initialized(self):\n        \"\"\"Get API key if not already initialized.\"\"\"\n        if self._initialized and self._api_key:\n            return\n\n        creds = self.conv.utils.get_secret(self.secret_name)\n        api_key = creds.get(\"api_key\")\n\n        if not api_key:\n            self.conv.log.error(\n                \"Google Maps API key not found in secret vault\", secret_name=self.secret_name\n            )\n            raise RuntimeError(f\"Google Maps API key not found in secret {self.secret_name}\")\n\n        self._api_key = api_key\n        self._initialized = True\n\n        self.conv.log.info(\"Google Maps API key obtained\", secret_name=self.secret_name)\n\n    def get_api_key(self) -> str:\n        \"\"\"Get the API key for use in query parameters.\"\"\"\n        self._ensure_initialized()\n        return self._api_key\n\n    def __call__(self, r: PreparedRequest) -> PreparedRequest:\n        \"\"\"AuthBase interface - Google Maps uses query params, not headers.\"\"\"\n        # No-op for headers, API key is added via query params in the handler\n        return r\n\n\nclass AbstractGoogleMapsApiHandler(BaseApiHandler, ABC):\n    \"\"\"Google Maps HTTP client: ``Session`` + API key in query params (not headers).\"\"\"\n\n    def __init__(self, conv: Conversation, secret_name: str) -> None:\n        session = Session()\n        session.auth = GoogleMapsAuth(conv, secret_name)\n        super().__init__(conv, session, BASE_URL)\n\n    def request(\n        self,\n        method: str,\n        endpoint: str,\n        timeout: int = 10,\n        request_description=None,\n        **kwargs,\n    ) -> Optional[requests.Response]:\n        params = kwargs.get(\"params\", {})\n        if not isinstance(params, dict):\n            params = {}\n        auth = self.session.auth\n        if not isinstance(auth, GoogleMapsAuth):\n            self.conv.log.error(\n                \"Google Maps handler misconfigured: session.auth is not GoogleMapsAuth\"\n            )\n            return None\n        try:\n            params[\"key\"] = auth.get_api_key()\n        except RuntimeError as e:\n            self.conv.log.error(\"Google Maps API key unavailable\", error=str(e))\n            return None\n        kwargs[\"params\"] = params\n        try:\n            return super().request(\n                method,\n                endpoint,\n                timeout=timeout,\n                request_description=request_description,\n                **kwargs,\n            )\n        except BrightreeAPIError:\n            # BaseApiHandler already logged; Maps uses Optional[Response] instead of Brightree errors.\n            return None\n\n    def _session_request_no_raise(\n        self,\n        method: str,\n        url: str,\n        *,\n        timeout: int = 10,\n        json: Optional[dict[str, Any]] = None,\n        params: Optional[dict[str, Any]] = None,\n        request_description: Optional[str] = None,\n    ) -> Optional[requests.Response]:\n        \"\"\"\n        Address Validation can return useful JSON on non-2xx; BaseApiHandler.request uses\n        raise_for_status(), so that API uses this path instead.\n        \"\"\"\n        auth = self.session.auth\n        if not isinstance(auth, GoogleMapsAuth):\n            self.conv.log.error(\n                \"Google Maps handler misconfigured: session.auth is not GoogleMapsAuth\"\n            )\n            return None\n        try:\n            merged = dict(params or {})\n            merged[\"key\"] = auth.get_api_key()\n        except RuntimeError as e:\n            self.conv.log.error(\"Google Maps API key unavailable\", error=str(e))\n            return None\n        self.conv.log.info(\n            \"Google Maps request (no raise_for_status)\",\n            method=method,\n            url=url,\n            description=request_description,\n        )\n        try:\n            return self.session.request(\n                method=method,\n                url=url,\n                timeout=timeout,\n                params=merged,\n                json=json,\n            )\n        except requests.RequestException as e:\n            self.conv.log.error(\"Google Maps request failed\", url=url, error=str(e))\n            return None\n\n    @staticmethod\n    def _google_api_error_message(data: dict[str, Any]) -> Optional[str]:\n        err = data.get(\"error\")\n        if isinstance(err, dict):\n            return err.get(\"message\") or err.get(\"status\")\n        return None\n\n    @abstractmethod\n    def get_places_search_results(self, query: str) -> PlacesSearchResult:\n        \"\"\"Places Text Search (or subclass-specific implementation).\"\"\"\n        ...\n\n\nclass GoogleMapsApiHandler(AbstractGoogleMapsApiHandler):\n    \"\"\"Places Text Search.\"\"\"\n\n    def get_places_search_results(self, query: str) -> PlacesSearchResult:\n        \"\"\"Get places search results from Google Places API.\"\"\"\n        endpoint = \"place/textsearch/json\"\n        params = {\"query\": query}\n\n        self.conv.log.info(\"Making request to Google Places API\", query=query)\n        response = self.request(\n            \"GET\",\n            endpoint,\n            params=params,\n            timeout=10,\n            request_description=\"Google Places text search\",\n        )\n\n        if response is None:\n            return PlacesSearchResult(\n                places=[],\n                status=\"REQUEST_FAILED\",\n                success=False,\n                error_message=\"No response (network, HTTP error, or missing API key)\",\n            )\n\n        data = self.parse_json_response(response)\n        if data is None:\n            snippet = (response.text or \"\")[:500]\n            self.conv.log.error(\n                \"Google Places API returned invalid JSON\",\n                status_code=response.status_code,\n                text_snippet=snippet,\n            )\n            return PlacesSearchResult(\n                places=[],\n                status=\"INVALID_RESPONSE\",\n                success=False,\n                error_message=\"Response was not valid JSON\",\n            )\n\n        status = data.get(\"status\", \"UNKNOWN\")\n\n        # Check for API errors\n        if status != \"OK\" and status != \"ZERO_RESULTS\":\n            error_message = data.get(\"error_message\")\n            self.conv.log.error(\n                \"Google Places API returned error status\",\n                status=status,\n                error_message=error_message,\n            )\n            return PlacesSearchResult(\n                places=[],\n                status=status,\n                success=False,\n                error_message=error_message,\n            )\n\n        # Extract places from results\n        places_search_result = PlacesSearchResult.from_json(data)\n\n        self.conv.log.info(\n            \"Successfully retrieved places from Google Places API\",\n            query=query,\n            num_results=len(places_search_result.places),\n            status=places_search_result.status,\n        )\n\n        return places_search_result\n\n    def _geocode(\n        self,\n        params: dict[str, Any],\n        *,\n        request_description: str,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        \"\"\"GET geocode/json — https://developers.google.com/maps/documentation/geocoding/requests-geocoding\"\"\"\n        response = self.request(\n            \"GET\",\n            \"geocode/json\",\n            params=params,\n            timeout=timeout,\n            request_description=request_description,\n        )\n        if response is None:\n            return GeocodingResult(\n                results=[],\n                status=\"REQUEST_FAILED\",\n                success=False,\n                error_message=\"No response (network, HTTP error, or missing API key)\",\n            )\n        data = self.parse_json_response(response)\n        if data is None:\n            self.conv.log.error(\n                \"Geocoding API returned invalid JSON\",\n                status_code=response.status_code,\n                text_snippet=(response.text or \"\")[:500],\n            )\n            return GeocodingResult(\n                results=[],\n                status=\"INVALID_RESPONSE\",\n                success=False,\n                error_message=\"Response was not valid JSON\",\n            )\n        status = data.get(\"status\", \"UNKNOWN\")\n        if status not in (\"OK\", \"ZERO_RESULTS\"):\n            err = data.get(\"error_message\")\n            self.conv.log.error(\"Geocoding API error status\", status=status, error_message=err)\n            return GeocodingResult(\n                results=[],\n                status=status,\n                success=False,\n                error_message=err,\n            )\n        hits = [GeocodeHit.from_json(r) for r in data.get(\"results\", [])]\n        return GeocodingResult(results=hits, status=status, success=True)\n\n    def geocode_address(\n        self,\n        address: str,\n        *,\n        bounds: Optional[str] = None,\n        region: Optional[str] = None,\n        components: Optional[str] = None,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        \"\"\"Forward geocode: address string → coordinates.\"\"\"\n        params: dict[str, Any] = {\"address\": address}\n        if bounds:\n            params[\"bounds\"] = bounds\n        if region:\n            params[\"region\"] = region\n        if components:\n            params[\"components\"] = components\n        if language:\n            params[\"language\"] = language\n        if result_type:\n            params[\"result_type\"] = result_type\n        if location_type:\n            params[\"location_type\"] = location_type\n        return self._geocode(params, request_description=\"Geocoding forward\", timeout=timeout)\n\n    def reverse_geocode(\n        self,\n        lat: float,\n        lng: float,\n        *,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        \"\"\"Reverse geocode: lat,lng → addresses.\"\"\"\n        params: dict[str, Any] = {\"latlng\": f\"{lat},{lng}\"}\n        if language:\n            params[\"language\"] = language\n        if result_type:\n            params[\"result_type\"] = result_type\n        if location_type:\n            params[\"location_type\"] = location_type\n        return self._geocode(params, request_description=\"Geocoding reverse\", timeout=timeout)\n\n    def validate_address(\n        self,\n        address_lines: list[str],\n        region_code: Optional[str] = None,\n        *,\n        locality: Optional[str] = None,\n        administrative_area: Optional[str] = None,\n        postal_code: Optional[str] = None,\n        enable_usps_cass: bool = False,\n        extra_fields: Optional[dict[str, Any]] = None,\n        timeout: int = 10,\n    ) -> AddressValidationResult:\n        \"\"\"\n        POST Address Validation API. ``address_lines`` required by Google; ``region_code`` recommended.\n        https://developers.google.com/maps/documentation/address-validation/requests-validate-address\n        \"\"\"\n        if not address_lines:\n            return AddressValidationResult(\n                success=False,\n                error_message=\"address_lines must be non-empty\",\n            )\n\n        postal_address: dict[str, Any] = {\"addressLines\": list(address_lines)}\n        if region_code:\n            postal_address[\"regionCode\"] = region_code\n        if locality:\n            postal_address[\"locality\"] = locality\n        if administrative_area:\n            postal_address[\"administrativeArea\"] = administrative_area\n        if postal_code:\n            postal_address[\"postalCode\"] = postal_code\n\n        body: dict[str, Any] = {\"address\": postal_address}\n        if enable_usps_cass:\n            body[\"enableUspsCass\"] = True\n        if extra_fields:\n            body.update(extra_fields)\n\n        response = self._session_request_no_raise(\n            \"POST\",\n            ADDRESS_VALIDATION_URL,\n            timeout=timeout,\n            json=body,\n            request_description=\"Address Validation validateAddress\",\n        )\n        if response is None:\n            return AddressValidationResult(\n                success=False,\n                error_message=\"Request failed (network or transport error)\",\n            )\n\n        data = self.parse_json_response(response) or {}\n        if response.status_code != 200:\n            msg = self._google_api_error_message(data) or (response.text or \"\")[:500]\n            return AddressValidationResult(\n                success=False,\n                error_message=msg,\n                http_status=response.status_code,\n            )\n\n        if \"result\" not in data:\n            return AddressValidationResult(\n                success=False,\n                error_message=\"Response missing result\",\n                http_status=response.status_code,\n            )\n\n        return AddressValidationResult(\n            success=True,\n            response_id=data.get(\"responseId\"),\n            result=data.get(\"result\"),\n            http_status=response.status_code,\n        )\n\n\ndef get_google_maps_api_handler(conv: Conversation) -> GoogleMapsApiHandler:\n    \"\"\"Create a new GoogleMapsApiHandler for each conversation.\"\"\"\n    # Always create a fresh handler - no global state to avoid stale handlers in warm Lambda containers\n    handler = GoogleMapsApiHandler(conv, secret_name=SECRET_NAME)\n    conv.log.info(\"get_google_maps_api_handler: Handler created successfully\")\n    return handler\n\n\ndef _default_mock_places(query: str) -> PlacesSearchResult:\n    return PlacesSearchResult(\n        places=[\n            Place(\n                name=\"Mock Place\",\n                formatted_address=f\"123 Mock Street (search: {query})\",\n                place_id=\"ChIJMOCK000000000000000000\",\n                geometry={\"location\": {\"lat\": 37.422_131, \"lng\": -122.084_801}},\n                types=[\"establishment\"],\n                rating=None,\n                user_ratings_total=None,\n                vicinity=None,\n            )\n        ],\n        status=\"OK\",\n        success=True,\n    )\n\n\ndef _default_mock_geocode_forward(address: str) -> GeocodingResult:\n    return GeocodingResult(\n        results=[\n            GeocodeHit(\n                formatted_address=address,\n                place_id=\"ChIJMOCKGEOCODE00000000000\",\n                geometry={\n                    \"location\": {\"lat\": 37.422_131, \"lng\": -122.084_801},\n                    \"location_type\": \"ROOFTOP\",\n                },\n                types=[\"street_address\"],\n                address_components=[],\n            )\n        ],\n        status=\"OK\",\n        success=True,\n    )\n\n\ndef _default_mock_geocode_reverse(lat: float, lng: float) -> GeocodingResult:\n    return GeocodingResult(\n        results=[\n            GeocodeHit(\n                formatted_address=f\"{lat:.6f}, {lng:.6f}\",\n                place_id=\"ChIJMOCKREVERSE0000000000\",\n                geometry={\n                    \"location\": {\"lat\": lat, \"lng\": lng},\n                    \"location_type\": \"ROOFTOP\",\n                },\n                types=[\"street_address\"],\n                address_components=[],\n            )\n        ],\n        status=\"OK\",\n        success=True,\n    )\n\n\ndef _default_mock_address_validation(address_lines: list[str]) -> AddressValidationResult:\n    return AddressValidationResult(\n        success=True,\n        response_id=\"mock-response-id\",\n        result={\n            \"verdict\": {\n                \"addressComplete\": True,\n                \"possibleNextAction\": \"ACCEPT\",\n                \"validationGranularity\": \"PREMISE\",\n            },\n            \"address\": {\"formattedAddress\": \", \".join(address_lines)},\n        },\n        http_status=200,\n    )\n\n\nclass MockGoogleMapsApiHandler:\n    \"\"\"No HTTP; for tests/QA. Same public methods as ``GoogleMapsApiHandler``.\"\"\"\n\n    def __init__(\n        self,\n        conv: Conversation,\n        *,\n        places: Optional[PlacesSearchResult] = None,\n        geocode_forward: Optional[GeocodingResult] = None,\n        geocode_reverse: Optional[GeocodingResult] = None,\n        address_validation: Optional[AddressValidationResult] = None,\n    ) -> None:\n        self.conv = conv\n        self._places = places\n        self._geocode_forward = geocode_forward\n        self._geocode_reverse = geocode_reverse\n        self._address_validation = address_validation\n\n    def get_places_search_results(self, query: str) -> PlacesSearchResult:\n        self.conv.log.info(\"MockGoogleMapsApiHandler.get_places_search_results\", query=query)\n        return self._places if self._places is not None else _default_mock_places(query)\n\n    def geocode_address(\n        self,\n        address: str,\n        *,\n        bounds: Optional[str] = None,\n        region: Optional[str] = None,\n        components: Optional[str] = None,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        _ = (bounds, region, components, language, result_type, location_type, timeout)\n        self.conv.log.info(\"MockGoogleMapsApiHandler.geocode_address\", address=address)\n        return (\n            self._geocode_forward\n            if self._geocode_forward is not None\n            else _default_mock_geocode_forward(address)\n        )\n\n    def reverse_geocode(\n        self,\n        lat: float,\n        lng: float,\n        *,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        _ = (language, result_type, location_type, timeout)\n        self.conv.log.info(\"MockGoogleMapsApiHandler.reverse_geocode\", lat=lat, lng=lng)\n        return (\n            self._geocode_reverse\n            if self._geocode_reverse is not None\n            else _default_mock_geocode_reverse(lat, lng)\n        )\n\n    def validate_address(\n        self,\n        address_lines: list[str],\n        region_code: Optional[str] = None,\n        *,\n        locality: Optional[str] = None,\n        administrative_area: Optional[str] = None,\n        postal_code: Optional[str] = None,\n        enable_usps_cass: bool = False,\n        extra_fields: Optional[dict[str, Any]] = None,\n        timeout: int = 10,\n    ) -> AddressValidationResult:\n        _ = (\n            region_code,\n            locality,\n            administrative_area,\n            postal_code,\n            enable_usps_cass,\n            extra_fields,\n            timeout,\n        )\n        self.conv.log.info(\"MockGoogleMapsApiHandler.validate_address\", lines=address_lines)\n        if not address_lines:\n            return AddressValidationResult(\n                success=False, error_message=\"address_lines must be non-empty\"\n            )\n        return (\n            self._address_validation\n            if self._address_validation is not None\n            else _default_mock_address_validation(address_lines)\n        )\n\n\ndef get_mock_google_maps_api_handler(\n    conv: Conversation,\n    *,\n    places: Optional[PlacesSearchResult] = None,\n    geocode_forward: Optional[GeocodingResult] = None,\n    geocode_reverse: Optional[GeocodingResult] = None,\n    address_validation: Optional[AddressValidationResult] = None,\n) -> MockGoogleMapsApiHandler:\n    return MockGoogleMapsApiHandler(\n        conv,\n        places=places,\n        geocode_forward=geocode_forward,\n        geocode_reverse=geocode_reverse,\n        address_validation=address_validation,\n    )\n\n\ndef google_maps_api_handler(conv: Conversation):\n    conv.log.error(\"google_maps_api_handler: MUST NEVER BE CALLED\")\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-03-24T15:12:46.361Z","createdBy":"miles.nash@poly-ai.com","updatedAt":"2026-03-24T15:12:46.361Z","updatedBy":"miles.nash@poly-ai.com"},"createdAt":"2026-03-24T15:12:46.361Z","createdBy":"miles.nash@poly-ai.com","updatedAt":"2026-03-24T16:20:23.052Z","updatedBy":"miles.nash@poly-ai.com","archived":true,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTION-317FE30C":{"id":"FUNCTION-317FE30C","name":"google_maps_api_handler","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"from abc import ABC, abstractmethod\nfrom dataclasses import dataclass\nfrom typing import Any, Optional\n\nimport requests\nfrom functions.api_handler import BaseApiHandler, BrightreeAPIError\nfrom requests import PreparedRequest, Session\nfrom requests.auth import AuthBase\n\n\"\"\"Google Maps API Integration.\"\"\"\n\nBASE_URL = \"https://maps.googleapis.com/maps/api/\"\n# Address Validation uses a separate host (see Google docs).\nADDRESS_VALIDATION_URL = \"https://addressvalidation.googleapis.com/v1:validateAddress\"\nSECRET_NAME = \"google_maps_api_creds\"\n\n\n@dataclass(frozen=True)\nclass Place:\n    \"\"\"Represents a place from Google Maps Places API.\"\"\"\n\n    name: Optional[str]\n    formatted_address: Optional[str]\n    place_id: Optional[str]\n    geometry: Optional[dict[str, Any]]\n    types: list[str]\n    rating: Optional[float]\n    user_ratings_total: Optional[int]\n    vicinity: Optional[str]\n\n    @classmethod\n    def from_json(cls, data: dict) -> Place:\n        return cls(\n            name=data.get(\"name\"),\n            formatted_address=data.get(\"formatted_address\"),\n            place_id=data.get(\"place_id\"),\n            geometry=data.get(\"geometry\"),\n            types=data.get(\"types\", []),\n            rating=data.get(\"rating\"),\n            user_ratings_total=data.get(\"user_ratings_total\"),\n            vicinity=data.get(\"vicinity\"),\n        )\n\n\n@dataclass(frozen=True)\nclass PlacesSearchResult:\n    \"\"\"Result from Google Maps Places API text search.\"\"\"\n\n    places: list[Place]\n    status: str\n    success: bool\n    error_message: Optional[str] = None\n\n    @classmethod\n    def from_json(cls, data: dict) -> PlacesSearchResult:\n        return cls(\n            places=[Place.from_json(p) for p in data.get(\"results\", [])],\n            status=data.get(\"status\", \"UNKNOWN\"),\n            success=True,\n            error_message=data.get(\"error_message\"),\n        )\n\n\n@dataclass(frozen=True)\nclass GeocodeHit:\n    \"\"\"One Geocoding API result — https://developers.google.com/maps/documentation/geocoding/requests-geocoding\"\"\"\n\n    formatted_address: Optional[str]\n    place_id: Optional[str]\n    geometry: Optional[dict[str, Any]]\n    types: list[str]\n    address_components: list[dict[str, Any]]\n    partial_match: bool = False\n\n    @classmethod\n    def from_json(cls, data: dict[str, Any]) -> GeocodeHit:\n        return cls(\n            formatted_address=data.get(\"formatted_address\"),\n            place_id=data.get(\"place_id\"),\n            geometry=data.get(\"geometry\"),\n            types=data.get(\"types\", []),\n            address_components=data.get(\"address_components\", []),\n            partial_match=bool(data.get(\"partial_match\", False)),\n        )\n\n\n@dataclass(frozen=True)\nclass GeocodingResult:\n    \"\"\"Geocoding API forward/reverse response.\"\"\"\n\n    results: list[GeocodeHit]\n    status: str\n    success: bool\n    error_message: Optional[str] = None\n\n\n@dataclass(frozen=True)\nclass AddressValidationResult:\n    \"\"\"Address Validation API — https://developers.google.com/maps/documentation/address-validation/overview\"\"\"\n\n    success: bool\n    response_id: Optional[str] = None\n    result: Optional[dict[str, Any]] = None\n    error_message: Optional[str] = None\n    http_status: Optional[int] = None\n\n\nclass GoogleMapsAuth(AuthBase):\n    \"\"\"Google Maps API key authentication (API key added via query params, not headers).\"\"\"\n\n    def __init__(self, conv: Conversation, secret_name: str):\n        self.conv = conv\n        self.secret_name = secret_name\n        self._api_key: Optional[str] = None\n        self._initialized = False\n\n    def _ensure_initialized(self):\n        \"\"\"Get API key if not already initialized.\"\"\"\n        if self._initialized and self._api_key:\n            return\n\n        creds = self.conv.utils.get_secret(self.secret_name)\n        api_key = creds.get(\"api_key\")\n\n        if not api_key:\n            self.conv.log.error(\n                \"Google Maps API key not found in secret vault\", secret_name=self.secret_name\n            )\n            raise RuntimeError(f\"Google Maps API key not found in secret {self.secret_name}\")\n\n        self._api_key = api_key\n        self._initialized = True\n\n        self.conv.log.info(\"Google Maps API key obtained\", secret_name=self.secret_name)\n\n    def get_api_key(self) -> str:\n        \"\"\"Get the API key for use in query parameters.\"\"\"\n        self._ensure_initialized()\n        return self._api_key\n\n    def __call__(self, r: PreparedRequest) -> PreparedRequest:\n        \"\"\"AuthBase interface - Google Maps uses query params, not headers.\"\"\"\n        # No-op for headers, API key is added via query params in the handler\n        return r\n\n\nclass AbstractGoogleMapsApiHandler(BaseApiHandler, ABC):\n    \"\"\"Google Maps HTTP client: ``Session`` + API key in query params (not headers).\"\"\"\n\n    def __init__(self, conv: Conversation, secret_name: str) -> None:\n        session = Session()\n        session.auth = GoogleMapsAuth(conv, secret_name)\n        super().__init__(conv, session, BASE_URL)\n\n    def request(\n        self,\n        method: str,\n        endpoint: str,\n        timeout: int = 10,\n        request_description=None,\n        **kwargs,\n    ) -> Optional[requests.Response]:\n        params = kwargs.get(\"params\", {})\n        if not isinstance(params, dict):\n            params = {}\n        auth = self.session.auth\n        if not isinstance(auth, GoogleMapsAuth):\n            self.conv.log.error(\n                \"Google Maps handler misconfigured: session.auth is not GoogleMapsAuth\"\n            )\n            return None\n        try:\n            params[\"key\"] = auth.get_api_key()\n        except RuntimeError as e:\n            self.conv.log.error(\"Google Maps API key unavailable\", error=str(e))\n            return None\n        kwargs[\"params\"] = params\n        try:\n            return super().request(\n                method,\n                endpoint,\n                timeout=timeout,\n                request_description=request_description,\n                **kwargs,\n            )\n        except BrightreeAPIError:\n            # BaseApiHandler already logged; Maps uses Optional[Response] instead of Brightree errors.\n            return None\n\n    def _session_request_no_raise(\n        self,\n        method: str,\n        url: str,\n        *,\n        timeout: int = 10,\n        json: Optional[dict[str, Any]] = None,\n        params: Optional[dict[str, Any]] = None,\n        request_description: Optional[str] = None,\n    ) -> Optional[requests.Response]:\n        \"\"\"\n        Address Validation can return useful JSON on non-2xx; BaseApiHandler.request uses\n        raise_for_status(), so that API uses this path instead.\n        \"\"\"\n        auth = self.session.auth\n        if not isinstance(auth, GoogleMapsAuth):\n            self.conv.log.error(\n                \"Google Maps handler misconfigured: session.auth is not GoogleMapsAuth\"\n            )\n            return None\n        try:\n            merged = dict(params or {})\n            merged[\"key\"] = auth.get_api_key()\n        except RuntimeError as e:\n            self.conv.log.error(\"Google Maps API key unavailable\", error=str(e))\n            return None\n        self.conv.log.info(\n            \"Google Maps request (no raise_for_status)\",\n            method=method,\n            url=url,\n            description=request_description,\n        )\n        try:\n            return self.session.request(\n                method=method,\n                url=url,\n                timeout=timeout,\n                params=merged,\n                json=json,\n            )\n        except requests.RequestException as e:\n            self.conv.log.error(\"Google Maps request failed\", url=url, error=str(e))\n            return None\n\n    @staticmethod\n    def _google_api_error_message(data: dict[str, Any]) -> Optional[str]:\n        err = data.get(\"error\")\n        if isinstance(err, dict):\n            return err.get(\"message\") or err.get(\"status\")\n        return None\n\n    @abstractmethod\n    def get_places_search_results(self, query: str) -> PlacesSearchResult:\n        \"\"\"Places Text Search (or subclass-specific implementation).\"\"\"\n        ...\n\n\nclass GoogleMapsApiHandler(AbstractGoogleMapsApiHandler):\n    \"\"\"Places Text Search.\"\"\"\n\n    def get_places_search_results(self, query: str) -> PlacesSearchResult:\n        \"\"\"Get places search results from Google Places API.\"\"\"\n        endpoint = \"place/textsearch/json\"\n        params = {\"query\": query}\n\n        self.conv.log.info(\"Making request to Google Places API\", query=query)\n        response = self.request(\n            \"GET\",\n            endpoint,\n            params=params,\n            timeout=10,\n            request_description=\"Google Places text search\",\n        )\n\n        if response is None:\n            return PlacesSearchResult(\n                places=[],\n                status=\"REQUEST_FAILED\",\n                success=False,\n                error_message=\"No response (network, HTTP error, or missing API key)\",\n            )\n\n        data = self.parse_json_response(response)\n        if data is None:\n            snippet = (response.text or \"\")[:500]\n            self.conv.log.error(\n                \"Google Places API returned invalid JSON\",\n                status_code=response.status_code,\n                text_snippet=snippet,\n            )\n            return PlacesSearchResult(\n                places=[],\n                status=\"INVALID_RESPONSE\",\n                success=False,\n                error_message=\"Response was not valid JSON\",\n            )\n\n        status = data.get(\"status\", \"UNKNOWN\")\n\n        # Check for API errors\n        if status != \"OK\" and status != \"ZERO_RESULTS\":\n            error_message = data.get(\"error_message\")\n            self.conv.log.error(\n                \"Google Places API returned error status\",\n                status=status,\n                error_message=error_message,\n            )\n            return PlacesSearchResult(\n                places=[],\n                status=status,\n                success=False,\n                error_message=error_message,\n            )\n\n        # Extract places from results\n        places_search_result = PlacesSearchResult.from_json(data)\n\n        self.conv.log.info(\n            \"Successfully retrieved places from Google Places API\",\n            query=query,\n            num_results=len(places_search_result.places),\n            status=places_search_result.status,\n        )\n\n        return places_search_result\n\n    def _geocode(\n        self,\n        params: dict[str, Any],\n        *,\n        request_description: str,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        \"\"\"GET geocode/json — https://developers.google.com/maps/documentation/geocoding/requests-geocoding\"\"\"\n        response = self.request(\n            \"GET\",\n            \"geocode/json\",\n            params=params,\n            timeout=timeout,\n            request_description=request_description,\n        )\n        if response is None:\n            return GeocodingResult(\n                results=[],\n                status=\"REQUEST_FAILED\",\n                success=False,\n                error_message=\"No response (network, HTTP error, or missing API key)\",\n            )\n        data = self.parse_json_response(response)\n        if data is None:\n            self.conv.log.error(\n                \"Geocoding API returned invalid JSON\",\n                status_code=response.status_code,\n                text_snippet=(response.text or \"\")[:500],\n            )\n            return GeocodingResult(\n                results=[],\n                status=\"INVALID_RESPONSE\",\n                success=False,\n                error_message=\"Response was not valid JSON\",\n            )\n        status = data.get(\"status\", \"UNKNOWN\")\n        if status not in (\"OK\", \"ZERO_RESULTS\"):\n            err = data.get(\"error_message\")\n            self.conv.log.error(\"Geocoding API error status\", status=status, error_message=err)\n            return GeocodingResult(\n                results=[],\n                status=status,\n                success=False,\n                error_message=err,\n            )\n        hits = [GeocodeHit.from_json(r) for r in data.get(\"results\", [])]\n        return GeocodingResult(results=hits, status=status, success=True)\n\n    def geocode_address(\n        self,\n        address: str,\n        *,\n        bounds: Optional[str] = None,\n        region: Optional[str] = None,\n        components: Optional[str] = None,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        \"\"\"Forward geocode: address string → coordinates.\"\"\"\n        params: dict[str, Any] = {\"address\": address}\n        if bounds:\n            params[\"bounds\"] = bounds\n        if region:\n            params[\"region\"] = region\n        if components:\n            params[\"components\"] = components\n        if language:\n            params[\"language\"] = language\n        if result_type:\n            params[\"result_type\"] = result_type\n        if location_type:\n            params[\"location_type\"] = location_type\n        return self._geocode(params, request_description=\"Geocoding forward\", timeout=timeout)\n\n    def reverse_geocode(\n        self,\n        lat: float,\n        lng: float,\n        *,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        \"\"\"Reverse geocode: lat,lng → addresses.\"\"\"\n        params: dict[str, Any] = {\"latlng\": f\"{lat},{lng}\"}\n        if language:\n            params[\"language\"] = language\n        if result_type:\n            params[\"result_type\"] = result_type\n        if location_type:\n            params[\"location_type\"] = location_type\n        return self._geocode(params, request_description=\"Geocoding reverse\", timeout=timeout)\n\n    def validate_address(\n        self,\n        address_lines: list[str],\n        region_code: Optional[str] = None,\n        *,\n        locality: Optional[str] = None,\n        administrative_area: Optional[str] = None,\n        postal_code: Optional[str] = None,\n        enable_usps_cass: bool = False,\n        extra_fields: Optional[dict[str, Any]] = None,\n        timeout: int = 10,\n    ) -> AddressValidationResult:\n        \"\"\"\n        POST Address Validation API. ``address_lines`` required by Google; ``region_code`` recommended.\n        https://developers.google.com/maps/documentation/address-validation/requests-validate-address\n        \"\"\"\n        if not address_lines:\n            return AddressValidationResult(\n                success=False,\n                error_message=\"address_lines must be non-empty\",\n            )\n\n        postal_address: dict[str, Any] = {\"addressLines\": list(address_lines)}\n        if region_code:\n            postal_address[\"regionCode\"] = region_code\n        if locality:\n            postal_address[\"locality\"] = locality\n        if administrative_area:\n            postal_address[\"administrativeArea\"] = administrative_area\n        if postal_code:\n            postal_address[\"postalCode\"] = postal_code\n\n        body: dict[str, Any] = {\"address\": postal_address}\n        if enable_usps_cass:\n            body[\"enableUspsCass\"] = True\n        if extra_fields:\n            body.update(extra_fields)\n\n        response = self._session_request_no_raise(\n            \"POST\",\n            ADDRESS_VALIDATION_URL,\n            timeout=timeout,\n            json=body,\n            request_description=\"Address Validation validateAddress\",\n        )\n        if response is None:\n            return AddressValidationResult(\n                success=False,\n                error_message=\"Request failed (network or transport error)\",\n            )\n\n        data = self.parse_json_response(response) or {}\n        if response.status_code != 200:\n            msg = self._google_api_error_message(data) or (response.text or \"\")[:500]\n            return AddressValidationResult(\n                success=False,\n                error_message=msg,\n                http_status=response.status_code,\n            )\n\n        if \"result\" not in data:\n            return AddressValidationResult(\n                success=False,\n                error_message=\"Response missing result\",\n                http_status=response.status_code,\n            )\n\n        return AddressValidationResult(\n            success=True,\n            response_id=data.get(\"responseId\"),\n            result=data.get(\"result\"),\n            http_status=response.status_code,\n        )\n\n\ndef get_google_maps_api_handler(conv: Conversation) -> GoogleMapsApiHandler:\n    \"\"\"Create a new GoogleMapsApiHandler for each conversation.\"\"\"\n    # Always create a fresh handler - no global state to avoid stale handlers in warm Lambda containers\n    handler = GoogleMapsApiHandler(conv, secret_name=SECRET_NAME)\n    conv.log.info(\"get_google_maps_api_handler: Handler created successfully\")\n    return handler\n\n\ndef _default_mock_places(query: str) -> PlacesSearchResult:\n    return PlacesSearchResult(\n        places=[\n            Place(\n                name=\"Mock Place\",\n                formatted_address=f\"123 Mock Street (search: {query})\",\n                place_id=\"ChIJMOCK000000000000000000\",\n                geometry={\"location\": {\"lat\": 37.422_131, \"lng\": -122.084_801}},\n                types=[\"establishment\"],\n                rating=None,\n                user_ratings_total=None,\n                vicinity=None,\n            )\n        ],\n        status=\"OK\",\n        success=True,\n    )\n\n\ndef _default_mock_geocode_forward(address: str) -> GeocodingResult:\n    return GeocodingResult(\n        results=[\n            GeocodeHit(\n                formatted_address=address,\n                place_id=\"ChIJMOCKGEOCODE00000000000\",\n                geometry={\n                    \"location\": {\"lat\": 37.422_131, \"lng\": -122.084_801},\n                    \"location_type\": \"ROOFTOP\",\n                },\n                types=[\"street_address\"],\n                address_components=[],\n            )\n        ],\n        status=\"OK\",\n        success=True,\n    )\n\n\ndef _default_mock_geocode_reverse(lat: float, lng: float) -> GeocodingResult:\n    return GeocodingResult(\n        results=[\n            GeocodeHit(\n                formatted_address=f\"{lat:.6f}, {lng:.6f}\",\n                place_id=\"ChIJMOCKREVERSE0000000000\",\n                geometry={\n                    \"location\": {\"lat\": lat, \"lng\": lng},\n                    \"location_type\": \"ROOFTOP\",\n                },\n                types=[\"street_address\"],\n                address_components=[],\n            )\n        ],\n        status=\"OK\",\n        success=True,\n    )\n\n\ndef _default_mock_address_validation(address_lines: list[str]) -> AddressValidationResult:\n    return AddressValidationResult(\n        success=True,\n        response_id=\"mock-response-id\",\n        result={\n            \"verdict\": {\n                \"addressComplete\": True,\n                \"possibleNextAction\": \"ACCEPT\",\n                \"validationGranularity\": \"PREMISE\",\n            },\n            \"address\": {\"formattedAddress\": \", \".join(address_lines)},\n        },\n        http_status=200,\n    )\n\n\nclass MockGoogleMapsApiHandler:\n    \"\"\"No HTTP; for tests/QA. Same public methods as ``GoogleMapsApiHandler``.\"\"\"\n\n    def __init__(\n        self,\n        conv: Conversation,\n        *,\n        places: Optional[PlacesSearchResult] = None,\n        geocode_forward: Optional[GeocodingResult] = None,\n        geocode_reverse: Optional[GeocodingResult] = None,\n        address_validation: Optional[AddressValidationResult] = None,\n    ) -> None:\n        self.conv = conv\n        self._places = places\n        self._geocode_forward = geocode_forward\n        self._geocode_reverse = geocode_reverse\n        self._address_validation = address_validation\n\n    def get_places_search_results(self, query: str) -> PlacesSearchResult:\n        self.conv.log.info(\"MockGoogleMapsApiHandler.get_places_search_results\", query=query)\n        return self._places if self._places is not None else _default_mock_places(query)\n\n    def geocode_address(\n        self,\n        address: str,\n        *,\n        bounds: Optional[str] = None,\n        region: Optional[str] = None,\n        components: Optional[str] = None,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        _ = (bounds, region, components, language, result_type, location_type, timeout)\n        self.conv.log.info(\"MockGoogleMapsApiHandler.geocode_address\", address=address)\n        return (\n            self._geocode_forward\n            if self._geocode_forward is not None\n            else _default_mock_geocode_forward(address)\n        )\n\n    def reverse_geocode(\n        self,\n        lat: float,\n        lng: float,\n        *,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        _ = (language, result_type, location_type, timeout)\n        self.conv.log.info(\"MockGoogleMapsApiHandler.reverse_geocode\", lat=lat, lng=lng)\n        return (\n            self._geocode_reverse\n            if self._geocode_reverse is not None\n            else _default_mock_geocode_reverse(lat, lng)\n        )\n\n    def validate_address(\n        self,\n        address_lines: list[str],\n        region_code: Optional[str] = None,\n        *,\n        locality: Optional[str] = None,\n        administrative_area: Optional[str] = None,\n        postal_code: Optional[str] = None,\n        enable_usps_cass: bool = False,\n        extra_fields: Optional[dict[str, Any]] = None,\n        timeout: int = 10,\n    ) -> AddressValidationResult:\n        _ = (\n            region_code,\n            locality,\n            administrative_area,\n            postal_code,\n            enable_usps_cass,\n            extra_fields,\n            timeout,\n        )\n        self.conv.log.info(\"MockGoogleMapsApiHandler.validate_address\", lines=address_lines)\n        if not address_lines:\n            return AddressValidationResult(\n                success=False, error_message=\"address_lines must be non-empty\"\n            )\n        return (\n            self._address_validation\n            if self._address_validation is not None\n            else _default_mock_address_validation(address_lines)\n        )\n\n\ndef get_mock_google_maps_api_handler(\n    conv: Conversation,\n    *,\n    places: Optional[PlacesSearchResult] = None,\n    geocode_forward: Optional[GeocodingResult] = None,\n    geocode_reverse: Optional[GeocodingResult] = None,\n    address_validation: Optional[AddressValidationResult] = None,\n) -> MockGoogleMapsApiHandler:\n    return MockGoogleMapsApiHandler(\n        conv,\n        places=places,\n        geocode_forward=geocode_forward,\n        geocode_reverse=geocode_reverse,\n        address_validation=address_validation,\n    )\n\n\ndef google_maps_api_handler(conv: Conversation):\n    conv.log.error(\"google_maps_api_handler: MUST NEVER BE CALLED\")\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-03-24T16:20:23.052Z","createdBy":"miles.nash@poly-ai.com","updatedAt":"2026-03-24T16:20:23.052Z","updatedBy":"miles.nash@poly-ai.com"},"createdAt":"2026-03-24T16:20:23.052Z","createdBy":"miles.nash@poly-ai.com","updatedAt":"2026-03-26T12:54:10.934Z","updatedBy":"kitan.ademidun@poly-ai.com","archived":true,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTIONS-06c1d027":{"id":"FUNCTIONS-06c1d027","name":"start_collect_insurance","description":"Enter the collect-insurance flow","parameters":{"ids":[],"entities":{}},"code":"def start_collect_insurance(conv: Conversation):\n    conv.goto_flow(\"collect-insurance\")\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-03-26T12:54:10.934Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-03-26T12:54:10.934Z","updatedBy":"kitan.ademidun@poly-ai.com"},"createdAt":"2026-03-26T12:54:10.934Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-03-26T13:00:01.386Z","updatedBy":"kitan.ademidun@poly-ai.com","archived":true,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTIONS-1d0460b4":{"id":"FUNCTIONS-1d0460b4","name":"google_maps_api_handler","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"from abc import ABC, abstractmethod\nfrom dataclasses import dataclass\nfrom typing import Any, Optional\n\nimport requests\nfrom functions.api_handler import BaseApiHandler, BrightreeAPIError\nfrom requests import PreparedRequest, Session\nfrom requests.auth import AuthBase\n\n\"\"\"Google Maps API Integration.\"\"\"\n\nBASE_URL = \"https://maps.googleapis.com/maps/api/\"\n# Address Validation uses a separate host (see Google docs).\nADDRESS_VALIDATION_URL = \"https://addressvalidation.googleapis.com/v1:validateAddress\"\nSECRET_NAME = \"google_maps_api_creds\"\n\n\n@dataclass(frozen=True)\nclass Place:\n    \"\"\"Represents a place from Google Maps Places API.\"\"\"\n\n    name: Optional[str]\n    formatted_address: Optional[str]\n    place_id: Optional[str]\n    geometry: Optional[dict[str, Any]]\n    types: list[str]\n    rating: Optional[float]\n    user_ratings_total: Optional[int]\n    vicinity: Optional[str]\n\n    @classmethod\n    def from_json(cls, data: dict) -> Place:\n        return cls(\n            name=data.get(\"name\"),\n            formatted_address=data.get(\"formatted_address\"),\n            place_id=data.get(\"place_id\"),\n            geometry=data.get(\"geometry\"),\n            types=data.get(\"types\", []),\n            rating=data.get(\"rating\"),\n            user_ratings_total=data.get(\"user_ratings_total\"),\n            vicinity=data.get(\"vicinity\"),\n        )\n\n\n@dataclass(frozen=True)\nclass PlacesSearchResult:\n    \"\"\"Result from Google Maps Places API text search.\"\"\"\n\n    places: list[Place]\n    status: str\n    success: bool\n    error_message: Optional[str] = None\n\n    @classmethod\n    def from_json(cls, data: dict) -> PlacesSearchResult:\n        return cls(\n            places=[Place.from_json(p) for p in data.get(\"results\", [])],\n            status=data.get(\"status\", \"UNKNOWN\"),\n            success=True,\n            error_message=data.get(\"error_message\"),\n        )\n\n\n@dataclass(frozen=True)\nclass GeocodeHit:\n    \"\"\"One Geocoding API result — https://developers.google.com/maps/documentation/geocoding/requests-geocoding\"\"\"\n\n    formatted_address: Optional[str]\n    place_id: Optional[str]\n    geometry: Optional[dict[str, Any]]\n    types: list[str]\n    address_components: list[dict[str, Any]]\n    partial_match: bool = False\n\n    @classmethod\n    def from_json(cls, data: dict[str, Any]) -> GeocodeHit:\n        return cls(\n            formatted_address=data.get(\"formatted_address\"),\n            place_id=data.get(\"place_id\"),\n            geometry=data.get(\"geometry\"),\n            types=data.get(\"types\", []),\n            address_components=data.get(\"address_components\", []),\n            partial_match=bool(data.get(\"partial_match\", False)),\n        )\n\n\n@dataclass(frozen=True)\nclass GeocodingResult:\n    \"\"\"Geocoding API forward/reverse response.\"\"\"\n\n    results: list[GeocodeHit]\n    status: str\n    success: bool\n    error_message: Optional[str] = None\n\n\n@dataclass(frozen=True)\nclass AddressValidationResult:\n    \"\"\"Address Validation API — https://developers.google.com/maps/documentation/address-validation/overview\"\"\"\n\n    success: bool\n    response_id: Optional[str] = None\n    result: Optional[dict[str, Any]] = None\n    error_message: Optional[str] = None\n    http_status: Optional[int] = None\n\n\nclass GoogleMapsAuth(AuthBase):\n    \"\"\"Google Maps API key authentication (API key added via query params, not headers).\"\"\"\n\n    def __init__(self, conv: Conversation, secret_name: str):\n        self.conv = conv\n        self.secret_name = secret_name\n        self._api_key: Optional[str] = None\n        self._initialized = False\n\n    def _ensure_initialized(self):\n        \"\"\"Get API key if not already initialized.\"\"\"\n        if self._initialized and self._api_key:\n            return\n\n        creds = self.conv.utils.get_secret(self.secret_name)\n        api_key = creds.get(\"api_key\")\n\n        if not api_key:\n            self.conv.log.error(\n                \"Google Maps API key not found in secret vault\", secret_name=self.secret_name\n            )\n            raise RuntimeError(f\"Google Maps API key not found in secret {self.secret_name}\")\n\n        self._api_key = api_key\n        self._initialized = True\n\n        self.conv.log.info(\"Google Maps API key obtained\", secret_name=self.secret_name)\n\n    def get_api_key(self) -> str:\n        \"\"\"Get the API key for use in query parameters.\"\"\"\n        self._ensure_initialized()\n        return self._api_key\n\n    def __call__(self, r: PreparedRequest) -> PreparedRequest:\n        \"\"\"AuthBase interface - Google Maps uses query params, not headers.\"\"\"\n        # No-op for headers, API key is added via query params in the handler\n        return r\n\n\nclass AbstractGoogleMapsApiHandler(BaseApiHandler, ABC):\n    \"\"\"Google Maps HTTP client: ``Session`` + API key in query params (not headers).\"\"\"\n\n    def __init__(self, conv: Conversation, secret_name: str) -> None:\n        session = Session()\n        session.auth = GoogleMapsAuth(conv, secret_name)\n        super().__init__(conv, session, BASE_URL)\n\n    def request(\n        self,\n        method: str,\n        endpoint: str,\n        timeout: int = 10,\n        request_description=None,\n        **kwargs,\n    ) -> Optional[requests.Response]:\n        params = kwargs.get(\"params\", {})\n        if not isinstance(params, dict):\n            params = {}\n        auth = self.session.auth\n        if not isinstance(auth, GoogleMapsAuth):\n            self.conv.log.error(\n                \"Google Maps handler misconfigured: session.auth is not GoogleMapsAuth\"\n            )\n            return None\n        try:\n            params[\"key\"] = auth.get_api_key()\n        except RuntimeError as e:\n            self.conv.log.error(\"Google Maps API key unavailable\", error=str(e))\n            return None\n        kwargs[\"params\"] = params\n        try:\n            return super().request(\n                method,\n                endpoint,\n                timeout=timeout,\n                request_description=request_description,\n                **kwargs,\n            )\n        except BrightreeAPIError:\n            # BaseApiHandler already logged; Maps uses Optional[Response] instead of Brightree errors.\n            return None\n\n    def _session_request_no_raise(\n        self,\n        method: str,\n        url: str,\n        *,\n        timeout: int = 10,\n        json: Optional[dict[str, Any]] = None,\n        params: Optional[dict[str, Any]] = None,\n        request_description: Optional[str] = None,\n    ) -> Optional[requests.Response]:\n        \"\"\"\n        Address Validation can return useful JSON on non-2xx; BaseApiHandler.request uses\n        raise_for_status(), so that API uses this path instead.\n        \"\"\"\n        auth = self.session.auth\n        if not isinstance(auth, GoogleMapsAuth):\n            self.conv.log.error(\n                \"Google Maps handler misconfigured: session.auth is not GoogleMapsAuth\"\n            )\n            return None\n        try:\n            merged = dict(params or {})\n            merged[\"key\"] = auth.get_api_key()\n        except RuntimeError as e:\n            self.conv.log.error(\"Google Maps API key unavailable\", error=str(e))\n            return None\n        self.conv.log.info(\n            \"Google Maps request (no raise_for_status)\",\n            method=method,\n            url=url,\n            description=request_description,\n        )\n        try:\n            return self.session.request(\n                method=method,\n                url=url,\n                timeout=timeout,\n                params=merged,\n                json=json,\n            )\n        except requests.RequestException as e:\n            self.conv.log.error(\"Google Maps request failed\", url=url, error=str(e))\n            return None\n\n    @staticmethod\n    def _google_api_error_message(data: dict[str, Any]) -> Optional[str]:\n        err = data.get(\"error\")\n        if isinstance(err, dict):\n            return err.get(\"message\") or err.get(\"status\")\n        return None\n\n    @abstractmethod\n    def get_places_search_results(self, query: str) -> PlacesSearchResult:\n        \"\"\"Places Text Search (or subclass-specific implementation).\"\"\"\n        ...\n\n\nclass GoogleMapsApiHandler(AbstractGoogleMapsApiHandler):\n    \"\"\"Places Text Search.\"\"\"\n\n    def get_places_search_results(self, query: str) -> PlacesSearchResult:\n        \"\"\"Get places search results from Google Places API.\"\"\"\n        endpoint = \"place/textsearch/json\"\n        params = {\"query\": query}\n\n        self.conv.log.info(\"Making request to Google Places API\", query=query)\n        response = self.request(\n            \"GET\",\n            endpoint,\n            params=params,\n            timeout=10,\n            request_description=\"Google Places text search\",\n        )\n\n        if response is None:\n            return PlacesSearchResult(\n                places=[],\n                status=\"REQUEST_FAILED\",\n                success=False,\n                error_message=\"No response (network, HTTP error, or missing API key)\",\n            )\n\n        data = self.parse_json_response(response)\n        if data is None:\n            snippet = (response.text or \"\")[:500]\n            self.conv.log.error(\n                \"Google Places API returned invalid JSON\",\n                status_code=response.status_code,\n                text_snippet=snippet,\n            )\n            return PlacesSearchResult(\n                places=[],\n                status=\"INVALID_RESPONSE\",\n                success=False,\n                error_message=\"Response was not valid JSON\",\n            )\n\n        status = data.get(\"status\", \"UNKNOWN\")\n\n        # Check for API errors\n        if status != \"OK\" and status != \"ZERO_RESULTS\":\n            error_message = data.get(\"error_message\")\n            self.conv.log.error(\n                \"Google Places API returned error status\",\n                status=status,\n                error_message=error_message,\n            )\n            return PlacesSearchResult(\n                places=[],\n                status=status,\n                success=False,\n                error_message=error_message,\n            )\n\n        # Extract places from results\n        places_search_result = PlacesSearchResult.from_json(data)\n\n        self.conv.log.info(\n            \"Successfully retrieved places from Google Places API\",\n            query=query,\n            num_results=len(places_search_result.places),\n            status=places_search_result.status,\n        )\n\n        return places_search_result\n\n    def _geocode(\n        self,\n        params: dict[str, Any],\n        *,\n        request_description: str,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        \"\"\"GET geocode/json — https://developers.google.com/maps/documentation/geocoding/requests-geocoding\"\"\"\n        response = self.request(\n            \"GET\",\n            \"geocode/json\",\n            params=params,\n            timeout=timeout,\n            request_description=request_description,\n        )\n        if response is None:\n            return GeocodingResult(\n                results=[],\n                status=\"REQUEST_FAILED\",\n                success=False,\n                error_message=\"No response (network, HTTP error, or missing API key)\",\n            )\n        data = self.parse_json_response(response)\n        if data is None:\n            self.conv.log.error(\n                \"Geocoding API returned invalid JSON\",\n                status_code=response.status_code,\n                text_snippet=(response.text or \"\")[:500],\n            )\n            return GeocodingResult(\n                results=[],\n                status=\"INVALID_RESPONSE\",\n                success=False,\n                error_message=\"Response was not valid JSON\",\n            )\n        status = data.get(\"status\", \"UNKNOWN\")\n        if status not in (\"OK\", \"ZERO_RESULTS\"):\n            err = data.get(\"error_message\")\n            self.conv.log.error(\"Geocoding API error status\", status=status, error_message=err)\n            return GeocodingResult(\n                results=[],\n                status=status,\n                success=False,\n                error_message=err,\n            )\n        hits = [GeocodeHit.from_json(r) for r in data.get(\"results\", [])]\n        return GeocodingResult(results=hits, status=status, success=True)\n\n    def geocode_address(\n        self,\n        address: str,\n        *,\n        bounds: Optional[str] = None,\n        region: Optional[str] = None,\n        components: Optional[str] = None,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        \"\"\"Forward geocode: address string → coordinates.\"\"\"\n        params: dict[str, Any] = {\"address\": address}\n        if bounds:\n            params[\"bounds\"] = bounds\n        if region:\n            params[\"region\"] = region\n        if components:\n            params[\"components\"] = components\n        if language:\n            params[\"language\"] = language\n        if result_type:\n            params[\"result_type\"] = result_type\n        if location_type:\n            params[\"location_type\"] = location_type\n        return self._geocode(params, request_description=\"Geocoding forward\", timeout=timeout)\n\n    def reverse_geocode(\n        self,\n        lat: float,\n        lng: float,\n        *,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        \"\"\"Reverse geocode: lat,lng → addresses.\"\"\"\n        params: dict[str, Any] = {\"latlng\": f\"{lat},{lng}\"}\n        if language:\n            params[\"language\"] = language\n        if result_type:\n            params[\"result_type\"] = result_type\n        if location_type:\n            params[\"location_type\"] = location_type\n        return self._geocode(params, request_description=\"Geocoding reverse\", timeout=timeout)\n\n    def validate_address(\n        self,\n        address_lines: list[str],\n        region_code: Optional[str] = None,\n        *,\n        locality: Optional[str] = None,\n        administrative_area: Optional[str] = None,\n        postal_code: Optional[str] = None,\n        enable_usps_cass: bool = False,\n        extra_fields: Optional[dict[str, Any]] = None,\n        timeout: int = 10,\n    ) -> AddressValidationResult:\n        \"\"\"\n        POST Address Validation API. ``address_lines`` required by Google; ``region_code`` recommended.\n        https://developers.google.com/maps/documentation/address-validation/requests-validate-address\n        \"\"\"\n        if not address_lines:\n            return AddressValidationResult(\n                success=False,\n                error_message=\"address_lines must be non-empty\",\n            )\n\n        postal_address: dict[str, Any] = {\"addressLines\": list(address_lines)}\n        if region_code:\n            postal_address[\"regionCode\"] = region_code\n        if locality:\n            postal_address[\"locality\"] = locality\n        if administrative_area:\n            postal_address[\"administrativeArea\"] = administrative_area\n        if postal_code:\n            postal_address[\"postalCode\"] = postal_code\n\n        body: dict[str, Any] = {\"address\": postal_address}\n        if enable_usps_cass:\n            body[\"enableUspsCass\"] = True\n        if extra_fields:\n            body.update(extra_fields)\n\n        response = self._session_request_no_raise(\n            \"POST\",\n            ADDRESS_VALIDATION_URL,\n            timeout=timeout,\n            json=body,\n            request_description=\"Address Validation validateAddress\",\n        )\n        if response is None:\n            return AddressValidationResult(\n                success=False,\n                error_message=\"Request failed (network or transport error)\",\n            )\n\n        data = self.parse_json_response(response) or {}\n        if response.status_code != 200:\n            msg = self._google_api_error_message(data) or (response.text or \"\")[:500]\n            return AddressValidationResult(\n                success=False,\n                error_message=msg,\n                http_status=response.status_code,\n            )\n\n        if \"result\" not in data:\n            return AddressValidationResult(\n                success=False,\n                error_message=\"Response missing result\",\n                http_status=response.status_code,\n            )\n\n        return AddressValidationResult(\n            success=True,\n            response_id=data.get(\"responseId\"),\n            result=data.get(\"result\"),\n            http_status=response.status_code,\n        )\n\n\ndef get_google_maps_api_handler(conv: Conversation) -> GoogleMapsApiHandler:\n    \"\"\"Create a new GoogleMapsApiHandler for each conversation.\"\"\"\n    # Always create a fresh handler - no global state to avoid stale handlers in warm Lambda containers\n    handler = GoogleMapsApiHandler(conv, secret_name=SECRET_NAME)\n    conv.log.info(\"get_google_maps_api_handler: Handler created successfully\")\n    return handler\n\n\ndef _default_mock_places(query: str) -> PlacesSearchResult:\n    return PlacesSearchResult(\n        places=[\n            Place(\n                name=\"Mock Place\",\n                formatted_address=f\"123 Mock Street (search: {query})\",\n                place_id=\"ChIJMOCK000000000000000000\",\n                geometry={\"location\": {\"lat\": 37.422_131, \"lng\": -122.084_801}},\n                types=[\"establishment\"],\n                rating=None,\n                user_ratings_total=None,\n                vicinity=None,\n            )\n        ],\n        status=\"OK\",\n        success=True,\n    )\n\n\ndef _default_mock_geocode_forward(address: str) -> GeocodingResult:\n    return GeocodingResult(\n        results=[\n            GeocodeHit(\n                formatted_address=address,\n                place_id=\"ChIJMOCKGEOCODE00000000000\",\n                geometry={\n                    \"location\": {\"lat\": 37.422_131, \"lng\": -122.084_801},\n                    \"location_type\": \"ROOFTOP\",\n                },\n                types=[\"street_address\"],\n                address_components=[],\n            )\n        ],\n        status=\"OK\",\n        success=True,\n    )\n\n\ndef _default_mock_geocode_reverse(lat: float, lng: float) -> GeocodingResult:\n    return GeocodingResult(\n        results=[\n            GeocodeHit(\n                formatted_address=f\"{lat:.6f}, {lng:.6f}\",\n                place_id=\"ChIJMOCKREVERSE0000000000\",\n                geometry={\n                    \"location\": {\"lat\": lat, \"lng\": lng},\n                    \"location_type\": \"ROOFTOP\",\n                },\n                types=[\"street_address\"],\n                address_components=[],\n            )\n        ],\n        status=\"OK\",\n        success=True,\n    )\n\n\ndef _default_mock_address_validation(address_lines: list[str]) -> AddressValidationResult:\n    return AddressValidationResult(\n        success=True,\n        response_id=\"mock-response-id\",\n        result={\n            \"verdict\": {\n                \"addressComplete\": True,\n                \"possibleNextAction\": \"ACCEPT\",\n                \"validationGranularity\": \"PREMISE\",\n            },\n            \"address\": {\"formattedAddress\": \", \".join(address_lines)},\n        },\n        http_status=200,\n    )\n\n\nclass MockGoogleMapsApiHandler:\n    \"\"\"No HTTP; for tests/QA. Same public methods as ``GoogleMapsApiHandler``.\"\"\"\n\n    def __init__(\n        self,\n        conv: Conversation,\n        *,\n        places: Optional[PlacesSearchResult] = None,\n        geocode_forward: Optional[GeocodingResult] = None,\n        geocode_reverse: Optional[GeocodingResult] = None,\n        address_validation: Optional[AddressValidationResult] = None,\n    ) -> None:\n        self.conv = conv\n        self._places = places\n        self._geocode_forward = geocode_forward\n        self._geocode_reverse = geocode_reverse\n        self._address_validation = address_validation\n\n    def get_places_search_results(self, query: str) -> PlacesSearchResult:\n        self.conv.log.info(\"MockGoogleMapsApiHandler.get_places_search_results\", query=query)\n        return self._places if self._places is not None else _default_mock_places(query)\n\n    def geocode_address(\n        self,\n        address: str,\n        *,\n        bounds: Optional[str] = None,\n        region: Optional[str] = None,\n        components: Optional[str] = None,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        _ = (bounds, region, components, language, result_type, location_type, timeout)\n        self.conv.log.info(\"MockGoogleMapsApiHandler.geocode_address\", address=address)\n        return (\n            self._geocode_forward\n            if self._geocode_forward is not None\n            else _default_mock_geocode_forward(address)\n        )\n\n    def reverse_geocode(\n        self,\n        lat: float,\n        lng: float,\n        *,\n        language: Optional[str] = None,\n        result_type: Optional[str] = None,\n        location_type: Optional[str] = None,\n        timeout: int = 10,\n    ) -> GeocodingResult:\n        _ = (language, result_type, location_type, timeout)\n        self.conv.log.info(\"MockGoogleMapsApiHandler.reverse_geocode\", lat=lat, lng=lng)\n        return (\n            self._geocode_reverse\n            if self._geocode_reverse is not None\n            else _default_mock_geocode_reverse(lat, lng)\n        )\n\n    def validate_address(\n        self,\n        address_lines: list[str],\n        region_code: Optional[str] = None,\n        *,\n        locality: Optional[str] = None,\n        administrative_area: Optional[str] = None,\n        postal_code: Optional[str] = None,\n        enable_usps_cass: bool = False,\n        extra_fields: Optional[dict[str, Any]] = None,\n        timeout: int = 10,\n    ) -> AddressValidationResult:\n        _ = (\n            region_code,\n            locality,\n            administrative_area,\n            postal_code,\n            enable_usps_cass,\n            extra_fields,\n            timeout,\n        )\n        self.conv.log.info(\"MockGoogleMapsApiHandler.validate_address\", lines=address_lines)\n        if not address_lines:\n            return AddressValidationResult(\n                success=False, error_message=\"address_lines must be non-empty\"\n            )\n        return (\n            self._address_validation\n            if self._address_validation is not None\n            else _default_mock_address_validation(address_lines)\n        )\n\n\ndef get_mock_google_maps_api_handler(\n    conv: Conversation,\n    *,\n    places: Optional[PlacesSearchResult] = None,\n    geocode_forward: Optional[GeocodingResult] = None,\n    geocode_reverse: Optional[GeocodingResult] = None,\n    address_validation: Optional[AddressValidationResult] = None,\n) -> MockGoogleMapsApiHandler:\n    return MockGoogleMapsApiHandler(\n        conv,\n        places=places,\n        geocode_forward=geocode_forward,\n        geocode_reverse=geocode_reverse,\n        address_validation=address_validation,\n    )\n\n\ndef google_maps_api_handler(conv: Conversation):\n    conv.log.error(\"google_maps_api_handler: MUST NEVER BE CALLED\")\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-03-26T13:00:01.386Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-03-26T13:00:01.386Z","updatedBy":"kitan.ademidun@poly-ai.com"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTION-F174F6FF":{"id":"FUNCTION-F174F6FF","name":"detected_voicemail","description":"This is a function that was created automatically","parameters":{"ids":[],"entities":{}},"code":"def detected_voicemail(conv: Conversation):\n    conv.write_metric(\"VOICEMAIL_DETECTED\", write_once=True)\n    utterance = conv.functions.utterances(\"OUTBOUND_CALL_VOICEMAIL_UTTERANCE\").format(\n        callback_number=conv.variant.callback_number,\n        site_name=conv.variant.site_name,\n    )\n    return conv.functions.handle_end_call(utterance=utterance)\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-03-30T13:28:40.213Z","createdBy":"nicole.soh@poly-ai.com","updatedAt":"2026-03-30T13:28:40.213Z","updatedBy":"nicole.soh@poly-ai.com"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@