erived routing is enabled when the conversation''s variant name is\n    listed in the per-campaign ``campaign_settings`` array in RTC with\n    ``routing_enabled`` true.\n\n    Defaults conservatively: a campaign that isn''t listed, or whose entry\n    is missing ``routing_enabled``, is treated as **off**. After the\n    BetterNight misrouting incident, routing-safety toggles must be opt-in\n    only — an omitted/typo''d entry should never silently enable derived\n    routing.\n    \"\"\"\n    rtc = conv.real_time_config\n    variant_name = conv.variant_name\n\n    campaign_settings = rtc.get(\"campaign_settings\", [])\n    if not isinstance(campaign_settings, list):\n        conv.log.warning(\n            \"Derived routing flag resolved\",\n            variant_name=variant_name,\n            enabled=False,\n            reason=\"rtc_campaign_settings_not_a_list\",\n        )\n        return False\n\n    for entry in campaign_settings:\n        if not isinstance(entry, dict):\n            continue\n        if entry.get(\"campaign_name\") == variant_name:\n            enabled = bool(entry.get(\"routing_enabled\", False))\n            conv.log.info(\n                \"Derived routing flag resolved\",\n                variant_name=variant_name,\n                enabled=enabled,\n                reason=\"campaign_name_match\",\n            )\n            return enabled\n\n    conv.log.info(\n        \"Derived routing flag resolved\",\n        variant_name=variant_name,\n        enabled=False,\n        reason=\"campaign_name_not_listed\",\n    )\n    return False\n\n\ndef _validate_config(conv: Conversation) -> dict | None:\n    \"\"\"Fetch the handoff routing variant attribute, parse its JSON, and\n    validate the structure up-front.\n\n    Returns the parsed config dict if valid, or ``None`` on any error —\n    missing variant attribute, JSON parse failure, or structural/format\n    violation — after logging and emitting the appropriate metric.\n    ``lookup_destination`` propagates this ``None`` so callers can\n    distinguish an *error* fallback (``None``) from an *intentional*\n    default-queue route (``BRIGHTREE_DEFAULT_DESTINATION``). Validates:\n\n    - variant attribute is present and truthy\n    - JSON parses\n    - top-level is a dict\n    - ``routes`` is present and is a dict; every value is either a 10-digit\n      PSTN string or the literal ``BRIGHTREE_DEFAULT_DESTINATION`` sentinel\n      (omitting the route entry has the same effect as the sentinel)\n    - ``conditionals`` (if present) is a list; each entry is a dict with\n      ``flag`` (registered), ``applies_to`` (``\"*\"`` or a list), and\n      ``destination`` (a 10-digit PSTN string or\n      ``BRIGHTREE_DEFAULT_DESTINATION``) keys\n    \"\"\"\n    raw = getattr(conv.variant, \"handoff_routing\", None)\n    if not raw:\n        conv.log.warning(\"Handoff routing attribute missing for variant\")\n        conv.write_metric(HANDOFF_ATTRIBUTE_MISSING_METRIC)\n        return None\n\n    try:\n        config = json.loads(raw)\n    except (TypeError, ValueError) as e:\n        conv.log.error(f\"Failed to parse handoff routing config: {e}\")\n        conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n        return None\n\n    if not isinstance(config, dict):\n        conv.log.error(f\"Handoff routing config is not a dict: {type(config).__name__}\")\n        conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n        return None\n\n    routes = config.get(\"routes\")\n    if routes is None:\n        conv.log.error(\"Handoff routing config is missing ''routes'' key\")\n        conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n        return None\n    if not isinstance(routes, dict):\n        conv.log.error(f\"Handoff routing routes is not a dict: {type(routes).__name__}\")\n        conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n        return None\n    for reason, dest in routes.items():\n        if not isinstance(dest, str):\n            conv.log.error(\n                f\"Handoff routing route destination for {reason!r} is not a string: {type(dest).__name__}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        if dest != BRIGHTREE_DEFAULT_DESTINATION and not (len(dest) == 10 and dest.isdigit()):\n            conv.log.error(\n                f\"Handoff routing route destination for {reason!r} is not a 10-digit PSTN \"\n                f\"or {BRIGHTREE_DEFAULT_DESTINATION!r}: {dest!r}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n\n    conditionals = config.get(\"conditionals\", [])\n    if not isinstance(conditionals, list):\n        conv.log.error(f\"Handoff routing conditionals is not a list: {type(conditionals).__name__}\")\n        conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n        return None\n\n    required_conditional_keys = {\"flag\", \"applies_to\", \"destination\"}\n    for cond in conditionals:\n        if not isinstance(cond, dict):\n            conv.log.error(\n                f\"Handoff routing conditional entry is not a dict: {type(cond).__name__}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        missing_keys = required_conditional_keys - cond.keys()\n        if missing_keys:\n            conv.log.error(\n                f\"Handoff routing conditional missing required keys: {sorted(missing_keys)}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        flag_name = cond[\"flag\"]\n        if flag_name not in _CONDITIONAL_FLAG_PREDICATES:\n            conv.log.error(f\"Handoff routing conditional references unregistered flag: {flag_name}\")\n            conv.write_metric(HANDOFF_ATTRIBUTE_MISSING_METRIC)\n            return None\n        applies_to = cond[\"applies_to\"]\n        if applies_to != \"*\" and not isinstance(applies_to, list):\n            conv.log.error(\n                f\"Handoff routing applies_to is not ''*'' or a list: {type(applies_to).__name__}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        if isinstance(applies_to, list) and not all(\n            isinstance(reason, str) for reason in applies_to\n        ):\n            conv.log.error(\"Handoff routing applies_to list contains non-string entries\")\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        cond_dest = cond[\"destination\"]\n        if not isinstance(cond_dest, str):\n            conv.log.error(\n                f\"Handoff routing conditional destination is not a string: {type(cond_dest).__name__}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n        if cond_dest != BRIGHTREE_DEFAULT_DESTINATION and not (\n            len(cond_dest) == 10 and cond_dest.isdigit()\n        ):\n            conv.log.error(\n                f\"Handoff routing conditional destination is not a 10-digit PSTN \"\n                f\"or {BRIGHTREE_DEFAULT_DESTINATION!r}: {cond_dest!r}\"\n            )\n            conv.write_metric(HANDOFF_CONFIG_PARSE_ERROR_METRIC)\n            return None\n\n    return config\n\n\ndef lookup_destination(conv: Conversation, handoff_reason: str) -> str | None:\n    \"\"\"Resolve `(variant, handoff_reason, conv.state)` to a 10-digit PSTN\n    destination, ``BRIGHTREE_DEFAULT_DESTINATION`` for the intentional\n    default queue, or ``None`` if the config is invalid / missing.\n\n    Caller is responsible for normalizing `handoff_reason` (uppercase,\n    underscore-separated) before invocation. The current caller in\n    `transfer_call.py` performs that normalization before calling this\n    function.\n\n    Conditionals are evaluated in declared order — **first match wins**. If\n    two entries have overlapping ``applies_to`` lists and both predicates\n    are true for the current conversation, only the earlier entry fires.\n    YAML ordering is therefore load-bearing.\n    \"\"\"\n    config = _validate_config(conv)\n    if config is None:\n        return None\n\n    # Walk conditionals in declared order; first match wins. _validate_config\n    # guarantees every entry is a dict with flag/applies_to/destination keys\n    # and that destination is a 10-digit PSTN string.\n    for cond in config.get(\"conditionals\", []):\n        applies_to = cond[\"applies_to\"]\n        if applies_to != \"*\" and handoff_reason not in applies_to:\n            continue\n        predicate = _CONDITIONAL_FLAG_PREDICATES[cond[\"flag\"]]\n        if predicate(conv):\n            return cond[\"destination\"]\n\n    # Fall back to static routing; missing reason → intentional default queue.\n    return config[\"routes\"].get(handoff_reason, BRIGHTREE_DEFAULT_DESTINATION)\n\n\ndef handoff_routing(conv: Conversation):\n    # Utility-module stub required by Agent Studio''s file-validator\n    # (every .py in functions/ must define a function matching the filename).\n    # This module is imported directly by transfer_call.py — see\n    # lookup_destination / is_derived_routing_enabled above.\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-04-28T00:19:09.788Z","createdBy":"kitan.ademidun@poly-ai.com","updatedAt":"2026-04-28T00:19:09.788Z","updatedBy":"kitan.ademidun@poly-ai.com"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTIONS-f03858ff":{"id":"FUNCTIONS-f03858ff","name":"mock_api_handler","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"\"\"\"Mock API handler for voice-testing the GET-before-POST fix (PR #3619).\n\nControlled via RTC key \"mock_api\" — a list of objects, each with a caller\nemail/number and the number of GET retries that should timeout (the rest\nsucceed with test data). Used only in draft or sandbox envs when an RTC\nentry''s \"caller\" matches conv.caller_number.\n\nExample RTC:\n  \"mock_api\": [\n    {\"caller\": \"kara.best@poly-ai.com\", \"timeout_retries\": 3},\n    {\"caller\": \"+15551234567\", \"timeout_retries\": 1}\n  ]\n\ntimeout_retries=3 means all 3 retries timeout → ORDER_NOT_FOUND.\ntimeout_retries=1 means the 1st retry times out, 2nd succeeds with test data.\ntimeout_retries=0 means no timeouts — uses test data immediately.\n\"\"\"\n\nimport time\n\nfrom functions.api_handler import BrightreeApiHandler, ServerBrightreeAPIError\nfrom functions.sample_data import RAPID_ORDER_TEST_DATA_DEFAULT\n\nMOCK_TIMEOUT_SECONDS = 8\n\nMOCK_PATIENT = {\n    \"phone_number\": \"5059696418\",\n    \"patientKey\": \"eedcb85c-7430-43bc-a972-1c615a9629d4\",\n    \"dateOfBirth\": \"1958-09-07T00:00:00\",\n    \"patientLanguage\": \"English\",\n}\n\n\ndef _get_mock_config(conv: Conversation) -> dict | None:\n    \"\"\"Return the mock_api config entry for this caller, or None.\"\"\"\n    mock_api = conv.real_time_config.get(\"mock_api\", [])\n    for entry in mock_api:\n        if isinstance(entry, dict) and entry.get(\"caller\") == conv.caller_number:\n            return entry\n    return None\n\n\ndef should_use_mock_api(conv: Conversation) -> bool:\n    if conv.env not in (\"draft\", \"sandbox\"):\n        return False\n    return _get_mock_config(conv) is not None\n\n\ndef _get_timeout_retries(conv: Conversation) -> int:\n    \"\"\"Number of GET retries that should timeout. Defaults to 3 (all).\"\"\"\n    config = _get_mock_config(conv)\n    if config is None:\n        return 3\n    return int(config.get(\"timeout_retries\", 3))\n\n\nclass MockBrightreeApiHandler:\n    \"\"\"Drop-in replacement for BrightreeApiHandler that simulates failures.\n\n    Wraps a real handler so non-mocked methods (e.g. insurance lookups) still work.\n    \"\"\"\n\n    def __init__(self, conv: Conversation, real_handler: BrightreeApiHandler | None = None):\n        self.conv = conv\n        self._real = real_handler\n        self._get_attempt = 0\n        self._timeout_retries = _get_timeout_retries(conv)\n\n    def __getattr__(self, name):\n        \"\"\"Delegate anything not explicitly mocked to the real handler.\"\"\"\n        if self._real is not None:\n            return getattr(self._real, name)\n        raise AttributeError(\n            f\"MockBrightreeApiHandler has no attribute {name!r} and no real handler\"\n        )\n\n    def GET_patients_by_phone_number(self, phone_number_to_search: str):\n        self.conv.log.info(\n            \"MOCK: Returning mock patient for phone number lookup\",\n            phone_number=phone_number_to_search,\n        )\n        return {\"data\": [MOCK_PATIENT]}\n\n    def GET_rapid_order_items_for_patient(\n        self, patient_key: str, campaignPatientKey=None, timeout: int = 8\n    ):\n        self._get_attempt += 1\n        if self._get_attempt <= self._timeout_retries:\n            self.conv.log.warning(\n                \"MOCK: Simulating GET timeout for rapid order items\",\n                patient_key=patient_key,\n                campaign_patient_key=campaignPatientKey,\n                attempt=self._get_attempt,\n                timeout_retries=self._timeout_retries,\n                sleep_seconds=MOCK_TIMEOUT_SECONDS,\n            )\n            time.sleep(MOCK_TIMEOUT_SECONDS)\n            raise ServerBrightreeAPIError(\n                \"MOCK: Simulated timeout on GET_rapid_order_items_for_patient\",\n                status_code=504,\n            )\n\n        self.conv.log.info(\n            \"MOCK: Returning test rapid order data (past timeout_retries limit)\",\n            patient_key=patient_key,\n            attempt=self._get_attempt,\n            timeout_retries=self._timeout_retries,\n        )\n        return RAPID_ORDER_TEST_DATA_DEFAULT\n\n    def POST_inbound_call(self, patient_key: str, phone_number_data: dict):\n        self.conv.log.info(\n            \"MOCK: Returning fake campaign patient key (POST_inbound_call)\",\n            patient_key=patient_key,\n        )\n        return {\"key\": \"MOCK-cpk-00000000-0000-0000-0000-000000000000\"}\n\n    def POST_outbound_call(self, patient_key: str, phone_number_data: dict):\n        self.conv.log.info(\n            \"MOCK: Returning fake campaign patient key (POST_outbound_call)\",\n            patient_key=patient_key,\n        )\n        return {\"key\": \"MOCK-cpk-00000000-0000-0000-0000-000000000001\"}\n\n\ndef mock_api_handler(conv: Conversation):\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2026-04-29T10:39:07.578Z","createdBy":"kara.best@poly-ai.com","updatedAt":"2026-04-29T10:39:07.578Z","updatedBy":"kara.best@poly-ai.com"},"createdAt":"2026-04-29T13:54:18.675Z","createdBy":"kara.best@poly-ai.com","updatedAt":"2026-04-29T15:10:24.267Z","updatedBy":"kara.best@poly-ai.com","archived":true,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}}}}},"guardrails":{"guardrails":{"JAILBREAK_DEFENCE":{"enabled":true},"HALLUCINATION_CONTROL":{"enabled":true},"AI_IDENTITY":{"enabled":true},"EMERGENCY_ESCALATION":{"enabled":true},"TOOL_CALL_INTEGRITY":{"enabled":true}},"updatedAt":"","updatedBy":""},"testing":{"testCases":{"ids":[],"entities":{}}},"transcriptCorrections":{"transcriptCorrections":{"ids":["00cb55bc-36bc-4f43-afc8-db514cf3f8be","0b8f3085-ce91-4571-9e98-c9f41b52583b","19de31aa-2497-4bba-ba86-55e4b5450032","b532df40-d979-47e0-809b-89377ce7b1a9","627630fb-bab7-4e4b-9b3b-4bfc82637375","TRANSCRIPT-CORRECTION-7632C71A","TRANSCRIPT-CORRECTION-B81D22A0","TRANSCRIPT-CORRECTION-70F41D78","TRANSCRIPT-CORRECTION-A8E7