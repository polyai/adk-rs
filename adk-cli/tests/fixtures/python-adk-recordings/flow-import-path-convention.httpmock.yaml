            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Quipt  - Mayhugh - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Quipt  - Mediserve - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Quipt  - Patient Aids - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Quipt  - RMG - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Quipt  - SleepWell - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Quipt  - Thrift - Inbound Call Campain\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Quipt  - West Home - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Great Elm - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(21, 00),\n        },\n        \"Quinlans - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"Regional - Inbound Call Campaign\": {\n            \"start_time\": time(7, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Reliable Respiratory - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"Ricks Medical Supply - Inbound Call Campaign\": {\n            \"start_time\": time(10, 30),\n            \"end_time\": time(21, 00),\n        },\n        \"Sleep Affiliates - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Sleep Metrics - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(22, 00),\n        },\n        \"SleepQuest - Inbound Call Campaign\": {\n            \"start_time\": time(10, 30),\n            \"end_time\": time(21, 00),\n        },\n        \"Sleep Solutions - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"UNC Homecare - Inbound Call Campaign\": {\n            \"start_time\": time(7, 30),\n            \"end_time\": time(18, 00),\n        },\n        \"Unity Point Home - Eastern Iowa - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Unity Point Home - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Unity Point Home - West Lakes - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"UW Health - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Valley Sleep - Inbound Call Campaign\": {\n            \"start_time\": time(10, 00),\n            \"end_time\": time(21, 00),\n        },\n        \"Vantage - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"Williams Bros - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Sutter - Inbound Call Campaign\": {\n            \"start_time\": time(10, 30),\n            \"end_time\": time(21, 00),\n        },\n        \"Atrium - Inbound Call Campaign\": {\n            \"start_time\": time(8, 00),\n            \"end_time\": time(18, 00),\n        },\n        \"Advocate - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Aurora - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Medic Sleep Care - Inbound Call Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n        \"Medic Sleep Care - Outbound Dialer Campaign\": {\n            \"start_time\": time(9, 00),\n            \"end_time\": time(19, 00),\n        },\n    }.get(variant_name)\n\n    if not in_hours:\n        conv.log.error(f\"Could not find in_hours for {variant_name=}\")\n        in_hours = {\"start_time\": time(7, 0), \"end_time\": time(19, 0)}\n\n    in_hours[\"in_hour_days\"] = MON_FRI\n    return in_hours\n\n\ndef format_time_with_optional_minutes(dt, conv: Conversation):\n    \"\"\"\n    Format time with optional minutes, supporting both English and Spanish formats.\n\n    NB: Ultimately may be better to rely on LLM for this, as coding out\n    the rules for Spanish is needlessly elaborate.\n\n    English: \"6am\", \"6:30pm\"\n    Spanish: \"las 6 de la mañana\", \"las 6 y 30 de la tarde\"\n    \"\"\"\n    if conv.language.startswith(\"es\"):\n        # Spanish format\n        hour = dt.hour\n        minute = dt.minute\n\n        # Convert to 12-hour format\n        if hour == 0:\n            hour_12 = 12\n            period = \"de la mañana\"\n        elif hour < 12:\n            hour_12 = hour\n            period = \"de la mañana\"\n        elif hour == 12:\n            hour_12 = 12\n            period = \"de la tarde\"\n        else:\n            hour_12 = hour - 12\n            period = \"de la tarde\"\n\n        # Get correct article for Spanish\n        article = \"la\" if hour_12 == 1 else \"las\"\n\n        if minute == 0:\n            return f\"{article} {hour_12} {period}\"\n        else:\n            return f\"{article} {hour_12} y {minute:02d} {period}\"\n    else:\n        # English format (original)\n        time_str = dt.strftime(\"%-I:%M%p\").lower()\n        # Strip \":00\" if the minutes are zero\n        return time_str.replace(\":00\", \"\")\n\n\ndef get_opening_hours_utterance(\n    conv: Conversation,\n    variant_name: str,\n):\n    open_time = format_time_with_optional_minutes(\n        datetime.strptime(conv.variant.opening_hours_open, \"%H:%M\"), conv\n    )\n    close_time = format_time_with_optional_minutes(\n        datetime.strptime(conv.variant.opening_hours_close, \"%H:%M\"), conv\n    )\n\n    # Use the utterance from utterances.py\n    utterance_template = conv.functions.utterances(\"OPENING_HOURS_UTTERANCE\")\n    opening_hours_timezone = conv.variant.opening_hours_timezone.lower()\n    if conv.state.language == \"es-US\":\n        if \"central\" in opening_hours_timezone:\n            opening_hours_timezone = \"hora central\"\n        elif \"eastern\" in opening_hours_timezone:\n            opening_hours_timezone = \"hora del Este\"\n        elif \"pacific\" in opening_hours_timezone:\n            opening_hours_timezone = \"hora del Pacífico\"\n        elif \"mountain\" in opening_hours_timezone:\n            opening_hours_timezone = \"hora de la Montaña\"\n\n    return utterance_template.format(\n        open_time=open_time, close_time=close_time, time_zone=opening_hours_timezone\n    )\n\n\ndef is_in_hours(conv: Conversation, variant_name: str, current_datetime: datetime) -> bool:\n    # RTC override\n    force_hours = get_force_hours_from_rtc(conv)\n    if force_hours is not None:\n        conv.log.warning(f\"Using RTC force_hours {force_hours=}\")\n        return force_hours\n\n    if conv.env in [\"draft\", \"sandbox\"]:\n        # Force in hours\n        if conv.env in [\"draft\"] or conv.callee_number in [\"+447427858223\"]:\n            return True\n    elif conv.env == \"pre-release\" and conv.callee_number in [\n        \"+447476963703\",\n        \"+15412752254\",\n    ]:\n        conv.log.warning(\"Forcing OOH\")\n        return False\n\n    in_hours = get_in_hours_from_variant_name(conv, variant_name)\n    if current_datetime.weekday() not in in_hours[\"in_hour_days\"]:\n        conv.log.info(\n            \"Days not in hours\",\n            current_day=current_datetime.weekday(),\n            in_hours_dict=in_hours,\n        )\n        return False\n    current_time = current_datetime.time()\n    is_in_hours_calc = in_hours[\"start_time\"] <= current_time <= in_hours[\"end_time\"]\n    conv.log.info(\n        \"is_in_hours_calc\",\n        is_in_hours_calc=is_in_hours_calc,\n        current_time=current_time,\n        in_hours=in_hours,\n    )\n    return is_in_hours_calc\n\n\n_ORDINAL_WORDS = {\n    1: \"first\",\n    2: \"second\",\n    3: \"third\",\n    4: \"fourth\",\n    5: \"fifth\",\n    6: \"sixth\",\n    7: \"seventh\",\n    8: \"eighth\",\n    9: \"ninth\",\n    10: \"tenth\",\n    11: \"eleventh\",\n    12: \"twelfth\",\n    13: \"thirteenth\",\n    14: \"fourteenth\",\n    15: \"fifteenth\",\n    16: \"sixteenth\",\n    17: \"seventeenth\",\n    18: \"eighteenth\",\n    19: \"nineteenth\",\n    20: \"twentieth\",\n    21: \"twenty first\",\n    22: \"twenty second\",\n    23: \"twenty third\",\n    24: \"twenty fourth\",\n    25: \"twenty fifth\",\n    26: \"twenty sixth\",\n    27: \"twenty seventh\",\n    28: \"twenty eighth\",\n    29: \"twenty ninth\",\n    30: \"thirtieth\",\n    31: \"thirty first\",\n}\n\n_NUM_WORDS_1_TO_19 = [\n    \"\",\n    \"one\",\n    \"two\",\n    \"three\",\n    \"four\",\n    \"five\",\n    \"six\",\n    \"seven\",\n    \"eight\",\n    \"nine\",\n    \"ten\",\n    \"eleven\",\n    \"twelve\",\n    \"thirteen\",\n    \"fourteen\",\n    \"fifteen\",\n    \"sixteen\",\n    \"seventeen\",\n    \"eighteen\",\n    \"nineteen\",\n]\n\n_TENS_WORDS = [\n    \"\",\n    \"\",\n    \"twenty\",\n    \"thirty\",\n    \"forty\",\n    \"fifty\",\n    \"sixty\",\n    \"seventy\",\n    \"eighty\",\n    \"ninety\",\n]\n\n\ndef number_to_words(n: int) -> str:\n    \"\"\"Convert integer to words (supports 0-99).\"\"\"\n    if n < 20:\n        return _NUM_WORDS_1_TO_19[n]\n    tens, below = divmod(n, 10)\n    return _TENS_WORDS[tens] + (\"\" if below == 0 else \" \" + _NUM_WORDS_1_TO_19[below])\n\n\ndef year_to_words(year: int) -> str:\n    \"\"\"Convert year into natural spoken form.\"\"\"\n    if 1000 <= year <= 1999:\n        first, last = divmod(year, 100)\n        first_words = number_to_words(first)\n        if last == 0:\n            return first_words + \" hundred\"\n        elif last < 10:\n            return first_words + \" oh \" + number_to_words(last)\n        else:\n            return first_words + \" \" + number_to_words(last)\n    elif 2000 <= year <= 2099:\n        if year == 2000:\n            return \"two thousand\"\n        first, last = divmod(year, 1000)\n        first_words = number_to_words(first) + \" thousand\"\n        if last == 0:\n            return first_words\n        return first_words + \" \" + number_to_words(last)\n    else:\n        # fallback to generic splitting: e.g. 875 → \"eight seventy five\"\n        return str(year)\n\n\ndef get_datetime_readable_str(dt: datetime) -> dict[str, str]:\n    \"\"\"Returns:\n    - date_readout: e.g. \"Tuesday, August sixteenth, two thousand twenty five\"\n    - date_readout_short: e.g. \"Tuesday, August sixteenth\"\n    - time_readout: e.g. \"3:45 PM\"\n    - time_readout_short: same as above\n    - date_of_birth_readout: e.g. \"August sixteenth, two thousand twenty five\"\n    \"\"\"\n\n    day_ordinal = _ORDINAL_WORDS[dt.day]\n    year_words = year_to_words(dt.year)\n\n    return {\n        \"date_readout\": f\"{dt.strftime(''%A'')}, {dt.strftime(''%B'')} {day_ordinal}, {year_words}\",\n        \"date_readout_short\": f\"{dt.strftime(''%A'')}, {dt.strftime(''%B'')} {day_ordinal}\",\n        \"time_readout\": dt.strftime(\"%-I:%M %p\"),\n        \"time_readout_short\": dt.strftime(\"%-I:%M %p\"),\n        \"date_of_birth_readout\": f\"{dt.strftime(''%B'')} {day_ordinal}, {year_words}\",\n    }\n\n\ndef format_ob_patient_number_as_caller_number(ob_patient_number: Optional[str], conv=None) -> str:\n    \"\"\"\n    If it''s exactly 10 digits and not starting with ''+1'', add ''+1''.\n    Otherwise, return the original number.\n    Returns empty string if input is blank.\n    Logs if we''re updating the number format.\n    \"\"\"\n    number = (ob_patient_number or \"\").strip()\n    if not number:\n        return \"\"\n    if len(number) == 10 and number.isdigit():\n        updated_number = f\"+1{number}\"\n        return updated_number\n    return number\n\n\ndef build_sip_headers(\n    conv: Conversation,\n    *,\n    contained: bool,\n    handoff_reason: str = \"null\",\n    destination: str = \"null\",\n) -> dict:\n    \"\"\"Build the SIP headers dict for BYE messages.\n\n    Reads base values from conv.state.out_going_sip_headers, falls back to\n    \"null\" for any missing key, then stamps the call-outcome fields that differ\n    between a transfer and a contained end-call.\n    \"\"\"\n    default_header_val = \"null\"\n    caller_number = (\n        conv.state.patient_caller_number if conv.state.is_outbound else conv.caller_number\n    )\n\n    header_defaults = {\n        \"X-patient-dob\": default_header_val,\n        \"X-patient-phone-number\": default_header_val,\n        \"X-patient-name\": default_header_val,\n        \"X-passed-idnv\": default_header_val,\n        \"X-reorder-started\": default_header_val,\n        \"X-caller-number\": caller_number or default_header_val,\n        \"X-virtual-agent-name\": conv.state.AGENT_NAME.upper() or default_header_val,\n        \"X-address-confirmed\": default_header_val,\n        \"X-insurance-confirmed\": default_header_val,\n        \"X-language\": \"English\",\n        \"X-hcpc-items\": default_header_val,\n    }\n\n    sip_headers: dict = {}\n    if conv.state.out_going_sip_headers:\n        sip_headers = {\n            key: conv.state.out_going_sip_headers.get(key) or default\n            for key, default in header_defaults.items()\n        }\n\n    if sip_headers.get(\"X-reorder-started\") == \"true\":\n        hcpc_codes = conv.state.order_service.get_current_order_hcpc_codes()\n        if hcpc_codes:\n            sip_headers[\"X-hcpc-items\"] = \",\".join(hcpc_codes)\n\n    sip_headers[\"X-handoff-reason\"] = handoff_reason\n    sip_headers[\"X-destination\"] = destination\n    sip_headers[\"X-contained\"] = \"true\" if contained else \"false\"\n\n    if conv.state.language == \"es-US\":\n        sip_headers[\"X-language\"] = \"Spanish\"\n\n    return sip_headers\n\n\n# ── Voice constants ──────────────────────────────────────────────────────────\n\nVOICE_MADDIE_ENGLISH = ElevenLabsVoice(\n    provider_voice_id=\"F7hCTbeEDbm7osolS21j\",\n    similarity_boost=0.85,\n    stability=0.9,\n    model_id=\"eleven_turbo_v2\",\n)\nVOICE_MAX_ENGLISH = ElevenLabsVoice(\n    provider_voice_id=\"UgBBYS2sOqTuMpoF3BR0\",\n    similarity_boost=0.85,\n    stability=0.9,\n    model_id=\"eleven_turbo_v2\",\n)\nVOICE_MADDIE_SPANISH = ElevenLabsVoice(\n    provider_voice_id=\"2Lb1en5ujrODDIqmp7F3\",\n    similarity_boost=1,\n    stability=0.9,\n)\nVOICE_MAX_SPANISH = ElevenLabsVoice(\n    provider_voice_id=\"htFfPSZGJwjBv1CL0aMD\",\n    similarity_boost=0.9,\n    stability=0.9,\n)\nVOICE_DISCLAIMER = ElevenLabsVoice(\"tnSpp4vdxKPjI9w0GnoV\")\n\n\n_VOICE_MAP = {\n    \"english\": {\"Max\": VOICE_MAX_ENGLISH, \"Maddie\": VOICE_MADDIE_ENGLISH},\n    \"spanish\": {\"Max\": VOICE_MAX_SPANISH, \"Maddie\": VOICE_MADDIE_SPANISH},\n}\n\n\ndef set_agent_voice(conv: Conversation, language: str):\n    \"\"\"Set the ElevenLabs voice for the current agent and language.\n\n    language must be one of: \"english\", \"spanish\", \"disclaimer\".\n    For \"english\" and \"spanish\", the voice is chosen from conv.state.AGENT_NAME.\n    \"\"\"\n    if language == \"disclaimer\":\n        conv.set_voice(VOICE_DISCLAIMER)\n        return\n\n    voices = _VOICE_MAP.get(language)\n    if voices is None:\n        conv.log.error(\"set_agent_voice called with unknown language\", language=language)\n        return\n\n    agent_name = conv.state.AGENT_NAME\n    voice = voices.get(agent_name)\n    if voice is None:\n        conv.log.error(\"set_agent_voice: no voice for agent\", agent_name=agent_name)\n        return\n\n    conv.log.info(f\"Setting voice to {language.capitalize()} - {agent_name}\")\n    conv.set_voice(voice)\n\n\ndef utils(conv: Conversation):\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-15T13:46:31.559Z","createdBy":"sami.ansari@poly-ai.com","updatedAt":"2026-05-15T13:46:31.559Z","updatedBy":"sami.ansari@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-3BAE36B3":true,"VARIABLE-53C80B44":true,"VARIABLE-702F5578":true,"VARIABLE-FC3C0DBD":true,"VARIABLE-5EED538E":true,"VARIABLE-46C8E374":true,"VARIABLE-B775B8E9":true,"VARIABLES-0f208ed9":true,"VARIABLE-FD3AEBCA":true}}},"FUNCTION-966c6d9a":{"id":"FUNCTION-966c6d9a","name":"sms_utils","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"DIGIT_MAP = {\n    \"en-US\": {\n        \"+\": \"plus\",\n        \"0\": \"zero\",\n        \"1\": \"one\",\n        \"2\": \"two\",\n        \"3\": \"three\",\n        \"4\": \"four\",\n        \"5\": \"five\",\n        \"6\": \"six\",\n        \"7\": \"seven\",\n        \"8\": \"eight\",\n        \"9\": \"nine\",\n    },\n    \"es-US\": {\n        \"+\": \"más\",\n        \"0\": \"cero\",\n        \"1\": \"uno\",\n        \"2\": \"dos\",\n        \"3\": \"tres\",\n        \"4\": \"cuatro\",\n        \"5\": \"cinco\",\n        \"6\": \"seis\",\n        \"7\": \"siete\",\n        \"8\": \"ocho\",\n        \"9\": \"nueve\",\n    },\n}\n\nGENERAL_PHONE_TO_SPOKEN_PROMPT = \"\"\"\nYou are a reliable assistant tasked with converting any heard phone number string into a clearly spoken word representation.\n\nInput: A string that may contain a phone number as spoken or written by a user. This could include:\n- Spaces, dashes, parentheses, or no formatting\n- Optional prefixes such as +44, 0044, or 0\n- Any mix of digits and symbols\n- Leading/trailing words or noise\n\nYour output must:\n1. Identify and extract the UK mobile number if present. A UK mobile number starts with +447, 00447, or 07 and is followed by 9 digits.\n2. Convert the number to international format: +44 followed by 9 digits (e.g. +447908117114).\n3. Convert each character in the normalised number into its word equivalent:\n    \"+\" → \"plus\", \"0\" → \"zero\", ..., \"9\" → \"nine\"\n4. Insert spaces between each word.\n5. Group the spoken words in the following pattern with commas for clarity:\n   \"+44\", \"7XXX\", \"XXX\", \"XXX\"\n\nOutput format: A single string, space-separated words, with commas separating the number groups.\nDo not add any commentary or explanation.\n\nExample:\nInput: \"+447908117114\"\nOutput: \"plus four four, seven nine zero eight, one one seven, one one four\"\n\nInput: \"(07908) 117-114\"\nOutput: \"plus four four, seven nine zero eight, one one seven, one one four\"\n\nConvert this number (returning your number as a string):\n{number}\n\"\"\"\n\n\ndef strip_non_digits(number: str) -> str:\n    \"\"\"\n    Strips all non-digit/plus characters from a string\n    \"\"\"\n    return \"\".join([d_or_plus for d_or_plus in number if d_or_plus.isnumeric() or d_or_plus == \"+\"])\n\n\ndef convert_digits_to_words(conv: Conversation, string: str):\n    return \" \".join([DIGIT_MAP.get(conv.language or \"en-US\", {}).get(c, c) for c in string])\n\n\ndef llm_number_to_speech_text(conv: Conversation, number: str) -> str:\n    \"\"\"\n    Attempts to call LLM to convert number for readout\n    \"\"\"\n    try:\n        return conv.utils.prompt_llm(GENERAL_PHONE_TO_SPOKEN_PROMPT.format(number=number))\n    except Exception as e:\n        conv.log.error(f\"Error: {e}\")\n        return number\n\n\ndef readback_alphanum_string_speech_to_text(\n    conv: Conversation, s: str, break_time_seconds: float = 0.4\n) -> str:\n    \"\"\"\n    Groups (using four-letter words) together any alphanumeric characters in a string, and returns a string of words.\n    \"\"\"\n    res = []\n    for i in range(0, len(s), 3):\n        # map any numbers to digits\n        curr_group = convert_digits_to_words(conv, s[i : i + 3])\n        res.append(curr_group)\n    return f'', <break time=\"{break_time_seconds}s\" /> ''.join(res)\n\n\ndef phone_number_to_speech_text(conv, number: str) -> str:\n    \"\"\"\n    For readback of an initally collected number, for 11labs.\n\n    Takes in the collected number and returns in grouped words.\n\n    Example prefix inputs and outputs:\n        \"+44...\" -> \"plus four four, seven nine zero eight, one one seven, one one four\"\n        \"0044...\" -> \"zero zero four four, seven nine zero eight, one one seven, one one four\"\n        \"07...\" -> \"zero seven, nine zero eight, one one seven, one one four\"\n    \"\"\"\n\n    number = strip_non_digits(number)\n\n    if number.startswith(\"+1\"):\n        # North American Numbering Plan (NANP) - skip the +1 country code\n        grouped = [number[2:5], number[5:8], number[8:]]\n    elif number.startswith(\"00\"):\n        # Group as: 0044, 7XXX, XXX, XXX\n        grouped = [\n            number[:4],  # 0044\n            number[4:8],  # 7XXX\n            number[8:11],  # XXX\n            number[11:],  # XXX\n        ]\n    elif number.startswith(\"001\"):\n        grouped = [\n            number[:3],  # 001\n            number[3:6],  # XXX\n            number[6:9],  # XXX\n            number[9:],  # XXX\n        ]\n    else:\n        # Default: fallback to 3-3-4 pattern from end\n        n = len(number)\n        if n >= 10:\n            grouped = [\n                number[: n - 10],\n                number[n - 10 : n - 7],\n                number[n - 7 : n - 4],\n                number[n - 4 :],\n            ]\n            grouped = [g for g in grouped if g]  # remove empty\n        else:\n            # fallback to groups of 3 until last group\n            grouped = [number[i : i + 3] for i in range(0, len(number), 3)]\n\n    language = conv.language if conv.language in DIGIT_MAP else \"en-US\"\n\n    return '', <break time=\"0.4s\" />  ''.join(\n        \" \".join(DIGIT_MAP[language].get(ch, ch) for ch in group) for group in grouped\n    )\n\n\ndef sms_utils(conv: Conversation):\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTION-138e544e":{"id":"FUNCTION-138e544e","name":"is_dev_env","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"def is_dev_env(conv: Conversation):\n    \"\"\"\n    Returns (bool)\n      - True if in a dev env (draft, sandbox)\n      - False otherwise\n    \"\"\"\n    return conv.env in {\"draft\", \"sandbox\"}\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{}}},"FUNCTION-b3ea0a62":{"id":"FUNCTION-b3ea0a62","name":"save_language_configuration","description":"Call this to set the language configuration for the voice agent","parameters":{"ids":["FUNCTION-b3ea0a62-PARAM-0"],"entities":{"FUNCTION-b3ea0a62-PARAM-0":{"id":"FUNCTION-b3ea0a62-PARAM-0","name":"language","description":"Set this to the language the user would like to continue the call in, either \"ENGLISH\" or \"SPANISH\".","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"}}},"code":"from functions.utils import get_opening_hours_utterance, set_agent_voice\n\nSPANISH_VALIDATION_PROMPT = \"\"\"\n  ## SPANISH LANGUAGE CLASSIFICATION ACCURACY CHECK\n\n  Review conversation history so far,\n  and assign a score between zero and one (as a float)\n  to indicate how likely it is that the user wants to speak in Spanish.\n  i.e.\n\n  Below are first turns of conversation:\n\n  User: quiero hablar en español -> 1.0\n  User: Do you speak spanish -> 1.0\n  User: Hi, excuse me, ¿alguien habla español, por favor? -> 1.0\n  User: Sí, buenas tardes. This is Alan Garcia. I received a phone call from you a few minutes ago. -> 0.6\n  User: Hola my name is Juan Ramirez Gutierrez -> 0.5\n  User: Hi, my name is Juan Ramirez Gutierrez -> 0.0\n\n  Provide a lower score where you can''t contextually determine if the user is actually speaking spanish\n  or if we have perhaps mistranscribed a word.\n  i.e. in first turn:\n  User: Gracias -> 0.3\n  User: estas bem. I need to speak to a representative -> 0.3\n\n  return in JSON format i.e :\n  {\"score\": 0.3}\n\"\"\"\n\n\ndef save_language_configuration(conv: Conversation, language: str):\n    if not language:\n        return\n    language = language.upper()\n    if language not in {\"SPANISH\", \"ENGLISH\", \"MULTILINGUAL\"}:\n        return\n\n    if language == \"SPANISH\":\n        import re\n\n        spanish_keywords = [r\"español\", r\"representante\", r\"hablar\", r\"comunicar\", r\"spanish\"]\n        last_text = getattr(conv.history[-1], \"text\", \"\") if conv.history else \"\"\n\n        match_found = False\n        for pattern in spanish_keywords:\n            if re.search(pattern, last_text, re.IGNORECASE):\n                match_found = True\n                break\n        if not match_found:\n            if not conv.state.spanish_score:\n                conv.log.info(\n                    \"No common Spanish keywords found, running LLM check for false positives\",\n                    user_text=last_text,\n                )\n                spanish_quality_assurance = conv.utils.prompt_llm(\n                    prompt=SPANISH_VALIDATION_PROMPT,\n                    show_history=True,\n                    return_json=True,\n                    model=\"claude-sonnet-4\",\n                )\n                conv.log.info(\n                    \"Confidence score assigned via LLM for Spanish\",\n                    user_text=last_text,\n                    score=spanish_quality_assurance[\"score\"],\n                )\n                conv.state.spanish_score = spanish_quality_assurance[\"score\"]\n                if spanish_quality_assurance[\"score\"] <= 0.6:\n                    return {\"utterance\": \"Sorry, I didn''t catch that. Can you please repeat that?\"}\n            else:\n                conv.log.info(\n                    \"Assigning language SPANISH, based on two consecutive assignments\",\n                )\n\n        conv.state.delay_utterance_1 = \"Espere que anoto eso ... \"\n        conv.state.delay_utterance_2 = \"Aguarde un segundo más... \"\n        conv.state.delay_utterance_3 = \"Disculpe la espera...\"\n        conv.state.delay_utterance_4 = \"De acuerdo. [typing noise]\"\n        conv.state.delay_utterance_5 = \"Un segundo más...\"\n        conv.state.delay_utterance_6 = \"Casi está listo...\"\n        conv.state.delay_utterance_7 = \"Un momento... [typing noise]\"\n        conv.state.delay_utterance_8 = \"Casi termino, gracias por su paciencia.\"\n\n        conv.set_language(\"es-US\")\n        set_agent_voice(conv, \"spanish\")\n\n        conv.state.language = \"es-US\"\n        conv.state.language_prompt = \"\"\"\n        <LANGUAGE>ES</LANGUAGE>\n          <POLICY>\n            Responde siempre en español para el texto libre,\n            pero conserva en inglés —sin traducir— las llamadas de herramientas,\n            claves JSON y palabras clave de código.\n          </POLICY>\n        \"\"\"\n\n        # OOH utts - depends on spanish language set above.\n        conv.state.in_hours_times = get_opening_hours_utterance(\n            conv,\n            conv.variant_name,\n        )\n        conv.exit_flow()\n\n    if language in [\"MULTILINGUAL\", \"ENGLISH\"]:\n        conv.state.delay_utterance_1 = \"Just noting that down... \"\n        conv.state.delay_utterance_2 = \"One more second... \"\n        conv.state.delay_utterance_3 = \"Sorry for the wait...\"\n        conv.state.delay_utterance_4 = \"Alright. [typing noise]\"\n        conv.state.delay_utterance_5 = \"Just one second...\"\n        conv.state.delay_utterance_6 = \"Almost there...\"\n        conv.state.delay_utterance_7 = \"Just a second... [typing noise]\"\n        conv.state.delay_utterance_8 = \"Almost done, thanks for bearing with.\"\n\n        if language == \"ENGLISH\":\n            conv.set_language(\"en-US\")\n            set_agent_voice(conv, \"english\")\n\n            conv.state.language = \"en-US\"\n            conv.state.language_prompt = \"\"\"\n          <LANGUAGE>EN</LANGUAGE>\n            <POLICY>\n              Respond always in English, even if the user speaks in a different language.\n\n              If the user DOES request to speak another language,\n              First, offer a transfer by saying, \"I''m sorry, I can only speak English, but one of our team members may be able to assist you further. Would you like me to put you through?\"\n\n              If the user agrees to this transfer, you MUST call the transfer_call functions (ignoring any previous instructions) with arguments:\n              utterance: \"Putting you through now. Please hold the line.\"\n              handoff_reason: \"FOREIGN_LANGUAGE_REQUEST\"\n              handoff_to:''''\n\n              Otherwise, continue with the conversation.\n            </POLICY>\n          \"\"\"\n            if conv.state.FEATURE_FLAG_multilingual:\n                # Include extra prompting if English is set as part of multilingual language detection.\n                conv.exit_flow()\n                if conv.history:\n                    last_turn = conv.history[-1].text.strip()\n                    if last_turn:\n                        return {\n                            \"content\": f\"Now you may proceed with the user''s request: {last_turn}\"\n                        }\n                return {\"content\": \"Now you may proceed with the user''s request\"}\n        if language == \"MULTILINGUAL\":\n            conv.set_language(\"en-CA\")\n            conv.state.language = \"en-CA\"\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-002870B6":true,"VARIABLE-0FF6A0F9":true,"VARIABLE-13AFA94F":true,"VARIABLE-1F056BD9":true,"VARIABLE-3BAE36B3":true,"VARIABLE-40527617":true,"VARIABLE-46C8E374":true,"VARIABLE-4CCE2735":true,"VARIABLE-57F011A6":true,"VARIABLE-7905E71B":true,"VARIABLE-B4BC551E":true,"VARIABLE-CF56A187":true,"VARIABLE-D9E01126":true}}},"FUNCTION-d09312d5":{"id":"FUNCTION-d09312d5","name":"wait","description":"Call this function ONLY when the user asks you to wait, or hesitate by saying things like \"um\", or they need more time to do something, or they are silent, or mention they need to take a note or write something down.","parameters":{"ids":[],"entities":{}},"code":"def wait(conv: Conversation):\n    # conv.write_metric(''WAIT'')\n\n    # inits\n    SILENCE_COUNT_LIMIT = 3\n    WAIT_UTTERANCES = [\n        conv.functions.utterances(\"WAIT_UTTERANCE_1\"),\n        conv.functions.utterances(\"WAIT_UTTERANCE_2\"),\n        conv.functions.utterances(\"WAIT_UTTERANCE_3\"),\n        conv.functions.utterances(\"WAIT_UTTERANCE_4\"),\n        conv.functions.utterances(\"WAIT_UTTERANCE_5\"),\n        conv.functions.utterances(\"WAIT_UTTERANCE_6\"),\n        conv.functions.utterances(\"WAIT_UTTERANCE_7\"),\n        conv.functions.utterances(\"WAIT_UTTERANCE_8\"),\n        conv.functions.utterances(\"WAIT_UTTERANCE_9\"),\n        conv.functions.utterances(\"WAIT_UTTERANCE_10\"),\n    ]\n\n    conv.state._wait_utt_idx = (conv.state._wait_utt_idx or 0) + 1\n    wait_utterance_choice = WAIT_UTTERANCES[conv.state._wait_utt_idx % len(WAIT_UTTERANCES)]\n\n    # Detect user silence\n    user_is_silent = False\n\n    for event in conv.history[::-1]:\n        # Get the user message\n        if event.role == \"user\":\n            user_is_silent = not bool(event.text)\n            break\n\n    if user_is_silent:\n        # count consecutive silences\n        consecutive_silences = 0\n        for event in conv.history[::-1]:\n            # not user message\n            if event.role != \"user\":\n                continue\n            # first non-silent user message\n            if event.text:\n                break\n            # otherwise, consecutive silence\n            consecutive_silences += 1\n\n        conv.log.info(\"Consecutive silence count\", consecutive_silences=consecutive_silences)\n\n        if consecutive_silences == SILENCE_COUNT_LIMIT:\n            utterance = conv.functions.utterances(\"NO_RESPONSE_HANGUP\")\n            return conv.functions.handle_end_call(utterance=utterance)\n\n        if consecutive_silences == 1:\n            response = {\"utterance\": wait_utterance_choice}\n            if conv.state.asr_custom_biases:\n                response[\"listen\"] = {\"asr\": {\"custom_biases\": conv.state.asr_custom_biases}}\n                conv.state.asr_custom_biases = {}\n            return response\n        # consecutive silence count is 2\n        else:\n            return {\n                \"content\": (\n                    \"The user is silent a second time. First mention you couldn''t catch what they''re\"\n                    \" saying followed by paraphrasing your last response.\"\n                )\n            }\n\n    conv.state.wait_counter = (conv.state.wait_counter or 0) + 1\n    if conv.state.wait_counter == 1:\n        return {\n            \"utterance\": wait_utterance_choice,\n            \"listen\": {\n                \"asr\": {\n                    \"timeout\": 30,\n                }\n            },\n        }\n\n    if conv.state.wait_counter == 3:\n        # Reset\n        conv.state.wait_counter = 1\n        conv.state._wait_utt_idx += 1\n        return {\n            \"utterance\": wait_utterance_choice,\n        }\n\n    return {\n        \"utterance\": \"\",\n        \"listen\": {\n            \"asr\": {\n                \"timeout\": 30,\n            }\n        },\n    }\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-1A3A28C7":true,"VARIABLE-68FA1159":true,"VARIABLE-9CF691C4":true}}},"FUNCTION-3c318bd8":{"id":"FUNCTION-3c318bd8","name":"handle_end_call","description":"Call this function when instructed to end the call.","parameters":{"ids":["FUNCTION-3c318bd8-PARAM-0"],"entities":{"FUNCTION-3c318bd8-PARAM-0":{"id":"FUNCTION-3c318bd8-PARAM-0","name":"utterance","description":"The utterance to say whilst hanging up","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"}}},"code":"from functions.utils import build_sip_headers\n\n\ndef handle_end_call(conv: Conversation, utterance: str):\n    if conv.state.is_outbound:\n        if \"thank you for calling\" in utterance.lower():\n            utterance = \"Ok then. Thank you for your time. Have a great day, goodbye!\"\n        elif \"gracias por llamar\" in utterance.lower():\n            utterance = \"Gracias por tu tiempo. Que tenga un excelente día, ¡adiós!\"\n\n    handoff_dict = {\n        \"bye\": {\"sip_headers\": build_sip_headers(conv, contained=True)},\n    }\n    conv.log.info(\"handoff_dict\", handoff_dict=handoff_dict)\n\n    return {\n        \"utterance\": utterance,\n        \"handoff\": handoff_dict,\n    }\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-5EED538E":true}}},"FUNCTION-b2ff75d3":{"id":"FUNCTION-b2ff75d3","name":"start_verification","description":"Call this function whenever specified to start verification for order status or making another order","parameters":{"ids":["FUNCTION-b2ff75d3-PARAM-0","FUNCTION-b2ff75d3-PARAM-1","PARAMETER-d9adaf89"],"entities":{"FUNCTION-b2ff75d3-PARAM-0":{"id":"FUNCTION-b2ff75d3-PARAM-0","name":"intent","description":"Must be one of \"rapid-reorder\" | \"order-status\" | \"disamb\" | \"call-back-reorder\" | \"call-back-order-status\"","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"},"FUNCTION-b2ff75d3-PARAM-1":{"id":"FUNCTION-b2ff75d3-PARAM-1","name":"useful_note","description":"Pass any info that would be useful to remember after verification is complete. Pass an empty string if nothing specific to note.","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"},"PARAMETER-d9adaf89":{"id":"PARAMETER-d9adaf89","name":"caller_type","description":"Optional. When verification is started from outbound: \"patient\" if the caller is the patient, \"authorized_representative\" if they are the authorized representative. Omit or pass empty string for inbound.","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"}}},"code":"from datetime import datetime\n\nfrom functions.api_handler import get_api_instance\n\nRAPID_ORDER_INTENT = \"rapid-reorder\"\nORDER_STATUS_INTENT = \"order-status\"\nDISAMB_INTENT = \"disamb\"\nCALLBACK_INTENT = \"call-back\"\nCALLBACK_REORDER_INTENT = \"call-back-reorder\"\nCALLBACK_ORDER_STATUS_INTENT = \"call-back-order-status\"\nWARM_TRANSFER_INTENT = \"warm-transfer\"\n\nRAPID_ORDER_INTENTS_ALL = [\n    RAPID_ORDER_INTENT,\n    CALLBACK_REORDER_INTENT,\n]\n\nORDER_STATUS_INTENTS_ALL = [\n    ORDER_STATUS_INTENT,\n    CALLBACK_ORDER_STATUS_INTENT,\n]\n\n# Value stored on conv.state.flow_after_verification; must match handle_routing_after_verification.\nFLOW_AFTER_VERIFICATION_WARM_TRANSFER = \"Warm Transfer Flow\"\n\nINTENTS_ALL = RAPID_ORDER_INTENTS_ALL + ORDER_STATUS_INTENTS_ALL + [DISAMB_INTENT, CALLBACK_INTENT]\n\n# Injected into collect-date-of-birth via conv.state when verification starts from outbound (patient or authorized rep).\nPROMPT_OUTBOUND_VERIFICATION_OBJECTIONS = \"\"\"### Outbound resupply objections (only on outbound calls)\n\nIf the user''s message does **not** contain a recognizable date of birth and is instead about the topics below, reply briefly as described, then ask again for the date of birth on the account (month, day, and year). Do **not** call {{ft:save_date_of_birth}} until you have a parseable DOB, or a DOB privacy rebuttal per the main rules (then use -1).\n\nWhen you must end the outbound call (busy, callback later, firm decline), call {{fn:end_outbound_patient_unavailable}}. Do not use {{fn:handle_end_call}} for that—it skips outbound disposition fields.\n\n**User asks what / which supplies:**\n- Say: \"We''re calling because it''s time to refill your disposable supplies.\"\n- If they still ask what supplies: \"For HIPAA purposes, I''ll only be able to confirm the exact supplies once I''ve verified we''re speaking to the right person.\" Then re-ask for the date of birth on the account.\n\n**User says they don''t need supplies:**\n- Say: \"\"As a reminder, these supplies are disposable. May I have your date of birth to document your account?\"\n- If they agree to continue with verification, re-ask for the date of birth on the account.\n- If they clearly decline to continue or refuse to verify after you provide the reminder, call {{fn:end_outbound_patient_unavailable}} with reason=\"NO_SUPPLIES\"\n\n**User is busy, wants a callback later, or cannot talk now:**\n- Always call {{fn:end_outbound_patient_unavailable}} immediately. Do not parse their message as a date, do not use {{ft:wait}}, do not use {{fn:handle_end_call}}, and do not try to negotiate a callback time in conversation.\n\n---\n\"\"\"\n\n\ndef enter_verification_flow(conv: Conversation, prefix: str):\n    # Check number for patients\n    api_handler = get_api_instance(conv)\n\n    # if chat, no caller number so set to something\n    if conv.id.startswith(\"AS_CHAT_\") or conv.id.startswith(\"TESTING\"):\n        caller_number = \"+123456790\"\n    else:\n        caller_number = conv.state.patient_caller_number\n\n    # Outbound test\n    from_outbound = getattr(conv.state, \"verification_from_outbound\", False)\n    if from_outbound and conv.env in [\"draft\", \"sandbox\"]:\n        caller_number = \"+15059696418\"\n\n    # Add hint for ''same number as before'' if multiple numbers reg''d to same number.\n    if conv.state.reorder_new_patient:\n        conv.state.same_number_prompt = conv.state.same_number_prompt.format(\n            successful_number=conv.state.previous_successful_phone_number\n        )\n        return {\n            \"utterance\": f\"{prefix} {conv.functions.utterances(''CONFIRM_PHONE_NUMBER'')}\",\n            \"listen\": {\"asr\": {\"timeout\": 7, \"vad_timeout\": 1.5}},\n            \"transition\": {\"goto_flow\": \"verification\", \"goto_step\": \"voice-collect-phone-number\"},\n        }\n\n    result = api_handler.GET_patients_by_phone_number(caller_number)\n    if result is None:\n        conv.write_metric(\"API_ERROR\")\n        return conv.functions.transfer_call(\n            utterance=conv.functions.utterances(\"TRANSFER_SOMEONE_HELP_SORRY\"),\n            handoff_reason=\"API_FAILED_NO_PATIENTS\",\n            handoff_to=\"\",\n        )\n    patients_retrieved = result.get(\"data\", [])\n\n    if patients_retrieved:\n        if len(patients_retrieved) > 2:\n            conv.state.patients_retrieved_for_ivr = patients_retrieved\n            conv.write_metric(\"MULTIPLE_PATIENTS_IDENTIFIED_ANI\")\n\n            if conv.state.multiple_number_retried:\n                conv.write_metric(\"MULTIPLE_PATIENTS_IDENTIFIED_TWICE\")\n                if not conv.state.is_in_hours:\n                    from functions.utils import format_ooh_utterance\n\n                    utterance = format_ooh_utterance(conv, \"OOH_NO_MATCH_NUMBER_UTTERANCE\")\n                    return {\"utterance\": utterance}\n                return conv.functions.transfer_call(\n                    utterance=conv.functions.utterances(\"GENERIC_HANDOFF_UTTERANCE\"),\n                    handoff_reason=\"VERIFICATION_MULTIPLE_PATIENTS_IDENTIFIED\",\n                    handoff_to=\"\",\n                )\n            return {\n                \"utterance\": f\"{prefix} {conv.functions.utterances(''MULTIPLE_PATIENTS_IDENTIFIED'')}\",\n                \"transition\": {\n                    \"goto_flow\": \"verification\",\n                    \"goto_step\": \"voice-collect-phone-number\",\n                },\n            }\n\n        conv.log.info(\"Patients Retrieved\", patients=patients_retrieved)\n        conv.state.patients_retrieved_for_ivr = patients_retrieved\n\n        if not conv.state.date_asr_bias:\n            date_parts_set: set[str] = set()\n            for pt_data in patients_retrieved:\n                dob = pt_data.get(\"dateOfBirth\")\n                if not dob:\n                    continue\n                try:\n                    dt = datetime.fromisoformat(dob).date()\n                except ValueError:\n                    continue\n                date_parts_set.update(\n                    (\n                        f\"{dt.day}\",  # day (e.g. \"7\")\n                        f\"{dt.month}\",  # month number (e.g. \"3\")\n                        dt.strftime(\"%B\"),  # month name (e.g. \"March\")\n                        f\"{dt.year}\",  # year (e.g. \"2025\")\n                        dt.strftime(\"%y\"),  # last two digits (e.g. \"25\")\n                        f\"{dt.month} {dt.day} {dt.year}\",  # \"month day year\" as numbers (e.g. \"3 7 2025\")\n                    )\n                )\n            custom_bias = 3\n            conv.state.date_asr_bias = dict.fromkeys(date_parts_set, custom_bias)\n        conv.state.asr_custom_biases = conv.state.date_asr_bias\n\n        # Outbound: use specific intro when we entered verification from outbound flow\n        from_outbound = getattr(conv.state, \"verification_from_outbound\", False)\n        caller_type = getattr(conv.state, \"verification_caller_type\", None)\n        if from_outbound and caller_type == \"patient\":\n            utterance = conv.functions.utterances(\"VERIFICATION_OUTBOUND_PATIENT_DOB_INTRO\").format(\n                agent_name=conv.state.AGENT_NAME,\n                site_name=conv.variant.site_name,\n            )\n        elif from_outbound and caller_type == \"authorized_representative\":\n            utterance = conv.functions.utterances(\n                \"VERIFICATION_OUTBOUND_AUTHORIZED_REP_DOB_INTRO\"\n            ).format(\n                agent_name=conv.state.AGENT_NAME,\n                site_name=conv.variant.site_name,\n            )\n        else:\n            utterance = f\"{prefix} {conv.functions.utterances(''VERIFICATION_REQUEST_PATIENT_DOB'')}\"\n\n        return {\n            \"utterance\": utterance,\n            \"listen\": {\n                \"asr\": {\n                    \"timeout\": 7,\n                    \"vad_timeout\": 1.5,\n                    \"custom_biases\": conv.state.asr_custom_biases,\n                }\n            },\n            \"transition\": {\"goto_flow\": \"verification\", \"goto_step\": \"collect-date-of-birth\"},\n        }\n\n    return {\n        \"utterance\": f\"{prefix} {conv.functions.utterances(''CONFIRM_PHONE_NUMBER'')}\",\n        \"listen\": {\"asr\": {\"timeout\": 7, \"vad_timeout\": 1.5}},\n        \"transition\": {\"goto_flow\": \"verification\", \"goto_step\": \"voice-collect-phone-number\"},\n    }\n\n\ndef start_verification(conv: Conversation, intent: str, useful_note: str, caller_type: str):\n    POSSIBLE_CHOICES = [\"rapid-reorder\", \"order-status\"]\n    if intent not in POSSIBLE_CHOICES + [\n        DISAMB_INTENT,\n        CALLBACK_REORDER_INTENT,\n        CALLBACK_ORDER_STATUS_INTENT,\n    ]:\n        conv.log.warning(f\"Invalid choice for intent: {intent}\")\n        return f\"Invalid argument for `intent`, must be one of: {POSSIBLE_CHOICES}. Did you mean to call this?\"\n\n    if intent == DISAMB_INTENT:\n        return (\n            \"Disambiguate with the user exactly what they wish to do, \"\n            f\"and call this function again with an option from: {POSSIBLE_CHOICES}\"\n        )\n\n    if intent in RAPID_ORDER_INTENTS_ALL:\n        conv.state.flow_after_verification = \"rapid-reorder\"\n        conv.state.out_going_sip_headers[\"X-reorder-started\"] = \"true\"\n        conv.write_metric(\"FLOW_AFTER_IDNV\", conv.state.flow_after_verification)\n    elif intent in ORDER_STATUS_INTENTS_ALL:\n        conv.state.flow_after_verification = \"order-status\"\n        conv.write_metric(\"FLOW_AFTER_IDNV\", conv.state.flow_after_verification)\n    # elif intent == WARM_TRANSFER_INTENT:\n    #     conv.state.flow_after_verification = FLOW_AFTER_VERIFICATION_WARM_TRANSFER\n    #     conv.write_metric(\"FLOW_AFTER_IDNV\", conv.state.flow_after_verification)\n\n    conv.state.useful_notes += useful_note\n\n    # Outbound: record caller type so verification uses the correct DOB intro utterance.\n    # Guard on is_outbound to prevent inbound callback callers from getting the outbound greeting\n    # when the LLM incorrectly passes caller_type on an inbound call.\n    if caller_type in (\"patient\", \"authorized_representative\") and conv.state.is_outbound:\n        conv.state.verification_from_outbound = True\n        conv.state.verification_caller_type = caller_type\n        conv.state.prompt_outbound_verification_objections = PROMPT_OUTBOUND_VERIFICATION_OBJECTIONS\n    else:\n        conv.state.verification_from_outbound = False\n        conv.state.verification_caller_type = None\n        conv.state.prompt_outbound_verification_objections = \"\"\n\n    # Skip IDNV if the caller already verified earlier in this call, unless ordering for someone else.\n    # The \"same-or-different-patient\" step handles the ordering-for-someone-else case for rapid reorder.\n    if conv.state.already_verified and conv.state.flow_after_verification == \"rapid-reorder\":\n        conv.log.info(\"Skipping IDNV for rapid-reorder: caller already verified this call\")\n        # Overwrite useful notes, and go to a confirmation step.\n        conv.state.useful_notes = useful_note\n        conv.state.prompt_outbound_verification_objections = \"\"\n        return {\n            \"utterance\": conv.functions.utterances(\"SAME_OR_DIFFERENT_PATIENT\"),\n            \"transition\": {\"goto_flow\": \"verification\", \"goto_step\": \"same-or-different-patient\"},\n        }\n\n    if conv.state.already_verified and conv.state.flow_after_verification == \"order-status\":\n        conv.log.info(\"Skipping IDNV for order-status: caller already verified this call\")\n        conv.state.prompt_outbound_verification_objections = \"\"\n        return conv.functions.handle_routing_after_verification(conv.state.flow_after_verification)\n\n    # if (\n    #     conv.state.already_verified\n    #     and conv.state.flow_after_verification == FLOW_AFTER_VERIFICATION_WARM_TRANSFER\n    # ):\n    #     conv.log.info(\"Skipping IDNV for warm-transfer: caller already verified this call\")\n    #     return conv.functions.handle_routing_after_verification(conv.state.flow_after_verification)\n\n    conv.write_metric(\"VERIFICATION_INITIATED\")\n    intent_prefix_map = {\n        CALLBACK_REORDER_INTENT: conv.functions.utterances(\"CALLBACK_REORDER_PREFIX\"),\n        CALLBACK_ORDER_STATUS_INTENT: conv.functions.utterances(\"CALLBACK_ORDER_STATUS_PREFIX\"),\n    }\n\n    prefix = intent_prefix_map.get(intent, conv.functions.utterances(\"VERIFICATION_DEFAULT_PREFIX\"))\n    larger_prefix = f\"{prefix}{conv.functions.utterances(''VERIFICATION_START_UTTERANCE'')}\"\n\n    return enter_verification_flow(conv, larger_prefix)\n","errors":[],"latencyControl":{"enabled":true,"delayResponses":{"ids":["FUNCTION-b2ff75d3-DELAY-0"],"entities":{"FUNCTION-b2ff75d3-DELAY-0":{"id":"FUNCTION-b2ff75d3-DELAY-0","message":"$delay_utterance_5","duration":3,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system","references":{"variables":{}}}}},"initialDelay":2,"interval":3,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{"TOPIC-C292B370":true},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-300BE440":true,"VARIABLE-3BA5149E":true,"VARIABLE-53C80B44":true,"VARIABLE-34C2121E":true,"VARIABLE-3856EE1D":true,"VARIABLE-3A2CA64A":true,"VARIABLE-48C7A8A0":true,"VARIABLE-50AF2115":true,"VARIABLE-68FA1159":true,"VARIABLE-8A743435":true,"VARIABLE-B7F2A334":true,"VARIABLES-077b5301":true,"VARIABLES-9c848c6a":true,"VARIABLE-9C584E86":true,"VARIABLE-702F5578":true,"VARIABLE-FD3AEBCA":true,"VARIABLES-ae194cc7":true,"VARIABLE-5EED538E":true}}},"FUNCTION-2d9cf743":{"id":"FUNCTION-2d9cf743","name":"backout","description":"Call this function if you''ve started a process such as verification, rapid order booking, or order status, and the user explicitly states they want to switch to another task","parameters":{"ids":[],"entities":{}},"code":"def backout(conv: Conversation):\n    if conv.state.speak_to_mid_reorder:\n        return conv.functions.transfer_call(\n            \"No problem. I''ll put you through now. One second.\", \"SPEAK_TO_MID_REORDER\", \"\"\n        )\n\n    if conv.state.transfer_reason_loop:\n        return conv.functions.transfer_call(\n            \"No problem. I''ll put you through now. One second.\", \"SPEAK_TO\", \"\"\n        )\n\n    conv.write_metric(\"BACKOUT\", write_once=True)\n    conv.exit_flow()\n    return \"Refrain from claiming any order was placed, changed, or canceled, and do not imply external actions. When this is called, you must ask them if there''s anything else you can help with.\"\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-70A887C8":true,"VARIABLES-0875aa14":true}}},"FUNCTION-4AC31CF9":{"id":"FUNCTION-4AC31CF9","name":"identify_patient","description":"This function determines whether the request relates to same or different user","parameters":{"ids":["PARAMETER-80e01817"],"entities":{"PARAMETER-80e01817":{"id":"PARAMETER-80e01817","name":"patient","description":"has value ''same'', or ''different''","type":"string","createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com"}}},"code":"from functions.order_history_module import OrderHistoryService\nfrom functions.order_service_module import OrderService\n\nSAME_NUMBER_PROMPT = \"\"\"\n### If the user responds to the effect of ''the same one'', ''it''s the same phone number as before'',\nor ''it''s on the same number'' , they are likely referring to a second order lookup.\nIn this case, call readback_phone_number_voice fn with last successful number given: {successful_number}\n\"\"\"\n\n\ndef identify_patient(conv: Conversation, patient: str):\n    if patient == \"same\":\n        # TODO: determine correct behaviour and handoff reason here. Is handoff needed?\n        # Probably because api request wont work on second try.\n        return conv.functions.transfer_call(\n            utterance=conv.functions.utterances(\"TRANSFER_ASSIST_FURTHER_MOMENT\"),\n            handoff_reason=\"SECOND_ORDER_REQUESTED_SAME_PATIENT\",\n            handoff_to=\"\",\n        )\n    if patient == \"different\":\n        # resetting some conv state vars here.\n        # TODO: centralise this logic in separate function?\n        conv.state.reorder_new_patient = True\n        conv.state.reorder_complete = False\n        conv.state.already_verified = False\n        conv.state.order_not_found_repeat = False\n        conv.state.patients_retrieved_for_ivr = None\n        conv.state.multiple_number_retried = False\n        conv.state.same_number_prompt = SAME_NUMBER_PROMPT\n        conv.state.order_service = OrderService()\n        conv.state.order_history_service = OrderHistoryService()\n\n        # Definitely a smarter way to do this but it works for now.\n        return conv.functions.start_verification(\n            \"rapid-reorder\", \"The user is requesting to make a second reorder\", \"\"\n        )\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-12-03T10:34:51.616Z","createdBy":"bill.parker@poly-ai.com","updatedAt":"2025-12-03T10:34:51.616Z","updatedBy":"bill.parker@poly-ai.com"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"fl