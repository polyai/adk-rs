er utterance without calling the transfer_call function. We stop the transfer utterance and re-prompt the LLM to call the function instead, with the utterance as one of the function arguments.","regularExpressions":["([Ll]et me|I''ll|I will|while I|need to) (put you through|transfer you|connect you)","[Pp]lease hold","transfer_call","hold the line"],"sayPhrase":false,"references":{"globalFunctions":{"FUNCTION-b017d294":true}},"createdBy":"nicole.soh@poly-ai.com","createdAt":"2025-07-28T11:35:17.020Z","updatedBy":"anchit.chandran@poly-ai.com","updatedAt":"2025-08-04T12:26:29.707Z","languageCode":""},"STOP_KEYWORD-184ddc50":{"id":"STOP_KEYWORD-184ddc50","title":"contact support","description":"do not say contact support","regularExpressions":["contact support"],"sayPhrase":false,"references":{"globalFunctions":{"FUNCTION-b017d294":true}},"createdBy":"nicole.soh@poly-ai.com","createdAt":"2025-07-28T11:36:56.198Z","updatedBy":"nicole.soh@poly-ai.com","updatedAt":"2025-07-28T11:37:12.470Z","languageCode":""}}}},"llmSettings":{"modelId":"MODEL-2ec832de","updatedAt":"2026-05-13T15:28:26.699Z","updatedBy":"nicole.soh@poly-ai.com"},"asrSettings":{"bargeIn":false,"latencyConfig":{"interactionStyle":"precise"},"updatedAt":"2026-01-21T14:35:16.078Z","updatedBy":"miles.nash@poly-ai.com"},"languages":{"defaultLanguageCode":"en-US","updatedAt":"2025-11-21T20:17:03.106Z","updatedBy":"nicole.soh@poly-ai.com","additionalLanguages":{"ids":[],"entities":{}}},"contentFilterSettings":{"type":"","azureConfig":{"violence":{"isActive":false,"precision":"MEDIUM"},"hate":{"isActive":false,"precision":"MEDIUM"},"sexual":{"isActive":false,"precision":"MEDIUM"},"selfHarm":{"isActive":false,"precision":"MEDIUM"}},"disabled":false,"updatedAt":"","updatedBy":""},"functions":{"functions":{"ids":["FUNCTION-2235e0ea","FUNCTION-64e89617","FUNCTION-a744716e","FUNCTION-c9cf7d50","FUNCTION-3a0e79f2","FUNCTION-41124cce","FUNCTION-0b206ab0","FUNCTION-7a471f0f","FUNCTION-b017d294","FUNCTION-77ee38d8","FUNCTION-8f0a505f","FUNCTION-966c6d9a","FUNCTION-138e544e","FUNCTION-b3ea0a62","FUNCTION-d09312d5","FUNCTION-3c318bd8","FUNCTION-b2ff75d3","FUNCTION-2d9cf743","FUNCTION-4AC31CF9","FUNCTION-DD547EE7","FUNCTION-397094C5","FUNCTION-DE03B2FC","FUNCTIONS-9f0cb4e5","FUNCTION-CB7167F5","FUNCTIONS-68b1656d","FUNCTION-C94B71EC","FUNCTIONS-af8f29a1","FUNCTION-317FE30C","FUNCTIONS-06c1d027","FUNCTIONS-1d0460b4","FUNCTION-F174F6FF","FUNCTION-15CAF744","FUNCTION-0795A15E","FUNCTIONS-0a1efb68","FUNCTIONS-56caaf91","FUNCTIONS-6edb575c","FUNCTIONS-8308c4df","FUNCTIONS-9265b15e","FUNCTIONS-6db2d154","FUNCTIONS-0ed163be","FUNCTIONS-030fb23b","FUNCTIONS-b4a8db73","FUNCTIONS-da1ab45a","FUNCTIONS-f03858ff"],"entities":{"FUNCTION-2235e0ea":{"id":"FUNCTION-2235e0ea","name":"order_service_module","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"\"\"\"\nThe goals of this Service are:\n    - centralised place handling complex state management of an Order\n    - rapid, high-leverage, and high-safety interfaces that do the bulk of processing, leaving flow functions\n        which use this service instance to be as dumb as possible.\n\n# Notes\n\n**Why are there methods defined in here that should be flow functions?**\n\nOften, this service includes methods that apply to only a single flow step and could be defined as a function\nwithin that step. However, we would\nthen lose type-hinting and the page load speed of switching between the flow and this page, given the\ncomplexity of this service, would be quite detrimental.\n\nAdditionally, if the method needs to be reused amongs flows, the current import syntax is quite ugly.\n\nLeveraging local agent studio, defining all the logic in this single file also leads to a nicer dev experience.\n\n**Why''s it so ugly?**\n\nLots of places are ripe for refactoring and cleaning. But deadlines and unexpected evolving requirements have led\nto the current state. Once these have settled, refactoring would be important.\n\n**Why are lists of things using an index to track the ''current'' item instead of just using a deque / popping?**\n\nTake for example the `.product_line_questions` attribute (list of question items to ask).\n\nPopping from this queue would lose information if we don''t immediately use that item (e.g. user asks some questions).\n\nThough tracking index state adds a little complexity, it enables keeping data the same, and just moving the ''pointer''\nto our current item.\n\"\"\"\n\nimport json\nimport re\nfrom typing import Literal, Optional, TypedDict\n\nimport plog\nfrom functions.api_handler import ServerBrightreeAPIError, get_api_instance\nfrom functions.sample_data import use_rapid_order_test_data\nfrom functions.sms_utils import convert_digits_to_words\n\n\nclass HcpcItemQuestionAnswerError(Exception):\n    pass\n\n\nclass UnimplementedProductLineDataTypeError(Exception):\n    pass\n\n\nclass ProductLineQuestionForLLM(TypedDict):\n    question_text: str\n    answer_choices_llm_prompt_str: str\n    data_type: Literal[\n        \"YesNo\",\n        \"YesNoDefaultNo\",\n        \"YesNoDefaultYes\",\n        \"Date\",\n        \"Integer\",\n        \"RadioButton\",\n        \"DropDownList\",\n        \"ShortText\",\n        \"Text\",\n    ]\n\n\nclass State(TypedDict):\n    key: str\n    name: str\n    code: str\n\n\nclass StateList(TypedDict):\n    data: list[State]\n\n\nclass BrightreeAddress(TypedDict):\n    street1: str\n    street2: str\n    city: str\n    state: State\n    postalCode: str\n\n\nclass Hcpc(TypedDict):\n    hcpcCode: str\n    hcpcTypeName: str\n    qty: int\n    nonFunctionalReasonAnswerChoices: list[str]\n    isRequiredBeforeBooking: bool\n    isRequiredEvenAfterBooking: bool\n    isRequiredForMedicareOnly: bool\n\n\nclass Item(TypedDict):\n    # Used for internal state tracking -> set once at load, autoincrement\n    internalKey: str\n    itemKey: str\n    itemDescription: str\n    qty: int\n    hcpcs: list[Hcpc]\n    eligibilityDrivingHcpcForItem: str\n\n\nclass ProductLineQuestionData(TypedDict):\n    productLineQuestionKey: str\n    productLineQuestionDataType: Literal[\n        \"YesNo\",\n        \"YesNoDefaultNo\",\n        \"YesNoDefaultYes\",\n        \"Date\",\n        \"Integer\",\n        \"RadioButton\",\n        \"DropDownList\",\n        \"ShortText\",\n        \"Text\",\n    ]\n    productLineQuestionName: str\n    productLineQuestionText: str\n    sortOrder: int\n    isRequiredBeforeBooking: bool\n    isRequiredEvenAfterBooking: bool\n    isRequiredForMedicareOnly: bool\n    mustBeYesGroupName: str\n    mustBeNoGroupName: str\n    answerChoices: list[str]\n    # Filled in during conversation\n    userAnswer: Optional[str]\n\n\nclass RapidOrder(TypedDict):\n    rapidOrderKey: str\n    patientKey: str\n    patientFirstName: str\n    patientPreferredFirstName: str\n    patientLastName: str\n    patientEmailAddress: str\n    patientBillingAddress: BrightreeAddress\n    items: list[Item]\n    productLineQuestions: list[ProductLineQuestionData]\n    previousOrderShippingAddress: BrightreeAddress\n    previousOrderShippingPhone: str\n    previousOrderShippingPhoneMobile: str\n    primaryInsuranceName: str\n    optionalCallForCopayText: str\n\n\nclass PatientDetails(TypedDict):\n    patientKey: str\n    dateOfBirth: str\n    contactUsNumber: str\n    transferPhoneNumber: str\n\n\nclass CampaignPatientKeyData(TypedDict):\n    key: str\n\n\nclass ItemHcpcData(TypedDict):\n    itemKey: str\n    qty: int\n    hcpcCode: str\n    hcpcTypeName: str\n    nonFunctionalReasonAnswerChoices: list[str]\n    # Initially None, otherwise value from nonFunctionalReasonAnswerChoices\n    hcpcNonFunctionalReasonAnswer: Optional[str]\n\n\nclass AllItemHcpcData(TypedDict):\n    insurance_question_items: list[ItemHcpcData]\n    non_insurance_question_items: list[ItemHcpcData]\n\n\nclass EducationItem(TypedDict):\n    internalKey: str\n    itemDescription: str\n    utterances: list[str]\n\n\n# RAPID ORDER POST BODY\nclass ProductLineAnswerPOSTBody(TypedDict):\n    productLineQuestionKey: str\n    answer: str\n\n\nclass HcpcNonFunctionalReasonAnswerSubmissionPOSTBody(TypedDict):\n    hcpcCode: str\n    nonFunctionalReasonAnswer: str\n\n\nclass ItemHcpcDataForRapidOrderSubmissionPOSTBody(TypedDict):\n    itemKey: str\n    itemQuantity: int\n    hcpcNonFunctionalReasonAnswers: list[HcpcNonFunctionalReasonAnswerSubmissionPOSTBody]\n\n\nclass ShippingAddressSubmissionPOSTBody(TypedDict):\n    street1: str\n    street2: str\n    city: str\n    stateKey: str  # Refers to State[\"key\"]\n    postalCode: str\n\n\nclass BillingAddressSubmissionPOSTBody(TypedDict):\n    street1: str\n    street2: str\n    city: str\n    stateCode: str\n    postalCode: str\n\n\nclass RapidOrderSubmissionPOSTBody(TypedDict):\n    rapidOrderKey: str\n    campaignPatientKey: Optional[str]\n    items: list[ItemHcpcDataForRapidOrderSubmissionPOSTBody]\n    shippingAddress: ShippingAddressSubmissionPOSTBody\n    isShippingAddressConfirmedByPatient: bool\n    productLineAnswers: list[ProductLineAnswerPOSTBody]\n    isPrimaryInsuranceOnFileCorrect: bool\n    isCopayCallRequested: bool\n    primaryInsurance: dict\n\n\nHCPC_ITEM_EDUCATION_UTTERANCE_MAP = {\n    \"A7030\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A7030\",\n    \"A7034\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A7034\",\n    \"A7031\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A7031\",\n    \"A7032\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A7032\",\n    \"A7033\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A7033\",\n    \"A7035\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A7035\",\n    \"A7037\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A7037\",\n    \"A4604\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A4604\",\n    \"A7038\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A7038\",\n    \"A7039\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A7039\",\n    \"A7046\": \"HCPC_ITEM_EDUCATION_UTTERANCE_A7046\",\n}\n\n\nclass OrderService:\n    def __init__(self):\n        # These are set by api\n        self.patient_details: Optional[PatientDetails] = None\n        self.rapid_order_data: Optional[RapidOrder] = None\n\n        # These are related to the order made by patient\n        self.new_order_items: list[Item] = []\n        # Used to track items removed from order\n        self.removed_order_items: list[Item] = []\n        self.all_hcpc_items: AllItemHcpcData = {\n            \"insurance_question_items\": [],\n            \"non_insurance_question_items\": [],\n        }\n        self._loaded_hcpc_items: bool = False\n        # This tracks only the insurance hcpc item questions\n        self.hcpc_item_question_idx: int = 0\n        # education\n        self.education_items: list[EducationItem] = []\n        self.education_item_idx: int = 0\n        self.education_given: bool = False\n        self._said_initial_edu_utt = False\n        # product line questions\n        self.product_line_questions: list[ProductLineQuestionData] = []\n        self.product_line_question_idx: int = 0\n        self.removed_item_keys: list[str] = []\n        self.item_quantity_changes: dict[str, int] = {}\n        self.updated_shipping_address = None\n        self.updated_billing_address = None\n        self.updated_primary_insurance = {}\n        self.site_state_info: Optional[StateList] = None\n\n    def set_patient_details(self, patient_details: PatientDetails) -> None:\n        self.patient_details = patient_details\n\n    def reset_current_order(self) -> None:\n        self.new_order_items = self.get_all_items_in_rapid_order()\n        plog.info(\n            f\"reset current order to {len(self.new_order_items)} items\",\n            new_order_items=self.new_order_items,\n        )\n\n    def set_rapid_order_data(self, rapid_order_data: RapidOrder) -> None:\n        self.rapid_order_data = rapid_order_data\n        # Set internal key for each item\n        for ix, item in enumerate(self.rapid_order_data[\"items\"]):\n            item[\"internalKey\"] = str(ix)\n\n        self.new_order_items = self.get_all_items_in_rapid_order()\n        plog.info(\"setting initial items in order\", rapid_order_data=self.new_order_items)\n\n    def get_patient_details(self) -> PatientDetails:\n        if self.patient_details is None:\n            raise ValueError(\"Patient details not set\")\n        return self.patient_details\n\n    def _ensure_only_supported_product_line_data_types(self, rapid_order_data: RapidOrder) -> None:\n        supported_types = [\n            \"YesNo\",\n            \"YesNoDefaultNo\",\n            \"YesNoDefaultYes\",\n            \"Date\",\n            \"RadioButton\",\n            \"ShortText\",\n            \"Text\",\n            # \"Integer\",\n            # \"DropDownList\",\n        ]\n        for product_line_question in rapid_order_data[\"productLineQuestions\"]:\n            if product_line_question[\"productLineQuestionDataType\"] not in supported_types:\n                raise UnimplementedProductLineDataTypeError(\n                    f\"Unsupported product line question data type {product_line_question[''productLineQuestionDataType'']}\"\n                )\n\n    def load_rapid_order_data_from_api(self, conv: Conversation) -> Optional[RapidOrder]:\n        \"\"\"Raises ValueError if there is an error loading the rapid order data\"\"\"\n        conv.log.info(\"Loading rapid order data from API\")\n        patient_key = self.get_patient_details()[\"patientKey\"]\n        if rapid_order_data := use_rapid_order_test_data(conv):\n            self.set_rapid_order_data(rapid_order_data)\n            return rapid_order_data\n\n        _MAX_ATTEMPTS = 3\n        _TIMEOUT_SECONDS = 8\n        try:\n            api_handler = get_api_instance(conv)\n        except Exception as e:\n            conv.log.error(f\"Failed to get API instance: {e}\")\n            conv.state.call_result = \"no serviceable hcpcs\"\n            return None\n        rapid_order_data = None\n        for attempt in range(_MAX_ATTEMPTS):\n            try:\n                rapid_order_data = api_handler.GET_rapid_order_items_for_patient(\n                    patient_key, conv.state.campaign_patient_key, timeout=_TIMEOUT_SECONDS\n                )\n                if rapid_order_data is None:\n                    # 404 — patient has no rapid order, expected case\n                    conv.log.warning(\"No rapid order found for patient\")\n                break\n            except ServerBrightreeAPIError as e:\n                # Timeout or 5xx — transient, worth retrying\n                conv.log.warning(\n                    f\"Transient error getting rapid order data (attempt {attempt + 1}/{_MAX_ATTEMPTS}): {e}\"\n                )\n            except Exception as e:\n                # Non-transient error — don''t retry\n                conv.log.warning(\n                    f\"Unexpected error getting rapid order data (attempt {attempt + 1}/{_MAX_ATTEMPTS}): {e}\"\n                )\n                break\n        else:\n            # for-else: loop completed without break — all attempts raised ServerBrightreeAPIError\n            conv.log.error(f\"No rapid order data after {_MAX_ATTEMPTS} transient failures\")\n\n        if rapid_order_data is None:\n            conv.state.call_result = \"no serviceable hcpcs\"\n            return None\n\n        # validate\n        try:\n            self._ensure_only_supported_product_line_data_types(rapid_order_data)\n        except Exception as e:\n            conv.log.warning(f\"Error validating rapid order data {e}\")\n            return None\n\n        self.set_rapid_order_data(rapid_order_data)\n        return rapid_order_data\n\n    def get_rapid_order_data(self) -> RapidOrder:\n        return self.rapid_order_data\n\n    def check_items_in_rapid_order(self) -> bool:\n        rapid_order_data = self.get_rapid_order_data()\n        return len(rapid_order_data[\"items\"]) > 0\n\n    def get_primary_insurance_name(self) -> Optional[str]:\n        rapid_order_data = self.get_rapid_order_data()\n        return rapid_order_data[\"primaryInsuranceName\"]\n\n    def get_shipping_address(self) -> Optional[BrightreeAddress]:\n        rapid_order_data = self.get_rapid_order_data()\n        rapid_order_shipping_address = rapid_order_data.get(\"previousOrderShippingAddress\")\n        if rapid_order_shipping_address is None:\n            plog.warn(\"No shipping address found in rapid order data\")\n            return None\n        return rapid_order_shipping_address\n\n    def get_billing_address(self) -> Optional[BrightreeAddress]:\n        rapid_order_data = self.get_rapid_order_data()\n        rapid_order_billing_address = rapid_order_data.get(\"patientBillingAddress\")\n        if rapid_order_billing_address is None:\n            plog.warn(\"No billing address found in rapid order data\")\n            return None\n        return rapid_order_billing_address\n\n    def normalize_street_name(self, street: str) -> str:\n        if not street:\n            return street\n        abbrev_dict = {\n            # Streets / Roads\n            r\"\\brd\\.?(?=$|\\s|[^A-Za-z])\": \"Road\",\n            r\"\\bst\\.?(?=$|\\s|[^A-Za-z])\": \"Street\",\n            r\"\\bave\\.?(?=$|\\s|[^A-Za-z])\": \"Avenue\",\n            r\"\\bblvd\\.?(?=$|\\s|[^A-Za-z])\": \"Boulevard\",\n            r\"\\bln\\.?(?=$|\\s|[^A-Za-z])\": \"Lane\",\n            r\"\\bdr\\.?(?=$|\\s|[^A-Za-z])\": \"Drive\",\n            r\"\\bct\\.?(?=$|\\s|[^A-Za-z])\": \"Court\",\n            r\"\\bpl\\.?(?=$|\\s|[^A-Za-z])\": \"Place\",\n            r\"\\bpkwy\\.?(?=$|\\s|[^A-Za-z])\": \"Parkway\",\n            r\"\\bter\\.?(?=$|\\s|[^A-Za-z])\": \"Terrace\",\n            r\"\\bsq\\.?(?=$|\\s|[^A-Za-z])\": \"Square\",\n            r\"\\bcrest\\.?(?=$|\\s|[^A-Za-z])\": \"Crescent\",\n            r\"\\bprk\\.?(?=$|\\s|[^A-Za-z])\": \"Park\",\n            r\"\\bhwy\\.?(?=$|\\s|[^A-Za-z])\": \"Highway\",\n            r\"\\bfwy\\.?(?=$|\\s|[^A-Za-z])\": \"Freeway\",\n            r\"\\bexpy\\.?(?=$|\\s|[^A-Za-z])\": \"Expressway\",\n            r\"\\bpt\\.?(?=$|\\s|[^A-Za-z])\": \"Point\",\n            # Directionals (multi-letter first to avoid ''n'' catching ''ne'')\n            r\"\\bne\\.?(?=$|\\s|[^A-Za-z])\": \"Northeast\",\n            r\"\\bnw\\.?(?=$|\\s|[^A-Za-z])\": \"Northwest\",\n            r\"\\bse\\.?(?=$|\\s|[^A-Za-z])\": \"Southeast\",\n            r\"\\bsw\\.?(?=$|\\s|[^A-Za-z])\": \"Southwest\",\n            r\"\\bn\\.?(?=$|\\s|[^A-Za-z])\": \"North\",\n            r\"\\bs\\.?(?=$|\\s|[^A-Za-z])\": \"South\",\n            r\"\\be\\.?(?=$|\\s|[^A-Za-z])\": \"East\",\n            r\"\\bw\\.?(?=$|\\s|[^A-Za-z])\": \"West\",\n            # Units / Residences\n            r\"\\bapt\\.?(?=$|\\s|[^A-Za-z])\": \"Apartment\",\n            r\"\\bfl\\.?(?=$|\\s|[^A-Za-z])\": \"Floor\",\n            r\"\\bste\\.?(?=$|\\s|[^A-Za-z])\": \"Suite\",\n            r\"\\bbldg\\.?(?=$|\\s|[^A-Za-z])\": \"Building\",\n        }\n        \"\"\"Expand common street abbreviations (case-insensitive).\"\"\"\n        s = street.lower()\n        for pattern, replacement in abbrev_dict.items():\n            s = re.sub(pattern, replacement.lower(), s, flags=re.IGNORECASE)\n\n        s = re.sub(r\"\\b(p\\.?\\s*o\\.?\\s*box|pobox|po\\s*box)\\b\", \"P.O. Box\", s, flags=re.IGNORECASE)\n        s = s.title()\n\n        s = re.sub(r\"\\b(\\d+)(St|Nd|Rd|Th)\\b\", lambda m: m.group(1) + m.group(2).lower(), s)\n\n        return s\n\n    def _get_formatted_address_from_address(\n        self, conv: Conversation, address: BrightreeAddress\n    ) -> str:\n        street1 = self.normalize_street_name(address.get(\"street1\"))\n        street2 = self.normalize_street_name(address.get(\"street2\"))\n        city = address.get(\"city\", \"\").title()\n        state = address.get(\"state\", {}).get(\"name\")\n        first_part = \", \".join(\n            item.strip() for item in [street1, street2, city, state] if item and item.strip()\n        )\n\n        postal_code = address.get(\"postalCode\")\n        if postal_code is None:\n            conv.log.warning(\"No postal code found in shipping address\")\n            return \"\"\n\n        # US readout prefers saying only up to first 5 digits for zipcode\n        postal_code = postal_code.strip()[:5]\n        zip_code_str = f\"Zip Code {convert_digits_to_words(conv, postal_code)}\"\n\n        return f\"{first_part}, {zip_code_str}\"\n\n    def get_formatted_shipping_address(self, conv: Conversation) -> str:\n        shipping_address = self.get_shipping_address()\n        if shipping_address is None:\n            return \"\"\n        return self._get_formatted_address_from_address(conv, shipping_address)\n\n    def get_formatted_billing_address(self, conv: Conversation) -> str:\n        billing_address = self.get_billing_address()\n        if billing_address is None:\n            return \"\"\n        return self._get_formatted_address_from_address(conv, billing_address)\n\n    def get_all_items_in_rapid_order(self) -> list[Item]:\n        return self.get_rapid_order_data()[\"items\"]\n\n    def get_items_for_current_order(self) -> list[Item]:\n        return self.new_order_items\n\n    def get_item_size(self, item: str, hcpcs: list[str], size_options: list[str]) -> list[str]:\n        matched_sizes = set()\n\n        for order_item in self.get_items_for_current_order():\n            item_hcps = {h[\"hcpcCode\"] for h in order_item[\"hcpcs\"]}\n            item_description = order_item[\"itemDescription\"].lower()\n            # Check if this order item contains the target item hcpcs\n            if item_hcps & set(hcpcs):\n                # Check if any size option is also in this order item\n                for size_option in size_options:\n                    # Match size followed by up to 3 words, then the item name\n                    pattern = rf\"\\b{size_option}\\b(?:\\s+\\w+){{0,2}}\\s+{item}(s)?\\b\"\n                    if re.search(pattern, item_description, re.IGNORECASE):\n                        matched_sizes.add(size_option)\n\n        return list(matched_sizes)\n\n    def get_formatted_readout_available_items_in_order_string(self, conv: Conversation) -> str:\n        items_for_readout = []\n        for item in self.get_items_for_current_order():\n            # Remove everything prior to `:`\n            item_name = self._clean_item_name(item[\"itemDescription\"])\n            # Localise item name\n            from functions.localise_api_text import Items\n\n            item_name = Items.get_localised_text(conv, item_name)\n            item_key = item[\"itemKey\"]\n            if item_key in self.item_quantity_changes:\n                item_quantity = self.item_quantity_changes[item_key]\n            else:\n                item_quantity = item[\"qty\"]\n\n            # workaround for gender of spanish article ''un/una''\n            if (conv.language or \"\").startswith(\"es\"):\n                item_quantity_full = (\n                    \"una unidad\" if item_quantity == 1 else f\"{item_quantity} unidades\"\n                )\n                items_for_readout.append(f\"{item_name}, {item_quantity_full}\")\n            else:\n                items_for_readout.append(f\"{item_quantity} {item_name}\")\n\n        conv.log.info(\n            f\"Current order readout {len(items_for_readout)} items\",\n            items_for_readout=items_for_readout,\n        )\n        items_for_readout_str = '' <break time=\"0.6s\" />. ''.join(items_for_readout)\n        return f\"{items_for_readout_str}.\"\n\n    def get_initial_items_in_order_utt(self, conv: Conversation) -> str:\n        return conv.functions.utterances(\"INITIAL_ITEMS_IN_ORDER_UTT\").format(\n            item_quantity=len(self.get_items_for_current_order())\n        )\n\n    def _convert_item_to_available_items_prompt_string(self, conv: Conversation, item: Item) -> str:\n        item_name = item[\"itemDescription\"]\n        item_code = item[\"internalKey\"]\n        from functions.localise_api_text import Items\n\n        item_name = Items.get_localised_text(conv, self._clean_item_name(item_name))\n        return f\"- {item_name} -> {item_code}\"\n\n    def get_formatted_for_prompt_available_items_string(self, conv: Conversation) -> str:\n        \"\"\"\n        Would look like:\n            ''''''\n            - \"CPAP Chinstrap\" -> \"0\"\n            - \"Item 2\" -> \"1\"\n            ''''''\n        \"\"\"\n        items_for_prompt = []\n        for item in self.get_items_for_current_order():\n            items_for_prompt.append(self._convert_item_to_available_items_prompt_string(conv, item))\n        return \"\\n\".join(items_for_prompt)\n\n    def get_prompt_removed_items_from_order(self, conv: Conversation) -> str:\n        return self._construct_removed_items_prompt(conv, self.removed_order_items)\n\n    def _construct_removed_items_prompt(self, conv: Conversation, removed_items: list[Item]) -> str:\n        removed_items_strs = [\n            self._convert_item_to_available_items_prompt_string(conv, item)\n            for item in removed_items\n        ]\n        if not removed_items_strs:\n            return \"\"\n\n        removed_items_str = \"\\n\".join(removed_items_strs)\n        return f\"**REMOVED ITEMS**:\\n{removed_items_str}\"\n\n    def load_hcpc_education_items(self, conv: Conversation, removed_items: list[Item]) -> None:\n        \"\"\"\n        Loads the hcpc education items from the removed items.\n\n        If the item has no educational utts, EducationItem will have an empty\n        utterances list.\n        \"\"\"\n\n        for item in removed_items:\n            utterance_arr = []\n            for hcpc in item[\"hcpcs\"]:\n                if edu_utt_key := HCPC_ITEM_EDUCATION_UTTERANCE_MAP.get(hcpc[\"hcpcCode\"]):\n                    edu_utt = conv.functions.utterances(edu_utt_key)\n                    if edu_utt:\n                        utterance_arr.append(edu_utt)\n\n            self.education_items.append(\n                EducationItem(\n                    internalKey=item[\"internalKey\"],\n                    itemDescription=item[\"itemDescription\"],\n                    utterances=utterance_arr,\n                )\n            )\n\n        conv.log.info(\"Sorting to get empty utterances first\")\n        self.education_items.sort(key=lambda x: len(x[\"utterances\"]))\n\n        conv.log.info(\n            f\"Loaded {len(self.education_items)} education items\",\n            education_items=self.education_items,\n        )\n\n    def get_current_education_item(self) -> Optional[EducationItem]:\n        if self.education_item_idx >= len(self.education_items):\n            plog.info(\n                f\"Exhausted education items {self.education_item_idx} >= {len(self.education_items)}\"\n            )\n            return None\n        return self.education_items[self.education_item_idx]\n\n    def get_current_education_utterance_for_agent(self, conv: Conversation) -> Optional[str]:\n        current_education_item = self.get_current_education_item()\n        if current_education_item is None:\n            conv.log.error(\"No current education item\")\n            return None\n\n        # Unpack the item\n        item_name = current_education_item[\"itemDescription\"]\n        # They don''t want \"CPAP\" said if start of name as will be repeated a\n        # lot\n        item_name = re.sub(r\"^CPAP\\s*\", \"\", item_name)\n        from functions.localise_api_text import Items\n\n        item_name = Items.get_localised_text(conv, item_name)\n\n        edu_utts = current_education_item[\"utterances\"]\n        edu_utts_combined = \" \".join(edu_utts)\n\n        # An item without an education utts\n        if not edu_utts:\n            if self.education_item_idx == 0:\n                return conv.functions.utterances(\"EDUCATION_ADVISE_INCLUDE_ITEM\").format(\n                    item_name=item_name\n                )\n            else:\n                return conv.functions.utterances(\"EDUCATION_KEEP_ITEM_ALSO\").format(\n                    item_name=item_name\n                )\n\n        # An item with educational utt\n        add_back_utt = conv.functions.utterances(\"EDUCATION_ADVISE_INCLUDE_THIS\")\n        return conv.functions.utterances(\"EDUCATION_FOR_ITEM_WITH_UTTERANCE\").format(\n            item_name=item_name, edu_utts_combined=edu_utts_combined, add_back_utt=add_back_utt\n        )\n\n    def add_item_back_after_education(self, add_item_back: bool) -> None:\n        \"\"\"Adds the current education item back to the order, depending on add_item_back, incrementing the education item index\"\"\"\n        education_item: Optional[EducationItem] = self.get_current_education_item()\n        if education_item is None:\n            plog.error(\"No current education item\")\n            return\n\n        if add_item_back:\n            # Find the Item in the removed order items\n            removed_item: Optional[Item] = next(\n                (\n                    item\n                    for item in self.removed_order_items\n                    if item[\"internalKey\"] == education_item[\"internalKey\"]\n                ),\n                None,\n            )\n\n            if removed_item is None:\n                plog.error(f\"No removed item found for {education_item[''itemDescription'']}\")\n                return\n\n            self.new_order_items.append(removed_item)\n            self.removed_order_items = list(\n                filter(\n                    lambda x: x[\"internalKey\"] != removed_item[\"internalKey\"],\n                    self.removed_order_items,\n                )\n            )\n            plog.info(\n                f\"Added {removed_item[''itemDescription'']} back to order\",\n                new_order_items=self.new_order_items,\n                removed_order_items=self.removed_order_items,\n            )\n        else:\n            plog.info(\n                f\"Not adding {education_item[''itemDescription'']} back to order\",\n            )\n        self.education_item_idx += 1\n\n    def update_current_order_items(self, conv: Conversation, internal_item_keys: set[str]) -> bool:\n        \"\"\"\n        Updates the current order items to only include the items with the given item codes.\n\n        Returns True if items removed and should route to education behaviour\n        \"\"\"\n        conv.log.info(\n            f\"updating order state by filtering to only {internal_item_keys}\",\n            new_order_items=self.new_order_items,\n        )\n        new_order_items = []\n        removed_items: list[Item] = []\n        for item in self.new_order_items:\n            if item[\"internalKey\"] in internal_item_keys:\n                new_order_items.append(item)\n            else:\n                removed_items.append(item)\n\n        self.new_order_items = new_order_items\n        self.removed_order_items = removed_items\n\n        # Try load education items\n        self.load_hcpc_education_items(conv, self.removed_order_items)\n        conv.log.info(\n            f\"Loaded {len(self.education_items)} education items\",\n            education_items=self.education_items,\n        )\n        if self.education_items:\n            return True\n\n        conv.log.info(\n            f\"Not routing to education behaviour as already given ({self.education_given=} or no education items ({self.education_items=}))\"\n        )\n        return False\n\n    def get_item_from_internal_key(self, internal_key: str) -> Optional[Item]:\n        for item in self.new_order_items:\n            if item[\"internalKey\"] == internal_key:\n                return item\n        return None\n\n    def item_quantity_changed(self, item_key: str, new_quantity: int):\n        self.item_quantity_changes[item_key] = new_quantity\n        plog.info(\n            f\"Set item quantity change for {item_key} to {new_quantity}\",\n            item_quantity_changes=self.item_quantity_changes,\n        )\n\n    def _sort_hcpc_item_questions(\n        self, hcpc_item_questions: list[ItemHcpcData]\n    ) -> list[ItemHcpcData]:\n        # Sort [\"Yes\"] only questions to the end (to have a single utt before\n        # all of them like ''i just need ur confirmation on following N stmts'')\n\n        # We use iteration in order to also count N [\"Yes\"]\n        yes_only_questions: list[ItemHcpcData] = []\n        other_questions: list[ItemHcpcData] = []\n        for question in hcpc_item_questions:\n            if question[\"nonFunctionalReasonAnswerChoices\"] == [\"Yes\"]:\n                yes_only_questions.append(question)\n            else:\n                other_questions.append(question)\n\n        self.n_yes_only_hcpc_item_questions = len(yes_only_questions)\n\n        plog.info(\n            f\"Sorted {self.n_yes_only_hcpc_item_questions=} yes only hcpc item questions to end\"\n        )\n        self.say_initial_yes_only_hcpc_q_utt = True\n        return other_questions + yes_only_questions\n\n    def _get_initial_yes_only_hcpc_q_utt(self, conv) -> str:\n        if not self.say_initial_yes_only_hcpc_q_utt:\n            return \"\"\n\n        self.say_initial_yes_only_hcpc_q_utt = False\n\n        return conv.functions.utterances(\"HCPC_ACKNOWLEDGMENT_UTTERANCE\")\n\n    def load_hcpc_items(self) -> None:\n        \"\"\"\n        Loads the hcpc items for the current order into `self.all_hcpc_items`.\n\n        Separates out insurance and non insurance hcpc items.\n\n        Effectively flattens the list of items and child hcpc questions to:\n\n        [\n            (item_1, hcpc question_1,...),\n            (item_2, hcpc question_1,...),\n            ...\n        ]\n        \"\"\"\n        plog.info(\"loading hcpc items for current order\", current_order_items=self.new_order_items)\n        if self._loaded_hcpc_items:\n            plog.warn(\"hcpc items already loaded\")\n            return\n\n        if not self.new_order_items:\n            plog.warn(\"No items in order, setting new order items to all items in rapid order\")\n            self.new_order_items = self.get_all_items_in_rapid_order()\n\n        # Separate out insurance and non insurance hcpc item questions\n        has_insurance_hcpc_item_questions: list[ItemHcpcData] = []\n        non_insurance_hcpc_item_questions: list[ItemHcpcData] = []\n        for item in self.new_order_items:\n            for hc in item[\"hcpcs\"]:\n                nfra_choices = hc[\"nonFunctionalReasonAnswerChoices\"]\n\n                # Non insurance hcpc item questions have no answer choices\n                if not nfra_choices:\n                    non_insurance_hcpc_item_questions.append(\n                        ItemHcpcData(\n                            itemKey=item[\"itemKey\"],\n                            qty=item[\"qty\"],\n                            hcpcCode=hc[\"hcpcCode\"],\n                            hcpcTypeName=hc[\"hcpcTypeName\"],\n                            nonFunctionalReasonAnswerChoices=nfra_choices,\n                            hcpcNonFunctionalReasonAnswer=None,\n                        )\n                    )\n                    continue\n\n                # Insurance hcpc item questions have answer choices\n                has_insurance_hcpc_item_questions.append(\n                    ItemHcpcData(\n                        itemKey=item[\"itemKey\"],\n                        qty=item[\"qty\"],\n                        hcpcCode=hc[\"hcpcCode\"],\n                        hcpcTypeName=hc[\"hcpcTypeName\"],\n                        nonFunctionalReasonAnswerChoices=nfra_choices,\n                        hcpcNonFunctionalReasonAnswer=None,\n                    )\n                )\n\n        # Sort hcpc item questions to place [\"Yes\"] only questions last\n        has_insurance_hcpc_item_questions_sorted = self._sort_hcpc_item_questions(\n            has_insurance_hcpc_item_questions\n        )\n\n        self.all_hcpc_items = {\n            \"insurance_question_items\": has_insurance_hcpc_item_questions_sorted,\n            \"non_insurance_question_items\": non_insurance_hcpc_item_questions,\n        }\n\n        plog.info(\n            f\"Sucessfully loaded {len(has_insurance_hcpc_item_questions_sorted)=} hcpc item questions and {len(non_insurance_hcpc_item_questions)=} non insurance hcpc items\",\n            data=self.all_hcpc_items,\n        )\n\n        self._loaded_hcpc_items = True\n\n        # Also load product line questions\n        self.product_line_questions = self.get_rapid_order_data()[\"productLineQuestions\"]\n\n        # ensure sorted\n        self.product_line_questions.sort(key=lambda x: x[\"sortOrder\"])\n        plog.info(\n            f\"Sucessfully loaded {len(self.product_line_questions)} product line questions\",\n            questions=self.product_line_questions,\n        )\n\n    def get_all_hcpc_items(self) -> AllItemHcpcData:\n        return self.all_hcpc_items\n\n    def get_hcpc_item_questions(self) -> list[ItemHcpcData]:\n        return self.all_hcpc_items[\"insurance_question_items\"]\n\n    def get_current_hcpc_item_question_data(self) -> Optional[ItemHcpcData]:\n        hcpc_item_questions = self.get_hcpc_item_questions()\n        if self.hcpc_item_question_idx >= len(hcpc_item_questions):\n            plog.info(\n                f\"Exhausted hcpc item questions {self.hcpc_item_question_idx} >= {len(hcpc_item_questions)}\"\n            )\n            return None\n        current_question = hcpc_item_questions[self.hcpc_item_question_idx]\n        plog.info(\n            f\"Retrieved hcpc item question {self.hcpc_item_question_idx}\",\n            question=current_question,\n        )\n        return current_question\n\n    def is_last_hcpc_item_question(self) -> bool:\n        return self.hcpc_item_question_idx == (len(self.get_hcpc_item_questions()) - 1)\n\n    def record_hcpc_item_question_answer(self, answer: str) -> None:\n        \"\"\"Records answer, increment state to next question\"\"\"\n        current_question = self.get_current_hcpc_item_question_data()\n        if current_question is None:\n            plog.error(\"No current hcpc item question\")\n            return\n\n        # Validate\n        if answer not in current_question[\"nonFunctionalReasonAnswerChoices\"]:\n            error_message = f\"Invalid answer {answer} for hcpc item question {current_question[''hcpcCode'']}. Must be one of {current_question[''nonFunctionalReasonAnswerChoices'']}\"\n            plog.error(\n                error_message,\n            )\n            raise HcpcItemQuestionAnswerError(\n                error_message,\n            )\n\n        current_question[\"hcpcNonFunctionalReasonAnswer\"] = answer\n        self._move_to_next_hcpc_question()\n        plog.info(\n            f\"Recorded answer {answer} for hcpc item question {current_question[''hcpcCode'']}. Next question index: {self.hcpc_item_question_idx}\",\n        )\n\n    def get_question_data_for_current_hcpc_question(\n        self, conv: Conversation\n    ) -> Optional[tuple[list[str], str]]:\n        current_question = self.get_current_hcpc_item_question_data()\n        if current_question is None:\n            conv.log.error(\"No current hcpc item question\")\n            return None\n\n        from functions.localise_api_text import HcpcAnswerChoices\n\n        answer_choices_localised = [\n            HcpcAnswerChoices.get_localised_text(conv, choice)\n            for choice in current_question[\"nonFunctionalReasonAnswerChoices\"]\n        ]\n        # Note that we localise the ''hcpcTypeName'' in the bot utterance\n\n        return (\n            answer_choices_localised,\n            current_question[\"hcpcTypeName\"],\n        )\n\n    def _format_answer_choices_for_llm_prompt(\n        self,\n        answer_choices: list[str],\n    ) -> str:\n        if answer_choices == [\"Yes\"]:\n            return \"\\n\".join([f\"- {answer}\" for answer in [\"Yes\", \"No\"]])\n        if answer_choices == [\"Yes - I am requesting this item as a refill.\"]:\n            return \"\\n\".join(\n                [f\"- {answer}\" for answer in [\"Yes - I am requesting this item as a refill.\", \"No\"]]\n            )\n        return \"\\n\".join([f\"- {answer}\" for answer in answer_choices])\n\n    def is_product_question_requiring_yes_answer(\n        self,\n        current_question: dict,\n    ) -> bool:\n        \"\"\"\n        Check if a product line question requires a ''Yes'' answer.\n\n        Args:\n            current_question: The product line question data dictionary\n\n        Returns:\n            True if the question requires a ''Yes'' answer, False otherwise\n        \"\"\"\n        if not current_question:\n            return False\n        return (\n            current_question[\"productLineQuestionDataType\"] == \"YesNoDefaultYes\"\n            or current_question[\"productLineQuestionName\"] == \"CPAP Supplies Functionality\"\n            or current_question[\"productLineQuestionName\"] == \"CPAP Supplies Needed\"\n        )\n\n    def get_available_items_with_exclusion_string(self, exclude_internal_key: str) -> str:\n        items = (\n            item[\"internalKey\"]\n            for item in self.get_items_for_current_order()\n            if item[\"internalKey\"] != exclude_internal_key\n        )\n        return \",\".join(items)\n\n    def get_prompt_formatted_answer_choices_for_current_hcpc_question(\n        self, conv: Conversation\n    ) -> str:\n        question_data = self.get_question_data_for_current_hcpc_question(conv)\n        if question_data is None:\n            conv.log.error(\"No current hcpc item question\")\n            return \"\"\n        answer_choices, _ = question_data\n        prompt = self._format_answer_choices_for_llm_prompt(answer_choices)\n        return prompt\n\n    def get_dynamic_asr_biasing_keywords_for_current_hcpc_question(\n        self, conv: Conversation\n    ) -> list[str]:\n        question_data = self.get_question_data_for_current_hcpc_question(conv)\n        if question_data is None:\n            conv.log.error(\"No current hcpc item question\")\n            return [\"\"]\n        answer_choices, _ = question_data\n\n        words = set()\n        for choice in answer_choices:\n            # Add cleaned subwords\n            subwords = re.sub(r\"[^\\w\\s]\", \"\", choice.replace(\"/\", \" \")).lower().split()\n            words.update(subwords)\n\n            # Add formatted original\n            or_conjunction = conv.functions.utterances(\"CONJUNCTION_OR\")\n            and_conjunction = conv.functions.utterances(\"CONJUNCTION_AND\")\n            formatted = (\n                choice.replace(\"/\", f\" {or_conjunction} \").replace(\"&\", and_conjunction).lower()\n            )\n            words.add(formatted)\n\n        words = list(words)\n        return words\n\n    def get_api_answer_choices(self, conv: Conversation) -> list[str]:\n        question_data = self.get_question_data_for_current_hcpc_question(conv)\n        if question_data is None:\n            return []\n        return question_data[0]\n\n    def get_initial_edu_utt(self, conv: Conversation) -> str:\n        if self._said_initial_edu_utt is False:\n            return conv.functions.utterances(\"SUPPLIES_DISPOSABLE_REMINDER\")\n        self._said_initial_edu_utt = True\n        return \"\"\n\n    def _format_answer_choices_from_api(\n        self, conv: Conversation, answer_choices: list[str]\n    ) -> list[str]:\n        \"\"\"\n        Formats answer choices from the API to be used for ASR biasing\n        \"\"\"\n        conjunction = conv.functions.utterances(\"CONJUNCTION_OR\")\n        return [choice.replace(\"/\", f\" {conjunction} \") for choice in answer_choices]\n\n    def _clean_item_name(self, item_name: str) -> str:\n        \"\"\"\n        Removes everything prior to first `:` in item description\n\n        \"apple: banana\" -> \"banana\"\n        \"apple\" -> \"apple\"\n        \"apple: banana: orange\" -> \"banana: orange\"\n        \"\"\"\n        description_split = item_name.split(\":\", 1)\n        if len(description_split) > 1:\n            return description_split[1].strip()\n        else:\n            return item_name\n\n    def get_n_hcpc_item_questions(self) -> int:\n        return len(self.get_hcpc_item_questions())\n\n    def get_bot_utterance_for_current_hcpc_question(self, conv: Conversation) -> str:\n        question_data = self.get_question_data_for_current_hcpc_question(conv)\n        if question_data is None:\n            conv.log.error(\"No current hcpc item question\")\n            return \"\"\n        answer_choices, hcpc_type_name = question_data\n\n        # Remove annoying \"Wear and Tear: \" prefix\n        hcpc_type_name = hcpc_type_name.replace(\"Wear and Tear: \", \"\")\n\n        # They don''t want \"CPAP\" said if start of name as will be repeated a\n        # lot\n        hcpc_type_name = re.sub(r\"^CPAP\\s*\", \"\", hcpc_type_name)\n\n        # Localise hcpc_type_name and answer choices\n        from functions.localise_api_text import HcpcAnswerChoices, HcpcTypeNames\n\n        hcpc_type_name = HcpcTypeNames.get_localised_text(conv, hcpc_type_name)\n        # Note that answer choices are already localised in\n        # get_question_data_for_current_hcpc_question\n\n        answer_choices = self._format_answer_choices_from_api(conv, answer_choices)\n\n        # Format for bot utterance\n        conjunction = conv.functions.utterances(\"CONJUNCTION_OR\")\n        if len(answer_choices) > 1:\n            answer_choices = answer_choices[:-1] + [f\"{conjunction} {answer_choices[-1]}\"]\n\n        # Special case to reword as api just returns 1 \"yes\"\n\n        if answer_choices == [HcpcAnswerChoices.get_localised_text(conv, \"Yes\")]:\n            conv.log.info(\n                f\"HCPC item question answer choices is just ''Yes'', converting to ''Can you confirm the {hcpc_type_name} needs to be replaced?''\"\n            )\n            utterance = conv.functions.utterances(\"HCPC_CONFIRM_REPLACEMENT\").format(\n                initial_utterance=self._get_initial_yes_only_hcpc_q_utt(conv),\n                hcpc_type_name=hcpc_type_name,\n            )\n        # ''Yes - I am requesting the following items need to be replaced''\n        elif answer_choices == [\n            HcpcAnswerChoices.get_localised_text(\n                conv, \"yes - I am requesting the following items as a refill to be used\"\n            )\n        ]:\n            conv.log.info(\n                f\"HCPC item question answer choices is just ''Yes'', converting to ''Can you confirm the {hcpc_type_name} needs to be replaced?''\"\n            )\n            utterance = conv.functions.utterances(\"HCPC_CONFIRM_REPLACEMENT\").format(\n                initial_utterance=self._get_initial_yes_only_hcpc_q_utt(conv),\n                hcpc_type_name=hcpc_type_name,\n            )\n\n        # ''Yes - I am requesting this item as a refill.''\n        elif answer_choices == [\n            HcpcAnswerChoices.get_localised_text(\n                conv, \"Yes - I am requesting this item as a refill.\"\n            )\n        ]:\n            conv.log.info(\n                f\"HCPC item question answer choices is just ''Yes'', converting to ''Can you confirm the {hcpc_type_name} needs to be replaced?''\"\n            )\n            utterance = conv.functions.utterances(\"HCPC_CONFIRM_REPLACEMENT\").format(\n                initial_utterance=self._get_initial_yes_only_hcpc_q_utt(conv),\n                hcpc_type_name=hcpc_type_name,\n            )\n\n        # ''Yes - I affirm my supplies need replaced''\n        elif answer_choices == [\n            HcpcAnswerChoices.get_localised_text(conv, \"Yes - I affirm my supplies need replaced\")\n        ]:\n            conv.log.info(\n                f\"HCPC item question answer choices is just ''Yes'', converting to ''Can you confirm the {hcpc_type_name} needs to be replaced?''\"\n            )\n            utterance = conv.functions.utterances(\"HCPC_CONFIRM_REPLACEMENT\").format(\n                initial_utterance=self._get_initial_yes_only_hcpc_q_utt(conv),\n                hcpc_type_name=hcpc_type_name,\n            )\n\n        # special case for size questions in HCPC\n        elif HcpcAnswerChoices.get_localised_text(conv, \"Small\") in answer_choices:\n            conv.log.info(\n                f\"HCPC item question answer choices is size, converting to ''what size {hcpc_type_name} do you wear?''\"\n            )\n            answer_choices_combined = \"; \".join(answer_choices)\n            utterance = conv.functions.utterances(\"HCPC_SIZE\").format(\n                hcpc_type_name=hcpc_type_name,\n                answer_choices_combined=answer_choices_combined,\n            )\n\n        else:\n            answer_choices_combined = \"; \".join(answer_choices)\n            utterance = conv.functions.utterances(\"HCPC_REASON\").format(\n                hcpc_type_name=hcpc_type_name,\n                answer_choices_combined=answer_choices_combined,\n            )\n\n        # Add ''Ok, lastly'' if final question\n        if (\n            # Only add if more than one question\n            self.get_n_hcpc_item_questions() > 1\n            # And if it''s the last question\n            and self.hcpc_item_question_idx == self.get_n_hcpc_item_questions() - 1\n        ):\n            return f\"{conv.functions.utterances(''HCPC_FINAL_Q_PREFIX'')}{utterance}\"\n\n        return utterance\n\n    def _pluralize(self, conv: Conversation, n: int, singular: str, plural: str) -> str:\n        if n == 1:\n            if conv.language.startswith(\"es\"):\n                return f\"una {singular}\"\n            return f\"1 {singular}\"\n        return f\"{n} {plural}\"\n\n    def get_initial_agent_utt_start_of_product_line_questions(self, conv: Conversation) -> str:\n        n_product_line_questions = sum(\n            question.get(\"userAnswer\") is None for question in self.product_line_questions\n        )\n        # Doing multilingual handling for pluralising here.\n\n        question_singular = conv.functions.utterances(\"QUESTION_SINGULAR\")\n        question_plural = conv.functions.utterances(\"QUESTION_PLURAL\")\n        question_quantity = self._pluralize(\n            conv, n_product_line_questions, question_singular, question_plural\n        )\n\n        # Returns utterance to tell user how many questions are left.\n        return conv.functions.utterances(\"INITIAL_UTT_PLQS_NUM_QS\").format(\n            question_quantity=question_quantity\n        )\n\n    def infer_size_answer_for_product_line_questions_from_item_list(self, conv: Conversation):\n        items = [\n            (\"mask\", [\"A7034\", \"A7030\", \"A7027\", \"A7044\"]),\n            (\"cushion\", [\"A7031\", \"A7032\", \"A7033\", \"A7028\", \"A7029\"]),\n        ]\n        for question in self.product_line_questions:\n            question_text = question[\"productLineQuestionText\"].lower()\n            match = next(\n                (\n                    (item, hcpcs)\n                    for item, hcpcs in items\n                    if \"size\" in question_text and item in question_text\n                ),\n                None,\n            )\n            if match is None:\n                continue\n\n            item, hcpcs = match\n            # Check if there''s no ambiguity on the Item''s size\n            sizes = self.get_item_size(item, hcpcs, question[\"answerChoices\"])\n            if len(sizes) == 1:\n                question[\"userAnswer\"] = sizes[0]\n                conv.log.info(\n                    f\"Inferred and recorded answer {sizes[0]} for product line question {question[''productLineQuestionText'']}.\",\n                )\n                conv.write_metric(\"PRODUCTLINE_QN_SKIPPED\")\n            elif not sizes:\n                conv.log.info(\n                    \"Unable to infer size - Size information in items not present\",\n                    items=self.get_items_for_current_order(),\n                    size_options=question[\"answerChoices\"],\n                    item_type=item,\n                )\n            else:\n                conv.log.info(\n                    \"Unable to infer size - multiple sizes found\",\n                    items=self.get_items_for_current_order(),\n                    size_options=question[\"answerChoices\"],\n                    item_type=item,\n                )\n\n    def add_preamble_to_product_line_questions_for_excluded_items(self, conv: Conversation):\n        \"\"\"\n        Add preamble to product line questions for items that are not in the final item list.\n        For example, if a question is about cushions but no cushion items exist in the order,\n        the question will be skipped (marked as answered with an empty string).\n        \"\"\"\n\n        # Define items to check for\n        items_to_check = [\"cushion\"]\n\n        # Get all item descriptions from the current order (lowercased for matching)\n        order_item_descriptions = [\n            item[\"itemDescription\"].lower() for item in self.get_items_for_current_order()\n        ]\n\n        # Process each product line question\n        for question in self.product_line_questions:\n            # Skip if already answered\n            if question.get(\"userAnswer\"):\n                continue\n\n            question_text = question[\"productLineQuestionText\"].lower()\n\n            # Check each item type\n            for item_name in items_to_check:\n                # If the question mentions this item type\n                if item_name in question_text:\n                    conv.log.info(f\"item name ''{item_name}'' in question text: {question_text}\")\n                    # Check if the item appears in any order item description\n                    item_in_order = any(item_name in desc for desc in order_item_descriptions)\n\n                    # If item is NOT in the order, add comment to the question\n                    if not item_in_order:\n                        question[\"productLineQuestionText\"] = (\n                            f\"Just so we have it on file for the future, {question[''productLineQuestionText'']}\"\n                        )\n                        conv.log.info(\n                            f\"Added preamble to product line question about ''{item_name}'' - item not in order\",\n                            question_text=question[\"productLineQuestionText\"],\n                            item_type=item_name,\n                            order_items=order_item_descriptions,\n                        )\n                        # conv.write_metric(''PRODUCTLINE_QN_SKIPPED'')\n                    break  # Found matching item, no need to check others\n\n    def get_initial_agent_utt_start_of_hcpc_questions(self, conv: Conversation) -> str:\n        n_hcpc_item_questions = self.get_n_hcpc_item_questions()\n        # Doing multilingual handling for pluralising here.\n\n        question_singular = conv.functions.utterances(\"QUESTION_SINGULAR\")\n        question_plural = conv.functions.utterances(\"QUESTION_PLURAL\")\n        question_quantity = self._pluralize(\n            conv, n_hcpc_item_questions, question_singular, question_plural\n        )\n\n        # Returns utterance to tell user how many questions are left.\n        return conv.functions.utterances(\"INITIAL_UTT_HCPC_NUM_QS\").format(\n            question_quantity=question_quantity\n        )\n\n    def _get_current_product_line_question_data(\n        self,\n    ) -> Optional[ProductLineQuestionData]:\n        # Skip answered question\n        while self.product_line_question_idx < len(self.product_line_questions):\n            if (\n                self.product_line_questions[self.product_line_question_idx].get(\"userAnswer\")\n                is None\n            ):\n                break\n\n            plog.info(f\"Skipped product line question {self.product_line_question_idx}\")\n            self.product_line_question_idx += 1\n\n        # At this point, either self.product_line_question_idx >= len(self.product_line_questions)\n        # or self.product_line_questions[self.product_line_question_idx][''userAnswer''] is None\n        # Handle the first case appropriately\n        if self.product_line_question_idx >= len(self.product_line_questions):\n            plog.info(\n                f\"Exhausted product line questions {self.product_line_question_idx} >= {len(self.product_line_questions)}\"\n            )\n            return None\n        current_question = self.product_line_questions[self.product_line_question_idx]\n        plog.info(\n            f\"Retrieved product line question {self.product_line_question_idx}\",\n            question=current_question,\n        )\n\n        return current_question\n\n    def get_api_answer_choices_for_current_product_line_question(\n        self, conv: Conversation\n    ) -> list[str]:\n        current_question = self._get_current_product_line_question_data()\n        if current_question is None:\n            conv.log.warning(\"No current product line question\")\n            return []\n\n        if not current_question.get(\"answerChoices\"):\n            conv.log.warning(\"No answer choices for current product line question\")\n            return []\n\n        from functions.localise_api_text import PLQAnswerChoices\n\n        return [\n            PLQAnswerChoices.get_localised_text(conv, choice)\n            for choice in current_question[\"answerChoices\"]\n        ]\n\n    def get_current_product_line_question_for_llm(\n        self, conv: Conversation\n    ) -> Optional[ProductLineQuestionForLLM]:\n        \"\"\"\n        Get data in nice way for flow fn\n        \"\"\"\n\n        current_question = self._get_current_product_line_question_data()\n        if current_question is None:\n            conv.log.warning(\"No current product line question\")\n            return None\n\n        question_text = current_question[\"productLineQuestionText\"]\n\n        # Conditional handling for Hometown Healthcare copay question\n        if (\n            conv.variant.site_name == \"Hometown Healthcare\"\n            and \"Would you like a phone call telling your copay amount before this order ships?\"\n            in question_text\n        ):\n            question_text = \"Would you like a phone call letting you know if your copay amount is over $50 before this order ships?  Any amount under $50 will ship without a phone call. \"\n\n        # Localise question text\n        from functions.localise_api_text import PLQAnswerChoices, PLQs\n\n        question_text_localised = PLQs.get_localised_text(conv, question_text)\n        answer_choices_localised = [\n            PLQAnswerChoices.get_localised_text(conv, choice)\n            for choice in current_question[\"answerChoices\"]\n        ]\n\n        # Add ''Ok, lastly'' if final question\n        if (\n            # Only add if more than one question\n            len(self.product_line_questions) > 1\n            # And if it''s the last question\n            and self.product_line_question_idx == len(self.product_line_questions) - 1\n        ):\n            question_text_localised = (\n                f\"{conv.functions.utterances(''PLQ_FINAL_Q_PREFIX'')}{question_text_localised}\"\n            )\n\n        if current_question[\"productLineQuestionDataType\"].startswith(\"YesNo\"):\n            # For acknowledgement utterances in first person\n            if question_text.startswith(\"I \"):\n                question_text_localised = conv.functions.utterances(\n                    \"PLQ_ACK_IN_FIRST_PERSON\"\n                ).format(question_text=question_text_localised)\n\n            answer_choices_llm_prompt_str = self._format_answer_choices_for_llm_prompt(\n                answer_choices_localised\n            )\n            # If yes only, add prompting to guide towards getting a Yes answer if no\n            if (\n                conv.variant.site_name\n                in (\"Eastern Iowa Sleep\", \"Unity Point\", \"West Lakes Medical Equipment\", \"demo\")\n                and \"Do you acknowledge that order may be subject to deductible or copay\"\n                in question_text\n            ):\n                deductible_clarification = (\n                    \"To clarify, in order to move forward with placing the order, \"\n                    \"we need to confirm you understand that the order is subject to \"\n                    \"deductible or copay, do you confirm?\"\n                )\n                answer_choices_llm_prompt_str = (\n                    f\"{answer_choices_llm_prompt_str}\\n\\n\"\n                    f\"NOTE: if the user says ''No'' to this question, reply with \"\n                    f\"''{deductible_clarification}''. If they still say No, you must \"\n                    f\"call transfer_call function with handoff_reason=''COPAY_PLQ_DECLINE'' and handoff_to = \"\n                    \".\"\n                )\n            elif self.is_product_question_requiring_yes_answer(current_question):\n                answer_choices_llm_prompt_str = f\"{answer_choices_llm_prompt_str}\\n\\nNOTE: if the user says ''No'' to this question, reply with ''{conv.functions.utterances(''PLQ_CONFIRM_REPLACE_NEED'')}''. If they still say No, you must call handle_ood_item_query with reason=''OOD_RESPONSE''. If the user seems unsure, state this same phrase ''{conv.functions.utterances(''PLQ_CONFIRM_REPLACE_NEED'')}'' - followed by using handle_ood_item_query with reason=''PLQ_UNSURE'' if they still seem unsure.\"\n\n            return ProductLineQuestionForLLM(\n                data_type=current_question[\"productLineQuestionDataType\"],\n                question_text=question_text_localised,\n                answer_choices_llm_prompt_str=answer_choices_llm_prompt_str,\n            )\n        elif current_question[\"productLineQuestionDataType\"] == \"RadioButton\":\n            return ProductLineQuestionForLLM(\n                data_type=current_question[\"productLineQuestionDataType\"],\n                question_text=question_text_localised,\n                answer_choices_llm_prompt_str=self._format_answer_choices_for_llm_prompt(\n                    answer_choices_localised\n                ),\n            )\n        elif current_question[\"productLineQuestionDataType\"] in {\n            \"Text\",\n            \"ShortText\",\n        }:\n            return ProductLineQuestionForLLM(\n                data_type=current_question[\"productLineQuestionDataType\"],\n                question_text=question_text_localised,\n                answer_choices_llm_prompt_str=\"\"\"Pass the answer from the user as short text. \"\n                \"- Accept the user''s response verbatim and return it as `answer_choice`. \"\n                \"- Do NOT reject for low confidence, spelling, or non-standard English. \"\n                \"- Explicitly allow for uncertainty in user response (\"I don''t know\", \"not sure\", \"maybe, \"uncertain\") and return it as a valid answer_choice \"\"\",\n            )\n\n        elif current_question[\"productLineQuestionDataType\"] == \"Date\":\n            # Identify whether this Date PLQ is the CPAP \"last doctor visit\" type\n            self._date_plq_is_cpap_last_visit = bool(\n                re.search(\n                    r\"last\\s+(?:talk\\s+with|see)\\s+your\\s+c?pap\\s+doctor|most\\s+recent\\s+visit\\s+with\\s+your\\s+(?:c?pap)\\s+doctor\",\n                    question_text_localised,\n                    re.IGNORECASE,\n                )\n            )\n\n            if self._date_plq_is_cpap_last_visit:\n                question_text_localised = \"Can you provide an approximate month and year for the last time you saw your PAP doctor?\"\n                today_ref = conv.state.TODAY\n                today_str = today_ref.strftime(\"%B %d, %Y\")\n                current_year = today_ref.year\n                current_month_num = today_ref.month\n                prev_year = current_year - 1\n                answer_choices_llm_prompt_str = f\"\"\"\n                CPAP DOCTOR LAST-VISIT DATE — STEP-BY-STEP ALGORITHM\n\n                TODAY = {today_str}  |  CURRENT_YEAR = {current_year}  |  PREVIOUS_YEAR = {prev_year}  |  CURRENT_MONTH_NUMBER = {current_month_num}\n\n                Follow these steps IN ORDER every time the user speaks. Do NOT skip steps.\n\n                ═══════════════════════════════════════\n                STEP 1 — DID THE USER PROVIDE A MONTH (with or without a year)?\n                ═══════════════════════════════════════\n\n                A \"date\" is ANY response containing a recognisable month name — with or without a year.\n                Examples: \"december\", \"It was in december\", \"october 2025\", \"Oh um January 2025\",\n                \"october of 2025\", \"I think March\", \"February 2026\", \"last december\".\n\n                • If YES → go to STEP 2.\n                • If the user gave only a relative time (\"a few months ago\", \"recently\", \"a while back\")\n                  → say \"Could you provide an approximate month and year?\" and STOP.\n                • If the user says they cannot remember → say \"That''s okay, we only need an estimate.\n                  What approximate month and year would you say?\" and STOP.\n                • If the user gave a future appointment (\"I''ll be seeing them next month\",\n                  \"I''m going in April\") → say \"I just need to know when you last saw them.\n                  What is the approximate month and year of your last visit?\" and STOP.\n\n                ═══════════════════════════════════════\n                STEP 2 — RESOLVE FULL DATE (month + year)\n                ═══════════════════════════════════════\n\n                If the user provided both month AND year → use exactly that month and year.\n                If the user provided ONLY a month (no year):\n                  • If that month''s number <= {current_month_num} (i.e. it has already occurred or is the current month\n                    this year) → use CURRENT_YEAR ({current_year}).\n                  • If that month''s number > {current_month_num} (i.e. it has NOT yet occurred this year)\n                    → use PREVIOUS_YEAR ({prev_year}).\n\n                Set day = 01 internally (never mention the day to the user).\n\n                ═══════════════════════════════════════\n                STEP 3 — CHECK PAST vs FUTURE\n                ═══════════════════════════════════════\n\n                Compare the resolved date (MM-01-YYYY) to TODAY ({today_str}).\n\n                • If the date is ON or BEFORE today → it is PAST. Go to STEP 4.\n                • If the date is AFTER today → it is FUTURE. Say: \"I just need to know when you\n                  last saw them. What is the approximate month and year of your last visit?\"\n                  and STOP. Do NOT confirm a future date. Do NOT silently correct the year.\n\n                ═══════════════════════════════════════\n                STEP 4 — CONFIRM WITH THE USER (MANDATORY)\n                ═══════════════════════════════════════\n\n                You MUST say: \"Just to confirm, you last saw your doctor in [Month] [Year]?\"\n                Only mention the month and year — even if the user included a specific day\n                (e.g. \"January 15th 2026\"), drop the day and confirm as \"January 2026\".\n                Then STOP and wait for the user''s response. Do NOT call any function yet.\n\n                ═══════════════════════════════════════\n                STEP 5 — HANDLE CONFIRMATION RESPONSE\n                ═══════════════════════════════════════\n\n                • User says YES (e.g. \"yes\", \"yeah\", \"correct\", \"that''s right\", \"yes it is\",\n                  \"yep\", \"uh huh\", \"mm hmm\", \"right\", \"yes that''s correct\"):\n                  → IMMEDIATELY call {{{{ft:answers_product_line_question}}}} with\n                    answer_choice = the confirmed date in MM-DD-YYYY format (e.g. \"10-01-2025\").\n                    Do NOT re-ask. Do NOT repeat the confirmation. Do NOT ask for more details.\n                    JUST CALL THE FUNCTION.\n\n                • User says NO or corrects the date → go back to STEP 1 with their new response.\n\n                ═══════════════════════════════════════\n                CRITICAL ANTI-LOOP RULES\n                ═══════════════════════════════════════\n\n                1. If the user provides a date and it resolves to the PAST, you MUST go to STEP 4\n                   (confirm). NEVER re-ask \"What is the approximate month and year?\" for a valid\n                   past date. This is the #1 cause of looping — do NOT do it.\n                2. After you have asked the confirmation question (STEP 4), the very next user\n                   turn that is affirmative MUST trigger the function call (STEP 5). No exceptions.\n                3. You may only re-ask the date question when: (a) the date is in the FUTURE,\n                   (b) the user gave no month at all, or (c) the user explicitly denied/corrected\n                   after your confirmation.\n                4. NEVER ask the same question more than twice in a row. If you find yourself\n                   about to re-ask, check whether you already have a valid past date and confirm it instead.\n                \"\"\"\n            else:\n                today_ref = conv.state.TODAY\n                today_str = today_ref.strftime(\"%B %d, %Y\")\n                current_year = today_ref.year\n                prev_year = current_year - 1\n                answer_choices_llm_prompt_str = f\"\"\"\n                Extract a date from the user''s response. Return as answer_choice in MM-DD-YYYY format.\n                TODAY = {today_str}. If year is missing, use {current_year}; if that would be in the future, use {prev_year}.\n                \"\"\"\n            return ProductLineQuestionForLLM(\n                data_type=current_question[\"productLineQuestionDataType\"],\n                question_text=question_text_localised,\n                answer_choices_llm_prompt_str=answer_choices_llm_prompt_str,\n            )\n\n        conv.log.error(\n            f\"Unsupported product line question data type {current_question[''productLineQuestionDataType'']}\",\n            current_question=current_question,\n            prod_line_data_type=f\"{type(current_question[''productLineQuestionDataType''])}\",\n        )\n\n        raise UnimplementedProductLineDataTypeError(\n            f\"Unsupported product line question data type {current_question[''productLineQuestionDataType'']}\"\n        )\n\n    def record_product_line_question_answer(self, answer: str) -> None:\n        current_question = self._get_current_product_line_question_data()\n        if current_question is None:\n            plog.error(\"No current product line question\")\n            return\n\n        if (\n            current_question[\"productLineQuestionDataType\"] not in {\"Text\", \"ShortText\", \"Date\"}\n        ) and answer not in current_question[\"answerChoices\"]:\n            plog.error(\n                f\"Invalid answer {answer} for product line question {current_question[''productLineQuestionText'']}\"\n            )\n            raise ValueError(\n                f\"Invalid answer {answer} for product line question {current_question[''productLineQuestionText'']}\"\n            )\n\n        current_question[\"userAnswer\"] = answer\n        self.product_line_question_idx += 1\n        plog.info(\n            f\"Recorded answer {answer} for product line question {current_question[''productLineQuestionText'']}. Next question index: {self.product_line_question_idx}\",\n        )\n\n    def get_optional_call_for_copay_text(self, conv: Conversation) -> Optional[str]:\n        copay_text = self.get_rapid_order_data()[\"optionalCallForCopayText\"]\n        from functions.localise_api_text import CopayText\n\n        return CopayText.get_localised_text(conv, copay_text) if copay_text else None\n\n    def _get_hcpc_item_questions_for_rapid_order_submission(\n        self,\n    ) -> list[ItemHcpcDataForRapidOrderSubmissionPOSTBody]:\n        # itemKey -> ItemHcpcDataForRapidOrderSubmissionPOSTBody\n        hcpc_item_questions_for_submission: dict[\n            str, ItemHcpcDataForRapidOrderSubmissionPOSTBody\n        ] = {}\n\n        # Separate out insurance and non insurance hcpc item questions\n        # This is just to validate insurance questions, we later combine them\n        all_hcpc_items = self.get_all_hcpc_items()\n        insurance_hcpc_items = all_hcpc_items[\"insurance_question_items\"]\n        non_insurance_hcpc_items = all_hcpc_items[\"non_insurance_question_items\"]\n\n        # Validate insurance questions and coalesce (1 item may have multiple hcpc q''s)\n        for item in insurance_hcpc_items:\n            if item.get(\"itemKey\") in self.removed_item_keys:\n                continue\n            if not item[\"hcpcNonFunctionalReasonAnswer\"]:\n                plog.error(\"Missing value hcpcNonFunctionalReasonAnswer\", item=item)\n                raise ValueError(\"Missing value hcpcNonFunctionalReasonAnswer\")\n\n            # Only add if not already in the dict\n            if item[\"itemKey\"] not in hcpc_item_questions_for_submission:\n                hcpc_item_questions_for_submission[item[\"itemKey\"]] = (\n                    ItemHcpcDataForRapidOrderSubmissionPOSTBody(\n                        itemKey=item[\"itemKey\"],\n                        itemQuantity=item[\"qty\"],\n                        hcpcNonFunctionalReasonAnswers=[\n                            HcpcNonFunctionalReasonAnswerSubmissionPOSTBody(\n                                hcpcCode=item[\"hcpcCode\"],\n                                nonFunctionalReasonAnswer=item[\"hcpcNonFunctionalReasonAnswer\"],\n                            )\n                        ],\n                    )\n                )\n\n            # Otherwise, add that hcpc to the existing item\n            else:\n                existing_item = hcpc_item_questions_for_submission[item[\"itemKey\"]]\n                existing_item[\"hcpcNonFunctionalReasonAnswers\"].append(\n                    HcpcNonFunctionalReasonAnswerSubmissionPOSTBody(\n                        hcpcCode=item[\"hcpcCode\"],\n                        nonFunctionalReasonAnswer=item[\"hcpcNonFunctionalReasonAnswer\"],\n                    )\n                )\n\n        # Add non insurance hcpc item questions\n        for item in non_insurance_hcpc_items:\n            if item.get(\"itemKey\") in self.removed_item_keys:\n                continue\n            hcpc_item_questions_for_submission[item[\"itemKey\"]] = (\n                ItemHcpcDataForRapidOrderSubmissionPOSTBody(\n                    itemKey=item[\"itemKey\"],\n                    itemQuantity=item[\"qty\"],\n                    hcpcNonFunctionalReasonAnswers=[\n                        HcpcNonFunctionalReasonAnswerSubmissionPOSTBody(\n                            hcpcCode=item[\"hcpcCode\"],\n                            nonFunctionalReasonAnswer=None,\n                        )\n                    ],\n                )\n            )\n\n        all_hcpc_items_data_for_submission = []\n        # Prep for POST body\n        for key, body in hcpc_item_questions_for_submission.items():\n            qty = self.item_quantity_changes.get(key)\n\n            if key in self.item_quantity_changes and qty is not None:\n                answers = body.get(\n                    \"hcpcNonFunctionalReasonAnswers\",\n                    [\n                        HcpcNonFunctionalReasonAnswerSubmissionPOSTBody(\n                            hcpcCode=key,\n                            nonFunctionalReasonAnswer=None,\n                        )\n                    ],\n                )\n\n                new_body = ItemHcpcDataForRapidOrderSubmissionPOSTBody(\n                    itemKey=key,\n                    itemQuantity=qty,\n                    hcpcNonFunctionalReasonAnswers=answers,\n                )\n\n                all_hcpc_items_data_for_submission.append(new_body)\n            else:\n                all_hcpc_items_data_for_submission.append(body)\n        # all_hcpc_items_data_for_submission = list(hcpc_item_questions_for_submission.values())\n        plog.info(\n            f\"Prepared {len(all_hcpc_items_data_for_submission)} hcpc item questions for submission\",\n            all_hcpc_items_data_for_submission=all_hcpc_items_data_for_submission,\n        )\n\n        return all_hcpc_items_data_for_submission\n\n    def _get_shipping_address_for_rapid_order_submission(\n        self,\n    ) -> ShippingAddressSubmissionPOSTBody:\n        shipping_address = self.updated_shipping_address\n        if not shipping_address:\n            shipping_address = self.get_shipping_address()\n        if not shipping_address:\n            shipping_address = self.get_billing_address()\n\n        if not shipping_address:\n            raise ValueError(\"No shipping address available for rapid order submission\")\n\n        # Sanitise postal code\n        postal_code = shipping_address[\"postalCode\"]\n        if postal_code:\n            postal_code = postal_code.strip()\n            if len(postal_code) == 9:\n                postal_code = f\"{postal_code[:5]}-{postal_code[5:]}\"\n\n        return ShippingAddressSubmissionPOSTBody(\n            street1=shipping_address[\"street1\"],\n            street2=shipping_address[\"street2\"],\n            city=shipping_address[\"city\"],\n            stateKey=shipping_address[\"state\"][\"key\"],\n            postalCode=postal_code,\n        )\n\n    def _get_all_product_line_question_data(self):\n        return self.product_line_questions\n\n    def _get_product_line_answers_for_rapid_order_submission(\n        self,\n    ) -> list[ProductLineAnswerPOSTBody]:\n        product_line_answers_for_submission: list[ProductLineAnswerPOSTBody] = []\n\n        product_line_question_data = self._get_all_product_line_question_data()\n\n        for question in product_line_question_data:\n            if question[\"userAnswer\"] is None:\n                plog.error(\n                    f\"Missing user answer for product line question {question[''productLineQuestionText'']}\"\n                )\n                raise ValueError(\n                    f\"Missing user answer for product line question {question[''productLineQuestionText'']}\"\n                )\n            product_line_answers_for_submission.append(\n                ProductLineAnswerPOSTBody(\n                    productLineQuestionKey=question[\"productLineQuestionKey\"],\n                    answer=question[\"userAnswer\"],\n                )\n            )\n        return product_line_answers_for_submission\n\n    def record_shipping_address_confirmation(self, is_confirmed: bool) -> None:\n        self.shipping_address_confirmed = is_confirmed\n\n    def record_billing_address_confirmation(self, is_confirmed: bool) -> None:\n        self.billing_address_confirmed = is_confirmed\n\n    def _get_shipping_address_confirmation(self) -> bool:\n        return self.shipping_address_confirmed\n\n    def record_is_primary_insurance_on_file_correct(self, is_correct: bool) -> None:\n        self.is_primary_insurance_on_file_correct = is_correct\n\n    def _get_is_primary_insurance_on_file_correct(self) -> bool:\n        return self.is_primary_insurance_on_file_correct\n\n    def book_rapid_order(self, conv: Conversation, is_copay_callback_requested: bool) -> bool:\n        \"\"\"Book the new rapid order\"\"\"\n\n        rapid_order_post_body = RapidOrderSubmissionPOSTBody(\n            rapidOrderKey=self.get_rapid_order_data()[\"rapidOrderKey\"],\n            campaignPatientKey=conv.state.campaign_patient_key,\n            items=self._get_hcpc_item_questions_for_rapid_order_submission(),\n            shippingAddress=self._get_shipping_address_for_rapid_order_submission(),\n            productLineAnswers=self._get_product_line_answers_for_rapid_order_submission(),\n            isShippingAddressConfirmedByPatient=self._get_shipping_address_confirmation(),\n            isPrimaryInsuranceOnFileCorrect=self._get_is_primary_insurance_on_file_correct(),\n            isCopayCallRequested=is_copay_callback_requested,\n            primaryInsurance=self.updated_primary_insurance,\n        )\n        conv.log.info(\n            \"Submitting rapid order\",\n            post_body=rapid_order_post_body,\n        )\n\n        api_handler = get_api_instance(conv)\n        return api_handler.POST_rapid_order(\n            patient_key=self.get_patient_details()[\"patientKey\"],\n            rapid_order_data=rapid_order_post_body,\n        )\n\n    def remove_hcpc_item(self, item_key: str):\n        self.removed_item_keys.append(item_key)\n        self._move_to_next_hcpc_question()\n\n    def _move_to_next_hcpc_question(self):\n        while True:\n            self.hcpc_item_question_idx += 1\n            next_q = self.get_current_hcpc_item_question_data()\n            # Stop if no more questions\n            if not next_q:\n                return\n\n            # Stop if next question for removed item\n            if next_q.get(\"itemKey\") not in self.removed_item_keys:\n                return\n\n    def get_education_item_for_hcpc(self, hcpc_code: str, item_key: str) -> Optional[EducationItem]:\n        \"\"\"Returns the education item for the given hcpc key, or None if not found\"\"\"\n        edu_utt = HCPC_ITEM_EDUCATION_UTTERANCE_MAP.get(hcpc_code, \"\")\n        rod = self.get_rapid_order_data()\n        if not rod:\n            return None\n        for item in rod.get(\"items\", []):\n            if item[\"itemKey\"] == item_key:\n                return {\n                    \"internalKey\": item[\"internalKey\"],\n                    \"itemDescription\": item[\"itemDescription\"],\n                    \"utterances\": [edu_utt] if edu_utt else [],\n                }\n        return None\n\n    def current_product_line_instant_handoff_question(self) -> bool:\n        \"\"\"Checks if the current product line question''s text contains the given string.\n\n        Returns True if the current question''s productLineQuestionText contains the search_string,\n        False if there is no current question or the string is not found.\n        \"\"\"\n        regexes_to_check = [\n            re.compile(r\"nursing\", re.IGNORECASE),\n            re.compile(r\"covered under a hospice program|hospice program\", re.IGNORECASE),\n            re.compile(r\"implanted.*(metal|metallic)|(?:metal|metallic).*implanted\", re.IGNORECASE),\n        ]\n        plog.info(\"product line question idx\", idx=self.product_line_question_idx)\n        # Check if there is a current question (current index > 0)\n        if self.product_line_question_idx < 0:\n            return False\n\n        # Get the current question (current index)\n        current_question_idx = self.product_line_question_idx\n        if current_question_idx >= len(self.product_line_questions):\n            return False\n\n        current_question = self.product_line_questions[current_question_idx]\n        question_text = current_question.get(\"productLineQuestionText\", \"\")\n        plog.info(\"product line question prev\", plq=question_text)\n\n        for regex in regexes_to_check:\n            if regex.search(question_text):\n                return True\n        return False\n\n    def get_quantity_education_item(self, item: Item, conv: Conversation) -> str:\n        hcpc_utterance_map = {\n            \"A7030\": \"HCPC_A7030_QUANTITY_EDUCATION\",\n            \"A7034\": \"HCPC_A7034_QUANTITY_EDUCATION\",\n            \"A7031\": \"HCPC_A7031_QUANTITY_EDUCATION\",\n            \"A7032\": \"HCPC_A7032_QUANTITY_EDUCATION\",\n            \"A7033\": \"HCPC_A7033_QUANTITY_EDUCATION\",\n            \"A7035\": \"HCPC_A7035_QUANTITY_EDUCATION\",\n            \"A7037\": \"HCPC_A7037_QUANTITY_EDUCATION\",\n            \"A4604\": \"HCPC_A4604_QUANTITY_EDUCATION\",\n            \"A7038\": \"HCPC_A7038_QUANTITY_EDUCATION\",\n            \"A7039\": \"HCPC_A7039_QUANTITY_EDUCATION\",\n            \"A7046\": \"HCPC_A7046_QUANTITY_EDUCATION\",\n            \"A7036\": \"HCPC_A7036_QUANTITY_EDUCATION\",\n        }\n        quantity = item[\"qty\"]\n        item_name = self._clean_item_name(item[\"itemDescription\"])\n        from functions.localise_api_text import Items\n\n        item_name = Items.get_localised_text(conv, item_name)\n\n        # Determine plural suffix based on language\n        if quantity > 1:\n            if conv.language.startswith(\"es\"):\n                # Spanish pluralization rules\n                last_char = item_name.strip()[-1]\n                if last_char not in \"aeiou\":\n                    suffix = \"es\"\n                else:\n                    suffix = \"s\"\n            else:\n                # Default English pluralization\n                suffix = \"s\"\n        else:\n            suffix = \"\"\n\n        for hcpc in item[\"hcpcs\"]:\n            hcpc_code = hcpc[\"hcpcCode\"]\n            if hcpc_code in hcpc_utterance_map:\n                hcpc_edd_utt = conv.functions.utterances(hcpc_utterance_map[hcpc_code])\n                return conv.functions.utterances(\"QUANTITY_EDUCATION_RECOMMEND\").format(\n                    quantity=quantity, item_name=item_name, suffix=suffix, hcpc_edd_utt=hcpc_edd_utt\n                )\n\n        return conv.functions.utterances(\"QUANTITY_EDUCATION_FULL_ORDER\").format(\n            quantity=quantity, item_name=item_name, suffix=suffix\n        )\n\n    def _get_site_state_info(self, conv: Conversation) -> Optional[StateList]:\n        \"\"\"\n        Get site state info, using cached value if available, otherwise fetch from API.\n\n        Args:\n            conv: Conversation object\n\n        Returns:\n            StateList if successful, None otherwise\n        \"\"\"\n        if self.site_state_info is not None:\n            return self.site_state_info\n\n        try:\n            api_handler = get_api_instance(conv)\n            site_state_info: Optional[StateList] = api_handler.GET_site_state_info()\n            if site_state_info is None:\n                conv.log.warning(\"No site state info retrieved for patient\")\n                return None\n            self.site_state_info = site_state_info\n            return site_state_info\n        except Exception as e:\n            conv.log.warning(f\"Error getting site state info {e}\")\n            return None\n\n    def _get_site_state_key(self, conv: Conversation, state_name: str) -> Optional[str]:\n        \"\"\"\n        Get the state key for a given state name, using cached state info if available.\n\n        Args:\n            conv: Conversation object\n            state_name: Name of the state to look up\n\n        Returns:\n            The state key if found, None otherwise\n        \"\"\"\n        site_state_info = self._get_site_state_info(conv)\n        if site_state_info is None:\n            return None\n\n        for state in site_state_info.get(\"data\", []):\n            if state.get(\"name\") == state_name:\n                return state[\"key\"]\n\n        conv.log.warning(f\"State ''{state_name}'' not found in site state info\")\n        return None\n\n    def update_shipping_address(self, conv: Conversation) -> bool:\n        try:\n            api_handler = get_api_instance(conv)\n            site_state_info: Optional[StateList] = api_handler.GET_site_state_info()\n            if site_state_info is None:\n                conv.log.warning(\"No site state info retreieved for patient\")\n                return False\n        except Exception as e:\n            conv.log.warning(f\"Error getting site state info {e}\")\n            return False\n        new_shipping_address_state = None\n        if (\n            not conv.state.c_add_floa\n            or not conv.state.c_add_city\n            or not conv.state.c_add_state\n            or not conv.state.c_add_zip_code\n        ):\n            return False\n        for state in site_state_info.get(\"data\"):\n            if state.get(\"name\") == conv.state.c_add_state:\n                new_shipping_address_state = state\n                break\n        if not new_shipping_address_state:\n            return False\n\n        updated_shipping_address = BrightreeAddress(\n            street1=conv.state.c_add_floa,\n            street2=\"\",\n            city=conv.state.c_add_city,\n            state=new_shipping_address_state,\n            postalCode=conv.state.c_add_zip_code,\n        )\n\n        self.record_shipping_address_confirmation(True)\n        self.updated_shipping_address = updated_shipping_address\n        conv.log.info(\"Updated shipping address\", address=updated_shipping_address)\n        return True\n\n    def update_primary_insurance(self, conv: Conversation):\n        self.record_is_primary_insurance_on_file_correct(False)\n        primary_insurance = {\n            \"name\": conv.state.get(\"insurance_provider\") or \"null\",\n            \"memberId\": conv.state.get(\"insurance_member_id\") or \"null\",\n            \"groupId\": conv.state.get(\"insurance_group_id\") or \"null\",\n            \"phoneNumber\": conv.state.get(\"insurance_phone_number\") or \"null\",\n        }\n        conv.log.info(\"Making note to update insurance\", primary_insurance=primary_insurance)\n        self.updated_primary_insurance = primary_insurance\n\n    def update_billing_address(self, conv: Conversation) -> bool:\n        try:\n            api_handler = get_api_instance(conv)\n            site_state_info: Optional[StateList] = api_handler.GET_site_state_info()\n            if site_state_info is None:\n                conv.log.warning(\"No site state info retreieved for patient\")\n                return False\n        except Exception as e:\n            conv.log.warning(f\"Error getting site state info {e}\")\n            return False\n        new_billing_address_state = None\n        if (\n            not conv.state.c_add_floa\n            or not conv.state.c_add_city\n            or not conv.state.c_add_state\n            or not conv.state.c_add_zip_code\n        ):\n            return False\n        for state in site_state_info.get(\"data\"):\n            if state.get(\"name\") == conv.state.c_add_state:\n                new_billing_address_state = state\n                break\n        if not new_billing_address_state:\n            return False\n\n        # Sanitise postal code\n        postal_code = conv.state.c_add_zip_code\n        if postal_code:\n            postal_code = postal_code.strip()\n            if len(postal_code) == 9:\n                postal_code = f\"{postal_code[:5]}-{postal_code[5:]}\"\n\n        billing_address_submission = BillingAddressSubmissionPOSTBody(\n            street1=conv.state.c_add_floa,\n            street2=\"\",\n            city=conv.state.c_add_city,\n            stateCode=new_billing_address_state[\"code\"],\n            postalCode=postal_code,\n        )\n\n        # Call API to update billing address\n        try:\n            api_response = api_handler.PUT_billing_address(\n                patient_key=self.get_patient_details()[\"patientKey\"],\n                billing_address_data=billing_address_submission,\n            )\n            if api_response is None:\n                conv.log.warning(\"Failed to update billing address via API\")\n            #     return False #TODO\n        except Exception as e:\n            conv.log.warning(f\"Error updating billing address via API {e}\")\n            return False\n\n        updated_billing_address = BrightreeAddress(\n            street1=conv.state.c_add_floa,\n            street2=\"\",\n            city=conv.state.c_add_city,\n            state=new_billing_address_state,\n            postalCode=conv.state.c_add_zip_code,\n        )\n\n        self.record_billing_address_confirmation(True)\n        self.updated_billing_address = updated_billing_address\n        conv.log.info(\"Updated billing address\", address=updated_billing_address)\n        return True\n\n    def send_patient_language_update(self, conv: Conversation) -> None:\n        \"\"\"Sends the current conversation language to the API (PUT /v1/patients/{patientKey}/language).\"\"\"\n        turn_threshold_for_language_update = 3\n        iso_code_map = {\n            \"es-US\": \"spa\",\n            \"en-US\": \"eng\",\n            \"en-CA\": \"eng\",\n        }\n\n        conv.log.info(\"Attempting to send patient language update\")\n\n        if self.patient_details is None:\n            conv.log.warning(\"Cannot send patient language update: patient_details is None\")\n            return\n\n        user_turn_count = len(\n            [event for event in conv.history if getattr(event, \"role\", None) == \"user\"]\n        )\n        if user_turn_count < turn_threshold_for_language_update:\n            conv.log.info(\n                f\"Not sending patient language update: user turn count {user_turn_count} is less than threshold {turn_threshold_for_language_update}\"\n            )\n            return\n\n        iso_code = iso_code_map.get(conv.state.language, \"eng\")\n        language_data = {\"isoCode\": iso_code}\n\n        try:\n            api_handler = get_api_instance(conv)\n            api_handler.PUT_patient_language(\n                patient_key=self.get_patient_details()[\"patientKey\"],\n                language_data=language_data,\n            )\n            conv.log.info(\"Patient language update sent successfully\")\n        except Exception as e:\n            conv.log.warning(f\"Error sending patient language update: {e}\")\n\n    def get_campaign_patient_key(self, conv: Conversation) -> Optional[str]:\n        if conv.state.campaign_patient_key:\n            return conv.state.campaign_patient_key\n\n        # Dialed In Phone Number = Phone number patient called in on\n        if conv.state.patient_caller_number:\n            dialed_in_phone_number = (\n                conv.state.patient_caller_number.strip().replace(\"+1\", \"\").replace(\"+\", \"\")\n            )\n        else:\n            dialed_in_phone_number = \"0\"\n\n        # Patient Phone Number = Number used in IDNV\n        if conv.state.collected_number:\n            patient_phone_number = (\n                conv.state.collected_number.strip().replace(\"+1\", \"\").replace(\"+\", \"\")\n            )\n        else:\n            patient_phone_number = dialed_in_phone_number\n\n        # Company Phone Number = X Number\n        if conv.state.x_number:\n            company_phone_number = conv.state.x_number.strip().replace(\"+1\", \"\").replace(\"+\", \"\")\n        else:\n            company_phone_number = \"0\"\n\n        try:\n            api_handler = get_api_instance(conv)\n            if conv.state.is_outbound:\n                if self.patient_details is not None and self.patient_details.get(\"patientKey\"):\n                    patient_key = self.patient_details.get(\"patientKey\")\n                else:\n                    patient_key = conv.state.outbound_patient_key\n\n                if not patient_key:\n                    conv.log.warning(\n                        \"No patient key available for outbound call, failed to load patient key and campaign patient key \"\n                    )\n                    return None\n\n                campaign_patient_key_data: Optional[CampaignPatientKeyData] = (\n                    api_handler.POST_outbound_call(\n                        patient_key=conv.state.outbound_patient_key,\n                        phone_number_data={\n                            \"patientPhoneNumber\": patient_phone_number,\n                            \"companyPhoneNumber\": company_phone_number,\n                        },\n                    )\n                )\n            else:\n                campaign_patient_key_data: Optional[CampaignPatientKeyData] = (\n                    api_handler.POST_inbound_call(\n                        patient_key=self.get_patient_details()[\"patientKey\"],\n                        phone_number_data={\n                            \"patientPhoneNumber\": patient_phone_number,\n                            \"dialedInPhoneNumber\": dialed_in_phone_number,\n                            \"companyPhoneNumber\": company_phone_number,\n                        },\n                    )\n                )\n        except Exception:\n            conv.log.warning(\"Error getting campaign patient key\")\n            return None\n        if not campaign_patient_key_data:\n            return None\n        campaign_patient_key = campaign_patient_key_data.get(\"key\")\n        return campaign_patient_key\n\n    def send_call_summary(self, conv: Conversation, call_result: str):\n        _BREAK_TAG_RE = re.compile(\n            r\"\"\"\\s*<break\\s+time=([\"''])\\d+(?:\\.\\d+)?s\\1\\s*/>\"\"\",\n            re.IGNORECASE,\n        )\n        _WS_RE = re.compile(r\"\\s+\")\n\n        def normalise_turn_text(text: str) -> str:\n            text = text.replace(\"\\n\", \" \").replace(\"\\r\", \" \").replace(\"\\t\", \" \")\n            text = _BREAK_TAG_RE.sub(\"\", text)\n            return _WS_RE.sub(\" \", text).strip()\n\n        def format_turn(event) -> str:\n            text = json.dumps(normalise_turn_text(event.text or \"\"))\n            return f''{{\"speaker\": \"{event.role}\", \\n\"text\": {text}}}''\n\n        conv_log = \"[\" + \",\\n\\n\".join(format_turn(event) for event in conv.history) + \"]\"\n\n        try:\n            api_handler = get_api_instance(conv)\n            response = api_handler.PUT_call_result(\n                patient_key=self.get_patient_details()[\"patientKey\"],\n                campaign_patient_key=conv.state.campaign_patient_key,\n                call_result_data={\n                    \"callResult\": call_result,\n                    \"conversationId\": conv.id,\n                    \"conversationLog\": conv_log,\n                },\n            )\n\n        except Exception as e:\n            conv.log.warning(\"Error making summary\", exception=e)\n            return False\n        if not response:\n            return False\n        return True\n\n    def is_patient_insurance_srs(self, conv: Conversation) -> bool:\n        insurance_plan_name = self.get_primary_insurance_plan_name_from_api(conv)\n        if not insurance_plan_name:\n            return False\n        return \"SRS\" in insurance_plan_name.upper()\n\n    # MSCo: insurance plans we should not attempt reorder for (UHC Community Plan variants and Synapse)\n    UHC_COMMUNITY_PLAN_MATCH_UPPER_STRINGS = (\n        \"UHC COMMUNITY PLAN\",\n        \"UNITED HEALTHCARE COMMUNITY PLAN OHIO - 597\",\n        \"UHC OH - MEDICAID - 597\",\n        \"United Healthcare Community - OH\",\n        # \"United Healthcare Community - OH: United Healthcare - OH - Community Plan\" #TODO-KA: Clean up after release\n    )\n\n    def is_patient_insurance_uhc_community(self, insurance_plan_name: Optional[str]) -> bool:\n        if not insurance_plan_name:\n            return False\n        insurance_plan_name_upper = insurance_plan_name.upper()\n        return any(\n            s.upper() in insurance_plan_name_upper\n            for s in self.UHC_COMMUNITY_PLAN_MATCH_UPPER_STRINGS\n        )\n\n    def is_patient_insurance_synapse(self, insurance_plan_name: Optional[str]) -> bool:\n        if not insurance_plan_name:\n            return False\n        return \"UHC - MEDICARE - SYNAPSE\" in insurance_plan_name.upper()\n\n    def get_primary_insurance_plan_name_from_api(self, conv: Conversation) -> Optional[str]:\n        \"\"\"Get primary insurance plan name from patient insurance API (e.g. when rapid order is not available).\"\"\"\n        try:\n            api_handler = get_api_instance(conv)\n            response = api_handler.GET_patient_insurance(\n                patient_key=self.get_patient_details()[\"patientKey\"],\n            )\n        except Exception as e:\n            conv.log.warning(\"Error getting patient insurance info\", exception=e)\n            return None\n        insurance_data = (response or {}).get(\"data\", [])\n        insurance_plan_name = insurance_data[0].get(\"insurancePlanName\") if insurance_data else None\n        if insurance_plan_name:\n            conv.state.primary_insurance_plan_source = \"insurance_api\"\n            return insurance_plan_name\n        try:\n            conv.log.info(\"No insurance name from API, trying rapid order insurance name fallback\")\n            # Make sure rapid order data is loaded\n            self.rapid_order_data or self.load_rapid_order_data_from_api(conv)\n            primary_insurance_name = self.get_primary_insurance_name()\n            if primary_insurance_name:\n                return primary_insurance_name\n        except (TypeError, KeyError) as e:\n            conv.log.warning(\n                \"Could not get primary insurance name from rapid order fallback\", exception=e\n            )\n            return None\n\n    def block_insurance_update(self, conv: Conversation):\n        return (\n            conv.state.primary_insurance_plan_source == \"insurance_api\"\n            and conv.state.is_msco_synapse_or_uhc\n        )\n\n    def create_response_if_rapid_reorder_not_allowed(\n        self, conv: Conversation, origin: Optional[str] = None\n    ):\n        \"\"\"\n        If Medical Service Company site and primary insurance is UHC Community or Synapse,\n        perform the related transfer/redirect and return the result. Otherwise return None.\n        Caller should return the result when non-None.\n        \"\"\"\n\n        # LOAD RTC DATA\n        if conv.variant.site_name.lower() != \"medical service company\":\n            return\n\n        primary_insurance_name = self.get_primary_insurance_plan_name_from_api(conv)\n        conv.log.info(\n            \"primary_insurance_name from insurance API\",\n            primary_insurance_name=primary_insurance_name,\n        )\n\n        if (\n            conv.state.FEATURE_FLAG_insurance\n            and origin == \"rapid_order_routing\"\n            and (\n                self.is_patient_insurance_uhc_community(primary_insurance_name)\n                or self.is_patient_insurance_synapse(primary_insurance_name)\n            )\n        ):\n            conv.state.is_msco_synapse_or_uhc = True\n            return {\n                \"utterance\": conv.functions.utterances(\"CONFIRM_INSURANCE_PROVIDER\").format(\n                    primary_insurance_name=primary_insurance_name\n                ),\n                \"transition\": {\n                    \"goto_flow\": \"rapid-reorder\",\n                    \"goto_step\": \"asked-insurance-correct\",\n                },\n            }\n        elif self.is_patient_insurance_uhc_community(primary_insurance_name):\n            conv.log.info(\"Divert to UHC insurance transfer\")\n            conv.write_metric(\"UHC_INSURANCE_TRANSFER\", write_once=True)\n            conv.exit_flow()\n            return conv.functions.transfer_call(\n                utterance=conv.functions.utterances(\"UHC_INSURANCE_HANDOFF_UTTERANCE\"),\n                handoff_reason=\"UHC_INSURANCE_TRANSFER\",\n                handoff_to=\"4402969338\",\n            )\n        elif self.is_patient_insurance_synapse(primary_insurance_name):\n            conv.write_metric(\"SYNAPSE_INSURANCE_REDIRECT\", write_once=True)\n            conv.exit_flow()\n            return {\n                \"utterance\": conv.functions.utterances(\"SYNAPSE_INSURANCE_REDIRECT_UTTERANCE\"),\n                \"content\": \"You''re informing the user to call another number. Consider their response, responding appropriately if possible given the entire context. If there are no queries, simply ask ''Is there anything else I can help with?''\",\n            }\n        return None\n\n    def get_current_order_hcpc_codes(self) -> list[str]:\n        all_hcpc_items = self.get_all_hcpc_items()\n        removed = self.removed_item_keys\n        items = all_hcpc_items.get(\"insurance_question_items\", []) + all_hcpc_items.get(\n            \"non_insurance_question_items\", []\n        )\n\n        hcpc_codes: list[str] = []\n        for item in items:\n            if item.get(\"itemKey\") in removed:\n                continue\n            code = item.get(\"hcpcCode\")\n            if code is not None:\n                hcpc_codes.append(code)\n\n        return hcpc_codes\n\n\ndef order_service_module(conv: Conversation):\n    pass\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T16:51:53.261Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T16:51:53.261Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-2AFD41D2":true,"VARIABLE-460AF8A1":true,"VARIABLE-7210ADAD":true,"VARIABLE-83F4DDF1":true,"VARIABLE-8EA8ED2B":true,"VARIABLE-AA4B2219":true,"VARIABLE-B9DF4796":true,"VARIABLE-DBEF1FFD":true,"VARIABLE-3BAE36B3":true,"VARIABLE-5EED538E":true,"VARIABLE-3525B880":true,"VARIABLE-198A49E5":true,"VARIABLES-2a188b7d":true,"VARIABLES-8211454d":true,"VARIABLES-28a60917":true,"VARIABLE-FD3AEBCA":true}}},"FUNCTION-64e89617":{"id":"FUNCTION-64e89617","name":"speak_to_human","description":"User has requested to speak to a human / person / operator / representative / agent / someone. They may or may not provide a reason for why they wish to do so. It is valid to call this function twice in consecutive turns if the user makes the speak to request again. DO NOT MENTION A SPECIFIC PERSON AS WE CANNOT GUARANTEE A TRANSFER TO THEM.","parameters":{"ids":[],"entities":{}},"code":"def speak_to_human(conv: Conversation):\n    conv.state.speak_to_count = (conv.state.speak_to_count or 0) + 1\n    if conv.state.transfer_reason_loop:\n        return conv.functions.transfer_call(\n            \"No problem. I''ll put you through now. One second.\", \"SPEAK_TO\", \"\"\n        )\n\n    if conv.variant.site_name == \"Nunn''s\":\n        return conv.functions.transfer_call(\n            \"No problem. I''ll put you through now. One second.\", \"SPEAK_TO\", \"\"\n        )\n\n    if conv.current_flow == \"rapid-reorder\":\n        if conv.state.speak_to_mid_reorder:\n            return conv.functions.transfer_call(\n                \"No problem. I''ll put you through now. One second.\", \"SPEAK_TO_MID_REORDER\", \"\"\n            )\n        conv.state.speak_to_mid_reorder = True\n        return \"\"\" You must say: ''Of course, I can put you through to someone after I get that order set up for you, is that okay?'' #If the user says no in response to this, you MUST call speak_to_human function again. \"\"\"\n\n    if conv.current_flow == \"order-status\":\n        if conv.state.speak_to_mid_order_status:\n            return conv.functions.transfer_call(\n                \"No problem. I''ll put you through now. One second.\", \"SPEAK_TO_MID_ORDER_STATUS\", \"\"\n            )\n        conv.state.speak_to_mid_order_status = True\n        return \"\"\" You must say: ''Of course, I can put you through to someone after I finish going through your order details, is that okay?'' #If the user says no in response to this, you MUST call speak_to_human function again. \"\"\"\n\n    if conv.state.is_outbound:\n        return \"acknowledge that you understand they''d like to speak to someone but remind the users that you were calling because it was time for them to reorder their supplies, and ask if they''d like to proceed with their order.\"\n\n    conv.state.transfer_reason_loop = True\n    utterance = conv.functions.utterances(\"SPEAK_TO_DEFLECTION\")\n    conv.say(utterance=utterance)\n","errors":[],"latencyControl":{"enabled":false,"delayResponses":{"ids":[],"entities":{}},"initialDelay":0,"interval":0,"createdAt":"2025-11-25T04:54:52.777Z","createdBy":"system","updatedAt":"2025-11-25T04:54:52.777Z","updatedBy":"system"},"createdAt":"2026-05-14T20:26:28.917Z","createdBy":"gregory.tanaka@poly-ai.com","updatedAt":"2026-05-14T20:26:28.917Z","updatedBy":"gregory.tanaka@poly-ai.com","archived":false,"references":{"flowSteps":{},"topics":{},"stopKeywords":{},"behaviour":{},"variables":{"VARIABLE-70A887C8":true,"VARIABLES-c6a2c901":true,"VARIABLE-5EED538E":true,"VARIABLES-0875aa14":true,"VARIABLE-8F6FAE9F":true}}},"FUNCTION-a744716e":{"id":"FUNCTION-a744716e","name":"localise_api_text","description":"MUST NEVER BE CALLED","parameters":{"ids":[],"entities":{}},"code":"class LocalisedAPITextBase:\n    \"\"\"\n    Base class for localized API text domains.\n    Subclasses define TRANSLATIONS as a list of dicts with ''en-US'' and other language codes.\n    The base class automatically builds a lookup dictionary for fast access.\n    \"\"\"\n\n    TRANSLATIONS = []\n\n    # Internal mapping: en-US text → {lang: localized_text}\n    MAPPING = {}\n\n    def __init_subclass__(cls, **kwargs):\n        \"\"\"\n        Automatically build the internal MAPPING when a subclass is defined.\n        \"\"\"\n        super().__init_subclass__(**kwargs)\n        cls.MAPPING = {\n            entry[\"en-US\"].lower(): {k: v for k, v in entry.items() if k != \"en-US\"}\n            for entry in getattr(cls, \"TRANSLATIONS\", [])\n        }\n\n    @classmethod\n    def get_localised_text(cls, conv: Conversation, text: str):\n        \"\"\"\n        Return localized text using mapping, fallback to original English or LLM.\n        \"\"\"\n        if conv.language is None or conv.language == \"en-US\":\n            return text\n\n        # Found in mapping\n        lowered_text = text.lower()\n        if lowered_text in cls.MAPPING and conv.language in cls.MAPPING[lowered_text]:\n            return cls.MAPPING[lowered_text][conv.language]\n\n        # Not found → fallback to LLM\n        prompt = (\n            f\"Translate the following English text into {conv.language} exactly, \"\n            f\"suitable for a formal phone voicebot asking people in the US. \"\n            f\"Use professional, clear, and literal translations. \"\n            f\"Return only the {conv.language} text, no extra labels.\\n\\n\"\n            f\"Text/Word to translate: \"\n            f\"{text}\"\n        )\n        translated = conv.utils.prompt_llm(\n            prompt=prompt, show_history=False, return_json=False, model=\"gpt-4o\"\n        )\n        conv.log.info(\n            f\"Retrieved translated text for {cls.__name__}\",\n            original=text,\n            translated=translated,\n            language_code=conv.language,\n            prompt=prompt,\n        )\n\n        # Store LLM translation in mapping for future use\n        cls.MAPPING[lowered_text] = {\n            conv.language: translated,\n            **(cls.MAPPING[lowered_text] if lowered_text in cls.MAPPING else {}),\n        }\n        return translated\n\n\nclass OptimisedLocalisedAPITextBase(LocalisedAPITextBase):\n    \"\"\"\n    Subclass of LocalisedAPITextBase that also builds a reverse mapping\n    from localized text back to ''en-US'' for API calls.\n    \"\"\"\n\n    REVERSE_MAPPING = {}\n\n    def __init_subclass__(cls, **kwargs):\n        super().__init_subclass__(**kwargs)\n\n        # Build mapping from localized text back to en-US\n        for translation in cls.TRANSLATIONS:\n            en_text = translation[\"en-US\"]\n            for lang, localized_text in translation.items():\n                if lang != \"en-US\":\n                    cls.REVERSE_MAPPING[localized_text] = en_text\n\n    @classmethod\n    def get_localised_text(cls, conv, text: str):\n        super_text = super().get_localised_text(conv, text)\n        cls.REVERSE_MAPPING[super_text] = text\n\n        return super_text\n\n    @classmethod\n    def get_api_text(cls, conv: Conversation, text: str):\n        \"\"\"\n        Return the API expected text (en-US) for a given localized text.\n        If not found, return the original text.\n        \"\"\"\n        if conv.language is None or conv.language == \"en-US\":\n            return text\n\n        if text not in cls.REVERSE_MAPPING:\n            conv.log.warning(\n                f\"Could not find API text for localized choice ''{text}'' in {cls.__name__}\",\n                language_code=conv.language,\n            )\n\n        return cls.REVERSE_MAPPING.get(text, text)\n\n\nclass PLQs(LocalisedAPITextBase):\n    TRANSLATIONS = [\n        {\n            \"en-US\": \"Are you using your machine for at least 4 hours per night?\",\n            \"es-US\": \"¿Está usando su máquina por al menos 4 horas cada noche?\",\n        },\n        {\n            \"en-US\": \"What size CPAP cushion/pillows do you wear?\",\n            \"es-US\": \"¿Qué tamaño de almohadilla/almohadas de CPAP usa?\",\n        },\n        {\n            \"en-US\": \"Are your supplies depleted or worn and needing replacement?\",\n            \"es-US\": \"¿Necesita reemplazar sus suministros porque están agotados o desgastados?\",\n        },\n        {\n            \"en-US\": \"Are you out of CPAP supplies or will you be soon?\",\n            \"es-US\": \"¿Se le acabaron los suministros de CPAP o se le van a acabar pronto?\",\n        },\n        {\n            \"en-US\": \"Are your CPAP supplies, mask, headgear and/or tubing non-functional?\",\n            \"es-US\": \"¿Sus suministros de CPAP, mascarilla, arnés o tubos