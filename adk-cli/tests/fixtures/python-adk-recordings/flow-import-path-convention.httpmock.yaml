",\n            \"es-US\": \"¿Tiene un dispositivo médico metálico implantado?\",\n        },\n    ]\n\n\nclass Items(LocalisedAPITextBase):\n    TRANSLATIONS = [\n        {\"en-US\": \"Airsense 11 Heated Tubing\", \"es-US\": \"Tubo térmico de Airsense once\"},\n        {\n            \"en-US\": \"AirSense, AirCurve10 Heated Tubing\",\n            \"es-US\": \"Tubo térmico de AirSense 10 y AirCurve 10\",\n        },\n        {\n            \"en-US\": \"AirSense 10 Humidifier Chamber\",\n            \"es-US\": \"Cámara humidificadora de AirSense 10\",\n        },\n        {\"en-US\": \"Airsense 11 Water Chamber\", \"es-US\": \"Tanque de agua de Airsense once\"},\n        {\n            \"en-US\": \"Airsense 11 Disposable Filters, 2 Pack\",\n            \"es-US\": \"paquete de dos filtros desechables de Airsense once\",\n        },\n        {\n            \"en-US\": \"Airsense 11 Disposable Filters\",\n            \"es-US\": \"Filtros desechables de Airsense once\",\n        },\n        {\n            \"en-US\": \"S9, Airsense 10 Disposable Filters\",\n            \"es-US\": \"Filtros desechables de S9 y Airsense 10\",\n        },\n        {\"en-US\": \"Headgear\", \"es-US\": \"Arnés\"},\n        {\"en-US\": \"Disposable filters\", \"es-US\": \"Filtros desechables\"},\n        {\"en-US\": \"S9 Disposable Filters\", \"es-US\": \"Filtros desechables S9\"},\n        {\"en-US\": \"Water chamber\", \"es-US\": \"Tanque de agua\"},\n        {\n            \"en-US\": \"S9 Disposable Filters, 2 Pack\",\n            \"es-US\": \"paquete de dos filtros desechables S9\",\n        },\n        {\"en-US\": \"Heated tubing\", \"es-US\": \"Tubo térmico\"},\n        {\"en-US\": \"Nasal mask frame\", \"es-US\": \"Armazón de mascarilla nasal\"},\n        {\n            \"en-US\": \"Airfit F20 Full Face medium Cushions\",\n            \"es-US\": \"Almohadillas faciales completas medianas AirFit F20\",\n        },\n        {\"en-US\": \"Full face cushions\", \"es-US\": \"Almohadillas facia