      commands:
      - command_id: ${COMMAND_ID}
        delete_step:
          flow_id: FLOW-recording
          step_id: STEP-function
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: delete_step
      - command_id: ${COMMAND_ID}
        create_step:
          flow_id: FLOW-recording
          function_step:
            function:
              code: |
                def new_work(conv: Conversation, flow: Flow):
                    return "new"
              id: FUNCTION-736b3c54
              latency_control: {}
              name: new_work
            id: FUNCTION_STEPS-a566623e
            name: new_work
            position:
              x: 900.0
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: create_step
      - command_id: ${COMMAND_ID}
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: update_flow_step
        update_flow_step:
          flow_id: FLOW-recording
          step:
            id: STEP-start
            name: start_step
            prompt: Updated welcome to the flow lifecycle recording.
            references: {}
      - command_id: ${COMMAND_ID}
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: update_no_code_step
        update_no_code_step:
          flow_id: FLOW-recording
          name: default_step
          prompt: Updated no-code prompt.
          references: {}
          step_id: STEP-default
      - command_id: ${COMMAND_ID}
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: update_flow
        update_flow:
          description: Flow recording updated.
          flow_id: FLOW-recording
          name: adk_recording_flow
          start_step_id: STEP-start
      - command_id: ${COMMAND_ID}
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: update_flow_step_asr_config
        update_flow_step_asr_config:
          asr_biasing:
            address: false
            alphanumeric: true
            custom_keywords:
              custom_keywords:
              - lifecycle
            is_enabled: true
            name_spelling: false
            numeric: false
            party_size: false
            precise_date: false
            relative_date: false
            single_number: false
            time: false
            yes_no: false
          flow_id: FLOW-recording
          step_id: STEP-start
