"}}}}}}},"functions":{"functions":{"entities":{"FUNCTION-recording":{"code":"def recording_handler(conv):\n    return {\"utterance\": \"handled\"}\n","description":"Recording function.","errors":[],"name":"recording_handler","parameters":{"entities":{},"ids":[]}}}}},"handoff":{"handoffs":{"entities":{"HANDOFF-sales":{"active":true,"description":"Route to sales.","isDefault":true,"name":"Sales","sipConfig":{"config":{"$case":"invite","value":{"outboundEncryption":"TLS/SRTP","outboundEndpoint":"sales-trunk","phoneNumber":"+15551234567"}}},"sipHeaders":{"headers":[{"key":"X-Recording","value":"sales"}]}},"HANDOFF-support":{"active":true,"description":"Deleted by lifecycle recording.","isDefault":false,"name":"Support","sipConfig":{"config":{"$case":"bye","value":{}}},"sipHeaders":{"headers":[]}}}}},"keyphraseBoosting":{"keyphraseBoosting":{"entities":{"KEYPHRASE-adk":{"keyphrase":"ADK parity","level":"boosted"}}}},"knowledgeBase":{"topics":{"entities":{"TOPIC-recording":{"actions":"Keep answers concise.","content":"Recording coverage topic.","exampleQueries":[{"query":"What is this recording?"}],"isActive":true,"name":"Recording Topic"}}}},"pronunciations":{"pronunciations":{"entities":{"PRON-adk":{"caseSensitive":true,"description":"Pronounce ADK clearly.","languageCode":"en-US","name":"ADK pronunciation","position":0,"regex":"\\bADK\\b","replacement":"Agent Development Kit"}}}},"sms":{"templates":{"entities":{"SMS-old":{"active":true,"envPhoneNumbers":{"live":"","preRelease":"","sandbox":""},"name":"Old SMS","text":"Old message"},"SMS-welcome":{"active":true,"envPhoneNumbers":{"live":"+15550000003","preRelease":"+15550000002","sandbox":"+15550000001"},"name":"Welcome SMS","text":"Hello {recording_state}"}}}},"stopKeywords":{"filters":{"entities":{"STOP-hangup":{"description":"End the conversation.","languageCode":"en-US","references":{"globalFunctions":{"FUNCTION-recording":true}},"regularExpressions":["(?i)bye"],"sayPhrase":false,"title":"Hang Up"},"STOP-old":{"description":"Deleted by lifecycle recording.","languageCode":"en-US","regularExpressions":["old"],"sayPhrase":false,"title":"Old Filter"}}}},"transcriptCorrections":{"transcriptCorrections":{"entities":{"CORRECTION-adk":{"description":"Correct ADK spelling.","name":"ADK correction","regularExpressions":[{"regularExpression":"agent development kid","replacement":"agent development kit","replacementType":"full"}]}}}},"variantManagement":{"attributes":{"entities":{"ATTR-channel":{"archived":false,"name":"channel"}}},"variantAttributeValues":{"entities":{"VAR-control":{"values":{"ATTR-channel":"voice"}},"VAR-treatment":{"values":{"ATTR-channel":"webchat"}}}},"variants":{"entities":{"VAR-control":{"isDefault":true,"name":"control"},"VAR-treatment":{"isDefault":false,"name":"treatment"}}}}}'
