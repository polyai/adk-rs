schema_version: 3
source:
  implementation: python-adk
  recorder: rust-httpmock-forwarding
  server: real-agent-studio
  poly_binary: ${PYTHON_ADK_BIN:-poly}
  region: us-1
  account_id: ben-ws
  project_id: PROJECT-JTQKOKLM
  project_name: Test
replay_notes:
- Documents Python status, diff, and dry-run command behavior for existing flow resource edits.
- 'This scenario is local-only: it pulls a synthetic flow projection, edits flow_config, step YAML, function-step files, and dry-runs push with --from-projection -.'
- The local edits exercise flow update and function-step create/delete behavior without mutating Agent Studio.
httpmock_recording: flow-lifecycle.httpmock.yaml
workflows:
- name: flow_lifecycle
  description: Pull a synthetic flow baseline, edit existing flow resources, then record Python status, diff, and dry-run command generation.
  mutates_real_server: false
  cleanup: []
  steps:
  - kind: file_edit
    name: write project config before flow lifecycle
    operation: write_text
    path: project.yaml
    content: |
      region: us-1
      account_id: ben-ws
      project_id: PROJECT-JTQKOKLM
      branch_id: main
    target: null
    replacement: null
    success: true
    error: null
  - kind: command
    name: pull flow lifecycle baseline projection
    argv:
    - poly
    - pull
    - --json
    - --force
    - --from-projection
    - '-'
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    stdin: '{"apiIntegrations":{"apiIntegrations":{"entities":{"API-recording":{"description":"Recording API integration.","environments":{"live":{"authType":"none","baseUrl":"https://example.invalid/live"},"pre-release":{"authType":"none","baseUrl":"https://example.invalid/pre"},"sandbox":{"authType":"none","baseUrl":"https://example.invalid/sandbox"}},"name":"recording_api","operations":{"OP-status":{"id":"OP-status","method":"GET","name":"get_status","resource":"/status"}}}}}},"entities":{"entities":{"entities":{"ENTITY-age":{"config":{"value":{"has_decimal":false,"has_range":true,"max":120,"min":1}},"description":"Customer age.","name":"Age","type":"numeric"},"ENTITY-legacy":{"config":{"value":{}},"description":"Deleted by lifecycle recording.","name":"Legacy Code","type":"free_text"}}}},"experimentalConfig":{"experimentalConfigs":{"entities":{"default":{"features":{"nested":{"enabled":true},"recording_flag":true}}}}},"flows":{"flows":{"entities":{"FLOW-recording":{"description":"Flow recording baseline.","name":"adk_recording_flow","startStepId":"STEP-start","steps":{"entities":{"STEP-default":{"conditions":[{"config":{"$case":"exitFlowCondition","value":{"details":{"description":"Exit the flow.","ingressPosition":"top","label":"exit","position":{"x":300.0,"y":250.0},"requiredEntities":[]},"exitFlowPosition":{"x":300.0,"y":500.0}}},"id":"COND-exit"}],"name":"default_step","position":{"x":300.0,"y":100.0},"prompt":"What do you need?","references":{"extractedEntities":{"ENTITY-age":true}},"type":"default_step"},"STEP-function":{"function":{"code":"def do_work(conv, flow):\n    return \"done\"\n","id":"FUNCTION-step-do-work","latencyControl":{},"parameters":{"entities":{},"ids":[]}},"name":"do_work","position":{"x":500.0,"y":100.0},"type":"function_step"},"STEP-start":{"asrBiasing":{"isEnabled":false},"dtmfConfig":{"isEnabled":false},"name":"start_step","position":{"x":100.0,"y":100.0},"prompt":"Welcome to the flow recording.","references":{},"type":"advanced_step"}}}}}}},"functions":{"functions":{"entities":{"FUNCTION-recording":{"code":"def recording_handler(conv):\n    return {\"utterance\": \"handled\"}\n","description":"Recording function.","errors":[],"name":"recording_handler","parameters":{"entities":{},"ids":[]}}}}},"handoff":{"handoffs":{"entities":{"HANDOFF-sales":{"active":true,"description":"Route to sales.","isDefault":true,"name":"Sales","sipConfig":{"config":{"$case":"invite","value":{"outboundEncryption":"TLS/SRTP","outboundEndpoint":"sales-trunk","phoneNumber":"+15551234567"}}},"sipHeaders":{"headers":[{"key":"X-Recording","value":"sales"}]}},"HANDOFF-support":{"active":true,"description":"Deleted by lifecycle recording.","isDefault":false,"name":"Support","sipConfig":{"config":{"$case":"bye","value":{}}},"sipHeaders":{"headers":[]}}}}},"keyphraseBoosting":{"keyphraseBoosting":{"entities":{"KEYPHRASE-adk":{"keyphrase":"ADK parity","level":"boosted"}}}},"knowledgeBase":{"topics":{"entities":{"TOPIC-recording":{"actions":"Keep answers concise.","content":"Recording coverage topic.","exampleQueries":[{"query":"What is this recording?"}],"isActive":true,"name":"Recording Topic"}}}},"pronunciations":{"pronunciations":{"entities":{"PRON-adk":{"caseSensitive":true,"description":"Pronounce ADK clearly.","languageCode":"en-US","name":"ADK pronunciation","position":0,"regex":"\\bADK\\b","replacement":"Agent Development Kit"}}}},"sms":{"templates":{"entities":{"SMS-old":{"active":true,"envPhoneNumbers":{"live":"","preRelease":"","sandbox":""},"name":"Old SMS","text":"Old message"},"SMS-welcome":{"active":true,"envPhoneNumbers":{"live":"+15550000003","preRelease":"+15550000002","sandbox":"+15550000001"},"name":"Welcome SMS","text":"Hello {recording_state}"}}}},"stopKeywords":{"filters":{"entities":{"STOP-hangup":{"description":"End the conversation.","languageCode":"en-US","references":{"globalFunctions":{"FUNCTION-recording":true}},"regularExpressions":["(?i)bye"],"sayPhrase":false,"title":"Hang Up"},"STOP-old":{"description":"Deleted by lifecycle recording.","languageCode":"en-US","regularExpressions":["old"],"sayPhrase":false,"title":"Old Filter"}}}},"transcriptCorrections":{"transcriptCorrections":{"entities":{"CORRECTION-adk":{"description":"Correct ADK spelling.","name":"ADK correction","regularExpressions":[{"regularExpression":"agent development kid","replacement":"agent development kit","replacementType":"full"}]}}}},"variantManagement":{"attributes":{"entities":{"ATTR-channel":{"archived":false,"name":"channel"}}},"variantAttributeValues":{"entities":{"VAR-control":{"values":{"ATTR-channel":"voice"}},"VAR-treatment":{"values":{"ATTR-channel":"webchat"}}}},"variants":{"entities":{"VAR-control":{"isDefault":true,"name":"control"},"VAR-treatment":{"isDefault":false,"name":"treatment"}}}}}'
    exit_code: 0
    stdout_json:
      files_with_conflicts: []
      success: true
    stdout: null
    stderr: ''
  - kind: file_edit
    name: write lifecycle flow config
    operation: write_text
    path: flows/adk_recording_flow/flow_config.yaml
    content: |
      name: adk_recording_flow
      description: Flow recording updated.
      start_step: start_step
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write lifecycle flow start step
    operation: write_text
    path: flows/adk_recording_flow/steps/start_step.yaml
    content: |
      step_type: advanced_step
      name: start_step
      prompt: Updated welcome to the flow lifecycle recording.
      asr_biasing:
        is_enabled: true
        alphanumeric: true
        custom_keywords:
          - lifecycle
      dtmf_config:
        is_enabled: true
        max_digits: 4
        end_key: "#"
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write lifecycle flow default step
    operation: write_text
    path: flows/adk_recording_flow/steps/default_step.yaml
    content: |
      step_type: default_step
      name: default_step
      prompt: Updated no-code prompt.
      conditions:
        - name: exit
          condition_type: exit_flow_condition
          description: Updated exit the flow.
          required_entities: []
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write lifecycle new function step
    operation: write_text
    path: flows/adk_recording_flow/function_steps/new_work.py
    content: |
      from _gen import *  # <AUTO GENERATED>


      def new_work(conv: Conversation, flow: Flow):
          return "new"
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: delete lifecycle old function step
    operation: delete_file
    path: flows/adk_recording_flow/function_steps/do_work.py
    content: null
    target: null
    replacement: null
    success: true
    error: null
  - kind: command
    name: status after flow lifecycle edits
    argv:
    - poly
    - status
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      deleted_files:
      - ${TMP}/ben-ws/PROJECT-JTQKOKLM/flows/adk_recording_flow/function_steps/do_work.py
      files_with_conflicts: []
      modified_files:
      - ${TMP}/ben-ws/PROJECT-JTQKOKLM/flows/adk_recording_flow/steps/start_step.yaml
      - ${TMP}/ben-ws/PROJECT-JTQKOKLM/flows/adk_recording_flow/steps/default_step.yaml
      - ${TMP}/ben-ws/PROJECT-JTQKOKLM/flows/adk_recording_flow/flow_config.yaml
      new_files:
      - ${TMP}/ben-ws/PROJECT-JTQKOKLM/flows/adk_recording_flow/function_steps/new_work.py
    stdout: null
    stderr: ''
  - kind: command
    name: diff after flow lifecycle edits
    argv:
    - poly
    - diff
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      diffs:
        ${TMP}/ben-ws/PROJECT-JTQKOKLM/flows/adk_recording_flow/function_steps/do_work.py: |-
          --- original
          +++ updated
          @@ -1,2 +0,0 @@
          -def do_work(conv, flow):
          -    return "done"
        flows/adk_recording_flow/flow_config.yaml: |-
          --- original
          +++ updated
          @@ -1,3 +1,3 @@
           name: adk_recording_flow
          -description: Flow recording baseline.
          -start_step: start_step
          +description: Flow recording updated.
          +start_step: STEP-start
        flows/adk_recording_flow/function_steps/new_work.py: |-
          --- original
          +++ updated
          @@ -0,0 +1,2 @@
          +def new_work(conv: Conversation, flow: Flow):
          +    return "new"
        flows/adk_recording_flow/steps/default_step.yaml: |-
          --- original
          +++ updated
          @@ -3,8 +3,7 @@
           conditions:
           - name: exit
             condition_type: exit_flow_condition
          -  description: Exit the flow.
          +  description: Updated exit the flow.
             required_entities: []
          -extracted_entities:
          -- ENTITY-age
          -prompt: What do you need?
          +extracted_entities: []
          +prompt: Updated no-code prompt.
        flows/adk_recording_flow/steps/start_step.yaml: |-
          --- original
          +++ updated
          @@ -1,8 +1,8 @@
           step_type: advanced_step
           name: start_step
           asr_biasing:
          -  is_enabled: false
          -  alphanumeric: false
          +  is_enabled: true
          +  alphanumeric: true
             name_spelling: false
             numeric: false
             party_size: false
          @@ -12,12 +12,13 @@
             time: false
             yes_no: false
             address: false
          -  custom_keywords: []
          +  custom_keywords:
          +  - lifecycle
           dtmf_config:
          -  is_enabled: false
          +  is_enabled: true
             inter_digit_timeout: 0
          -  max_digits: 0
          -  end_key: ''
          +  max_digits: 4
          +  end_key: '#'
             collect_while_agent_speaking: false
             is_pii: false
          -prompt: Welcome to the flow recording.
          +prompt: Updated welcome to the flow lifecycle recording.
      success: true
    stdout: null
    stderr: ''
  - kind: command
    name: push dry-run flow lifecycle command payload
    argv:
    - poly
    - push
    - --output-json-commands
    - --dry-run
    - --skip-validation
    - --from-projection
    - '-'
    - --email
    - adk-recorder@example.com
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
