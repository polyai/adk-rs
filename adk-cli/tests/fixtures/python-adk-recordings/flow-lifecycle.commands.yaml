        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: update_flow_step_dtmf_config
        update_flow_step_dtmf_config:
          dtmf_config:
            collect_while_agent_speaking: false
            end_key: '#'
            inter_digit_timeout: 0
            is_enabled: true
            is_pii: false
            max_digits: 4
          flow_id: FLOW-recording
          step_id: STEP-start
      - command_id: ${COMMAND_ID}
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: update_no_code_condition
        update_no_code_condition:
          condition_id: COND-exit
          exit_flow_condition:
            details:
