schema_version: 3
source:
  implementation: python-adk
  recorder: rust-httpmock-forwarding
  server: real-agent-studio
  poly_binary: ${PYTHON_ADK_BIN:-poly}
  region: us-1
  account_id: ben-ws
  project_id: PROJECT-JTQKOKLM
  project_name: Test
replay_notes:
- Documents Python validation output for representative invalid flow resources.
- 'This scenario is local-only: it writes invalid flow_config, step YAML, and function-step files, then validates and dry-runs push with --from-projection -.'
- The invalid resources cover missing start steps, default-step function references, malformed step conditions, empty prompts, and bad function-step signatures.
httpmock_recording: flow-validation.httpmock.yaml
workflows:
- name: flow_validation
  description: Write invalid flow resources and record Python validate plus push dry-run validation errors.
  mutates_real_server: false
  cleanup: []
  steps:
  - kind: file_edit
    name: write project config before flow validation
    operation: write_text
    path: project.yaml
    content: |
      region: us-1
      account_id: ben-ws
      project_id: PROJECT-JTQKOKLM
      branch_id: main
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write flow validation entity config
    operation: write_text
    path: config/entities.yaml
    content: |
      entities:
        - name: Age
          description: Age.
          entity_type: numeric
          config:
            has_range: false
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write invalid flow config
    operation: write_text
    path: flows/bad_flow/flow_config.yaml
    content: |
      name: bad_flow
      description: Valid description.
      start_step: missing_start
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write invalid flow bad condition step
    operation: write_text
    path: flows/bad_flow/steps/bad_condition.yaml
    content: |
      step_type: default_step
      name: bad_condition
      prompt: Continue.
      conditions:
        - name: go
          condition_type: step_condition
          description: Go.
          child_step: missing_step
          required_entities:
            - ENTITY-missing
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write invalid flow default function reference step
    operation: write_text
    path: flows/bad_flow/steps/default_func.yaml
    content: |
      step_type: default_step
      name: default_func
      prompt: "Use {{fn:recording_handler}}."
      conditions: []
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write invalid flow empty prompt step
    operation: write_text
    path: flows/bad_flow/steps/empty_prompt.yaml
    content: |
      step_type: advanced_step
      name: empty_prompt
      prompt: ""
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write invalid flow function step
    operation: write_text
    path: flows/bad_flow/function_steps/bad_func.py
    content: |
      from _gen import *  # <AUTO GENERATED>

      @func_parameter("x", "bad")
      def bad_func(conv: Conversation, flow: Flow, x: str):
          return x
    target: null
    replacement: null
    success: true
    error: null
  - kind: command
    name: validate flow resource errors
    argv:
    - poly
    - validate
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      errors:
      - 'Validation error in flows/bad_flow/steps/bad_condition.yaml: Condition ''go'': Step ''missing_step'' not found'
      - 'Validation error in flows/bad_flow/steps/default_func.yaml: Default steps cannot reference functions. Found function references: [''recording_handler'']'
      - 'Validation error in flows/bad_flow/steps/empty_prompt.yaml: Prompt cannot be empty.'
      - 'Validation error in flows/bad_flow/function_steps/bad_func.py: Function definition ''def bad_func(conv: Conversation, flow: Flow)'' not found in code.'
      - 'Validation error in flows/bad_flow/flow_config.yaml: Start step ''missing_start'' not found.'
      valid: false
    stdout: null
    stderr: ''
  - kind: command
    name: push dry-run blocks on flow validation errors
    argv:
    - poly
    - push
    - --json
    - --dry-run
    - --from-projection
    - '-'
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    stdin: '{}'
    exit_code: 1
    stdout_json:
      dry_run: true
      message: |-
        Validation errors detected:
        Validation error in flows/bad_flow/steps/bad_condition.yaml: Condition 'go': Step 'missing_step' not found
        Validation error in flows/bad_flow/steps/default_func.yaml: Default steps cannot reference functions. Found function references: ['recording_handler']
        Validation error in flows/bad_flow/steps/empty_prompt.yaml: Prompt cannot be empty.
        Validation error in flows/bad_flow/function_steps/bad_func.py: Function definition 'def bad_func(conv: Conversation, flow: Flow)' not found in code.
        Validation error in flows/bad_flow/flow_config.yaml: Start step 'missing_start' not found.
      success: false
    stdout: null
    stderr: ''
