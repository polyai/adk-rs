schema_version: 3
source:
  implementation: python-adk
  recorder: rust-httpmock-forwarding
  server: real-agent-studio
  poly_binary: ${PYTHON_ADK_BIN:-poly}
  region: us-1
  account_id: ben-ws
  project_id: PROJECT-JTQKOKLM
  project_name: Test
replay_notes:
- Documents Python dry-run command generation for flow_config, flow_steps, function_steps, and no-code exit conditions.
- 'This scenario is local-only: it uses --from-projection {} so the HTTP cassette is intentionally empty or near-empty.'
- Authentication headers are redacted after recording.
httpmock_recording: flow-resource-coverage.httpmock.yaml
workflows:
- name: flow_resource_coverage
  description: Record Python create-flow command behavior for advanced steps, no-code steps, function steps, and exit conditions.
  mutates_real_server: false
  cleanup: []
  steps:
  - kind: file_edit
    name: write project config before flow resource workflow
    operation: write_text
    path: project.yaml
    content: |
      region: us-1
      account_id: ben-ws
      project_id: PROJECT-JTQKOKLM
      branch_id: main
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write flow config
    operation: write_text
    path: flows/adk_recording_flow/flow_config.yaml
    content: |
      name: adk_recording_flow
      description: Flow recording baseline.
      start_step: start_step
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write flow start step
    operation: write_text
    path: flows/adk_recording_flow/steps/start_step.yaml
    content: |
      step_type: advanced_step
      name: start_step
      prompt: Welcome to the flow recording.
      asr_biasing:
        is_enabled: false
      dtmf_config:
        is_enabled: false
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write flow default step
    operation: write_text
    path: flows/adk_recording_flow/steps/default_step.yaml
    content: |
      step_type: default_step
      name: default_step
      prompt: What do you need?
      conditions:
        - name: exit
          condition_type: exit_flow_condition
          description: Exit the flow.
          required_entities: []
      extracted_entities: []
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: write flow function step
    operation: write_text
    path: flows/adk_recording_flow/function_steps/do_work.py
    content: |
      from _gen import *  # <AUTO GENERATED>


      def do_work(conv: Conversation, flow: Flow):
          return "done"
    target: null
    replacement: null
    success: true
    error: null
  - kind: command
    name: push dry-run flow resource command payload
    argv:
    - poly
    - push
    - --output-json-commands
    - --dry-run
    - --skip-validation
    - --from-projection
    - '{}'
    - --email
    - adk-recorder@example.com
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      commands:
      - command_id: ${COMMAND_ID}
        create_flow:
          description: Flow recording baseline.
          id: FLOW_CONFIG-d79868c5
          name: adk_recording_flow
          no_code_steps:
          - flow_id: FLOW_CONFIG-d79868c5
            name: default_step
            position:
              x: 600.0
            prompt: What do you need?
            references: {}
            step_id: FLOW_STEPS-902e56b7
          start_step_id: FLOW_STEPS-790be911
          steps:
          - asr_biasing: {}
            dtmf_config:
              end_key: '#'
            id: FLOW_STEPS-790be911
            name: start_step
            position: {}
            prompt: Welcome to the flow recording.
            references: {}
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: create_flow
      - command_id: ${COMMAND_ID}
        create_step:
          flow_id: FLOW_CONFIG-d79868c5
          function_step:
            function:
              code: |
                def do_work(conv: Conversation, flow: Flow):
                    return "done"
              id: FUNCTION-e5ce4d05
              latency_control: {}
              name: do_work
            id: FUNCTION_STEPS-3f260785
            name: do_work
            position:
              x: 1200.0
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: create_step
      - command_id: ${COMMAND_ID}
        create_no_code_condition:
          condition_id: CONDITION-4c77aabf
          exit_flow_condition:
            details:
              description: Exit the flow.
              ingress_position: top
              label: exit
              position:
                x: 600.0
                y: 250.0
            exit_flow_position:
              x: 600.0
              y: 500.0
          flow_id: FLOW_CONFIG-d79868c5
          step_id: FLOW_STEPS-902e56b7
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: create_no_code_condition
      dry_run: true
      message: Dry run completed. No changes were pushed.
      success: true
    stdout: null
    stderr: ''
