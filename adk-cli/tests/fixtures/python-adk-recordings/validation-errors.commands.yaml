schema_version: 3
source:
  implementation: python-adk
  recorder: rust-httpmock-forwarding
  server: real-agent-studio
  poly_binary: ${PYTHON_ADK_BIN:-poly}
  region: us-1
  account_id: ben-ws
  project_id: PROJECT-JTQKOKLM
  project_name: Test
replay_notes:
- This manifest records Python ADK error output for invalid local project files.
- The validate and push steps are expected to report failure.
- This workflow is local-only after init and does not mutate Agent Studio.
httpmock_recording: validation-errors.httpmock.yaml
workflows:
- name: validation_errors
  description: Initialize a real project, overwrite a YAML file with invalid syntax, then record validate and push dry-run error contracts.
  mutates_real_server: false
  cleanup: []
  steps:
  - kind: command
    name: init real project before validation errors
    argv:
    - poly
    - init
    - --json
    - --base-path
    - ${TMP}
    - --region
    - us-1
    - --account_id
    - ben-ws
    - --project_id
    - PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      root_path: ${TMP}/ben-ws/PROJECT-JTQKOKLM
      success: true
    stdout: null
    stderr: ''
  - kind: file_edit
    name: write invalid personality yaml
    operation: write_text
    path: agent_settings/personality.yaml
    content: |
      adjectives:
        Polite: true
        - malformed
    target: null
    replacement: null
    success: true
    error: null
