    name: push dry-run synthetic lifecycle command payload
    argv:
    - poly
    - push
    - --output-json-commands
    - --dry-run
    - --skip-validation
    - --from-projection
    - '-'
    - --email
    - adk-recorder@example.com
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
