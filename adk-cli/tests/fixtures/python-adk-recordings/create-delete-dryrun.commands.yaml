schema_version: 3
source:
  implementation: python-adk
  recorder: rust-httpmock-forwarding
  server: real-agent-studio
  poly_binary: ${PYTHON_ADK_BIN:-poly}
  region: us-1
  account_id: ben-ws
  project_id: PROJECT-JTQKOKLM
  project_name: Test
replay_notes:
- This manifest records create/delete command generation on a throwaway branch.
- Apply file_edit steps before replaying the following command steps.
- The push step is a dry run and does not send command batches to Agent Studio.
- The branch is deleted at the end of the recorded workflow.
httpmock_recording: create-delete-dryrun.httpmock.yaml
workflows:
- name: create_delete_dryrun
  description: Create a branch, write a new topic, delete an existing function locally, inspect status/diff, dry-run push command generation, then delete the branch.
  mutates_real_server: true
  cleanup:
  - poly branch delete ${BRANCH_NAME} --json --path ${TMP}/ben-ws/PROJECT-JTQKOKLM
  steps:
  - kind: command
    name: init real project before create/delete dry-run
    argv:
    - poly
    - init
    - --json
    - --base-path
    - ${TMP}
    - --region
    - us-1
    - --account_id
    - ben-ws
    - --project_id
    - PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      root_path: ${TMP}/ben-ws/PROJECT-JTQKOKLM
      success: true
    stdout: null
    stderr: ''
  - kind: command
    name: create throwaway branch
    argv:
    - poly
    - branch
    - create
    - ${BRANCH_NAME}
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      branch_name: ${BRANCH_NAME}
      new_branch_id: BRANCH-ITAT4IE9
      success: true
    stdout: null
    stderr: ''
  - kind: file_edit
    name: write new topic resource
    operation: write_text
    path: topics/adk_recording_topic.yaml
    content: |
      name: ADK Recording Topic
      enabled: true
      actions: Keep answers concise and helpful.
      content: This topic exists only to exercise Python ADK create command generation.
      example_queries:
      - What can this recorder test?
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: delete existing goodbye function
    operation: delete_file
    path: functions/goodbye_and_hang_up.py
    content: null
    target: null
    replacement: null
    success: true
    error: null
  - kind: command
    name: status after create/delete edits
    argv:
    - poly
    - status
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      deleted_files:
      - ${TMP}/ben-ws/PROJECT-JTQKOKLM/functions/goodbye_and_hang_up.py
      files_with_conflicts: []
      modified_files: []
      new_files:
      - ${TMP}/ben-ws/PROJECT-JTQKOKLM/topics/adk_recording_topic.yaml
    stdout: null
    stderr: ''
  - kind: command
    name: diff after create/delete edits
    argv:
    - poly
    - diff
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      diffs:
        ${TMP}/ben-ws/PROJECT-JTQKOKLM/functions/goodbye_and_hang_up.py: |-
          --- original
          +++ updated
          @@ -1,6 +0,0 @@
          -@func_description("Say goodbye and end the conversation if and only if you've explicitly confirmed with the user that they don't need help with anything else")
          -def goodbye_and_hang_up(conv: Conversation):
          -  return {
          -    "utterance": "Okay. I hope you have a great rest of your day. Goodbye!",
          -    "hangup": True
          -  }
        topics/adk_recording_topic.yaml: |-
          --- original
          +++ updated
          @@ -0,0 +1,6 @@
          +name: ADK Recording Topic
          +enabled: true
          +actions: Keep answers concise and helpful.
          +content: This topic exists only to exercise Python ADK create command generation.
          +example_queries:
          +- What can this recorder test?
      success: true
    stdout: null
    stderr: ''
  - kind: command
    name: push dry-run create/delete command payload
    argv:
    - poly
    - push
    - --output-json-commands
    - --dry-run
    - --skip-validation
    - --email
    - adk-recorder@example.com
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      commands:
      - command_id: ${COMMAND_ID}
        delete_function:
          id: default-function
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: delete_function
      - command_id: ${COMMAND_ID}
        create_topic:
          actions: Keep answers concise and helpful.
          content: This topic exists only to exercise Python ADK create command generation.
          example_queries:
            queries:
            - What can this recorder test?
          id: TOPICS-74a568cc
          is_active: true
          name: ADK Recording Topic
          references: {}
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: create_topic
      dry_run: true
      message: Dry run completed. No changes were pushed.
      success: true
    stdout: null
    stderr: ''
  - kind: command
    name: delete throwaway branch
    argv:
    - poly
    - branch
    - delete
    - ${BRANCH_NAME}
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      success: true
      switched_to: main
    stdout: null
    stderr: ''
