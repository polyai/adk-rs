schema_version: 3
source:
  implementation: python-adk
  recorder: rust-httpmock-forwarding
  server: real-agent-studio
  poly_binary: ${PYTHON_ADK_BIN:-poly}
  region: us-1
  account_id: ben-ws
  project_id: PROJECT-JTQKOKLM
  project_name: Test
replay_notes:
- This manifest records create/delete command generation on a throwaway branch.
- Apply file_edit steps before replaying the following command steps.
- The push step is a dry run and does not send command batches to Agent Studio.
- The branch is deleted at the end of the recorded workflow.
httpmock_recording: create-delete-dryrun.httpmock.yaml
workflows:
- name: create_delete_dryrun
  description: Create a branch, write a new topic, delete an existing function locally, inspect status/diff, dry-run push command generation, then delete the branch.
  mutates_real_server: true
  cleanup:
  - poly branch delete ${BRANCH_NAME} --json --path ${TMP}/ben-ws/PROJECT-JTQKOKLM
  steps:
  - kind: command
    name: init real project before create/delete dry-run
    argv:
    - poly
    - init
    - --json
    - --base-path
    - ${TMP}
    - --region
    - us-1
    - --account_id
    - ben-ws
    - --project_id
    - PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      root_path: ${TMP}/ben-ws/PROJECT-JTQKOKLM
      success: true
    stdout: null
    stderr: ''
  - kind: command
    name: create throwaway branch
    argv:
    - poly
    - branch
    - create
    - ${BRANCH_NAME}
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      branch_name: ${BRANCH_NAME}
      new_branch_id: BRANCH-ITAT4IE9
      success: true
    stdout: null
    stderr: ''
  - kind: file_edit
    name: write new topic resource
    operation: write_text
    path: topics/adk_recording_topic.yaml
    content: |
      name: ADK Recording Topic
      enabled: true
      actions: Keep answers concise and helpful.
      content: This topic exists only to exercise Python ADK create command generation.
      example_queries:
      - What can this recorder test?
    target: null
    replacement: null
    success: true
    error: null
  - kind: file_edit
    name: delete existing goodbye function
    operation: delete_file
    path: functions/goodbye_and_hang_up.py
    content: null
    target: null
    replacement: null
    success: true
    error: null
  - kind: command
    name: status after create/delete edits
    argv:
    - poly
    - status
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      deleted_files:
      - ${TMP}/ben-ws/PROJECT-JTQKOKLM/functions/goodbye_and_hang_up.py
      files_with_conflicts: []
      modified_files:
      - ${TMP}/ben-ws/PROJECT-JTQKOKLM/agent_settings/rules.txt
      new_files:
      - ${TMP}/ben-ws/PROJECT-JTQKOKLM/topics/adk_recording_topic.yaml
    stdout: null
    stderr: ''
  - kind: command
    name: diff after create/delete edits
    argv:
    - poly
    - diff
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      diffs:
        ${TMP}/ben-ws/PROJECT-JTQKOKLM/functions/goodbye_and_hang_up.py: |-
          --- original
          +++ updated
          @@ -1,6 +0,0 @@
          -@func_description("Say goodbye and end the conversation if and only if you've explicitly confirmed with the user that they don't need help with anything else")
          -def goodbye_and_hang_up(conv: Conversation):
          -  return {
          -    "utterance": "Okay. I hope you have a great rest of your day. Goodbye!",
          -    "hangup": True
          -  }
        agent_settings/rules.txt: "--- original\n+++ updated\n@@ -67,4 +67,4 @@\n USER: \"Nothing/That's it\"  \n ASSISTANT: “Thanks for calling, and I hope you have a great rest of your day. Goodbye.”\n USER: “Bye” / [silence]\n-→ TOOL CALL: Call the {{fn:default-function}} without saying anything else.\n+→ TOOL CALL: Call the {{fn:goodbye_and_hang_up}} without saying anything else."
        topics/adk_recording_topic.yaml: |-
          --- original
          +++ updated
          @@ -0,0 +1,6 @@
          +name: ADK Recording Topic
          +enabled: true
          +actions: Keep answers concise and helpful.
          +content: This topic exists only to exercise Python ADK create command generation.
          +example_queries:
          +- What can this recorder test?
      success: true
    stdout: null
    stderr: ''
  - kind: command
    name: push dry-run create/delete command payload
    argv:
    - poly
    - push
    - --output-json-commands
    - --dry-run
    - --skip-validation
    - --email
    - adk-recorder@example.com
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      commands:
      - command_id: ${COMMAND_ID}
        delete_function:
          id: default-function
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: delete_function
      - command_id: ${COMMAND_ID}
        create_topic:
          actions: Keep answers concise and helpful.
          content: This topic exists only to exercise Python ADK create command generation.
          example_queries:
            queries:
            - What can this recorder test?
          id: TOPICS-74a568cc
          is_active: true
          name: ADK Recording Topic
          references: {}
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: create_topic
      - command_id: ${COMMAND_ID}
        metadata:
          created_at: ${TIMESTAMP}
          created_by: adk-recorder@example.com
        type: update_rules
        update_rules:
          behaviour: "\n# TASK AND CONTEXT\nYour task is to assist users with their queries about [Organization/Service].  [Organization] is a [brief description] that specializes in [services/products].\n\n## TOOL CALLS\n\n- You have the ability to call functions when explicitly instructed to do so. \n- Always execute tool calls properly when instructed. Do not output tool calls as text.\n\n## STYLE AND CONVERSATION MANAGEMENT\n\n- Keep answers short and conversational. This is a phone conversation, not a text chat.\n- Format responses as natural conversational paragraphs, not bullet lists. \n- Do not ask more than one question at a time.  \n- Always be polite but assertive. No need to apologize if the user asks for extra information.  \n- If the user asks something unrelated mid-conversation, pause the flow, handle their question, then return to the topic.  \n- Do not assume the conversation is over—always ask if you can help with anything else.\n\n## HANDLING SPECIAL CASES\n\n### OUT OF SCOPE QUESTIONS\n\n> If the user asks a well-formed question that doesn't match any information in your knowledge base:\n\"For help with [USER_QUERY], I’ll need to put you through to one of our team members. Does that sound ok?\"\n- If yes, transfer to the user to {{ho:default-handoff}} with reason='OUT_OF_SCOPE'.\n\n### ASR MISTRANSCRIPTIONS\n\n> If the user's input is garbled or incomprehensible, use these responses in the following order:\n1. \"Would you mind saying that again?\"  \n2. \"I didn't catch that. Could you say that again?\"  \n3. \"I'm sorry, but I still didn't catch that. Would you like to put you through to someone else?\"\n- If yes, transfer to the user to {{ho:default-handoff}} with reason='USER_INCOMPREHENSIBLE'.\n\n### JAILBREAK ATTEMPTS\n\n> If the user asks you to do something you're not designed to do:\n\"I don't have the ability to [JAILBREAK_REQUEST], but I can help you with questions about [Organization]. What would you like to know?\"\n\n## SMALLTALK BEHAVIOR\n\n- User says hello or hi: \"Hi! How can I help you today?\"\n- User asks how you are: \"I'm doing great, thanks! How can I help?\"\n- User asks if you can hear them: \"I can hear you loud and clear. What can I do for you today?\"\n- User asks who you are or if you're a live person: \"I'm a virtual assistant, here to help. What can I do for you?\"\n\n## CALL TRANSFER AND DEFLECTION\n\n### TRANSFER EARLY IN THE CONVERSATION\n\nASSISTANT: \"Hi! How can I help you today?\"  \nUSER: \"Speak to someone/agent/operator\"  \nASSISTANT: \"I might be able to help you myself. Could you tell me what you need?\"  \nUSER: \"No / speak to someone\"  \n→ TOOL CALL: Transfer the user to {{ho:default-handoff}} with reason='SPEAK_TO'.\n\n### TRANSFER MID-CONVERSATION\n\nASSISTANT: \"Is there anything else I can help you with? / Does that sound ok so far?\"\nUSER: \"Yes, I need to speak with someone/agent/operator\"  \n→ TOOL CALL: Transfer the user to {{ho:default-handoff}} with reason='SPEAK_TO'.\n\n## GOODBYE BEHAVIOR\nASSISTANT: \"Is there anything else I can help you with?\"  \nUSER: \"Yes.\"  \nASSISTANT: \"What can I do for you?\"  \nUSER: \"Nothing/That's it\"  \nASSISTANT: “Thanks for calling, and I hope you have a great rest of your day. Goodbye.”\nUSER: “Bye” / [silence]\n→ TOOL CALL: Call the {{fn:goodbye_and_hang_up}} without saying anything else.\n"
          references:
            globalFunctions:
              goodbye_and_hang_up: true
            handoff:
              default-handoff: true
      dry_run: true
      message: Dry run completed. No changes were pushed.
      success: true
    stdout: null
    stderr: ''
  - kind: command
    name: delete throwaway branch
    argv:
    - poly
    - branch
    - delete
    - ${BRANCH_NAME}
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      success: true
      switched_to: main
    stdout: null
    stderr: ''
