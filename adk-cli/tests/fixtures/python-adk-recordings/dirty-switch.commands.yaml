schema_version: 3
source:
  implementation: python-adk
  recorder: rust-httpmock-forwarding
  server: real-agent-studio
  poly_binary: ${PYTHON_ADK_BIN:-poly}
  region: us-1
  account_id: ben-ws
  project_id: PROJECT-JTQKOKLM
  project_name: Test
replay_notes:
- This manifest records Python ADK branch switch behavior with local dirty files.
- The first branch switch is expected to fail because --force is omitted.
- The second branch switch uses --force and discards the local edit.
- The branch is deleted at the end of the recorded workflow.
httpmock_recording: dirty-switch.httpmock.yaml
workflows:
- name: dirty_switch
  description: Create a branch, dirty the local checkout, capture switch-without-force failure, force switch to main, then delete the branch.
  mutates_real_server: true
  cleanup:
  - poly branch delete ${BRANCH_NAME} --json --path ${TMP}/ben-ws/PROJECT-JTQKOKLM
  steps:
  - kind: command
    name: init real project before dirty switch
    argv:
    - poly
    - init
    - --json
    - --base-path
    - ${TMP}
    - --region
    - us-1
    - --account_id
    - ben-ws
    - --project_id
    - PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      root_path: ${TMP}/ben-ws/PROJECT-JTQKOKLM
      success: true
    stdout: null
    stderr: ''
  - kind: command
    name: create throwaway branch
    argv:
    - poly
    - branch
    - create
    - ${BRANCH_NAME}
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      branch_name: ${BRANCH_NAME}
      new_branch_id: BRANCH-MUHWIK4X
      success: true
    stdout: null
    stderr: ''
  - kind: file_edit
    name: append dirty switch edit
    operation: append_text
    path: agent_settings/rules.txt
    content: |2


      # ADK recording dirty switch edit
      This line makes branch switching require --force.
    target: null
    replacement: null
    success: true
    error: null
  - kind: command
    name: switch to main without force fails with dirty tree
    argv:
    - poly
    - branch
    - switch
    - main
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 1
    stdout_json:
      error: Cannot switch branches with uncommitted changes. Use --force to switch and discard changes.
      success: false
      traceback: |
        Traceback (most recent call last):
          File "${PYTHON_ADK_ROOT}/src/poly/cli.py", line 1051, in _run_command
            cls.branch_switch(
            ~~~~~~~~~~~~~~~~~^
                args.path,
                ^^^^^^^^^^
            ...<5 lines>...
                from_projection=args.from_projection,
                ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^
            )
            ^
          File "${PYTHON_ADK_ROOT}/src/poly/cli.py", line 2077, in branch_switch
            switch_ok, projection = project.switch_branch(
                                    ~~~~~~~~~~~~~~~~~~~~~^
                branch_name,
                ^^^^^^^^^^^^
            ...<3 lines>...
                on_save=on_save,
                ^^^^^^^^^^^^^^^^
            )
            ^
          File "${PYTHON_ADK_ROOT}/src/poly/project.py", line 2314, in switch_branch
            raise ValueError(
                "Cannot switch branches with uncommitted changes. Use --force to switch and discard changes."
            )
        ValueError: Cannot switch branches with uncommitted changes. Use --force to switch and discard changes.
    stdout: null
    stderr: ''
  - kind: command
    name: force switch to main discards dirty tree
    argv:
    - poly
    - branch
    - switch
    - main
    - --json
    - --force
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      branch_name: main
      success: true
    stdout: null
    stderr: ''
  - kind: command
    name: status after force switch
    argv:
    - poly
    - status
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      deleted_files: []
      files_with_conflicts: []
      modified_files: []
      new_files: []
    stdout: null
    stderr: ''
  - kind: command
    name: delete throwaway branch after switch
    argv:
    - poly
    - branch
    - delete
    - ${BRANCH_NAME}
    - --json
    - --path
    - ${TMP}/ben-ws/PROJECT-JTQKOKLM
    exit_code: 0
    stdout_json:
      success: true
    stdout: null
    stderr: ''
