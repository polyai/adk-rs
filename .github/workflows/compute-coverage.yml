name: compute-untested-slop-risk

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  RUFF_VERSION: "0.14.2"
  TY_VERSION: "0.0.35"
  CRAP_THRESHOLD: "30"

jobs:
  compute-untested-slop-risk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    - name: Specify Rust toolchain
      run: rustup toolchain install stable --profile minimal
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Install ADK parity tools
      run: |
        curl -LsSf "https://astral.sh/ruff/${RUFF_VERSION}/install.sh" | sh
        curl -LsSf "https://astral.sh/ty/${TY_VERSION}/install.sh" | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    - name: Install LLVM Coverage
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Install cargo-crap
      run: cargo install cargo-crap
    - name: Restore base CRAP report cache
      if: github.event_name == 'pull_request'
      id: restore-base-crap
      uses: actions/cache/restore@v5
      with:
        path: coverage-base
        key: crap-report-${{ github.event.pull_request.base.sha }}
        enableCrossOsArchive: true
    - name: Run coverage and CRAP reports
      env:
        HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        BASE_CACHE_HIT: ${{ steps.restore-base-crap.outputs.cache-hit }}
      run: |
        report_args=(
          --output-dir .
          --html-dir coverage-html
          --pr-comment-output crap-pr-comment.md
          --repo-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          --commit-ref "$HEAD_SHA"
        )

        if [ "$BASE_CACHE_HIT" = "true" ]; then
          report_args+=(--baseline coverage-base/crap-report.json)
        fi

        bash .github/scripts/run_crap_coverage.sh "${report_args[@]}"
    - name: Prepare main CRAP report cache
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        mkdir -p coverage-base
        cp crap-report.json coverage-base/crap-report.json
    - name: Save main CRAP report cache
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      continue-on-error: true
      uses: actions/cache/save@v5
      with:
        path: coverage-base
        key: crap-report-${{ github.sha }}
        enableCrossOsArchive: true
    - name: Add CRAP report to summary
      run: |
        {
          cat crap-pr-comment.md
          echo
          echo "Full reports are attached to this workflow run."
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Upload coverage and CRAP reports
      id: upload-reports
      uses: actions/upload-artifact@v6
      with:
        name: coverage-and-crap-reports
        path: |
          coverage-html/
          coverage-base/
          lcov.info
          crap-full-report.md
          crap-report.json
    - name: Add report links to summary
      run: |
        {
          echo
          echo "Full reports: [coverage-and-crap-reports artifact](${{ steps.upload-reports.outputs.artifact-url }})"
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Post CRAP metric PR comment
      if: github.event_name == 'pull_request'
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPORT_URL: ${{ steps.upload-reports.outputs.artifact-url }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        marker="<!-- adk-rs-cargo-crap-report -->"
        body_file="$(mktemp)"
        report_url="${REPORT_URL:-$RUN_URL}"
        {
          echo "$marker"
          echo
          cat crap-pr-comment.md
          echo
          echo "Full reports: [coverage-and-crap-reports artifact]($report_url) ([workflow run]($RUN_URL))."
        } > "$body_file"

        comment_ids="$(
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id"
        )"
        comment_id="$(printf '%s\n' "$comment_ids" | sed -n '1p')"
        duplicate_comment_ids="$(printf '%s\n' "$comment_ids" | sed '1d')"

        if [ -n "$comment_id" ]; then
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
            -F "body=@${body_file}" \
            --silent
        else
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -F "body=@${body_file}" \
            --silent
        fi

        for duplicate_comment_id in $duplicate_comment_ids; do
          gh api \
            --method DELETE \
            "repos/${GITHUB_REPOSITORY}/issues/comments/${duplicate_comment_id}" \
            --silent
        done
