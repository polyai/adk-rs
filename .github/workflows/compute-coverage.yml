name: compute-untested-slop-risk

on:
  pull_request:
  push:
    branches: [main]

env:
  RUFF_VERSION: "0.14.2"
  TY_VERSION: "0.0.35"

jobs:
  compute-untested-slop-risk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Specify Rust toolchain
      run: rustup toolchain install stable --profile minimal
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Install ADK parity tools
      run: |
        curl -LsSf "https://astral.sh/ruff/${RUFF_VERSION}/install.sh" | sh
        curl -LsSf "https://astral.sh/ty/${TY_VERSION}/install.sh" | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    - name: Install LLVM Coverage
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Install cargo-crap
      run: cargo install cargo-crap
    - name: Run llvm-cov
      run: cargo llvm-cov --lcov --output-path lcov.info
    - name: Run cargo-crap
      run: cargo crap --lcov lcov.info --threshold 30
