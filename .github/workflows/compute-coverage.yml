name: compute-untested-slop-risk

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  RUFF_VERSION: "0.14.2"
  TY_VERSION: "0.0.35"

jobs:
  compute-untested-slop-risk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Specify Rust toolchain
      run: rustup toolchain install stable --profile minimal
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Install ADK parity tools
      run: |
        curl -LsSf "https://astral.sh/ruff/${RUFF_VERSION}/install.sh" | sh
        curl -LsSf "https://astral.sh/ty/${TY_VERSION}/install.sh" | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    - name: Install LLVM Coverage
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Install cargo-crap
      run: cargo install cargo-crap
    - name: Run llvm-cov
      run: cargo llvm-cov --workspace --lcov --output-path lcov.info
    - name: Run cargo-crap
      run: |
        CRAP_EXCLUDES=(
          --exclude 'tests/**'
          --exclude 'src/tests.rs'
          --exclude 'src/testing.rs'
          --exclude 'src/*_test.rs'
          --exclude 'src/**/*_test.rs'
          --exclude 'src/*_tests.rs'
          --exclude 'src/**/*_tests.rs'
          --exclude 'src/**/tests.rs'
          --exclude 'src/**/testing.rs'
        )

        cargo crap --workspace "${CRAP_EXCLUDES[@]}" --lcov lcov.info --threshold 30 --top 25
        cargo crap --workspace "${CRAP_EXCLUDES[@]}" --lcov lcov.info --threshold 30 --top 25 --format pr-comment --output crap-pr-comment.md
        {
          echo "## CRAP metric"
          echo
          cat crap-pr-comment.md
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Post CRAP metric PR comment
      if: github.event_name == 'pull_request'
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        marker="<!-- adk-rs-cargo-crap-report -->"
        body_file="$(mktemp)"
        {
          echo "$marker"
          echo
          cat crap-pr-comment.md
        } > "$body_file"

        comment_id="$(
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" \
            | head -n 1
        )"

        if [ -n "$comment_id" ]; then
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
            -F "body=@${body_file}" \
            --silent
        else
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -F "body=@${body_file}" \
            --silent
        fi
