name: Lint/Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:

env:
  CARGO_TERM_COLOR: always
  RUFF_VERSION: "0.14.2"
  TY_VERSION: "0.0.35"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Specify Rust toolchain
      run: rustup toolchain install stable --profile minimal
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Format check
      run: cargo fmt --all -- --check
    - name: Clippy check
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: Specify Node.js toolchain
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: adk-napi/package-lock.json
    - name: Version lock-step check
      run: |
        node <<'NODE'
        const { execFileSync } = require("node:child_process");
        const { readFileSync } = require("node:fs");

        const metadata = JSON.parse(
          execFileSync("cargo", ["metadata", "--format-version", "1", "--no-deps"], {
            encoding: "utf8",
          }),
        );
        const npmPackage = JSON.parse(readFileSync("adk-napi/package.json", "utf8"));
        const npmLock = JSON.parse(readFileSync("adk-napi/package-lock.json", "utf8"));
        const workspaceVersions = new Map(
          metadata.packages
            .filter((pkg) => pkg.source === null && pkg.name.startsWith("poly-adk"))
            .map((pkg) => [pkg.name, pkg.version]),
        );
        const rustVersions = new Set(workspaceVersions.values());

        if (rustVersions.size !== 1) {
          console.error("Rust workspace crate versions are not in lock-step:");
          for (const [name, version] of workspaceVersions) {
            console.error(`  ${name}: ${version}`);
          }
          process.exit(1);
        }

        const [rustVersion] = rustVersions;
        if (npmPackage.version !== rustVersion) {
          console.error(
            `adk-napi/package.json version ${npmPackage.version} does not match Rust workspace version ${rustVersion}`,
          );
          process.exit(1);
        }

        const lockfileRootVersion = npmLock.packages?.[""]?.version;
        if (npmLock.version !== npmPackage.version || lockfileRootVersion !== npmPackage.version) {
          console.error(
            `adk-napi/package-lock.json versions do not match package.json version ${npmPackage.version}`,
          );
          console.error(`  package-lock root version: ${npmLock.version}`);
          console.error(`  package-lock packages[""].version: ${lockfileRootVersion}`);
          process.exit(1);
        }

        console.log(`Rust workspace and npm package versions are both ${rustVersion}`);
        NODE
    - name: N-API wrapper test
      working-directory: adk-napi
      run: |
        npm ci
        npm test
    - name: Install ADK parity tools
      run: |
        curl -LsSf "https://astral.sh/ruff/${RUFF_VERSION}/install.sh" | sh
        curl -LsSf "https://astral.sh/ty/${TY_VERSION}/install.sh" | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    - name: Cargo test
      run: cargo test --workspace
