name: Slack Release Notification

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

permissions: {}

jobs:
  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    if: ${{ inputs.plan != '' && !fromJson(inputs.plan).announcement_tag_is_implicit }}
    steps:
      - name: Build Slack payload
        shell: bash
        env:
          PLAN_JSON: ${{ inputs.plan }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          release_tag="$(jq -r '.announcement_tag' <<< "${PLAN_JSON}")"
          release_body="$(jq -r '.announcement_github_body // "No release notes provided."' <<< "${PLAN_JSON}")"
          release_summary="$(awk 'NF { sub(/\r$/, ""); print; found=1; exit } END { if (!found) print "No release notes provided." }' <<< "${release_body}")"
          if [ "${#release_summary}" -gt 500 ]; then
            release_summary="${release_summary:0:500}..."
          fi

          jq -n \
            --arg text "Release ${release_tag}: ${release_summary} | Update with poly self-update." \
            --arg tag "${release_tag}" \
            --arg notes "${release_summary}" \
            --arg repository_url "${REPOSITORY_URL}" \
            '{
              text: $text,
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*Release:* `" + $tag + "`\n*Notes:* " + $notes)
                  },
                  accessory: {
                    type: "button",
                    text: {
                      type: "plain_text",
                      text: "Repo",
                      emoji: true
                    },
                    url: $repository_url
                  },
                  expand: false
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: "Update with `poly self-update`."
                    }
                  ]
                }
              ]
            }' > slack-payload.json

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured"
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header "Content-Type: application/json" \
            --data @slack-payload.json \
            "${SLACK_WEBHOOK_URL}"
