name: Slack Release Notification

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

permissions: {}

jobs:
  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    if: ${{ inputs.plan != '' && !fromJson(inputs.plan).announcement_tag_is_implicit }}
    steps:
      - name: Build Slack payload
        shell: bash
        env:
          PLAN_JSON: ${{ inputs.plan }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          release_tag="$(jq -r '.announcement_tag' <<< "${PLAN_JSON}")"
          release_body="$(jq -r '.announcement_github_body // "No release notes provided."' <<< "${PLAN_JSON}")"
          release_notes="$(
            awk '
              function trim(value) {
                sub(/^[[:space:]]+/, "", value)
                sub(/[[:space:]]+$/, "", value)
                return value
              }

              {
                sub(/\r$/, "")
                trimmed = trim($0)

                if (!started && (trimmed == "" || tolower(trimmed) ~ /^#{1,6}[[:space:]]+release notes[[:space:]]*$/)) {
                  next
                }

                if (started && tolower(trimmed) ~ /^#{1,6}[[:space:]]+install polyai adk([[:space:]]|$)/) {
                  exit
                }

                started = 1
                lines[++count] = $0
              }

              END {
                while (count > 0 && trim(lines[count]) == "") {
                  count--
                }

                if (count == 0) {
                  print "No release notes provided."
                  exit
                }

                for (i = 1; i <= count; i++) {
                  print lines[i]
                }
              }
            ' <<< "${release_body}"
          )"
          release_preview="$(
            awk '
              {
                sub(/\r$/, "")
                line = $0
                sub(/^[[:space:]]+/, "", line)
                sub(/[[:space:]]+$/, "", line)

                if (line == "" || line ~ /^#{1,6}[[:space:]]+/) {
                  next
                }

                sub(/^[-*][[:space:]]+/, "", line)
                print line
                found = 1
                exit
              }

              END {
                if (!found) {
                  print "No release notes provided."
                }
              }
            ' <<< "${release_notes}"
          )"

          release_notes_limit=1500
          if [ "${#release_notes}" -gt "${release_notes_limit}" ]; then
            release_notes="${release_notes:0:${release_notes_limit}}..."
          fi

          jq -n \
            --arg text "Release ${release_tag}: ${release_preview} | Update with poly self-update." \
            --arg tag "${release_tag}" \
            --arg notes "${release_notes}" \
            --arg repository_url "${REPOSITORY_URL}" \
            '{
              text: $text,
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*Release:* `" + $tag + "`\n*Notes:*\n" + $notes)
                  },
                  accessory: {
                    type: "button",
                    text: {
                      type: "plain_text",
                      text: "Repo",
                      emoji: true
                    },
                    url: $repository_url
                  },
                  expand: false
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: "Update with `poly self-update`."
                    }
                  ]
                }
              ]
            }' > slack-payload.json

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured"
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header "Content-Type: application/json" \
            --data @slack-payload.json \
            "${SLACK_WEBHOOK_URL}"
