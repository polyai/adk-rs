[workspace]
members = [
  "adk-cli",
  "adk-command-gen",
  "adk-core",
  "adk-io",
  "adk-api-client",
  "adk-ffi",
  "adk-protobuf",
  "adk-types",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/polyai/adk-rs"
rust-version = "1.95.0"

[workspace.dependencies]
# ADK crates
adk-cli = { package = "poly-adk-cli", version = "0.1.0", path = "adk-cli" }
adk-command-gen = { package = "poly-adk-command-gen", version = "0.1.0", path = "adk-command-gen" }
adk-core = { package = "poly-adk-core", version = "0.1.0", path = "adk-core" }
adk-ffi = { package = "poly-adk-ffi", version = "0.1.0", path = "adk-ffi" }
adk-io = { package = "poly-adk-io", version = "0.1.0", path = "adk-io" }
adk-api-client = { package = "poly-adk-api-client", version = "0.1.0", path = "adk-api-client" }
adk-protobuf = { package = "poly-adk-protobuf", version = "0.1.0", path = "adk-protobuf" }
adk-types = { package = "poly-adk-types", version = "0.1.0", path = "adk-types" }
# 3rd-party
anyhow = "1"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
base64 = "0.22"
prost = "0.14"
prost-types = "0.14"
uuid = { version = "1", features = ["v4"] }
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
indexmap = { version = "2", features = ["serde"] }
chrono = { version = "0.4", features = ["serde"] }
walkdir = "2"
sha2 = "0.10"
similar = "2"
globset = "0.4"
regex = "1"
fancy-regex = "0.14"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "blocking"] }
url = "2"
rich_rust = { version = "0.2.1", features = ["backtrace"] }
httpmock = { version = "0.8.3", features = ["record"] }
ruff_python_parser = { package = "littrs-ruff-python-parser", version = "0.6.2" }
