[workspace]
members = [
  "adk-cli",
  "adk-core",
  "adk-domain",
  "adk-io",
  "adk-platform-api",
  "adk-ffi",
  "adk-protobuf",
]
resolver = "2"

[workspace.package]
version = "0.15.3"
edition = "2024"
license = "Apache-2.0"
authors = ["PolyAI"]
repository = "https://github.com/polyai/adk-rs"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
base64 = "0.22"
prost = "0.14"
prost-types = "0.14"
uuid = { version = "1", features = ["v4"] }
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
indexmap = { version = "2", features = ["serde"] }
chrono = { version = "0.4", features = ["serde"] }
walkdir = "2"
sha2 = "0.10"
similar = "2"
globset = "0.4"
regex = "1"
fancy-regex = "0.14"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "blocking"] }
url = "2"
rich_rust = { version = "0.2.1", features = ["backtrace"] }
httpmock = { version = "0.8.3", features = ["record"] }
ruff_python_parser = { package = "littrs-ruff-python-parser", version = "0.6.2" }
