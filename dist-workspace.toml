[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
ci = "github"
# Only the CLI package is a cargo-dist application.
packages = ["poly-adk"]
installers = ["shell"]
targets = ["aarch64-apple-darwin", "x86_64-unknown-linux-gnu"]
github-build-setup = "dist/github-build-setup.yml"
# Keep release PR checks cheap; tagged releases build and upload artifacts.
pr-run-mode = "plan"
# Send Slack notifications after cargo-dist finishes announcing a release.
post-announce-jobs = ["./slack-release-notification"]
# Use the product name in release notes, while keeping the crates.io package name.
display-name = "PolyAI ADK"

# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false

[dist.bin-aliases]
poly = ["adk"]

[dist.github-custom-runners.x86_64-unknown-linux-gnu]
runner = "ubuntu-latest"
